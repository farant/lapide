<blockquote>
<p>Thật sự và trong lương tâm tôi, tôi là kẻ ngu dốt nhất trong loài người, và sự khôn ngoan của loài người không ở nơi tôi; tôi là một đứa trẻ nhỏ không biết lối ra lối vào của mình.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_vi.html#life">Phần Mở Đầu — Tiểu Sử Cornelius a Lapide</a></cite>
</blockquote>
