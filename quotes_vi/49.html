<blockquote>
<p>Không tác giả nào trác tuyệt hơn Thiên Chúa; không nghệ thuật nào hữu hiệu hơn Lời Thiên Chúa; không nguyên nhân nào tốt đẹp hơn việc điều thiện hảo được tạo dựng bởi Đấng Thiện Hảo.</p>
<cite>— Thánh Augustinô, trong Cornelius a Lapide, <a href="01_genesis_01_vi.html#verse-4">Chú Giải Sáng Thế Ký, Chương I — "Và Thiên Chúa Thấy Ánh Sáng Tốt Đẹp"</a></cite>
</blockquote>
