<blockquote>
<p>Các Kitô hữu cầu nguyện quay mặt về hướng Đông, để nhớ lại vườn địa đàng, nơi họ đã bị trục xuất vì tội lỗi.</p>
<cite>— Thánh Gioan Kim Khẩu, Thêôđôrêtô và Đamascênô, in Cornelius a Lapide, <a href="01_genesis_02_vi.html#verse-8">Chú Giải Sáng Thế Ký, Chương II — "Và Chúa là Thiên Chúa đã trồng một vườn địa đàng khoái lạc"</a></cite>
</blockquote>
