<blockquote>
<p>Lời nói thần linh của Kinh Thánh là một dòng sông vừa cạn vừa sâu, nơi chiên con có thể lội qua và voi có thể bơi lặn.</p>
<cite>— Thánh Grêgôriô, trong Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_vi.html#chapter-v">Lời Tựa và Ngợi Ca Kinh Thánh — Chương V: Về Các Tâm Thế Cần Thiết cho Việc Nghiên Cứu Này</a></cite>
</blockquote>
