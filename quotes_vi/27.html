<blockquote>
<p>Không có một âm tiết nào, thậm chí không có một nét bút nào trong Kinh Thánh mà trong chiều sâu của nó không ẩn giấu một kho tàng lớn lao.</p>
<cite>— Thánh Gioan Kim Khẩu, trong Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_vi.html#chapter-iv">Lời Tựa và Ngợi Ca Kinh Thánh — Chương IV: Các Nhận Định và Gương Mẫu của Các Giáo Phụ</a></cite>
</blockquote>
