<blockquote>
<p>Lạy Chúa, Chúa đã dựng nên chúng con cho Chúa, và lòng chúng con không yên nghỉ cho đến khi được nghỉ yên trong Chúa. Trời đất kêu lên, lạy Chúa, rằng chúng con phải yêu mến Chúa.</p>
<cite>— Thánh Augustinô, trong Cornelius a Lapide, <a href="01_genesis_01_vi.html#he-created">Chú Giải Sáng Thế Ký, Chương I — "Người Đã Tạo Dựng"</a></cite>
</blockquote>
