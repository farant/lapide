<blockquote>
<p>Ngài đã thổi hơi, để cho thấy rằng việc Thiên Chúa tạo dựng linh hồn cũng dễ dàng như việc con người hít thở.</p>
<cite>— Thêôđôrêtô, in Cornelius a Lapide, <a href="01_genesis_02_vi.html#verse-7">Chú Giải Sáng Thế Ký, Chương II — "Và Chúa là Thiên Chúa đã nặn con người từ bùn đất"</a></cite>
</blockquote>
