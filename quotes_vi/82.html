<blockquote>
<p>Trong tất cả những việc mà người ta tìm kiếm lợi ích, không gì tốt hơn nông nghiệp, không gì phong phú hơn, không gì ngọt ngào hơn, không gì xứng đáng hơn với một người tự do.</p>
<cite>— Cicero, in Cornelius a Lapide, <a href="01_genesis_02_vi.html#verse-15">Chú Giải Sáng Thế Ký, Chương II — "Chúa là Thiên Chúa đã đem con người đặt vào địa đàng"</a></cite>
</blockquote>
