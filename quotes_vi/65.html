<blockquote>
<p>Vậy miệng con người là gì, nếu không phải là một cung thánh của lời nói, một suối nguồn của diễn từ, một đại sảnh của ngôn ngữ, một kho tàng của ý chí?</p>
<cite>— Thánh Ambrôsiô, in Cornelius a Lapide, <a href="01_genesis_02_vi.html#verse-7">Chú Giải Sáng Thế Ký, Chương II — "Và Chúa là Thiên Chúa đã nặn con người từ bùn đất"</a></cite>
</blockquote>
