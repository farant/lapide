<blockquote>
<p>Chúng ta đã bị vị Giám mục của Giáo hội này đánh bại; ngài vượt trên mọi lời đe dọa, vững vàng hơn trong lý lẽ, mạnh mẽ hơn trước những lời dụ dỗ ngọt ngào. Phải tìm một người nhút nhát hơn mà thử.</p>
<cite>— Modestô, trong Cornelius a Lapide, <a href="01_Preliminares_vi.html#dedicatory-letter">Phần Mở Đầu — Thư Dâng Tặng</a></cite>
</blockquote>
