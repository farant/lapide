<blockquote>
<p>Đây là phương châm của A-ben: "Lễ vật béo tốt tôi sẽ dâng; lễ vật gầy còm tôi sẽ không hiến tế." Ngược lại, phương châm của Ca-in: "Tôi sẽ hiến tế cái gầy còm; lễ vật béo tốt tôi sẽ không dâng."</p>
<cite>— Thánh Ambrôsiô, trong Cornelius a Lapide, <a href="01_genesis_04_vi.html#ch4-verse-3">Chú Giải Sáng Thế Ký, Chương IV — "Sau nhiều ngày"</a></cite>
</blockquote>
