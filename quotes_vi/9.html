<blockquote>
<p>Trong đền thờ Thiên Chúa, mỗi người dâng hiến điều mình có thể: người thì dâng vàng, bạc và đá quý; người thì dâng vải gai mịn, vải tía, vải đỏ thắm và vải xanh biếc; với chúng tôi thì cũng tốt rồi nếu chúng tôi dâng được da thú và lông dê.</p>
<cite>— Thánh Giêrônimô, <a href="02_Clemens_Hieronymi_Du_Culte_vi.html#helmeted-prologue">Lời Tựa Mang Giáp Trụ</a></cite>
</blockquote>
