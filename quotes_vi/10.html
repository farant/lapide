<blockquote>
<p>Vì tiếng nói sống động có một sức mạnh tiềm ẩn nào đó, và khi được tuôn chảy từ miệng tác giả vào tai người học trò, nó vang lên mạnh mẽ hơn.</p>
<cite>— Thánh Giêrônimô, <a href="02_Clemens_Hieronymi_Du_Culte_vi.html#jerome-to-paulinus">Giêrônimô Gửi Paulinô</a></cite>
