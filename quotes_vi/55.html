<blockquote>
<p>Chỉ chiếu sáng mà thôi thì hư không, chỉ cháy mà thôi thì ít ỏi, vừa cháy vừa chiếu sáng mới là trọn hảo.</p>
<cite>— Thánh Bênađô, trong Cornelius a Lapide, <a href="01_genesis_01_vi.html#verse-16">Chú Giải Sáng Thế Ký, Chương I — "Và Thiên Chúa Làm Hai Vầng Sáng Lớn"</a></cite>
</blockquote>
