<blockquote>
<p>Chúng ta hãy học ở trần gian những điều mà tri thức về chúng sẽ tồn tại cùng ta trên thiên đàng. Hãy học như thể bạn sẽ sống mãi; hãy sống như thể bạn sẽ luôn chết.</p>
<cite>— Thánh Giêrônimô, trong Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_vi.html#chapter-iv">Lời Tựa và Ngợi Ca Kinh Thánh — Chương IV: Các Nhận Định và Gương Mẫu của Các Giáo Phụ</a></cite>
</blockquote>
