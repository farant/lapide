<blockquote>
<p>Khi Thiên Chúa thông ban hơi thở và linh hồn của chính Ngài cho con người, Ngài đã thông ban chính mình Ngài, như thể Ngài đã đặt trái tim của chính Ngài vào trong con người.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_02_vi.html#verse-7">Chú Giải Sáng Thế Ký, Chương II — "Và Chúa là Thiên Chúa đã nặn con người từ bùn đất"</a></cite>
</blockquote>
