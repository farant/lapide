<blockquote>
<p>Không có gì có thể so sánh được với Nước Trời; vì cả thế giới, dù đặt lên bàn cân, cũng không thể so sánh với một linh hồn duy nhất.</p>
<cite>— Menas, trong Cornelius a Lapide, <a href="01_genesis_01_vi.html#verse-16">Chú Giải Sáng Thế Ký, Chương I — "Và Thiên Chúa Làm Hai Vầng Sáng Lớn"</a></cite>
</blockquote>
