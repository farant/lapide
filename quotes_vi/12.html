<blockquote>
<p>Đây là những trò trẻ con, giống như trò chơi của bọn lang băm — dạy điều mình không biết; hay đúng hơn, nói với sự phẫn nộ, thậm chí không biết rằng mình không biết.</p>
<cite>— Thánh Giêrônimô, <a href="02_Clemens_Hieronymi_Du_Culte_vi.html#jerome-to-paulinus">Giêrônimô Gửi Paulinô</a></cite>
