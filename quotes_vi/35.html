<blockquote>
<p>Uống mãi hay ăn mãi, cái nào tốt hơn? Chắc chắn, cũng như cả hai đều cần phải luân phiên, thì cầu nguyện và nghiên cứu Kinh Thánh cũng cần được thực hiện thay đổi nhau.</p>
<cite>— Giođanô, trong Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_vi.html#saintly-examples">Lời Tựa và Ngợi Ca Kinh Thánh — Gương Mẫu Thánh Thiện về Việc Nghiên Cứu Kinh Thánh</a></cite>
</blockquote>
