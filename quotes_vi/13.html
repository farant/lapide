<blockquote>
<p>Tôi xin anh, người anh em thân mến nhất, hãy sống giữa những điều này, hãy suy gẫm chúng, không biết gì khác, không tìm kiếm gì khác. Anh không thấy rằng ngay tại đây trên trần gian đã là nơi cư ngụ của Nước Trời hay sao?</p>
<cite>— Thánh Giêrônimô, <a href="02_Clemens_Hieronymi_Du_Culte_vi.html#jerome-to-paulinus">Giêrônimô Gửi Paulinô</a></cite>
</blockquote>
