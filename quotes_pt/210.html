<blockquote>
<p>A todos os hóspedes que chegam ou partem, com a cabeça inclinada ou com todo o corpo prostrado no chão, seja Cristo adorado neles, pois é também Ele que neles se recebe.</p>
<cite>— São Bento, em Cornelius a Lapide, <a href="01_genesis_18_pt.html#verse-2">Comentário sobre o Génesis, Capítulo XVIII — «Três homens»</a></cite>
</blockquote>
