<blockquote>
<p>Toda nobreza teve um início ignóbil: e os que se gloriam na nobreza dos seus antepassados gloriam-se não na sua própria virtude, mas na alheia. E isto, portanto, é vaidade.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_38_pt.html#moral-reflection">Comentário sobre o Génesis, Capítulo XXXVIII — «Reflexão moral: Sobre a origem da nobreza»</a></cite>
</blockquote>
