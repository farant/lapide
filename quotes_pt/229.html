<blockquote>
<p>Este bosque era o oratório e o retiro de Abraão, ao qual de tempos a tempos se retirava dos cuidados e dos negócios, quando ia tratar com Deus.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_21_pt.html#verse-33">Comentário sobre o Génesis, Capítulo XXI — «Plantou um bosque»</a></cite>
</blockquote>
