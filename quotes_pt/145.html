<blockquote>
<p>Se a natureza comum não te comove, que ao menos te comova a minha imagem; pois o homem é a minha imagem. Vê portanto que, ao matá-lo, não destruas a imagem viva do Rei celeste.</p>
<cite>— São João Crisóstomo, em Cornelius a Lapide, <a href="01_genesis_09_pt.html#verse-9-6">Comentário sobre o Génesis, Capítulo IX — «Quem derramar sangue humano»</a></cite>
</blockquote>
