<blockquote>
<p>Aquela servidão conquistou-me esta soberania, aquela venda elevou-me a esta glória; aquela aflição foi para mim a ocasião desta honra; aquela inveja produziu-me esta fama.</p>
<cite>— São João Crisóstomo, em Cornelius a Lapide, <a href="01_genesis_45_pt.html#father-of-pharaoh">Comentário sobre o Génesis, Capítulo XLV — «Pai do Faraó»</a></cite>
