<blockquote>
<p>Isto deve ser considerado por nós com tremor: que o Deus justo e omnipotente, quando Se ira pelos pecados precedentes, permite que a mente cega caia em outros ainda maiores.</p>
<cite>— São Gregório, em Cornelius a Lapide, <a href="01_genesis_15_pt.html#verse-15-16">Comentário sobre o Génesis, Capítulo XV — «Na quarta geração»</a></cite>
</blockquote>
