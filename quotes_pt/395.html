<blockquote>
<p>O caminho para Deus é fácil, porque se caminha descarregando; seria difícil se se caminhasse carregando. Portanto, descarrega-te a tal ponto que, postas de lado todas as coisas, negues a ti mesmo.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_pt.html#chapter-ii">Meditações — Capítulo II</a></cite>
</blockquote>
