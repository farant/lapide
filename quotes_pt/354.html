<blockquote>
<p>Nos infortúnios inesperados, o conhecimento é mais leve do que a dúvida: pois uma vez conhecida a coisa, pode encontrar-se um caminho para a salvação; a hesitação nada resolve.</p>
<cite>— Fílon, em Cornelius a Lapide, <a href="01_genesis_42_pt.html#verse-29">Comentário sobre o Génesis, Capítulo XLII — «Contaram-lhe tudo»</a></cite>
</blockquote>
