<blockquote>
<p>Filhos caríssimos, persisti na confissão da fé; Cristo já vos espera com os Seus santos; combatei pelas vossas almas e mostrai-vos fiéis a Cristo.</p>
<cite>— Santa Felicidade, em Cornelius a Lapide, <a href="01_genesis_49_pt.html#gad">Comentário sobre o Génesis, Capítulo XLIX — «A Profecia e Bênção de Gad»</a></cite>
