<blockquote>
<p>Melquisedec é chamado sacerdote do Deus Altíssimo, não só porque ele próprio servia a Deus, mas também porque convertia e encorajava outros à fé e ao culto d'Ele.</p>
<cite>— São Dionísio, em Cornelius a Lapide, <a href="01_genesis_14_pt.html#verse-14-18">Comentário sobre o Génesis, Capítulo XIV — «Melquisedec — pão e vinho»</a></cite>
</blockquote>
