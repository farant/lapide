<blockquote>
<p>O Amado suportou-te; suporta tu também o Amado. Os teus pecados não O venceram; que os Seus flagelos também não te vençam a ti, e obterás a bênção.</p>
<cite>— São Bernardo, em Cornelius a Lapide, <a href="01_genesis_35_pt.html#verse-9">Comentário sobre o Génesis, Capítulo XXXV — «Deus apareceu de novo a Jacob»</a></cite>
</blockquote>
