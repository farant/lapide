<blockquote>
<p>Não sejam as coisas temporais a causa da tua paz, pois ela será tão vil e frágil quanto elas o são. Uma tal paz partilhá-la-ás com os animais brutos; que a tua seja com os anjos, isto é, a paz que procede da verdade.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_pt.html#chapter-i">Meditações — Capítulo I</a></cite>
</blockquote>
