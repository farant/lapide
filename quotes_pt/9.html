<blockquote>
<p>No templo de Deus, cada um oferece o que pode: uns oferecem ouro, prata e pedras preciosas; outros oferecem linho, púrpura, escarlate e jacinto. Connosco se passa bem, se oferecermos peles e pêlos de cabras.</p>
<cite>— S. Hieronymus, <a href="02_Clemens_Hieronymi_Du_Culte_pt.html#helmeted-prologue">Prólogo Galeato</a></cite>
</blockquote>
