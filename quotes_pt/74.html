<blockquote>
<p>A árvore da vida é a cruz de Cristo, que, erguida no meio do paraíso, isto é, da Igreja, dá vida ao mundo: a ela desejando subir, a Esposa diz: «Subirei à palmeira e colherei os seus frutos doces ao meu paladar.»</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_02_pt.html#the-tree-of-life">Comentário sobre o Génesis, Capítulo II — «A Árvore da Vida»</a></cite>
</blockquote>
