<blockquote>
<p>Este é o lema de Abel: «Uma oferenda gorda darei; uma magra não sacrificarei.» Pelo contrário, o de Caim: «Sacrificarei a magra; a oferenda gorda não darei.»</p>
<cite>— Santo Ambrósio, em Cornelius a Lapide, <a href="01_genesis_04_pt.html#ch4-verse-3">Comentário sobre o Génesis, Capítulo IV — «Passados Muitos Dias»</a></cite>
</blockquote>
