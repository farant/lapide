<blockquote>
<p>Um engenho dócil é louvável mesmo sem mestre. Não consideramos o que achais, mas o que buscais. A cera mole e fácil de moldar, ainda que cessem as mãos do artífice e do escultor, todavia em potência é tudo o que pode ser.</p>
<cite>— S. Hieronymus, <a href="02_Clemens_Hieronymi_Du_Culte_pt.html#jerome-to-paulinus">Jerónimo a Paulino</a></cite>
</blockquote>
