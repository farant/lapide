<blockquote>
<p>Pois é próprio do homem sábio separar-se dos prazeres da carne, elevar a alma e retirá-la do corpo. Pois isto é o que significa conhecer-se a si mesmo como ser humano.</p>
<cite>— Santo Ambrósio, em Cornelius a Lapide, <a href="01_genesis_24_pt.html#verse-63">Comentário sobre o Génesis, Capítulo XXIV — «Para meditar»</a></cite>
</blockquote>
