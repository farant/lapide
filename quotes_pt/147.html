<blockquote>
<p>Todo homem justo, quando começa a purificar-se, primeiro repele de si tudo o que é obscuro, impuro e temerário. Com efeito, toda a impudência e culpa é obscura e alimenta-se dos mortos como o corvo.</p>
<cite>— Santo Ambrósio, in Cornelius a Lapide, <a href="01_genesis_08_pt.html#ch8-verse-7">Comentário sobre o Génesis, Capítulo VIII — «O Corvo»</a></cite>
</blockquote>
