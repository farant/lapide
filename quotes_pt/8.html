<blockquote>
<p>Verdadeiramente e na minha consciência, sou eu o mais insensato dos homens, e a sabedoria dos homens não está comigo; sou um menino pequeno que não sabe a sua entrada nem a sua saída.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_pt.html#life">Preliminares — Vida de Cornelius a Lapide</a></cite>
</blockquote>
