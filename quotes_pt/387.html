<blockquote>
<p>Pedi-me outra coisa, e os vossos méritos receberão a sua recompensa. Esquecei aquele homem: pois o Rei de França não vinga as injúrias do Duque de Orleães.</p>
<cite>— Luís XII, em Cornelius a Lapide, <a href="01_genesis_50_pt.html#verse-21">Comentário ao Génesis, Capítulo L — «Com brandura e suavidade»</a></cite>
</blockquote>
