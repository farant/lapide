<blockquote>
<p>Se alguém cortasse todos os cabelos da tua cabeça, não te faria mal, a não ser quando tocasse nos que ainda estão agarrados ao couro cabeludo. Assim nada te faz mal a não ser que alguém toque naquelas coisas que fixaram as suas raízes em ti pelo desejo.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_pt.html#chapter-iv">Meditações — Capítulo IV</a></cite>
</blockquote>
