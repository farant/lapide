<blockquote>
<p>O prazer bestial provém dos sentidos da carne; o prazer diabólico, de toda a soberba, inveja e engano; o prazer filosófico, de conhecer a criação; o prazer angélico, de conhecer e amar a Deus.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_pt.html#chapter-iii">Meditações — Capítulo III</a></cite>
