<blockquote>
<p>A Igreja é o lugar dos Anjos, o lugar dos Arcanjos, o reino de Deus, o próprio céu; e se não o credes, olhai para esta mesa, isto é, o altar.</p>
<cite>— São João Crisóstomo, em Cornelius a Lapide, <a href="01_genesis_28_pt.html#verse-17">Comentário sobre o Génesis, Capítulo XXVIII — «Quão terrível é este lugar»</a></cite>
