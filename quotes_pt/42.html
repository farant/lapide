<blockquote>
<p>Fizeste-nos, Senhor, para Vós, e o nosso coração está inquieto até que repouse em Vós. O céu e a terra clamam, Senhor, para que Vos amemos.</p>
<cite>— Santo Agostinho, em Cornelius a Lapide, <a href="01_genesis_01_pt.html#he-created">Comentário sobre o Génesis, Capítulo I — «Criou»</a></cite>
