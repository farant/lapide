<blockquote>
<p>Conduz-me, ó Pai, e Tu, senhor do alto firmamento, aonde te aprouver: nenhuma demora há em obedecer; aqui estou, pronto.</p>
<cite>— Cleantes, in Cornelius a Lapide, <a href="01_genesis_17_pt.html#verse-23">Comentário sobre o Génesis, Capítulo XVII — «Imediatamente naquele dia»</a></cite>
</blockquote>
