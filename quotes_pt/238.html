<blockquote>
<p>Se portanto és tentado, desprezado, sofredor, enfraquecido, entristecido, difamado, mortificado, atormentado, e mesmo suspenso ou queimado, imita Isaac: é pouca coisa; pensa na eternidade.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_22_pt.html#verse-10">Comentário sobre o Génesis, Capítulo XXII — «Arrebatou a espada»</a></cite>
</blockquote>
