<p>Os mártires dizem a Deus: <em>«Por vossa causa somos postos à morte o dia inteiro»</em>; tu dizes a quaisquer coisas vis: Por vossa causa sou perturbado o dia inteiro.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_pt.html#chapter-iv">Meditações — Capítulo IV</a></cite>
