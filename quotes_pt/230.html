<blockquote>
<p>O juramento é uma coisa sagrada, na qual se interpõe a autoridade e a veracidade divinas, que por isso não se deve tomar temerariamente nem levianamente, mas com um espírito confirmado e certo de muitas maneiras.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_21_pt.html#verse-31">Comentário sobre o Génesis, Capítulo XXI — «Bersabé»</a></cite>
</blockquote>
