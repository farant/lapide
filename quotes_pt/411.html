<blockquote>
<p>Qualquer coisa que te aconteça, enquanto a tua alma não cair no movimento da ira, do ódio, da tristeza ou do medo, nem nas suas causas, nada te prejudicará no século futuro.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_pt.html#chapter-xiii">Meditações — Capítulo XIII</a></cite>
</blockquote>
