<blockquote>
<p>Deus age frequentemente connosco deste modo: ordena e exige um acto difícil, mas quando vê uma obediência voluntária, contenta-Se com ela e suspende a execução.</p>
<cite>— São João Crisóstomo, em Cornelius a Lapide, <a href="01_genesis_22_pt.html#verse-12">Comentário sobre o Génesis, Capítulo XXII — «Não estendas a tua mão»</a></cite>
</blockquote>
