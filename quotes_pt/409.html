<blockquote>
<p>Isto é, em suma, toda a depravação humana: abandonar o que é melhor do que nós mesmos, isto é, Deus; e ocupar-se com o que é inferior a nós mesmos, apegando-se a isso no gozo, isto é, as coisas temporais.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_pt.html#chapter-ix">Meditações — Capítulo IX</a></cite>
</blockquote>
