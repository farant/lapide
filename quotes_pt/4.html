<blockquote>
<p>A morte, por sua vez, ser-me-á um benefício: pois mais depressa me enviará a Deus, para quem vivo e exerço o meu ministério, e em grande parte já morri, e para quem há muito me apresso.</p>
<cite>— S. Basilius Magnus, <a href="01_Preliminares_pt.html#dedicatory-letter">Preliminares — Carta Dedicatória</a></cite>
</blockquote>
