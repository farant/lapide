<blockquote>
<p>Rogo-te, irmão caríssimo, viver entre estas coisas, meditar nelas, não conhecer nada mais, não buscar nada mais. Não te parece que já aqui na terra se encontra a morada do reino celeste?</p>
<cite>— S. Hieronymus, <a href="02_Clemens_Hieronymi_Du_Culte_pt.html#jerome-to-paulinus">Jerónimo a Paulino</a></cite>
</blockquote>
