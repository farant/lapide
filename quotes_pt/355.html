<blockquote>
<p>Os que sofrem fazem proposições universais sobre coisas pequenas, de modo que se têm poucos males, dizem que têm todos os males; e se lhes faltam poucos bens, dizem que tudo lhes falta.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_42_pt.html#verse-36">Comentário sobre o Génesis, Capítulo XLII — «Fizestes-me ficar sem filhos»</a></cite>
</blockquote>
