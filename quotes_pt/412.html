<blockquote>
<p>Vê como Deus te pica em qualquer direcção que te estendas para além dele pelo desejo das criaturas — como uma ama que pica o braço de uma criança estendido para fora do berço, para que não pereça de frio.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_pt.html#chapter-xiv">Meditações — Capítulo XIV</a></cite>
</blockquote>
