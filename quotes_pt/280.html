<blockquote>
<p>«O diabo nada odeia mais do que alguém humilde e amante de Deus.» O mesmo santo numa visão viu o mundo cheio de laços dos demónios, e perguntou: «Quem os evitará, Senhor?» O Senhor respondeu: «A humildade.»</p>
<cite>— Santo António, em Cornelius a Lapide, <a href="01_genesis_29_pt.html#verse-32">Comentário sobre o Génesis, Capítulo XXIX — «Ruben»</a></cite>
</blockquote>
