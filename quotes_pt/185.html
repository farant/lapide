<blockquote>
<p>As riquezas são minhas, tu pertences às tuas riquezas: pois as riquezas estão ao serviço do sábio, mas o insensato está no poder das riquezas.</p>
<cite>— Séneca, em Cornelius a Lapide, <a href="01_genesis_14_pt.html#verse-14-23">Comentário sobre o Génesis, Capítulo XIV — «De um fio até à correia da sandália»</a></cite>
</blockquote>
