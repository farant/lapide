<blockquote>
<p>São Martinho recusou privar o presbítero Brício, seu caluniador, do seu ofício, dizendo: «Se Cristo suportou Judas, por que não hei-de eu suportar Brício?»</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_45_pt.html#charity-of-joseph">Comentário sobre o Génesis, Capítulo XLV — «A caridade de José»</a></cite>
</blockquote>
