<blockquote>
<p>O Abade João, visitando o anacoreta Pésio, perguntou-lhe que progresso fizera em 40 anos no deserto. Ele respondeu: «Que o sol que tudo ilumina nunca me viu a comer, nem irado.»</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_26_pt.html#verse-29-examples">Comentário sobre o Génesis, Capítulo XXVI — «Exemplos dos pacíficos»</a></cite>
</blockquote>
