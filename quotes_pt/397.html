<blockquote>
<p>O princípio do regresso à verdade é desagradar-se de si mesmo na falsidade. A correcção é precedida pela repreensão. Pois não se cuida de mudar o que não desagrada.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_pt.html#chapter-ii">Meditações — Capítulo II</a></cite>
