<blockquote>
<p>Foi justamente condenada a soberba, pela qual sucedeu que o homem que dava ordens ao homem não fosse entendido, ele que não quis entender para obedecer a Deus que dava ordens.</p>
<cite>— Santo Agostinho, em Cornelius a Lapide, <a href="01_genesis_11_pt.html#verse-11-8">Comentário sobre o Génesis, Capítulo XI — «E assim os dividiu»</a></cite>
</blockquote>
