<blockquote>
<p>Deus permitiu que Lot fosse capturado em Sodoma, para castigar a sua escolha precipitada e sensual, pela qual, atraído pela fertilidade do lugar, preferira habitar entre os impiíssimos Sodomitas.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_14_pt.html#verse-14-12">Comentário sobre o Génesis, Capítulo XIV — «Lot capturado»</a></cite>
</blockquote>
