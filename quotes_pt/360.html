<blockquote>
<p>Anacarsis disse que na videira há três cachos e três cálices. O primeiro cálice, disse, bebe-se pela saúde; o segundo pelo prazer; o terceiro pela embriaguez, pela injúria e pela loucura.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_43_pt.html#verse-34">Comentário sobre o Génesis, Capítulo XLIII — «Versículo 34»</a></cite>
</blockquote>
