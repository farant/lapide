<blockquote>
<p>Aquele cristão a quem Juliano o Apóstata perguntou com sarcasmo: «Que faz o vosso carpinteiro galileu?» respondeu: «Está a preparar-vos um caixão.»</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_40_pt.html#verse-22">Comentário sobre o Génesis, Capítulo XL — «Para que a verdade do intérprete fosse provada»</a></cite>
</blockquote>
