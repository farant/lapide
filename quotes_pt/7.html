<blockquote>
<p>Sou habitante somente da cela — que me é fiel, mais querida do que toda a terra, e que me parece um céu terrestre — e somente do silêncio; sou morador da cela e seguidor do sagrado Museu, e esforço-me por ser habitante do céu.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_pt.html#life">Preliminares — Vida de Cornelius a Lapide</a></cite>
</blockquote>
