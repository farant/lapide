<blockquote>
<p>Não está sujeito à proscrição dos bens aquele que nada possui: a não ser que porventura necessites destes andrajos rotos e gastos, e de uns poucos livros, nos quais residem todas as minhas posses e riquezas.</p>
<cite>— S. Basilius Magnus, <a href="01_Preliminares_pt.html#dedicatory-letter">Preliminares — Carta Dedicatória</a></cite>
</blockquote>
