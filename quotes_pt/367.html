<blockquote>
<p>O Espírito Santo não permanece nos homens tristes, aflitos, melancólicos, e portanto torpes e preguiçosos, mas nos alegres, joviais, vigorosos, enérgicos e activos.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_45_pt.html#verse-27">Comentário sobre o Génesis, Capítulo XLV — «O seu espírito reviveu»</a></cite>
</blockquote>
