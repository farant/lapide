<blockquote>
<p>Pois esta é a verdadeira mansidão — não quando alguém ofendido pelos mais poderosos o suporta com doçura, mas quando alguém ofendido mesmo por aqueles que são considerados inferiores cede.</p>
<cite>— São João Crisóstomo, in Cornelius a Lapide, <a href="01_genesis_26_pt.html#verse-20">Comentário sobre o Génesis, Capítulo XXVI — «É nossa»</a></cite>
</blockquote>
