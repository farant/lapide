<blockquote>
<p>São coisas pueris e semelhantes ao espectáculo dos charlatães: ensinar o que se ignora; ou antes, para falar com indignação, nem sequer saber que não se sabe.</p>
<cite>— S. Hieronymus, <a href="02_Clemens_Hieronymi_Du_Culte_pt.html#jerome-to-paulinus">Jerónimo a Paulino</a></cite>
