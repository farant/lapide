<blockquote>
<p>미래의 일까지 알고자 하는 욕구에 사로잡힌 이가 있다면, 그의 마음을 깨끗이 할지어다. 나는 하느님을 섬기는 영혼이 다시 태어난 그 순결함 안에 머물러 있다면, 마귀들보다 더 많이 알 수 있다고 믿나이다.</p>
<cite>— 성 안토니오, 코르넬리우스 아 라피데, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_Pt1_ko.html#chapter-v">성경의 서문과 찬양 — "제5장: 이 학문에 필요한 준비에 관하여"</a></cite>
</blockquote>
