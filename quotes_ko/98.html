<blockquote>
<p>여기서 마귀와 하느님의 서로 다른 성품을 주목하라. 마귀는 하찮은 쾌락으로 사람을 넘어뜨린 뒤, 곧바로 비참과 혼란의 깊은 곳에 쓰러져 있는 그를 버려서, 보는 모든 이에게 가련한 구경거리가 되게 한다. 그러나 하느님은 비록 가련한 원수라 할지라도 그를 도와주시어, 그를 입히시고 가리어 주신다.</p>
<cite>— 코르넬리우스 아 라피데, <a href="01_genesis_03_ko.html#verse-21">창세기 제3장 주석 — "하느님이 아담과 그의 아내에게 가죽옷을 만들어 주셨다"</a></cite>
</blockquote>
