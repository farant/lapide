<blockquote>
<p>하느님은 말씀하여도 다 말할 수 없으시고, 헤아려도 다 헤아릴 수 없으시며, 정의하여도 그 정의 자체가 더욱 커지시는 분이시니, 이는 하늘을 손으로 덮으시고 온 세상의 둘레를 주먹으로 감싸시는 분이시기 때문이니이다. 만물이 그를 알지 못하면서도 두려워함으로써 아느니이다.</p>
<cite>— 성 나지안조, 코르넬리우스 아 라피데, <a href="01_genesis_01_ko.html#god-elohim">창세기 제1장 주석 — "하느님(엘로힘): 열세 가지 정의"</a></cite>
</blockquote>
