<blockquote>
<p>이집트와 시리아의 왕으로서 1180년경 그리스도인들에게서 성지를 빼앗은 살라딘은 죽음을 앞두고 자기 진영 전체에 장례용 수의를 매단 깃발을 돌리게 하고 전령에게 이렇게 외치게 하였다: "시리아와 이집트의 지배자 살라딘이 자기 모든 영토에서 이제 가져갈 것은 오직 이것뿐이니라."</p>
<cite>— 코르넬리우스 아 라피데, <a href="01_genesis_02_ko.html#verse-17">창세기 제2장 주석 — "제17절: 선악을 알게 하는 나무의 열매를 먹지 말라"</a></cite>
</blockquote>
