<blockquote>
<p>이 작은 맡겨진 양 떼와, 이로부터 받은 크지 아니한 녹봉에 대하여 주님의 날에 올바른 답변을 드릴 수만 있다면 그것으로 더없이 행복하리라 여기겠나이다. 대저 잘 돌본 영혼들에 대하여서도, 바르게 사용한 재물에 대하여서도, 세인들이 일반적으로 생각하거나 염려하는 것보다 더 엄격한 심판이 있을 것이기 때문이니이다.</p>
<cite>— 복자 요한 피셔, <a href="01_Preliminares_ko.html#dedicatory-letter">서론 — 봉헌 서한</a></cite>
</blockquote>
