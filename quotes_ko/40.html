<blockquote>
<p>하느님의 가장 충실한 종 모세는 그토록 위대한 직무를 사양함에 겸손하였고, 받아들임에 순종하였으며, 지킴에 충실하였고, 수행함에 강건하였으며, 백성을 다스림에 깨어 있었고, 바로잡음에 엄격하였으며, 사랑함에 열렬하였고, 견딤에 인내하였느니이다.</p>
<cite>— 성 아우구스티노, 코르넬리우스 아 라피데, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ko.html#praises-of-moses">성경의 서문과 찬양 — "성경과 교부들의 모세 찬양"</a></cite>
</blockquote>
