<blockquote>
<p>마귀는 죽음을 여러 부분과 여러 해로 나누어, 젊은이들에게 이렇게 설득한다: "너는 청춘의 꽃과 활력 속에서 죽지 않을 것이다." 학생들에게는 이렇게 설득한다: "너는 학업을 마치기 전에 죽지 않을 것이다." 요컨대 아무리 늙은 사람이라도 적어도 한 해는 더 살 것이라고 생각하지 않는 이가 없다. 여기에서 가장 참된 격언이 나온다: 죽음은 모든 사람 각자에게, 모든 사람 각자가 생각하는 것보다 더 가까이 있다.</p>
<cite>— 코르넬리우스 아 라피데, <a href="01_genesis_03_ko.html#verse-4">창세기 제3장 주석 — "너희가 결코 죽지 아니하리라"</a></cite>
</blockquote>
