<blockquote>
<p>죄, 곧 죄의 벌은 개나 케르베로스처럼 매복하여 죄의 문 앞을 죄의 복수자로서 에워싸고 있으니, 이것은 네가 악을 행하자마자 네 곁에 있을 것이요, 너를 향하여 짖을 것이요, 너를 물고 찢을 것이다. 이 개는 양심의 벌레요, 마음의 혼란과 분노요, 죄인의 머리를 위협하시는 하느님의 진노요, 환난과 고뇌와 현세 및 영원의 모든 고통이니, 하느님께서 이것으로 죄를 벌하시는 것이다.</p>
<cite>— 코르넬리우스 아 라피데, <a href="01_genesis_04_ko.html#ch4-verse-7">창세기 제4장 주석 — "네가 잘 행하면"</a></cite>
</blockquote>
