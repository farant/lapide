<blockquote>
<p>우리는 옷을 벗는 것이 아니라, 탐욕의 기만으로 부패한 옛 사람을 벗는 것이다. 주님, 감사하나이다. 이 옷과 함께 죄도 벗을 수 있사오니, 뱀 때문에 우리가 그것을 입었고 그리스도 때문에 우리가 그것을 벗기 때문이다. 이렇게 추위로 거의 죽게 된 그들은 화염에 넘겨졌고, 하늘의 천사들이 그들의 승리의 관을 보여 주었다.</p>
<cite>— 사십 위 순교자, 코르넬리우스 아 라피데, <a href="01_genesis_03_ko.html#verse-21">창세기 제3장 주석 — "하느님이 아담과 그의 아내에게 가죽옷을 만들어 주셨다"</a></cite>
</blockquote>
