<blockquote>
<p>시간적인 것과 영원한 것의 차이는 이러하니, 시간적인 것은 소유하기 전에 더 사랑하다가 얻으면 하찮아지나니, 이는 불멸하는 기쁨의 참되고 확실한 영원성이 아니고서는 영혼을 만족시킬 수 없기 때문이니이다. 그러나 영원한 것은 갈망할 때보다 얻은 뒤에 더 열렬히 사랑하게 되나니, 거기서 사랑은 믿음이 믿었거나 희망이 바랐던 것보다 더 많은 것을 얻게 되기 때문이니이다.</p>
<cite>— 성 아우구스티노, 코르넬리우스 아 라피데, <a href="01_genesis_01_ko.html#verse-14">창세기 제1장 주석 — "제14절: 궁창에 빛이 있으라"</a></cite>
</blockquote>
