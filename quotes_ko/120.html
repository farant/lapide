<blockquote>
<p>이와 같이 마카리오는 하느님과 함께 하늘에 거하면서 자신에게 이렇게 말하곤 하였다. "너에게는 천사들과 대천사들과 모든 하늘의 능력들과 케루빔과 세라핌과 이 모든 것의 창조주이신 하느님이 계시니, 거기에 머물러라. 하늘 아래로 내려오지 말라. 세속적인 생각에 빠지지 말라."</p>
<cite>— 성 마카리오, in 코르넬리우스 아 라피데, <a href="01_genesis_05_ko.html#ch5-verse-22">창세기 제5장 주석 — "에녹이 하느님과 동행하였더라"</a></cite>
</blockquote>
