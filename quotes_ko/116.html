<blockquote>
<p>골고타는 일찍이 해골의 이름을 따서 불린 곳이니,<br />여기가 세상의 중심이요, 여기가 승리의 표징이라.<br />우리 선조들은 이곳에서 커다란 유골이 발견되었다 전하였고,<br />이곳에 첫 사람이 묻혔다 하는 말을 우리가 전해 받았으니,<br />이곳에서 그리스도께서 수난하시매 거룩한 피로 땅이 적셔지고,<br />옛 아담의 먼지가 그리스도의 피와 뒤섞여<br />떨어지는 물의 능력으로 씻기게 되었느니라.</p>
<cite>— 테르툴리아누스, in 코르넬리우스 아 라피데, <a href="01_genesis_05_ko.html#ch5-verse-5">창세기 제5장 주석 — "그리고 그가 죽었더라"</a></cite>
</blockquote>
