<blockquote>
<p>오 아담아, 내가 너를 한 곳에 두었거늘, 다른 곳에서 너를 발견하는구나. 영광으로 너를 입혔고, 네가 내 앞에서 영광스럽게 걸었거늘, 이제는 네가 벌거벗고 숨을 곳을 찾는 모습을 보는구나. 뱀의 그 장엄한 약속들은 이제 어디에 있느냐? 네 마음의 처음 그 평온함은 어디에 있느냐? 정신의 안전은 어디에 있느냐? 양심의 평화와 확신은 어디에 있느냐? 그 많은 선의 소유와 모든 악으로부터의 자유는 어디에 있느냐?</p>
<cite>— 코르넬리우스 아 라피데, <a href="01_genesis_03_ko.html#verse-9">창세기 제3장 주석 — "네가 어디 있느냐?"</a></cite>
</blockquote>
