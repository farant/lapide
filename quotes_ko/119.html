<blockquote>
<p>하느님과 동행하는 법을 아는 것은 큰 기술이니, 어디에서나 하느님을 현존하시는 분으로 모시고, 자신을 그분과 결합시키며, 만사에 그분께 순종하고, 자주 그분과 대화하며, 그분의 도움을 간구하고, 그분께 의지하며, 그분의 다스리심을 받고, 온전히 그분과 하나 되는 것이다. 하느님과 동행하는 자는 사람들과도 잘 동행하거니와, 사람들과만 동행하는 자는 하느님과도, 사람들과도 잘 동행하지 못하느니라.</p>
<cite>— 코르넬리우스 아 라피데, <a href="01_genesis_05_ko.html#ch5-verse-22">창세기 제5장 주석 — "에녹이 하느님과 동행하였더라"</a></cite>
</blockquote>
