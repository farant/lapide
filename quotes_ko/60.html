<blockquote>
<p>사람아, 너는 다스리기 위하여 태어난 존재이니라. 어찌하여 정념의 종에게 비참한 종살이를 하는가! 어찌하여 자신을 죄에게 천한 노예로 넘기는가! 어찌하여 스스로 악마의 포로이자 종이 되는가! 하느님께서 너에게 피조물 가운데 으뜸 자리를 차지하라 명하셨거늘, 보라 네가 그 큰 통치의 존엄을 스스로 내던지고 밀어내는도다.</p>
<cite>— 성 바실리오, 코르넬리우스 아 라피데, <a href="01_genesis_01_ko.html#verse-26">창세기 제1장 주석 — "제26절: 우리의 모습과 닮은꼴대로 사람을 만들자"</a></cite>
</blockquote>
