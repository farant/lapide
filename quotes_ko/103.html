<blockquote>
<p>그러므로 새롭게 된 자의 새로운 믿음, 곧 강하고, 꽃피며, 덕의 증가를 얻는 믿음 — 느슨하지 않고, 지치지 않으며, 어떤 노쇠함에 시들지 않고, 활력이 둔하지 않은 — 이 믿음이야말로 제사에 합당한 것이니, 이는 지혜의 푸른 새싹으로 돋아나고, 신적 지식의 젊은 열정으로 붉게 물드는 것이다.</p>
<cite>— 성 암브로시오, in 코르넬리우스 아 라피데, <a href="01_genesis_04_ko.html#ch4-verse-3">창세기 제4장 주석 — "여러 날이 지난 후에"</a></cite>
</blockquote>
