<blockquote>
<p>아담으로 말미암아 죽음이 왔고, 그리스도로 말미암아 생명이 왔다. 뱀이 하와를 유혹하였고, 마리아는 가브리엘에게 동의하였다. 그러나 하와의 유혹은 죽음을 가져왔고, 마리아의 동의는 세상에 구세주를 낳았다. 마리아를 통하여 하와로 말미암아 멸망한 것이 회복되었고, 그리스도를 통하여 아담으로 말미암아 사로잡힌 것이 구속되었으며, 가브리엘을 통하여 마귀로 말미암아 절망에 빠진 것에 약속이 주어졌다.</p>
<cite>— 성 요한 크리소스토모, 코르넬리우스 아 라피데, <a href="01_genesis_03_ko.html#verse-15">창세기 제3장 주석 — "그 여자가 네 머리를 부수리라 (원시 복음)"</a></cite>
</blockquote>
