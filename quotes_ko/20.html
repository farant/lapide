<blockquote>
<p>마치 동산에서 푸른 나무와 꽃의 싹 사이를, 혹은 사과의 빛나는 표면 사이를 지나가는 이가 적어도 그 향기와 빛깔에 의해 상쾌함을 얻지 않을 수 없고, 마치 햇볕 아래 걷는 자가 비록 산책을 위해서일지라도 저절로 따뜻해지고 붉은 빛을 띠게 되는 것을 보듯이, 성경을 경건하고 꾸준히 읽고 듣고 배우는 이들의 정신과 감각과 뜻과 소망과 품행은 마치 신성의 빛으로 물들고 거룩한 감동으로 불붙지 않을 수 없는 것이니이다.</p>
<cite>— 코르넬리우스 아 라피데, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_Pt1_ko.html#chapter-i">성경의 서문과 찬양 — "제1장: 성경의 탁월함, 필요성, 그리고 열매에 관하여"</a></cite>
</blockquote>
