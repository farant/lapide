<blockquote>
<p>은은 언어 혹은 지혜의 빛남이요, 광맥은 성경이니, 이는 분명히 말하자면 이러하니이다: 참된 설교의 말씀을 준비하는 자는 반드시 그 논거의 원천을 거룩한 성경에서 가져와야 하며, 자기가 말하는 모든 것을 신적 권위의 기초 위로 돌이키고, 그 위에 자기 언변의 건물을 굳건히 세워야 하느니이다.</p>
<cite>— 성 그레고리오, 코르넬리우스 아 라피데, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_Pt1_ko.html#chapter-i">성경의 서문과 찬양 — "제1장: 성경의 탁월함, 필요성, 그리고 열매에 관하여"</a></cite>
</blockquote>
