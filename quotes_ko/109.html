<blockquote>
<p>이와 같이 동정 순교자 성녀 크리스티나는 아버지 우르바누스의 은 우상들을 부수고, 굳건한 의지로 그의 감언을 경멸하고 그의 위협을 조롱하였으니, 채찍으로도 갈고리로도 그녀의 살을 찢어 그 절개를 바꿀 수 없었다. 오히려 자기 살점을 아버지에게 던지며 이르되: "이 살을 먹어라, 비참한 자여 — 네가 낳은 살을. 네 딸을 삼킬 수 있을지언정, 네 불경에 동의하게 할 수는 결코 없으리라." 보라, 결연한 의지가 정념과 고통과 폭군과 죽음을 어떻게 지배하는지를.</p>
<cite>— 코르넬리우스 아 라피데, <a href="01_genesis_04_ko.html#ch4-verse-7">창세기 제4장 주석 — "네가 잘 행하면"</a></cite>
</blockquote>
