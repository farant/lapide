<blockquote>
<p>에녹이 엘리야와 마찬가지로 아직 죽지 아니하였다는 것은 신앙 조항에 버금가는 것이다. 이에 테르툴리아누스는 그들을 영원의 후보자라 일컬으니, "영원의 후보자로서 그들은 육신이 모든 악덕과 모든 해로움과 모든 상해와 모욕에서 면제됨을 배우느니라"고 하였다. 또한 이레네오는 그들을 "불멸의 첫 시작에 참여하는 자들"이라 불렀으니, 곧 그 징조와 말하자면 그 예표를 받는 자들이라는 뜻이다.</p>
<cite>— 코르넬리우스 아 라피데, <a href="01_genesis_05_ko.html#ch5-verse-24">창세기 제5장 주석 — "보이지 아니하였으니"</a></cite>
</blockquote>
