<blockquote>
<p>세쿤두스 철학자가 하드리아누스 황제에게 "사람이란 무엇인가?"라는 질문을 받았을 때, 그는 이렇게 대답하였다: "육신을 입은 정신이요, 시간의 환영이요, 삶의 관찰자요, 지나가는 나그네요, 고달픈 영혼이니이다." 에픽테토스는 또한 이렇게 말하였다: "사람이란 바람 속에 놓인 등불이요, 거처의 나그네요, 법의 모상이요, 재앙의 이야기요, 죽음의 종이라."</p>
<cite>— 코르넬리우스 아 라피데, <a href="01_genesis_02_ko.html#verse-7">창세기 제2장 주석 — "제7절: 주 하느님께서 땅의 진흙으로 사람을 빚으셨다"</a></cite>
</blockquote>
