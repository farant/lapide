<blockquote>
<p>우리는 예언서와 사도서를 읽으니, 이는 우리의 신앙을 기념하고, 우리의 희망을 위로하며, 우리의 사랑을 권면하기 위함이라. 서로 어우러지는 목소리들로, 마치 하늘의 나팔 소리와 같이, 우리를 현세 삶의 무기력에서 깨우고, 하늘의 부르심이라는 상급을 향해 뻗어 나아가게 하느니이다.</p>
<cite>— 성 아우구스티노, 코르넬리우스 아 라피데, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ko.html#utility-iv">성경의 서문과 찬양 — "구약성경의 여섯 가지 유용함"</a></cite>
</blockquote>
