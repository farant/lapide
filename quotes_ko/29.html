<blockquote>
<p>진리와 거룩한 지혜를 파악하고 얻기 위하여, 하느님으로서 우리 걸음의 연약함을 보시는 그분께서 닦아 놓으신 길 외에 다른 길을 닦으려 하지 말지어다. 그것은 첫째도 겸손이요, 둘째도 겸손이요, 셋째도 겸손이니, 그대가 몇 번이고 물어도 나는 같은 것을 말하리이다.</p>
<cite>— 성 아우구스티노, 코르넬리우스 아 라피데, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ko.html#chapter-v">성경의 서문과 찬양 — "제5장: 이 학문에 필요한 준비에 관하여"</a></cite>
</blockquote>
