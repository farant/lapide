<blockquote>
<p>예수께서는 당신의 특권들을 다른 이들에게 나누어 주시나니, 빛이시면서 "너희는 세상의 빛이라" 하시고, 사제이시면서 사제를 세우시며, 양이시면서 "보라, 내가 너희를 이리 가운데 양처럼 보내노라" 하시고, 반석이시면서 반석을 만드시나이다. 당신의 것을 당신 종들에게 아낌없이 주시니, 그분은 끊임없이 흘러나오는 샘과 같으시니이다.</p>
<cite>— 성 바실리오, 코르넬리우스 아 라피데, <a href="01_genesis_01_ko.html#verse-3">창세기 제1장 주석 — "제3절: 하느님이 말씀하시기를, 빛이 있으라"</a></cite>
</blockquote>
