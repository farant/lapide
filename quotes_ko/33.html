<blockquote>
<p>주님, 당신 말씀의 깊이는 경이로우니이다. 보소서, 그 표면은 우리 앞에 펼쳐져 어린이들을 어루만지나, 그 깊이는 경이롭나이다, 나의 하느님이여, 경이로운 깊이여. 그것을 들여다보는 것은 두려운 일이니, 경외의 두려움이요, 사랑의 떨림이니이다.</p>
<cite>— 성 아우구스티노, 코르넬리우스 아 라피데, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ko.html#the-fathers">성경의 서문과 찬양 — "교부들의 구약성경 옹호"</a></cite>
</blockquote>
