<blockquote>
<p>주교는 천사와 같아야 하니, 어떠한 인간적 동요나 악덕에도 굴복하지 않아야 하느니이다. 다른 이들을 다스리는 책무를 맡은 자는 마땅히 덕의 영광에서 탁월하여, 마치 해가 별들의 작은 빛을 자기의 광채 안에서 가리듯이, 다른 모든 이를 능가해야 하느니이다.</p>
<cite>— 성 요한 크리소스토모, 코르넬리우스 아 라피데, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_Pt1_ko.html#moses-virtues">성경의 서문과 찬양 — "모세의 덕행들"</a></cite>
</blockquote>
