<blockquote>
<p>낙원에는, 성 바실리오가 말하기를, 깃털의 아름다움과 타고난 노래와 감미로운 화음으로 사람을 놀랍도록 즐겁게 하는 온갖 종류의 새가 있었다. 또한 여러 동물들의 장관도 있었다. 그러나 그것들은 모두 온순하고 사람에게 순종하며 서로 화목하고 평화롭게 살고 있었다.</p>
<cite>— 성 바실리오, 코르넬리우스 아 라피데, <a href="01_genesis_02_ko.html#verse-8">창세기 제2장 주석 — "제8절: 주 하느님께서 즐거움의 동산을 심으시니"</a></cite>
</blockquote>
