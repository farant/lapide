<blockquote>
<p>하느님께서 두 사람에게 하나의 이름을 주셨으니, 이는 배우자들이 자신들이 말하자면 두 몸 안의 한 사람임을 알고, 이름으로 하나 되었듯이 영혼과 뜻으로도 하나 되어야 함을 알게 하시려 함이다. 아담이라는 이름으로 그들은 자신들이 땅의 자녀임을 상기하게 되니, 비천하고 흙으로 빚어졌으며 연약하고 죽을 수밖에 없는 존재로서 마침내 땅으로 돌아갈 운명임을 기억하게 된다. 아담아, 네가 <em>아다마</em>, 곧 흙이요 먼지임을 기억하라. 너는 먼지로 돌아가리라.</p>
<cite>— 코르넬리우스 아 라피데, <a href="01_genesis_05_ko.html#ch5-verse-2">창세기 제5장 주석 — "그 이름을 아담이라 하셨더라"</a></cite>
</blockquote>
