<blockquote>
<p>세상 자체가 그 지극히 질서 있는 변화와 운동으로, 그리고 보이는 모든 것의 아름다운 형상으로 말없이 선포하나니, 자신이 만들어진 것이며, 형언할 수 없이 보이지 않으시는 위대하신 분, 형언할 수 없이 보이지 않으시는 아름다우신 하느님이 아니고서는 만들어질 수 없었다고 외치는 것이니이다.</p>
<cite>— 성 아우구스티노, 코르넬리우스 아 라피데, <a href="01_genesis_01_ko.html#he-created">창세기 제1장 주석 — "창조하셨다"</a></cite>
</blockquote>
