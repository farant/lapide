<blockquote>
<p>여기에서 사악한 정신은 유익하게 교정되고, 미약한 정신은 양육되며, 위대한 정신은 기쁨을 얻나니, 이 가르침에 적대하는 영혼은 착오로 인하여 그것이 지극히 유익함을 알지 못하거나, 병들어 약을 미워하는 자이니이다.</p>
<cite>— 성 아우구스티노, 코르넬리우스 아 라피데, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ko.html#chapter-i">성경의 서문과 찬양 — "제1장: 성경의 탁월함, 필요성, 그리고 열매에 관하여"</a></cite>
</blockquote>
