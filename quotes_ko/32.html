<blockquote>
<p>이 참되고 진정한 지혜는 독서로 가르쳐지는 것이 아니라 성유로, 문자가 아니라 성령으로, 학식이 아니라 주님의 계명을 실천함으로써 가르쳐지느니이다. 그대들은 착각하고 있나이다, 착각하고 있나이다. 세상의 스승들에게서 오직 그리스도의 제자들, 곧 세상을 멸시하는 이들만이 하느님의 은사로 얻는 것을 찾을 수 있다고 생각한다면 말이니이다.</p>
<cite>— 성 베르나르도, 코르넬리우스 아 라피데, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_Pt1_ko.html#chapter-v">성경의 서문과 찬양 — "제5장: 이 학문에 필요한 준비에 관하여"</a></cite>
</blockquote>
