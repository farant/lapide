<blockquote>
<p>모세는 여기서 사람의 다섯 가지 원인을 제시한다. 작용인은 하느님이시다. 질료인은 땅의 진흙, 곧 물과 섞인 흙이다. 형상인은 생명의 입김이다. 모범인은 하느님이시니, 사람은 하느님의 모상이기 때문이다. 목적인은 살아 있는 영혼, 곧 살아 있는 것, 다시 말하여 느끼고, 스스로 움직이며, 자신과 다른 것들을 알고, 삶의 모든 활동을 수행하는 존재가 되는 것이다.</p>
<cite>— 코르넬리우스 아 라피데, <a href="01_genesis_02_ko.html#verse-7">창세기 제2장 주석 — "제7절: 주 하느님께서 땅의 진흙으로 사람을 빚으셨다"</a></cite>
</blockquote>
