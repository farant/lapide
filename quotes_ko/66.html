<blockquote>
<p>사람에게는 두 발이 있으니, 짐승에게는 네 발이, 새에게는 두 발이 있다. 그러므로 사람은 마치 날짐승과 같아서 시선으로 높은 곳을 추구하고 숭고한 사상의 날갯짓으로 비상하는도다. 그래서 사람에 대하여 이르시기를 "네 젊음이 독수리처럼 새로워지리라" 하셨으니, 이는 사람이 하늘의 것들에 더 가깝고 독수리보다 더 높이 솟아올라 "우리의 본향은 하늘에 있다"고 말할 수 있기 때문이라.</p>
<cite>— 성 암브로시오, 코르넬리우스 아 라피데, <a href="01_genesis_02_ko.html#verse-7">창세기 제2장 주석 — "제7절: 주 하느님께서 땅의 진흙으로 사람을 빚으셨다"</a></cite>
</blockquote>
