<blockquote>
<p>이에 모세는 성막을 빈번히 드나들었으니, 안에서는 관상에 이끌리고 밖에서는 병든 이들의 일에 시달리며, 안에서는 하느님의 비밀을 묵상하고 밖에서는 육적 인간들의 짐을 지니, 이로써 지도자들에게 모범을 보여, 밖에서 무엇을 처리해야 할지 의심될 때에는 기도를 통해 주님께 자문을 구하도록 하였느니이다.</p>
<cite>— 성 그레고리오, 코르넬리우스 아 라피데, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_Pt1_ko.html#praises-of-moses">성경의 서문과 찬양 — "성경과 교부들의 모세 찬양"</a></cite>
</blockquote>
