<blockquote>
<p>알렉산드리아 총대주교 자선왕 성 요한은 자신을 위한 무덤을 짓도록 명하되 미완성으로 남겨 두었으며, 장엄한 축일마다 많은 사람이 보는 앞에서 일꾼들이 자신에게 이렇게 말하기를 원하였다. "주교님, 주교님의 무덤이 아직 완성되지 않았나이다. 그러하오니 마침내 완성하라 명하소서. 죽음이 어느 시각에 올지 알 수 없나이다." 세네카도 말하기를, "어느 곳에서 죽음이 너를 기다리는지 알 수 없으니, 그러므로 너는 모든 곳에서 죽음을 기다리라."</p>
<cite>— 코르넬리우스 아 라피데, <a href="01_genesis_05_ko.html#ch5-verse-5">창세기 제5장 주석 — "그리고 그가 죽었더라"</a></cite>
</blockquote>
