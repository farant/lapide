<blockquote>
<p>성 파코미오의 생애에서 전하기를, 어떤 철학자가 성 파코미오의 제자 테오도로에게 세 가지 수수께끼를 제시하였는데, 테오도로가 이에 영리하게 답하였다 한다. 첫째, 태어나지 않고 죽은 자는 누구인가? 테오도로가 답하기를, 아담이라 하였다. 둘째, 태어났으되 죽지 아니한 자는 누구인가? 그가 답하기를, 들어 올려진 에녹이라 하였다. 셋째, 죽었으되 썩지 아니한 자는 누구인가? 그가 답하기를, 소금 기둥으로 변한 롯의 아내라 하였다.</p>
<cite>— 코르넬리우스 아 라피데, <a href="01_genesis_05_ko.html#ch5-verse-24">창세기 제5장 주석 — "보이지 아니하였으니"</a></cite>
</blockquote>
