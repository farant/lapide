<blockquote>
<p>여자는 남자와 마찬가지로 창조주에 의하여 덕을 행할 수 있는 존재로 창조되었다. 여자를 만드실 때 살만 취하신 것이 아니라 뼈에서 나온 뼈도 취하셨으니, 이로써 우리 여자들도 남자 못지않게 주님께 신앙의 굳건함과 항구함을, 그리고 역경에서의 인내를 돌려드려야 하는 것이다.</p>
<cite>— 성녀 율리타, 코르넬리우스 아 라피데, <a href="01_genesis_02_ko.html#verse-23">창세기 제2장 주석 — "제23절: 이는 내 뼈에서 나온 뼈로다"</a></cite>
</blockquote>
