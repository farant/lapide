<blockquote>
<p>사람의 몸에서 장인의 작품을 보라. 어떻게 뼈를 기둥처럼 세워 살이 지탱되고 이끌리게 하셨는지를 보라. 또한 양쪽, 곧 오른쪽과 왼쪽이 균등한 치수를 유지하여 발이 발에, 손이 손에, 손가락이 손가락에 하나하나 완전한 균형으로 상응하게 하셨으며, 눈이 눈에, 귀가 귀에 조화를 이루되 서로 화합할 뿐 아니라 필요한 쓰임에 적합하게 만들어졌도다.</p>
<cite>— 성 클레멘스, 코르넬리우스 아 라피데, <a href="01_genesis_02_ko.html#verse-7">창세기 제2장 주석 — "제7절: 주 하느님께서 땅의 진흙으로 사람을 빚으셨다"</a></cite>
</blockquote>
