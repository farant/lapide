<blockquote>
<p>The matter is desperate, war is upon us, a great enemy is nearby; yet nothing has befallen you beyond your hope or your will. For this you left your homeland; for this you came: you have always desired battle.</p>
<cite>— Baldric of Dol, <a href="baldricus_dolensis/Hierosolymitanae_Historiae.html#book-two">History of Jerusalem — Book Two</a></cite>
</blockquote>
