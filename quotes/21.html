<p>See how God pricks you wherever you reach out beyond him through desire for creatures — like a nurse pricking the arm of a child that has been extended outside the cradle, lest it perish from the cold.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes.html#chapter-xiv">Meditations — Chapter XIV</a></cite>
