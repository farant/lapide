<blockquote>
<p>Many carry out the will of God from the very source by which they strive to change it, and those who resist His counsel submit to it, because what issues from human effort serves His plan.</p>
<cite>— Master Bandinus, <a href="bandinus_magister/Sententiarum_I.html#distinction-XLVII">Sentences I — Distinction XLVII</a></cite>
</blockquote>
