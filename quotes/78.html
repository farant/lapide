<blockquote>
<p>This manner most effectively frees us from the death of despair and raises our minds to heavenly things, when we see that He valued us so highly that He Himself, unchangeably good, preferred to die bearing our evils.</p>
<cite>— Master Bandinus, <a href="bandinus_magister/Sententiarum_III.html#distinction-xx">Sentences III — Distinction XX</a></cite>
</blockquote>
