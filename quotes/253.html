<blockquote>
<p>He cannot be a Martyr who is not in the Church; he cannot attain to the kingdom who abandons her who is to reign.</p>
<cite>— Cyprian, in Caesar Baronius, <a href="baronius_caesar/De_Martyrologio_Romano.html#chapter-10">The Roman Martyrology — On the False Martyrs of the Heretics</a></cite>
</blockquote>
