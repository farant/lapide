<blockquote>
<p>Prudent reader, always beware of superstitious interpretation, so that you do not adjust the Scriptures to your understanding, but join your understanding to the Scriptures.</p>
<cite>— Berno of Reichenau, <a href="berno_augiae_divitis/De_Varia_Psalmorum_Modulatione.html#section-8">On the Various Modulation of Psalms and Chants — Section 8</a></cite>
</blockquote>
