<blockquote>
<p>Felicity, being pregnant, was waited for according to the laws until she gave birth: while giving birth, she was in pain; when thrown to the wild beasts, she rejoiced.</p>
<cite>— Augustine, in Caesar Baronius, <a href="baronius_caesar/De_Martyrologio_Romano.html#march-7">The Roman Martyrology — March 7</a></cite>
</blockquote>
