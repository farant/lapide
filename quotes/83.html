<blockquote>
<p>One who lies in order to console does not sin in the same way as one who lies in order to harm; nor does one who lies about the way of the earth sin as one who lies about the way of life.</p>
<cite>— Master Bandinus, <a href="bandinus_magister/Sententiarum_III.html#distinction-xxxviii">Sentences III — Distinction XXXVIII</a></cite>
</blockquote>
