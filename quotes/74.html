<blockquote>
<p>The whole was wholly assumed by me, and the whole was united to the whole, so that He might bestow salvation on the whole. For what is not capable of being assumed is itself incurable.</p>
<cite>— Master Bandinus, <a href="bandinus_magister/Sententiarum_III.html#distinction-ii">Sentences III — Distinction II</a></cite>
</blockquote>
