<cite>— Jerome, in Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae.html#chapter-iv">Preface and Praise of Sacred Scripture — Chapter IV: "The Judgments and Examples of the Fathers"</a></cite>
