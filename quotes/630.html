<blockquote>
<p>I have not lived in such a way that I would be ashamed to live among you. But neither do I fear to die, because we have a good Lord.</p>
<cite>— St. Ambrose, in Cornelius a Lapide, <a href="01_genesis_50.html#dying-words">Commentary on Genesis, Chapter L — "Dying Words of Saints and Holy Men"</a></cite>
</blockquote>
