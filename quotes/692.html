<blockquote>
<p>Marcus Antonius, when he saw his fortune passing to another, to Caesar, and that nothing was left to him except the right to die, said: "I have whatever I have given away."</p>
<cite>— Seneca, in Cornelius a Lapide, <a href="02_exodus_14.html#verse-25">Commentary on Exodus, Chapter XIV — "And He Overturned the Wheels of the Chariots"</a></cite>
</blockquote>
