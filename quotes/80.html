<p>In order to be perfected, it is born; once born, it is nourished; once nourished, it is strengthened; once strengthened, it is perfected.</p>
<cite>— Master Bandinus, <a href="bandinus_magister/Sententiarum_III.html#distinctions-xxviii-xxix">Sentences III — Distinctions XXVIII–XXIX</a></cite>
