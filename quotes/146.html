<blockquote>
<p>About the shape of heaven, we must say briefly that our authors knew what the truth holds; but the Spirit of God who spoke through them did not wish to reveal things profitable to no one's salvation.</p>
<cite>— The Venerable Bede, <a href="beda_venerabilis/De_Sex_Dierum_Creatione.html#on-the-second-day">On the Creation of the Six Days — On the Second Day</a></cite>
</blockquote>
