<blockquote>
<p>Let not temporal things be the cause of your peace, for it will be as worthless and fragile as they are. Such a peace you will share with brute animals; let yours be with the angels, that is, the peace that proceeds from truth.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes.html#chapter-i">Meditations — Chapter I</a></cite>
</blockquote>
