<p>The poor man receives help, the sad man hope, the naked man clothing; / All that you have, you make to be for all.</p>
<cite>— Venantius Fortunatus, in Bertarius of Verdun, <a href="bertarius_virdunensis/Gesta_Episcoporum_Virdunensium.html#verses-of-fortunatus">Deeds of the Bishops of Verdun — Verses of Fortunatus</a></cite>
