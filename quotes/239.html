<blockquote>
<p>No author is more excellent than God; no art more efficacious than the Word of God; no cause better than that good should be created by the Good.</p>
<cite>— Augustine, in Cornelius a Lapide, <a href="15_Genesis_Caput_Primum_Synopsis_Pt1.html#verse-4">Commentary on Genesis, Chapter I — "And God Saw the Light That It Was Good"</a></cite>
</blockquote>
