<blockquote>
<p>We ought to sing, and chant, and praise the Lord more with the soul than with the voice. Whence the holy father Benedict commands us: <em>Let us so stand for psalm-singing that our mind may accord with our voice.</em></p>
<cite>— Berno of Reichenau, <a href="berno_augiae_divitis/De_Varia_Psalmorum_Modulatione.html#section-7">On the Various Modulation of Psalms and Chants — Section 7</a></cite>
</blockquote>
