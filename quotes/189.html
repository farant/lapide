<blockquote>
<p>In the temple of God each one offers what he can: some offer gold, silver, and precious stones; others offer fine linen and purple and scarlet and hyacinth; it goes well with us if we offer skins and goats' hair.</p>
<cite>— Jerome, <a href="02_Clemens_Hieronymi_Du_Culte.html#helmeted-prologue">The Helmeted Prologue</a></cite>
</blockquote>
