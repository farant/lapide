<p>Emperor Charles V, upon hearing of the death of Thomas More, Lord Chancellor of England and Martyr, said: "In More, King Henry VIII cut off the head of all England."</p>
<cite>— Emperor Charles V, in Cornelius a Lapide, <a href="02_exodus_18.html#verse-21">Commentary on Exodus, Chapter XVIII — "Choose from All the People Able Men"</a></cite>
