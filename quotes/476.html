<blockquote>
<p>Achatius, wonderfully trained in obedience, when he was called from the grave after death by a certain elder and asked whether he had died, replied: "One who is obedient cannot die."</p>
<cite>— St. John Climacus, in Cornelius a Lapide, <a href="01_genesis_22.html#verse-10">Commentary on Genesis, Chapter XXII — "He Seized the Sword"</a></cite>
</blockquote>
