<blockquote>
<p>Let prayer arm those going out from their lodging; let it meet those returning from the street: let the body not rest on its seat before prayer has fed the soul.</p>
<cite>— St. Jerome, in Cornelius a Lapide, <a href="02_exodus_30.html#verse-1">Commentary on Exodus, Chapter XXX — "The Altar of Incense"</a></cite>
</blockquote>
