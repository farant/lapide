<blockquote>
<p>It seems reasonable to me that those whom one spirit binds with the bond of charity should not be separated by the written word; rather, a letter should join those whom the fellowship of dear friendship binds together.</p>
<cite>— Berno of Reichenau, <a href="berno_augiae_divitis/De_Varia_Psalmorum_Modulatione.html#synopsis">On the Various Modulation of Psalms and Chants — Synopsis</a></cite>
</blockquote>
