<blockquote>
<p>From a perverse will came habit, and when habit was not resisted, it became necessity; by certain links, as it were, joined one to another, a hard bondage held me fast.</p>
<cite>— St. Augustine, in Cornelius a Lapide, <a href="02_exodus_07.html#question-3">Commentary on Exodus, Chapter VII — "What Is Hardness of Heart?"</a></cite>
</blockquote>
