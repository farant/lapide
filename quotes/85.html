<blockquote>
<p>A sacrament is a visible form of invisible grace, or a sign of a sacred thing. A sign, moreover, is a thing which, beyond the appearance it presents to the senses, causes something else from itself to come to knowledge.</p>
<cite>— Master Bandinus, <a href="bandinus_magister/Sententiarum_IV.html#distinction-i">Sentences IV — Distinction I</a></cite>
</blockquote>
