<p>Obedience alone possesses the merit of faith, without which anyone is proven faithless, even if he seems to be faithful.</p>
<cite>— Gregory the Great, in Bernard of Fontcaude, <a href="bernardus_fontis_calidi/Adversus_Waldensium_Sectam.html#chapter-1">Against the Waldensian Sect — Chapter I</a></cite>
