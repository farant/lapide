<blockquote>
<p>Just as smoke drives away bees, and a foul smell drives away doves: so the wretched and putrid sin repels the guardian angel of our life.</p>
<cite>— St. Basil, in Cornelius a Lapide, <a href="02_exodus_23.html#verse-20">Commentary on Exodus, Chapter XXIII — "Behold I Send My Angel"</a></cite>
</blockquote>
