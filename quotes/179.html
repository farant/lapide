<blockquote>
<p>In those who come of their own accord, there is the presumption of recklessness; but in those who are sent, there is the service of obedience.</p>
<cite>— Bernard of Fontcaude, <a href="bernardus_fontis_calidi/Adversus_Waldensium_Sectam.html#chapter-5">Against the Waldensian Sect — Chapter V</a></cite>
</blockquote>
