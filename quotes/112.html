<blockquote>
<p>I earnestly entreat your obedience that you receive these things with the affection of charity with which they were composed by me, and that as good sons you keep the memory of your father in Christ.</p>
<cite>— Berno of Reichenau, <a href="berno_augiae_divitis/De_Consona_Tonorum_Diversitate.html#prefatory-letter">On the Harmonious Diversity of Tones — Prefatory Letter</a></cite>
</blockquote>
