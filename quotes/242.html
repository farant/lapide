<blockquote>
<p>My son, my son, remember eternal life, look up to heaven, and behold Him who reigns there: for life is not taken from you, but changed for the better.</p>
<cite>— The mother of St. Symphorian, in Cornelius a Lapide, <a href="16_Genesis_Caput_Primum_Synopsis_Pt2.html#verse-16">Commentary on Genesis, Chapter I — "And God Made Two Great Lights"</a></cite>
