<blockquote>
<p>"The devil hates nothing more than one who is humble and loves God." The same saint in a vision saw the world full of the snares of demons, and asked: "Who will escape them, Lord?" The Lord answered: "Humility."</p>
<cite>— St. Antony, in Cornelius a Lapide, <a href="01_genesis_29.html#verse-32">Commentary on Genesis, Chapter XXIX — "Reuben"</a></cite>
</blockquote>
