<p>The battle against the devil is common to women and men, and often in such combat women have fought more bravely than men and have shone with illustrious trophies.</p>
<cite>— St. Chrysostom, in Cornelius a Lapide, <a href="02_exodus_38.html#verse-8">Commentary on Exodus, Chapter XXXVIII — "The Mirrors of the Women"</a></cite>
