<blockquote>
<p>What therefore they strive to assert by the testimony of Scripture, let us utterly destroy by the same testimony. But what they seem to put forth as delusions, let us trample underfoot as being unworthy of a response.</p>
<cite>— Bonacursus Catholicus, <a href="bonacursus_catholicus/Vita_Haereticorum.html#against-the-heretics-called-cathars">The Life of the Heretics — Against the Cathars</a></cite>
</blockquote>
