<blockquote>
<p>These are childish things, similar to the games of charlatans — to teach what you do not know; or rather, to speak with indignation, not even to know that you do not know.</p>
<cite>— Jerome, <a href="02_Clemens_Hieronymi_Du_Culte.html#jerome-to-paulinus">Jerome to Paulinus</a></cite>
</blockquote>
