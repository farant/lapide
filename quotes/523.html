<blockquote>
<p>For just as it belongs to Rachel to understand, to meditate, to contemplate: so surely it belongs to Leah to weep, to groan, to sigh.</p>
<cite>— Richard of St. Victor, in Cornelius a Lapide, <a href="01_genesis_29.html#verse-24-symbolic">Commentary on Genesis, Chapter XXIX — "Symbolic: Rachel and Leah as Contemplation and Action"</a></cite>
</blockquote>
