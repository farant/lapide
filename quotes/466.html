<blockquote>
<p>God wished Abraham to be a stranger in Canaan and to be continually on pilgrimage, in order to teach us that in this life we are pilgrims and journeying toward heaven.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_20.html#verse-1">Commentary on Genesis, Chapter XX — "Abraham Departed from There"</a></cite>
</blockquote>
