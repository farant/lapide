<blockquote>
<p>The martyrs say to God: <em>"For your sake we are put to death all the day long"</em>; you say to any worthless things: For your sake I am disturbed all the day long.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes.html#chapter-iv">Meditations — Chapter IV</a></cite>
</blockquote>
