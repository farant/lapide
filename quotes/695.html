<blockquote>
<p>I can go around, O Lord, heaven and earth, sea and dry land, and nowhere shall I find You except on the cross: there You sleep, there You feed, there You rest at midday.</p>
<cite>— St. Bernard, in Cornelius a Lapide, <a href="02_exodus_15.html#verse-25">Commentary on Exodus, Chapter XV — "He Showed Him a Piece of Wood"</a></cite>
</blockquote>
