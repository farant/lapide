<blockquote>
<p>The Church is the place of Angels, the place of Archangels, the kingdom of God, heaven itself; and if you do not believe it, look at this table, that is, the altar.</p>
<cite>— St. Chrysostom, in Cornelius a Lapide, <a href="01_genesis_28.html#verse-17">Commentary on Genesis, Chapter XXVIII — "How Terrible Is This Place"</a></cite>
