<p>That Christian who was asked by Julian the Apostate with sarcasm: "What is your Galilean carpenter doing?" answered: "He is preparing a coffin for you."</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_40.html#verse-22">Commentary on Genesis, Chapter XL — "That the Truth of the Interpreter Might Be Proved"</a></cite>
