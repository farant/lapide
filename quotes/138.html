<blockquote>
<p>On the altar of the cross, the supreme Priest of priests willed to free the human race entirely in one man, when by a singular sacrifice and common grace He provided for all in one, and for the one in all.</p>
<cite>— Berengosus of Trier, <a href="berengosus_trevirensis/De_Laude_Et_Inventione_Sanctae_Crucis.html#book-1-ch-1">On the Praise and Discovery of the Holy Cross — Book I, Chapter 1</a></cite>
</blockquote>
