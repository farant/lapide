<blockquote>
<p>Joseph did not wish to avenge himself; for he knew that the pleasure of vengeance is momentary, but the pleasure of mercy is everlasting.</p>
<cite>— Josephus, in Cornelius a Lapide, <a href="01_genesis_50.html#verse-19">Commentary on Genesis, Chapter L — "Joseph Wept"</a></cite>
</blockquote>
