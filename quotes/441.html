<blockquote>
<p>To all guests whether arriving or departing, with bowed head or with the whole body prostrate on the ground, let Christ be worshipped in them, who is also received in them.</p>
<cite>— St. Benedict, in Cornelius a Lapide, <a href="01_genesis_18.html#verse-2">Commentary on Genesis, Chapter XVIII — "Three Men"</a></cite>
</blockquote>
