<blockquote>
<p>I pray you, dearest brother, to live among these things, to meditate on them, to know nothing else, to seek nothing else. Does it not seem to you already here on earth a dwelling place of the heavenly kingdom?</p>
<cite>— Jerome, <a href="02_Clemens_Hieronymi_Du_Culte.html#jerome-to-paulinus">Jerome to Paulinus</a></cite>
</blockquote>
