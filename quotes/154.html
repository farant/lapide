<blockquote>
<p>For if I were to diminish the strength of the pagans more than is just, I would detract from the fortitude and labors of the Christians, while I would proclaim that our race fought as if against an unwarlike people with reckless bravado.</p>
<cite>— Baldric of Dol, <a href="baldricus_dolensis/Hierosolymitanae_Historiae.html#prologue">History of Jerusalem — Prologue</a></cite>
</blockquote>
