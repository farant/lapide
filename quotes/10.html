<blockquote>
<p>If someone were to cut off all the hairs of your head, he would not hurt you, except when he touched those still attached to the scalp. So nothing hurts you unless someone touches those things that have fixed their roots in you through desire.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes.html#chapter-iv">Meditations — Chapter IV</a></cite>
</blockquote>
