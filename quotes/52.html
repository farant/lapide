<blockquote>
<p>I would call that light too dim -- and therefore in a way not even light -- in which the soul sees other things but does not see itself: a lamp illuminating distant shadows while itself remaining in darkness.</p>
<cite>— Adam of Dryburgh, <a href="adamus_scotus/Sermones.html#sermon-45">Sermons — Sermon XLV</a></cite>
</blockquote>
