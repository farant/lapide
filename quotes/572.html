<blockquote>
<p>If I could bodily see on one side the horror of sin, and on the other the pain of hell, and had to be plunged necessarily into one of them, I would choose hell before sin.</p>
<cite>— St. Anselm, in Cornelius a Lapide, <a href="01_genesis_39.html#verse-9">Commentary on Genesis, Chapter XXXIX — "How Can I Do This Evil?"</a></cite>
</blockquote>
