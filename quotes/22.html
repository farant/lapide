<blockquote>
<p>Prosperity is a snare; the knife that cuts this snare is adversity. Prosperity is the prison of the love of God; the battering ram that breaks it down is adversity.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes.html#chapter-xiv">Meditations — Chapter XIV</a></cite>
</blockquote>
