<blockquote>
<p>Because divine dreams are rare, and can scarcely be distinguished from demonic or vain ones, the safest course is to despise all dreams whatsoever, unless God reveals otherwise.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_40.html#on-divination-from-dreams">Commentary on Genesis, Chapter XL — "Whether It Is Lawful to Divine from Dreams"</a></cite>
</blockquote>
