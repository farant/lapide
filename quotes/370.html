<blockquote>
<p>Every just man, when he begins to purify himself, first repels from himself whatever is dark, unclean, and reckless. Indeed all shamelessness and guilt is dark and feeds on the dead like a raven.</p>
<cite>— St. Ambrose, in Cornelius a Lapide, <a href="01_genesis_08.html#ch8-verse-7">Commentary on Genesis, Chapter VIII — "The Raven"</a></cite>
</blockquote>
