<blockquote>
<p>The god of Marcion ought to have produced at least one little chickpea of his own, so that he might be proclaimed as some new Triptolemus.</p>
<cite>— Tertullian, in Pianciani, <a href="06_In_Historiam_Creationis_Mosaicam_Commentatio.html#section-xxi">Commentary on the Mosaic History of Creation — "In the Beginning"</a></cite>
</blockquote>
