<p>For He always does and manages all things, and dispenses each one, so that those who serve Him may shine like lights, and He may make their virtue manifest everywhere.</p>
<cite>— St. John Chrysostom, in Cornelius a Lapide, <a href="01_genesis_20.html#moral">Commentary on Genesis, Chapter XX — "Moral Reflection from St. Chrysostom"</a></cite>
