<blockquote>
<p>The supereminence of the divinity exceeds the capacity of ordinary speech. For God is more truly thought than spoken, and more truly is than is thought.</p>
<cite>— Master Bandinus, <a href="bandinus_magister/Sententiarum_I.html#distinction-XXIII">Sentences I — Distinction XXIII</a></cite>
</blockquote>
