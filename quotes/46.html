<blockquote>
<p>Interior grace visits you frequently, approaching you and withdrawing from you; and in each approach as well as withdrawal, seeking your salvation. For it approaches to make you joyful, and withdraws to make you eager.</p>
<cite>— Adam of Dryburgh, <a href="adamus_scotus/Sermones.html#sermon-21">Sermons — Sermon XXI</a></cite>
</blockquote>
