<blockquote>
<p>For it is more wonderful that the Bread hungers, the Fountain thirsts, Life dies, than that He feeds many who hunger with a few morsels, that He changes water into wine, that He raises the dead.</p>
<cite>— Adam of Dryburgh, <a href="adamus_scotus/Sermones.html#sermon-32">Sermons — Sermon XXXII</a></cite>
</blockquote>
