<blockquote>
<p>If the common nature does not move you, let at least My image move you; for man is My image. See therefore that by killing him you do not destroy the living image of the heavenly King.</p>
<cite>— St. Chrysostom, in Cornelius a Lapide, <a href="01_genesis_09.html#verse-9-6">Commentary on Genesis, Chapter IX — "Whoever Shall Shed Man's Blood"</a></cite>
</blockquote>
