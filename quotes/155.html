<blockquote>
<p>How blessed, O Stephen protomartyr, the stones that crowned you! How happy, O John the Baptist, the waters of the Jordan that served you for baptizing the Savior!</p>
<cite>— Baldric of Dol, <a href="baldricus_dolensis/Hierosolymitanae_Historiae.html#council-of-clermont">History of Jerusalem — The Council of Clermont</a></cite>
</blockquote>
