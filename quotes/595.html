<blockquote>
<p>In unexpected misfortunes, knowledge is lighter than doubt: for once the matter is known, a way to safety can be found; hesitation accomplishes nothing.</p>
<cite>— Philo, in Cornelius a Lapide, <a href="01_genesis_42.html#verse-29">Commentary on Genesis, Chapter XLII — "They Told Him All Things"</a></cite>
</blockquote>
