<blockquote>
<p>Melchizedek is called priest of God Most High, not only because he himself served God, but also because he converted and encouraged others to faith in and worship of Him.</p>
<cite>— St. Dionysius, in Cornelius a Lapide, <a href="01_genesis_14.html#verse-14-18">Commentary on Genesis, Chapter XIV — "Melchizedek — Bread and Wine"</a></cite>
</blockquote>
