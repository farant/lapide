<blockquote>
<p>This must be considered by us with trembling, that the just and omnipotent God, when He is angry at preceding sins, permits the blinded mind to fall into still others.</p>
<cite>— St. Gregory, in Cornelius a Lapide, <a href="01_genesis_15.html#verse-15-16">Commentary on Genesis, Chapter XV — "In the Fourth Generation"</a></cite>
</blockquote>
