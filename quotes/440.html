<blockquote>
<p>Learn how eager you should be, so that you may be the first to welcome the guest, lest someone else get there first and deprive you of the abundance of a good gift.</p>
<cite>— St. Ambrose, in Cornelius a Lapide, <a href="01_genesis_18.html#verse-1">Commentary on Genesis, Chapter XVIII — "The Lord Appeared to Him"</a></cite>
</blockquote>
