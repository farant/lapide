<blockquote>
<p>The devout withdraw from distractions to the inner secrets of the mind, and there rest as if in the bosom of tranquility; these are the tabernacles of the pious.</p>
<cite>— St. Gregory, in Cornelius a Lapide, <a href="01_genesis_25.html#verse-27">Commentary on Genesis, Chapter XXV — "A Farmer"</a></cite>
</blockquote>
