<blockquote>
<p>God permitted Lot to be captured in Sodom, to chastise his hasty and sensual choice, by which, enticed by the fertility of the place, he had preferred to dwell among the most impious Sodomites.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_14.html#verse-14-12">Commentary on Genesis, Chapter XIV — "Lot Captured"</a></cite>
</blockquote>
