<blockquote>
<p>Such ought those to be to whom the care of souls has been committed, that they would rather perish with those entrusted to them than be saved without them.</p>
<cite>— St. Chrysostom, in Cornelius a Lapide, <a href="02_exodus_32.html#verse-11">Commentary on Exodus, Chapter XXXII — "But Moses Prayed"</a></cite>
</blockquote>
