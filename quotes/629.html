<blockquote>
<p>What then, do you want bears and lions to reign? Clemency belongs to humans, ferocity to beasts. I would rather save many by my clemency than destroy a few by my severity.</p>
<cite>— Alphonsus, King of Aragon, in Cornelius a Lapide, <a href="01_genesis_50.html#verse-21">Commentary on Genesis, Chapter L — "Kindly and Gently"</a></cite>
</blockquote>
