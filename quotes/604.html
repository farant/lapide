<blockquote>
<p>Do you wish to be praised? Praise another. Do you wish to be loved? Love. Do you wish to obtain the first places? Yield them first to another.</p>
<cite>— St. John Chrysostom, in Cornelius a Lapide, <a href="01_genesis_45.html#charity-of-joseph">Commentary on Genesis, Chapter XLV — "The Charity of Joseph"</a></cite>
</blockquote>
