<blockquote>
<p>Go forth, why do you fear, my soul? Why do you hesitate? For nearly seventy years you have served Christ, and do you fear death?</p>
<cite>— St. Hilarion, in Cornelius a Lapide, <a href="01_genesis_50.html#dying-words">Commentary on Genesis, Chapter L — "Dying Words of Saints and Holy Men"</a></cite>
</blockquote>
