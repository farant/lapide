<blockquote>
<p>God could have freed His servant by power, whom the devil had fraudulently led away and violently held, but He did not wish to, lest man seem to be taken from him by force.</p>
<cite>— Master Bandinus, <a href="bandinus_magister/Sententiarum_III.html#distinction-xx">Sentences III — Distinction XX</a></cite>
</blockquote>
