<blockquote>
<p>If therefore you are tempted, despised, suffering, weakened, saddened, defamed, put to death, tortured, even hanged or burned, imitate Isaac: it is but a little while; think of eternity.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_22.html#verse-10">Commentary on Genesis, Chapter XXII — "He Seized the Sword"</a></cite>
</blockquote>
