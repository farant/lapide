<blockquote>
<p>We have been vanquished by the Bishop of this Church; he is superior to threats, firmer in argument, stronger than fair words. Some more timid man must be tried.</p>
<cite>— Modestus, in Cornelius a Lapide, <a href="01_Preliminares.html#dedicatory-letter">Preliminaries — Dedicatory Letter</a></cite>
</blockquote>
