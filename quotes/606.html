<blockquote>
<p>St. Martin refused to deprive the presbyter Brictio, his slanderer, of his office, saying: "If Christ endured Judas, why should I not endure Brictio?"</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_45.html#charity-of-joseph">Commentary on Genesis, Chapter XLV — "The Charity of Joseph"</a></cite>
