<blockquote>
<p>The beginning of returning to truth is to be displeased with oneself in falsehood. Correction is preceded by reproach. For one does not care to change what does not displease.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes.html#chapter-ii">Meditations — Chapter II</a></cite>
</blockquote>
