<blockquote>
<p>Fasting is the death of sin, the destruction of offenses, the remedy of salvation, the root of grace, the foundation of chastity: by this step, as by a chariot, Elijah ascended.</p>
<cite>— St. Ambrose, in Cornelius a Lapide, <a href="02_exodus_34.html#on-fasting">Commentary on Exodus, Chapter XXXIV — "On Fasting"</a></cite>
</blockquote>
