<blockquote>
<p>The just man never ceases to pray unless he ceases to be just. He always prays who always acts rightly.</p>
<cite>— Augustine, in Bernard of Fontcaude, <a href="bernardus_fontis_calidi/Adversus_Waldensium_Sectam.html#chapter-9">Against the Waldensian Sect — Chapter IX</a></cite>
</blockquote>
