<blockquote>
<p>O happy Simeon, who saw with bodily eyes what we see only with the eyes of faith! O happy Simeon, who held in his arms the One whom the whole world cannot contain! O happy Simeon, who recognized in the infant the Lord of glory!</p>
<cite>— Adam of Perseigne, <a href="adamus_perseniae/Mariale.html#sermon-4">Mariale — Sermon IV: On the Purification</a></cite>
</blockquote>
