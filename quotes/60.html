<blockquote>
<p>We can piously both will and not will the sufferings of the saints. Whence it is pious to weep for Martin, and pious to rejoice over Martin.</p>
<cite>— Master Bandinus, <a href="bandinus_magister/Sententiarum_I.html#distinction-XLVIII">Sentences I — Distinction XLVIII</a></cite>
</blockquote>
