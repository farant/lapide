<blockquote>
<p>This is the motto of Abel: "A fat offering I will give; a lean one I will not sacrifice." On the contrary, that of Cain: "I will sacrifice the lean; the fat offering I will not give."</p>
<cite>— St. Ambrose, in Cornelius a Lapide, <a href="20_Genesis_Caput_Quartum_Synopsis.html#ch4-verse-3">Commentary on Genesis, Chapter IV — "After Many Days"</a></cite>
</blockquote>
