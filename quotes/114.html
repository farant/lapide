<blockquote>
<p>O Christ, pious and radiant, graciously bestow upon your people the eight beatitudes of evangelical grace, and mercifully refresh with eternal rest those who believe in you without end.</p>
<cite>— Berno of Reichenau, <a href="berno_augiae_divitis/De_Consona_Tonorum_Diversitate.html#tone-8">On the Harmonious Diversity of Tones — Tone 8</a></cite>
</blockquote>
