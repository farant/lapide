<blockquote>
<p>An oath is a sacred thing, in which divine authority and truthfulness are interposed, which therefore should not be taken rashly or lightly, but with a mind confirmed and certain in many ways.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_21.html#verse-31">Commentary on Genesis, Chapter XXI — "Beersheba"</a></cite>
</blockquote>
