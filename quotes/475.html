<blockquote>
<p>God often deals with us thus: He commands and demands a difficult deed, but when He has seen a willing obedience, content with that, He holds back the execution.</p>
<cite>— St. John Chrysostom, in Cornelius a Lapide, <a href="01_genesis_22.html#verse-12">Commentary on Genesis, Chapter XXII — "Do Not Extend Your Hand"</a></cite>
</blockquote>
