<blockquote>
<p>I do not consider it safe to go far from the company of the holy Virgin. For who would provide for me, if I were to distance myself from the mercy of that most indulgent mother? I will hold fast to her, I will not depart from her.</p>
<cite>— Adam of Perseigne, <a href="adamus_perseniae/Mariale.html#fragment-7">Mariale — Fragment VII</a></cite>
</blockquote>
