<blockquote>
<p>A teachable mind is praiseworthy even without a teacher. We consider not what you find but what you seek. Soft wax, easy to shape, even if the hands of the craftsman and sculptor are idle, is nevertheless by its virtue everything that it can be.</p>
<cite>— Jerome, <a href="02_Clemens_Hieronymi_Du_Culte.html#jerome-to-paulinus">Jerome to Paulinus</a></cite>
</blockquote>
