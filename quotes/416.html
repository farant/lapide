<blockquote>
<p>The riches are mine, you belong to your riches: for riches are in the service of the wise man, but the fool is in the power of riches.</p>
<cite>— Seneca, in Cornelius a Lapide, <a href="01_genesis_14.html#verse-14-23">Commentary on Genesis, Chapter XIV — "From a Thread to a Sandal Strap"</a></cite>
</blockquote>
