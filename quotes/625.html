<blockquote>
<p>Happy is that soul which, embalmed with the spices of virtues, while dwelling in the coffin of the body, is preserved for eternal life.</p>
<cite>— Rabanus, in Cornelius a Lapide, <a href="01_genesis_50.html#verse-2">Commentary on Genesis, Chapter L — "The Embalming of Jacob"</a></cite>
</blockquote>
