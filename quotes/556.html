<blockquote>
<p>The Beloved bore with you; you too bear with the Beloved. Your sins did not conquer Him; let not His scourges conquer you either, and you will obtain the blessing.</p>
<cite>— St. Bernard, in Cornelius a Lapide, <a href="01_genesis_35.html#verse-9">Commentary on Genesis, Chapter XXXV — "And God Appeared Again to Jacob"</a></cite>
</blockquote>
