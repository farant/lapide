<blockquote>
<p>Anacharsis said that on the vine there are three clusters and three cups. The first cup is drunk for health; the second for pleasure; the third for drunkenness, injury, and madness.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_43.html#verse-34">Commentary on Genesis, Chapter XLIII — "Verse 34"</a></cite>
</blockquote>
