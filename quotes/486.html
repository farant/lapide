<blockquote>
<p>For it is the mark of a wise man, to separate himself from the pleasures of the flesh, to elevate the soul, and to withdraw it from the body. For this is what it means to know oneself as a human being.</p>
<cite>— St. Ambrose, in Cornelius a Lapide, <a href="01_genesis_24.html#verse-63">Commentary on Genesis, Chapter XXIV — "To Meditate"</a></cite>
</blockquote>
