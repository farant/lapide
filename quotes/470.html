<p>This grove was the oratory and retreat of Abraham, to which he would from time to time withdraw from cares and business, when he was about to commune with God.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_21.html#verse-33">Commentary on Genesis, Chapter XXI — "He Planted a Grove"</a></cite>
