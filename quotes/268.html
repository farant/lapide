<blockquote>
<p>Blessed Pinytus, most renowned among Bishops, was Bishop of the city of Knossos. In his writings he left, as in a mirror, a living image of himself.</p>
<cite>— Caesar Baronius, <a href="baronius_caesar/De_Martyrologio_Romano.html#october-10">The Roman Martyrology — October 10</a></cite>
</blockquote>
