<blockquote>
<p>Saint Edith, Virgin, daughter of Edgar, King of the English, who, consecrated to God in a monastery from her tender years, was rather ignorant of the world than one who had left it.</p>
<cite>— Caesar Baronius, <a href="baronius_caesar/De_Martyrologio_Romano.html#september-16">The Roman Martyrology — September 16</a></cite>
</blockquote>
