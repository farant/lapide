<p>The poverty of Christ enriches us, His weakness heals, His hunger satisfies, His death gives life, His burial raises us up.</p>
<cite>— St. Ambrose, in Cornelius a Lapide, <a href="01_genesis_49.html#asher">Commentary on Genesis, Chapter XLIX — "The Prophecy and Blessing of Asher"</a></cite>
