<blockquote>
<p>Humility is like a thunderbolt, which strikes indeed, but leaves no trace behind it; so truly humility disperses every sin, and yet causes a man to be nothing in his own eyes.</p>
<cite>— St. Giles, in Cornelius a Lapide, <a href="01_genesis_18.html#verse-27">Commentary on Genesis, Chapter XVIII — "I Have Begun"</a></cite>
</blockquote>
