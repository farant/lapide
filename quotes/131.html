<blockquote>
<p>O blessed Father [Benedict], if it be permissible to say, how much more just it would have been to say: "May almighty God forgive me, who do not hear your good prayers" — rather than to say: "May almighty God forgive you, what have you done?"</p>
<cite>— Bertarius of Monte Cassino, <a href="bertarius_cassinensis/Vita_Sanctae_Scholasticae.html#vita-sanctae-scholasticae">Life of Saint Scholastica</a></cite>
</blockquote>
