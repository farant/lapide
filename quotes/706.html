<blockquote>
<p>God is to Himself the supreme light, but to us He is supreme darkness: just as the sun is bright in itself, yet to the weak and feeble eye of the owl it is dim, dark, and invisible.</p>
<cite>— Cornelius a Lapide, <a href="02_exodus_20.html#verse-22">Commentary on Exodus, Chapter XX — "Moses Drew Near to the Darkness"</a></cite>
</blockquote>
