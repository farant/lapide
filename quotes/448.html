<blockquote>
<p>But let us, mindful of our own frailty and sluggishness, even if we cannot enter to comprehend, at least take care to remain near and to gaze by believing, hoping, and loving.</p>
<cite>— Bede the Venerable, <a href="beda_venerabilis/De_Tabernaculo.html#book-i-ch-1">On the Tabernacle, Book I, Chapter I — "Moses Ascending the Mountain"</a></cite>
</blockquote>
