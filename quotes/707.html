<blockquote>
<p>A good man, even if he serves, is free; but a bad man, if he reigns, is a slave; and not of one master, but, what is more grievous, of as many masters as vices.</p>
<cite>— St. Augustine, in Cornelius a Lapide, <a href="02_exodus_23.html#verse-33">Commentary on Exodus, Chapter XXIII — "Which Will Certainly Be a Scandal to You"</a></cite>
</blockquote>
