<blockquote>
<p>For humility is the guardian and defense of all holiness that is in the soul; and therefore it seems to me no different to take humility from the soul than to take a wall from a city, a fence from a vineyard, a hedge from a garden.</p>
<cite>— Adam of Dryburgh, <a href="adamus_scotus/Sermones.html#sermon-41">Sermons — Sermon XLI</a></cite>
</blockquote>
