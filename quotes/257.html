<blockquote>
<p>Saint Blandina, weaker in sex, feebler in body, lower in condition, undergoing longer and more bitter contests and still remaining strong, was slain by the sword, following the others whom she had encouraged to the palm of victory.</p>
<cite>— Caesar Baronius, <a href="baronius_caesar/De_Martyrologio_Romano.html#june-2">The Roman Martyrology — June 2</a></cite>
</blockquote>
