<blockquote>
<p>What sort of license is this that, roaming through the region of dissimilarity, bringing in the confusion of uncertainty, the mother of presumption and the refuge of error, suppresses truth and disturbs judgment?</p>
<cite>— Bernard of Clairvaux, <a href="bernardus_claraevallensis/Super_Antiphonarium.html#section-7">On the Antiphonary — On Double and Irregular Chants</a></cite>
</blockquote>
