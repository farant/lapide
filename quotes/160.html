<blockquote>
<p>The private feuds of princes ruin and afflict their subjects, when the one dissents from the other. For while each seeks what is his own, he grows cold toward the common good.</p>
<cite>— Baldric of Dol, <a href="baldricus_dolensis/Hierosolymitanae_Historiae.html#book-three">History of Jerusalem — Book Three</a></cite>
</blockquote>
