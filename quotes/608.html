<blockquote>
<p>The Holy Spirit does not remain in men who are sad, grieving, melancholic, and therefore sluggish and slothful, but in those who are cheerful, joyful, vigorous, energetic, and active.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_45.html#verse-27">Commentary on Genesis, Chapter XLV — "His Spirit Revived"</a></cite>
</blockquote>
