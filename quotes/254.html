<p>It is an insult to pray for a Martyr, to whose prayers we ought to commend ourselves.</p>
<cite>— Augustine, in Caesar Baronius, <a href="baronius_caesar/De_Martyrologio_Romano.html#chapter-4">The Roman Martyrology — On the Ancient Veneration of the Holy Martyrs</a></cite>
