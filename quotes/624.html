<blockquote>
<p>Death is a tranquil harbor, true rest, sleep, a passage to better things, liberation from evils, a migration from earth to heaven, from men to angels, and to the very Lord of the angels.</p>
<cite>— St. John Chrysostom, in Cornelius a Lapide, <a href="01_genesis_49.html#verses-29-32">Commentary on Genesis, Chapter XLIX — "Jacob's Death"</a></cite>
</blockquote>
