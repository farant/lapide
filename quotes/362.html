<blockquote>
<p>God mercifully rained the waters down not all at once, but gradually, so that in the meantime men might be terrified and repent.</p>
<cite>— St. Chrysostom, in Cornelius a Lapide, <a href="01_genesis_07.html#ch7-verse-12">Commentary on Genesis, Chapter VII — "Forty Days"</a></cite>
</blockquote>
