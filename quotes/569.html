<blockquote>
<p>All nobility had an ignoble beginning: and those who glory in the nobility of their ancestors glory not in their own but in another's virtue. And this therefore is vanity.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_38.html#moral-reflection">Commentary on Genesis, Chapter XXXVIII — "On the Origin of Nobility"</a></cite>
</blockquote>
