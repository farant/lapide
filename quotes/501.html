<blockquote>
<p>For this is true meekness — not when one offended by the more powerful bears it gently, but when one offended even by those who are considered inferior yields.</p>
<cite>— St. Chrysostom, in Cornelius a Lapide, <a href="01_genesis_26.html#verse-20">Commentary on Genesis, Chapter XXVI — "It Is Ours"</a></cite>
</blockquote>
