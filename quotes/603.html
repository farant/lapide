<blockquote>
<p>"Confession in evils is better than proud boasting in good things." Hence when a hermit was asked what was the surest way he had found to heaven, he answered: "If a man always accuses himself."</p>
<cite>— St. Augustine, in Cornelius a Lapide, <a href="01_genesis_44.html#verse-16">Commentary on Genesis, Chapter XLIV — "Verse 16"</a></cite>
</blockquote>
