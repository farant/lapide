<blockquote>
<p>Pride was rightly condemned, by which it came about that man giving orders to man would not be understood, he who did not wish to understand so as to obey God giving orders.</p>
<cite>— St. Augustine, in Cornelius a Lapide, <a href="01_genesis_11.html#verse-11-8">Commentary on Genesis, Chapter XI — "And So He Divided Them"</a></cite>
</blockquote>
