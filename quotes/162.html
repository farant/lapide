<blockquote>
<p>They besieged [Jerusalem], not as stepchildren besiege a stepmother; but as sons besiege a mother. For they besieged her not to capture a free city, but to free a captive one.</p>
<cite>— Baldric of Dol, <a href="baldricus_dolensis/Hierosolymitanae_Historiae.html#the-siege-of-jerusalem">History of Jerusalem — The Siege of Jerusalem</a></cite>
</blockquote>
