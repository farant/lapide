<blockquote>
<p>No human merit precedes God's grace, but grace itself merits to be increased, so that once increased it may merit to be perfected as well, with the will accompanying, not leading: as a handmaid, not as a guide.</p>
<cite>— Master Bandinus, <a href="bandinus_magister/Sententiarum_II.html#distinction-26">Sentences II — Distinction 26</a></cite>
</blockquote>
