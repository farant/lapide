<blockquote>
<p>As blessed Gregory testifies, the words of the heavenly oracle are not to be bent under the rules of Donatus; just as the Prophet, not fearing the rod of grammarians, wrote: <em>Deliver me from bloods.</em></p>
<cite>— Berno of Reichenau, <a href="berno_augiae_divitis/De_Varia_Psalmorum_Modulatione.html#section-5">On the Various Modulation of Psalms and Chants — Section 5</a></cite>
</blockquote>
