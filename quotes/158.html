<blockquote>
<p>No one has ever always succeeded happily, no one has ever rejoiced or will rejoice in continuous prosperity. For this reason, adversity must be guarded against in prosperity, and prosperity must be hoped for and desired in adversity.</p>
<cite>— Baldric of Dol, <a href="baldricus_dolensis/Hierosolymitanae_Historiae.html#book-two">History of Jerusalem — Book Two</a></cite>
</blockquote>
