<p>In human affairs nothing is stable, nothing immovable in things that are transient, nothing eternal in temporal things, nothing immortal among mortals.</p>
<cite>— Adam of Dryburgh, <a href="adamus_scotus/De_Tripartito_Tabernaculo.html#part-2-ch-13">On the Threefold Tabernacle — Part II, Chapter XIII</a></cite>
