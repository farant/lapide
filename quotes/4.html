<blockquote>
<p>The road to God is easy, because one travels by unburdening; it would be hard if one traveled by burdening. Therefore unburden yourself to such an extent that, having set aside all things, you deny yourself.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes.html#chapter-ii">Meditations — Chapter II</a></cite>
</blockquote>
