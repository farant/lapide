<blockquote>
<p>When someone objected to Plato, "You who are a teacher, are you also a student? And how long will you learn?" he answered: "As long as I do not regret becoming wiser."</p>
<cite>— Plato, in Cornelius a Lapide, <a href="02_exodus_18.html#verse-18">Commentary on Exodus, Chapter XVIII — "You Will Wear Yourself Out with Foolish Labor"</a></cite>
</blockquote>
