<blockquote>
<p>That servitude won me this sovereignty, that sale raised me to this glory; that affliction was for me the occasion of this honor; that envy produced for me this renown.</p>
<cite>— St. John Chrysostom, in Cornelius a Lapide, <a href="01_genesis_45.html#father-of-pharaoh">Commentary on Genesis, Chapter XLV — "Father of Pharaoh"</a></cite>
</blockquote>
