<blockquote>
<p>Dearest sons, persist in the confession of the faith; Christ already awaits you with His saints; fight for your souls and show yourselves faithful to Christ.</p>
<cite>— St. Felicitas, in Cornelius a Lapide, <a href="01_genesis_49.html#gad">Commentary on Genesis, Chapter XLIX — "The Prophecy and Blessing of Gad"</a></cite>
