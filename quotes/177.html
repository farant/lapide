<blockquote>
<p>For good subjects the faults of their superiors displease them, yet they conceal these from others; and judging the deed while reverencing the office, they refuse to see what they cover.</p>
<cite>— Gregory the Great, in Bernard of Fontcaude, <a href="bernardus_fontis_calidi/Adversus_Waldensium_Sectam.html#chapter-3">Against the Waldensian Sect — Chapter III</a></cite>
</blockquote>
