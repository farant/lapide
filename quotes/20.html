<blockquote>
<p>Whatever happens to you, as long as your soul does not fall into the movement of anger, hatred, sadness, or fear, nor into their causes, it will harm you nothing in the age to come.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes.html#chapter-xiii">Meditations — Chapter XIII</a></cite>
</blockquote>
