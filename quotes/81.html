<blockquote>
<p>The more charity grows, the more fear decreases. And the more charity becomes interior, the more fear is cast out — greater charity, lesser fear; lesser charity, greater fear.</p>
<cite>— Master Bandinus, <a href="bandinus_magister/Sententiarum_III.html#distinction-xxxiv">Sentences III — Distinction XXXIV</a></cite>
</blockquote>
