<blockquote>
<p>Mercy without truth is too soft an indulgence, and truth without mercy is too severe a strictness. Similarly, peace without justice is an idle state, while justice without peace is a furious commotion.</p>
<cite>— Adam of Dryburgh, <a href="adamus_scotus/Sermones.html#sermon-8">Sermons — Sermon VIII</a></cite>
</blockquote>
