<blockquote>
<p>Our soul is sick with a threefold disease: in memory, in reason, and in will. In memory through the weakness of inconstancy; in reason through the obscurity of ignorance; in will through the wickedness of iniquity.</p>
<cite>— Adam of Dryburgh, <a href="adamus_scotus/De_Tripartito_Tabernaculo.html#part-3-ch-13">On the Threefold Tabernacle — Part III, Chapter XIII</a></cite>
</blockquote>
