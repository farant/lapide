<blockquote>
<p>Abbot John, visiting the anchorite Pesius, asked him what progress he had made in 40 years in the desert. He replied: "That the sun which illumines all things has never seen me eating, nor angry."</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_26.html#verse-29-examples">Commentary on Genesis, Chapter XXVI — "Examples of the Peaceable"</a></cite>
