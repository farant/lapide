<blockquote>
<p>[Kerbogha's mother] said: "Our people are gold, that people is iron. Moreover the God of the Franks is truly Almighty, and unless they themselves have gravely offended Him, He always protects them as victors."</p>
<cite>— Baldric of Dol, <a href="baldricus_dolensis/Hierosolymitanae_Historiae.html#book-three">History of Jerusalem — Book Three</a></cite>
</blockquote>
