<blockquote>
<p>Do you know, daughter, who I am and who you are? You will be blessed if you know this. I am He who am; you are she who is not.</p>
<cite>— Bl. Catherine of Siena, in Cornelius a Lapide, <a href="02_exodus_03.html#verse-16">Commentary on Exodus, Chapter III — "Visiting I Have Visited You"</a></cite>
</blockquote>
