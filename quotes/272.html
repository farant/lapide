<blockquote>
<p>Blessed Servulus, from the earliest age of his life until the end, lay paralyzed in a portico near the Church of Saint Clement, and at last, invited by the singing of Angels, passed to the glory of paradise.</p>
<cite>— Gregory the Great, in Caesar Baronius, <a href="baronius_caesar/De_Martyrologio_Romano.html#december-23">The Roman Martyrology — December 23</a></cite>
</blockquote>
