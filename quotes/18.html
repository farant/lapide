<blockquote>
<p>This is in sum the whole of human depravity: to abandon what is better than oneself, that is, God; and to attend to what is lesser than oneself, clinging to it in enjoyment, that is, temporal things.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes.html#chapter-ix">Meditations — Chapter IX</a></cite>
</blockquote>
