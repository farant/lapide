<blockquote>
<p>The spirit of the philosopher is made more noble by what it has suffered, and as glowing iron is hardened by the sprinkling of cold water, so he himself is hardened by dangers.</p>
<cite>— St. Gregory of Nazianzus, in Cornelius a Lapide, <a href="01_genesis_32.html#verse-24">Commentary on Genesis, Chapter XXXII — "A Man Wrestled with Him"</a></cite>
</blockquote>
