<blockquote>
<p>There are three differences of sin, as if three deaths: in the house, at the gate, and in the tomb — which the Lord signified in the three dead persons He raised.</p>
<cite>— Master Bandinus, <a href="bandinus_magister/Sententiarum_IV.html#distinction-xvi">Sentences IV — Distinction XVI</a></cite>
</blockquote>
