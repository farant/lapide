<blockquote>
<p>The body of Christ is received under a different species than its own for a threefold reason: so that faith might have merit; so that the mind might not be horrified at what the eye would see; and so that religion might not be mocked by unbelievers.</p>
<cite>— Master Bandinus, <a href="bandinus_magister/Sententiarum_IV.html#distinction-xi">Sentences IV — Distinction XI</a></cite>
</blockquote>
