<blockquote>
<p>Sacred Scripture likens itself to a certain river of no great depth, in which a lamb, however small, can walk most easily, and an elephant, however immense, can scarcely manage to swim.</p>
<cite>— Adam of Dryburgh, <a href="adamus_scotus/De_Tripartito_Tabernaculo.html#epistle-3-sec-4">On the Threefold Tabernacle — Epistle III</a></cite>
</blockquote>
