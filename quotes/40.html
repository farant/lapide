<blockquote>
<p>However holy anyone may be, as long as he is occupied with the solicitudes of earthly actions, it is very difficult for him not to bear in his mind a somewhat bestial face and in his conduct a somewhat worldly disposition.</p>
<cite>— Adam of Dryburgh, <a href="adamus_scotus/De_Tripartito_Tabernaculo.html#part-3-ch-14">On the Threefold Tabernacle — Part III, Chapter XIV</a></cite>
</blockquote>
