<blockquote>
<p>You have made us, O Lord, for Yourself, and our heart is restless until it rests in You. Heaven and earth cry out, O Lord, that we should love You.</p>
<cite>— Augustine, in Cornelius a Lapide, <a href="15_Genesis_Caput_Primum_Synopsis_Pt1.html#he-created">Commentary on Genesis, Chapter I — "He Created"</a></cite>
</blockquote>
