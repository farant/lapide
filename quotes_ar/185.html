<blockquote>
<p>الْغِنَى لِي، أَمَّا أَنْتَ فَمِلْكٌ لِغِنَاكَ: فَإِنَّ الْغِنَى فِي خِدْمَةِ الْحَكِيمِ، لَكِنَّ الْأَحْمَقَ فِي قَبْضَةِ الْغِنَى.</p>
<cite>— سِينِيكَا، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_14_ar.html#verse-14-23">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الرَّابِعَ عَشَرَ — «مِنْ خَيْطٍ إِلَى شِرَاكِ نَعْلٍ»</a></cite>
</blockquote>
