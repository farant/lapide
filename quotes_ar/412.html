<blockquote>
<p>اُنْظُرْ كَيْفَ يَوْخِزُكَ اللَّهُ حَيْثُمَا مَدَدْتَ يَدَكَ خَارِجَهُ بِشَهْوَةِ الْمَخْلُوقَاتِ — كَمُرَبِّيَةٍ تَوْخِزُ ذِرَاعَ طِفْلٍ مَدَّهَا خَارِجَ الْمَهْدِ لِئَلَّا يَهْلِكَ مِنَ الْبَرْدِ.</p>
<cite>— غِيغُو الْأَوَّلُ، <a href="guigo_i/Meditationes_ar.html#chapter-xiv">تَأَمُّلَاتٌ — الْفَصْلُ الرَّابِعَ عَشَرَ</a></cite>
</blockquote>
