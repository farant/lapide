<blockquote>
<p>لَا مُبْدِعَ أَفْضَلُ مِنَ اللهِ؛ وَلَا فَنَّ أَنْجَعُ مِنْ كَلِمَةِ اللهِ؛ وَلَا سَبَبَ أَحْسَنُ مِنْ أَنْ يَخْلُقَ الصَّالِحُ صَالِحًا.</p>
<cite>— القِدِّيسُ أُغُسْطِينُوسُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_01_ar.html#verse-4">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الْأَوَّلُ — «وَرَأَى اللهُ النُّورَ أَنَّهُ حَسَنٌ»</a></cite>
</blockquote>
