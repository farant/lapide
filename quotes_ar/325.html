<blockquote>
<p>بِقَدْرِ مَا يَتَقَدَّمُ الْمَرْءُ فِي حِلْمِ الْقَلْبِ وَصَبْرِهِ، بِقَدْرِ ذَلِكَ يَتَقَدَّمُ فِي طَهَارَةِ الْجَسَدِ.</p>
<cite>— كَاسِيَانُوسُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_37_ar.html#moral-conclusion">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ السَّابِعُ وَالثَّلَاثُونَ — «الْخَاتِمَةُ الْأَخْلَاقِيَّةُ»</a></cite>
</blockquote>
