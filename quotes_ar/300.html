<blockquote>
<p>الْخَلْوَةُ أُمُّ الصُّعُودِ الْإِلَهِيِّ، أَيِ الصَّلَاةِ، الَّتِي تَجْعَلُ مِنَ الْإِنْسَانِ إِلَهًا.</p>
<cite>— الْقِدِّيسُ غْرِيغُورِيُوسُ النَّزِيَنْزِيُّ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_32_ar.html#verse-24">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الثَّانِي وَالثَّلَاثُونَ — «صَارَعَهُ رَجُلٌ»</a></cite>
</blockquote>
