<blockquote>
<p>ذَلِكَ الْمَسِيحِيُّ الَّذِي سَأَلَهُ يُولْيَانُوسُ الْمُرْتَدُّ بِسُخْرِيَةٍ: «مَاذَا يَصْنَعُ نَجَّارُكُمُ الْجَلِيلِيُّ؟» أَجَابَ: «إِنَّهُ يَصْنَعُ لَكَ نَعْشًا.»</p>
<cite>— كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_40_ar.html#verse-22">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الْأَرْبَعُونَ — «لِتَثْبُتَ صِحَّةُ الْمُفَسِّرِ»</a></cite>
</blockquote>
