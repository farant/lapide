<blockquote>
<p>تُرِيدُ أَنْ تُزَيِّنَ بِالْأَلْوَانِ خَشَبًا سَتَأْكُلُهُ النَّارُ، حِينَ تُرِيدُ أَنْ يَكُونَ جَمِيلًا مَا تَسْتَهْلِكُهُ، سَوَاءٌ أَكَانَ طَعَامًا أَمْ لِبَاسًا.</p>
<cite>— غِيغُو الْأَوَّلُ، <a href="guigo_i/Meditationes_ar.html#chapter-iii">تَأَمُّلَاتٌ — الْفَصْلُ الثَّالِثُ</a></cite>
</blockquote>
