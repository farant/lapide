<blockquote>
<p>مَا أَفْلَاطُونُ إِلَّا مُوسَى يَتَكَلَّمُ بِالْأَتِّيكِيَّةِ؟</p>
<cite>— نُومِينِيُوسْ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_Pt1_ar.html#moses-and-christ">تَمْهِيدٌ وَمَدْحٌ لِلْكِتَابِ الْمُقَدَّسِ — «مُوسَى وَالْمَسِيحُ: تِسْعَةَ عَشَرَ تَوَازِيًا»</a></cite>
</blockquote>
