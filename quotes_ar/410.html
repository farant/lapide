<blockquote>
<p>اُنْظُرْ كَمْ تَجْهَلُ نَفْسَكَ. فَمَا مِنْ بُقْعَةٍ نَائِيَةٍ مَجْهُولَةٍ عِنْدَكَ تُصَدِّقُ فِيهَا مَنْ يُحَدِّثُكَ بِالْأَبَاطِيلِ أَسْهَلَ مِمَّا تُصَدِّقُ عَنْ نَفْسِكَ.</p>
<cite>— غِيغُو الْأَوَّلُ، <a href="guigo_i/Meditationes_ar.html#chapter-xi">تَأَمُّلَاتٌ — الْفَصْلُ الْحَادِيَ عَشَرَ</a></cite>
</blockquote>
