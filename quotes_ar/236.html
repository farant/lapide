<blockquote>
<p>ذَلِكَ الْخَشَبُ الَّذِي عُلِّقَتْ عَلَيْهِ أَعْضَاءُ الْمَائِتِ كَانَ كُرْسِيَّ الْمُعَلِّمِ الَّذِي يُعَلِّمُ.</p>
<cite>— الْقِدِّيسُ أُغُسْطِينُوسْ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_22_ar.html#verse-2">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الثَّانِي وَالْعِشْرُونَ — «خُذِ ابْنَكَ»</a></cite>
</blockquote>
