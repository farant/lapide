<blockquote>
<p>إِنْسَانٌ لا تَارِيخَ لَهُ هُوَ بِأَكْمَلِهِ فِي قَبْرِهِ؛ وَشَعْبٌ لَمْ يُمْلِ تَارِيخَهُ لَمْ يُولَدْ بَعْدُ.</p>
<cite>— الأَبُ لَاكُورْدِيرْ، <a href="02_Clemens_Hieronymi_Du_Culte_ar.html#du-culte">فِي عِبَادَةِ يَسُوعَ الْمَسِيحِ فِي الْكُتُبِ الْمُقَدَّسَةِ</a></cite>
</blockquote>
