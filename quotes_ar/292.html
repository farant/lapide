<blockquote>
<p>مَاذَا يُمْكِنُ أَنْ يَنْقُصَ مَنْ يَحْضُرُ عِنْدَهُ مِلْءُ كُلِّ شَيْءٍ؟</p>
<cite>— الْقِدِّيسُ أَمْبْرُوسِيُوسُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_31_ar.html#verse-3">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الْحَادِي وَالثَّلَاثُونَ — «وَأَكُونُ مَعَكَ»</a></cite>
</blockquote>
