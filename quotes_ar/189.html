<blockquote>
<p>الرَّغْبَةُ وَالْحُبُّ يَخَافَانِ مِنْ كُلِّ شَيْءٍ، حَتَّى مِمَّا هُوَ آمِنٌ؛ وَلَا يَسْتَقِرَّانِ حَتَّى يَنَالَا الْمَحْبُوبَ وَالْمُشْتَهَى.</p>
<cite>— كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_15_ar.html#verse-15-2">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الْخَامِسَ عَشَرَ — «مَاذَا تُعْطِينِي؟»</a></cite>
</blockquote>
