<blockquote>
<p>ضَحِكَةُ إِبْرَاهِيمَ هِيَ ابْتِهَاجُ الْمُبَارِكِ لَا سُخْرِيَةُ الشَّاكِّ.</p>
<cite>— الْقِدِّيسُ أَغُسْطِينُوسُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_17_ar.html#verse-17">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ السَّابِعَ عَشَرَ — «ضَحِكَ إِبْرَاهِيمُ»</a></cite>
</blockquote>
