<blockquote>
<p>شَجَرَةُ الْحَيَاةِ هِيَ الْعَذْرَاءُ الْمُبَارَكَةُ، الَّتِي مِنْهَا وُلِدَتِ الْحَيَاةُ — اللهُ الْمُتَجَسِّدُ، الْمَسِيحُ يَسُوعُ.</p>
<cite>— كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_02_ar.html#the-tree-of-life">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الثَّانِي — «شَجَرَةُ الْحَيَاةِ»</a></cite>
</blockquote>
