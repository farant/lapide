<blockquote>
<p>لِيَذْهَبِ الْآخَرُونَ إِلَى أُورُشَلِيمَ؛ أَمَّا أَنْتَ فَاذْهَبْ إِلَى حَيْثُ الصَّبْرُ أَوِ التَّوَاضُعُ. فَهَذَا هُوَ خُرُوجُكَ مِنَ الْعَالَمِ، أَمَّا ذَاكَ فَبَقَاؤُكَ فِيهِ.</p>
<cite>— غِيغُو الْأَوَّلُ، <a href="guigo_i/Meditationes_ar.html#chapter-xv">تَأَمُّلَاتٌ — الْفَصْلُ الْخَامِسَ عَشَرَ</a></cite>
</blockquote>
