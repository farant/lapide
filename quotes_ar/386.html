<blockquote>
<p>لَقَدْ نَدِمْتُ أَحْيَانًا عَلَى كَوْنِي صَارِمًا وَقَاسِيًا؛ أَمَّا عَلَى كَوْنِي لَيِّنًا وَمُسَامِحًا، فَلَمْ أَنْدَمْ قَطُّ.</p>
<cite>— رُودُولْفْ، إِمْبِرَاطُورُ النِّمْسَا، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_50_ar.html#verse-21">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الْخَمْسُونَ — «بِرِفْقٍ وَلُطْفٍ»</a></cite>
</blockquote>
