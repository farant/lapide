<blockquote>
<p>إِنَّ نَفْسَ الْمُحِبِّ تَكُونُ فِي مَنْ يُحِبُّهُ أَكْثَرَ مِمَّا تَكُونُ فِيمَنْ تُحْيِيهِ.</p>
<cite>— كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_34_ar.html#verse-5">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الرَّابِعُ وَالثَّلَاثُونَ — «تَعَلَّقَتْ نَفْسُهُ بِهَا»</a></cite>
</blockquote>
