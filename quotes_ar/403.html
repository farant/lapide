<blockquote>
<p>يَقُولُ الشُّهَدَاءُ لِلَّهِ: «مِنْ أَجْلِكَ نُمَاتُ النَّهَارَ كُلَّهُ»؛ وَأَنْتَ تَقُولُ لِأَيِّ تَوَافِهٍ حَقِيرَةٍ: مِنْ أَجْلِكُمْ أَضْطَرِبُ النَّهَارَ كُلَّهُ.</p>
<cite>— غِيغُو الْأَوَّلُ، <a href="guigo_i/Meditationes_ar.html#chapter-iv">تَأَمُّلَاتٌ — الْفَصْلُ الرَّابِعُ</a></cite>
</blockquote>
