<blockquote>
<p>حَتَّى لَوْ أَمْطَرَ الرَّبُّ حِجَارَةً وَصُخُورًا مِنَ السَّمَاءِ، فَلَنْ تَضُرَّنَا إِنْ كُنَّا عَلَى مَا يُرِيدُنَا أَنْ نَكُونَ عَلَيْهِ.</p>
<cite>— الْقِدِّيسُ إِيجِيدِيُوسُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_41_ar.html#verse-42">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْفَصْلُ الْحَادِي وَالْأَرْبَعُونَ — «الْآيَةُ ٤٢»</a></cite>
</blockquote>
