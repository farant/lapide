<blockquote>
<p>قُدْنِي أَيُّهَا الْآبُ، وَأَنْتَ يَا حَاكِمَ السَّمَاوَاتِ الْعُلَا، حَيْثُمَا شِئْتَ: لَا تَأْخِيرَ فِي الطَّاعَةِ؛ هَا أَنَا ذَا مُتَحَمِّسٌ.</p>
<cite>— كْلِيَانْثِسُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_17_ar.html#verse-23">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ السَّابِعَ عَشَرَ — «فِي ذَلِكَ الْيَوْمِ عَيْنِهِ»</a></cite>
</blockquote>
