<blockquote>
<p>فَإِنَّ كُلَّ أَرْضٍ لَنَا وَطَنٌ، وَلَا أَرْضَ لَنَا وَطَنٌ.</p>
<cite>— الْقِدِّيسُ غْرِيغُورِيُوسُ النَّزْيَنْزِيُّ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_12_ar.html#verse-12-1">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الثَّانِيَ عَشَرَ — «اُخْرُجْ مِنْ أَرْضِكَ»</a></cite>
</blockquote>
