<blockquote>
<p>الزُّهْدُ فِي الْوَفْرَةِ، وَالسَّخَاءُ فِي الْفَقْرِ، وَالْعِفَّةُ فِي الشَّبَابِ، اسْتِشْهَادٌ بِلَا دَمٍ.</p>
<cite>— الْقِدِّيسُ بِرْنَارْدُوسُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_39_ar.html#verse-12">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ التَّاسِعُ وَالثَّلَاثُونَ — «فَهَرَبَ»</a></cite>
</blockquote>
