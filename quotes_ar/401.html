<blockquote>
<p>لَوْ قَطَعَ أَحَدٌ جَمِيعَ شَعْرِ رَأْسِكَ لَمَا آذَاكَ، إِلَّا حِينَ يَمَسُّ مَا لَا يَزَالُ مُتَّصِلًا بِفَرْوَةِ الرَّأْسِ. كَذَلِكَ لَا يُؤْذِيكَ شَيْءٌ إِلَّا إِذَا مَسَّ أَحَدٌ مَا غَرَسَتِ الشَّهْوَةُ جُذُورَهُ فِيكَ.</p>
<cite>— غِيغُو الْأَوَّلُ، <a href="guigo_i/Meditationes_ar.html#chapter-iv">تَأَمُّلَاتٌ — الْفَصْلُ الرَّابِعُ</a></cite>
</blockquote>
