<blockquote>
<p>اَلزَّوَاجُ يَمْلَأُ الْأَرْضَ؛ الْعَذَارَاءُ تَمْلَأُ الْفِرْدَوْسَ.</p>
<cite>— الْقِدِّيسُ يِيرُونِيمُوسُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_04_ar.html#verse-4-1">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الرَّابِعُ — «عَرَفَ آدَمُ امْرَأَتَهُ حَوَّاءَ»</a></cite>
</blockquote>
