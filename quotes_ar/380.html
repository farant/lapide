<blockquote>
<p>فَقْرُ الْمَسِيحِ يُغْنِينَا، وَضَعْفُهُ يَشْفِينَا، وَجُوعُهُ يُشْبِعُنَا، وَمَوْتُهُ يُحْيِينَا، وَدَفْنُهُ يُقِيمُنَا.</p>
<cite>— الْقِدِّيسُ أَمْبْرُوسِيُوسُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_49_ar.html#asher">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ التَّاسِعُ وَالْأَرْبَعُونَ — «نُبُوءَةُ أَشِيرَ وَبَرَكَتُهُ»</a></cite>
</blockquote>
