<blockquote>
<p>رَأَى نُوحٌ إِذَنْ عَالَمًا مَمْلُوءًا بِالنَّاسِ، وَهُمْ أَشْرَارٌ: رَأَى وَتَنَهَّدَ.</p>
<cite>— كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_09_ar.html#verse-9-28">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ التَّاسِعُ — «عَاشَ نُوحٌ بَعْدَ الطُّوفَانِ ثَلَاثَمِئَةٍ وَخَمْسِينَ سَنَةً»</a></cite>
</blockquote>
