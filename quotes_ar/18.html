<blockquote>
<p>مِنَ الأَرْضِ لا يَصِلُ إِلَى اللهِ إِلَّا الأَنِينُ وَالنَّحِيبُ؛ وَمِنَ السَّمَاءِ لا يَنْزِلُ إِلَيْنَا إِلَّا الْحَنَانُ وَالْمَغْفِرَةُ.</p>
<cite>— الأَبُ لَاكُورْدِيرْ، <a href="02_Clemens_Hieronymi_Du_Culte_ar.html#du-culte">فِي عِبَادَةِ يَسُوعَ الْمَسِيحِ فِي الْكُتُبِ الْمُقَدَّسَةِ</a></cite>
</blockquote>
