<blockquote>
<p>لَمْ يَكُنِ الْأُسْقُفُ بِحَاجَةٍ إِلَى حَدِيقَةٍ، بَلْ كَانَتْ حَدِيقَتُهُ الْكِتَابَ الْمُقَدَّسَ.</p>
<cite>— القِدِّيسُ كَارْلُوسْ بُورُومِيُوسْ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_Pt1_ar.html#saintly-examples">تَمْهِيدٌ وَمَدْحٌ لِلْكِتَابِ الْمُقَدَّسِ — «أَمْثِلَةٌ مِنَ الْقِدِّيسِينَ فِي دِرَاسَةِ الْكِتَابِ الْمُقَدَّسِ»</a></cite>
</blockquote>
