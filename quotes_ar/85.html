<blockquote>
<p>تَذَكَّرْ، أَيُّهَا الْإِنْسَانُ، أَنَّكَ سَتَمُوتُ حَتْمًا، وَعَمَّا قَرِيبٍ.</p>
<cite>— كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_02_ar.html#verse-17">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الثَّانِي — «مِنْ شَجَرَةِ الْمَعْرِفَةِ لَا تَأْكُلْ»</a></cite>
</blockquote>
