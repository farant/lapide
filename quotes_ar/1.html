<blockquote>
<p>يَدْعُو هُومِيرُوسُ الْمَلِكَ رَاعِيَ الشُّعُوبِ، لِأَنَّهُ يَنْبَغِي لَهُ أَنْ يَرْعَاهُمْ كَمَا يَرْعَى الرَّاعِي خِرَافَهُ، لا أَنْ يَسْلُخَهُمْ.</p>
<cite>— كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_Preliminares_ar.html#dedicatory-letter">الْمُقَدِّمَاتُ — الرِّسَالَةُ الإِهْدَائِيَّةُ</a></cite>
</blockquote>
