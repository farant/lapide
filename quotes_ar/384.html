<blockquote>
<p>طُوبَى لِتِلْكَ النَّفْسِ الَّتِي، وَقَدْ حُنِّطَتْ بِأَطْيَابِ الْفَضَائِلِ، تُحْفَظُ لِلْحَيَاةِ الْأَبَدِيَّةِ وَهِيَ سَاكِنَةٌ فِي تَابُوتِ الْجَسَدِ.</p>
<cite>— رَابَانُوسْ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_50_ar.html#verse-2">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الْخَمْسُونَ — «تَحْنِيطُ يَعْقُوبَ»</a></cite>
</blockquote>
