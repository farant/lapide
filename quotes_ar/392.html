<blockquote>
<p>إِذَا قُلْتَ الْحَقَّ لَا مِنْ مَحَبَّةِ الْحَقِّ، بَلْ مِنْ رَغْبَةٍ فِي إِيذَاءِ غَيْرِكَ، فَلَنْ تَنَالَ ثَوَابَ قَائِلِ الْحَقِّ، بَلْ عِقَابَ الشَّاتِمِ.</p>
<cite>— غِيغُو الْأَوَّلُ، <a href="guigo_i/Meditationes_ar.html#chapter-i">تَأَمُّلَاتٌ — الْفَصْلُ الْأَوَّلُ</a></cite>
</blockquote>
