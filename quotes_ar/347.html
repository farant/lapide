<blockquote>
<p>لَا تَكْسِرُهُ أَيُّ شَقَاوَةٍ مَنْ لَا تُفْسِدُهُ أَيُّ سَعَادَةٍ.</p>
<cite>— الْقِدِّيسُ أُغُسْطِينُوسُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_41_ar.html#verse-43">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْفَصْلُ الْحَادِي وَالْأَرْبَعُونَ — «الْآيَةُ ٤٣»</a></cite>
</blockquote>
