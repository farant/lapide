<blockquote>
<p>حَقًّا وَفِي ضَمِيرِي، أَنَا أَحْمَقُ الرِّجَالِ، وَحِكْمَةُ الْبَشَرِ لَيْسَتْ مَعِي؛ أَنَا طِفْلٌ صَغِيرٌ لا يَعْرِفُ خُرُوجَهُ وَدُخُولَهُ.</p>
<cite>— كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_Preliminares_ar.html#life">الْمُقَدِّمَاتُ — حَيَاةُ كُورْنِيلِيُوسْ آ لَابِيدِي</a></cite>
</blockquote>
