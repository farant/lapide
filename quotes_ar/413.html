<blockquote>
<p>الرَّخَاءُ شَرَكٌ؛ وَالسِّكِّينُ الَّتِي تَقْطَعُ هَذَا الشَّرَكَ هِيَ الشِّدَّةُ. الرَّخَاءُ سِجْنُ مَحَبَّةِ اللهِ؛ وَالْكَبْشُ الَّذِي يَهْدِمُهُ هُوَ الشِّدَّةُ.</p>
<cite>— غِيغُو الْأَوَّلُ، <a href="guigo_i/Meditationes_ar.html#chapter-xiv">تَأَمُّلَاتٌ — الْفَصْلُ الرَّابِعَ عَشَرَ</a></cite>
</blockquote>
