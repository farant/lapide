<blockquote>
<p>هَذِهِ أُمُورٌ صِبْيَانِيَّةٌ شَبِيهَةٌ بِأَلْعَابِ الْمُشَعْوِذِينَ — أَنْ تُعَلِّمَ مَا تَجْهَلُهُ؛ بَلْ، لِأَتَكَلَّمَ بِسَخَطٍ، أَلَّا تَعْرِفَ حَتَّى أَنَّكَ لا تَعْرِفُ.</p>
<cite>— الْقِدِّيسُ إِيرُونِيمُوسْ، <a href="02_Clemens_Hieronymi_Du_Culte_ar.html#jerome-to-paulinus">إِيرُونِيمُوسُ إِلَى بُولِينُوسَ</a></cite>
</blockquote>
