<blockquote>
<p>اذْكُرِ اللهَ دَائِمًا، فَيَصِيرَ عَقْلُكَ سَمَاءً.</p>
<cite>— الْقِدِّيسُ أَفْرَامُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_17_ar.html#verse-1-fruits">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ السَّابِعَ عَشَرَ — «الثِّمَارُ السِّتُّ لِلسَّيْرِ فِي حَضْرَةِ اللهِ»</a></cite>
</blockquote>
