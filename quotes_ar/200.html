<blockquote>
<p>عِشْ بَيْنَ النَّاسِ كَمَا لَوْ كَانَ اللهُ يَرَاكَ؛ وَتَكَلَّمْ مَعَ اللهِ كَمَا لَوْ كَانَ النَّاسُ يَسْمَعُونَ.</p>
<cite>— سِينِيكَا، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_17_ar.html#verse-1-ambula">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ السَّابِعَ عَشَرَ — «سِرْ أَمَامِي»</a></cite>
</blockquote>
