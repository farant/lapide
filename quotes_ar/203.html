<blockquote>
<p>غِنَايَ هُوَ الْمَسِيحُ — فَلْيَغِبِ الْبَاقِي. كُلُّ وَفْرَةٍ لَيْسَتْ إِلَهِي هِيَ فَقْرٌ لِي.</p>
<cite>— الْقِدِّيسُ لُودْفِيكُسُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_17_ar.html#verse-1-el-shaddai">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ السَّابِعَ عَشَرَ — «أَنَا اللهُ الْقَدِيرُ — إِيلْ شَدَّايْ»</a></cite>
</blockquote>
