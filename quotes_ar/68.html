<blockquote>
<p>حِينَ أَفَاضَ اللهُ نَسَمَتَهُ وَرُوحَهُ عَلَى الْإِنْسَانِ، أَفَاضَ ذَاتَهُ، كَأَنَّمَا وَضَعَ قَلْبَهُ فِي دَاخِلِهِ.</p>
<cite>— كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_02_ar.html#verse-7">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الثَّانِي — «وَجَبَلَ الرَّبُّ الْإِلَهُ الْإِنْسَانَ مِنْ طِينِ الْأَرْضِ»</a></cite>
</blockquote>
