<blockquote>
<p>نَفَخَ، لِيُبَيِّنَ أَنَّ خَلْقَ النَّفْسِ عَلَى اللهِ يَسِيرٌ كَيُسْرِ النَّفْخِ عَلَى الْإِنْسَانِ.</p>
<cite>— ثِيُودُورِيطُسُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_02_ar.html#verse-7">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الثَّانِي — «وَجَبَلَ الرَّبُّ الْإِلَهُ الْإِنْسَانَ مِنْ طِينِ الْأَرْضِ»</a></cite>
</blockquote>
