<blockquote>
<p>فَإِنَّ لِلصَّوْتِ الْحَيِّ قُوَّةً خَفِيَّةً لا تُوصَفُ، وَإِذَا انْسَكَبَ مِنْ فَمِ الْمُؤَلِّفِ فِي أُذُنَيِ التِّلْمِيذِ رَنَّ بِقُوَّةٍ أَشَدَّ.</p>
<cite>— الْقِدِّيسُ إِيرُونِيمُوسْ، <a href="02_Clemens_Hieronymi_Du_Culte_ar.html#jerome-to-paulinus">إِيرُونِيمُوسُ إِلَى بُولِينُوسَ</a></cite>
</blockquote>
