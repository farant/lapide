<blockquote>
<p>مَحَبَّةُ السَّلَامِ الزَّمَنِيِّ تُوَلِّدُ بِالضَّرُورَةِ اضْطِرَابَ النَّفْسِ. فَمَنْ مَلَكَ هَذَا السَّلَامَ وَأَحَبَّهُ فَهُوَ بِالضَّرُورَةِ مَحْرُومٌ مِنَ السَّلَامِ.</p>
<cite>— غِيغُو الْأَوَّلُ، <a href="guigo_i/Meditationes_ar.html#chapter-i">تَأَمُّلَاتٌ — الْفَصْلُ الْأَوَّلُ</a></cite>
</blockquote>
