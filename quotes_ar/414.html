<blockquote>
<p>بِمَا أَنَّكَ لَا تُؤْسَرُ إِلَّا بِاللَّذَّةِ وَحْدَهَا، فَلَا يَجِبُ الْحَذَرُ إِلَّا مِنَ الْأُمُورِ الْمُلَذَّةِ. لِذَلِكَ لَا تَكُونُ النَّفْسُ الْمَسِيحِيَّةُ آمِنَةً أَبَدًا إِلَّا فِي الشَّدَائِدِ.</p>
<cite>— غِيغُو الْأَوَّلُ، <a href="guigo_i/Meditationes_ar.html#chapter-xiv">تَأَمُّلَاتٌ — الْفَصْلُ الرَّابِعَ عَشَرَ</a></cite>
</blockquote>
