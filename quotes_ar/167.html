<blockquote>
<p>الشَّدَائِدُ تِيجَانٌ لِلرَّجُلِ الشُّجَاعِ، وَأَمْرَاضٌ لِلضَّعِيفِ.</p>
<cite>— الْقِدِّيسُ أَمْبْرُوسِيُوسُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_12_ar.html#verse-12-17">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الثَّانِيَ عَشَرَ — «فَضَرَبَ الرَّبُّ فِرْعَوْنَ بِضَرَبَاتٍ عَظِيمَةٍ»</a></cite>
</blockquote>
