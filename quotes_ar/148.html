<blockquote>
<p>فَبِبُطْءٍ، وَسَطَ مَكْرِ هَذَا الْعَالَمِ وَأَمْوَاجِ الشَّهَوَاتِ الدُّنْيَوِيَّةِ، تَجِدُ الْبَسَاطَةُ مَرْفَأً.</p>
<cite>— الْقِدِّيسُ أَمْبْرُوسِيُوسُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_08_ar.html#ch8-verse-7">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الثَّامِنُ — «الْغُرَابُ»</a></cite>
</blockquote>
