<blockquote>
<p>إِنْ كَانَ قَوْسُ قُزَحَ بِهَذَا الْجَمَالِ وَالتَّنَوُّعِ، فَكَمْ يَكُونُ اللهُ وَبَيْتُ اللهِ أَجْمَلَ وَأَبْهَى؟</p>
<cite>— كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_09_ar.html#verse-9-16">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ التَّاسِعُ — «أَنْظُرُ إِلَيْهَا وَأَذْكُرُ الْعَهْدَ»</a></cite>
</blockquote>
