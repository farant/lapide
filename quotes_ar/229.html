<blockquote>
<p>كَانَتْ هَذِهِ الْأَيْكَةُ مُصَلَّى إِبْرَاهِيمَ وَمُعْتَكَفَهُ، يَنْسَحِبُ إِلَيْهِ بَيْنَ الْحِينِ وَالْآخَرِ مِنَ الْهُمُومِ وَالْأَشْغَالِ حِينَ يُرِيدُ أَنْ يُنَاجِيَ اللهَ.</p>
<cite>— كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_21_ar.html#verse-33">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْفَصْلُ الْحَادِي وَالْعِشْرُونَ — «غَرَسَ أَيْكَةً»</a></cite>
</blockquote>
