<blockquote>
<p>بِرِضَى الْمَسِيحِ، لَا يَسْتَطِيعُ الْحِقْدُ شَيْئًا؛ وَبِرَفْضِ الْمَسِيحِ، لَا يَسْتَطِيعُ الْكَدْحُ شَيْئًا.</p>
<cite>— الْقِدِّيسُ غْرِيغُورِيُوسُ النَّزْيَنْزِيُّ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_37_ar.html#verse-4">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ السَّابِعُ وَالثَّلَاثُونَ — «الْآيَةُ ٤»</a></cite>
</blockquote>
