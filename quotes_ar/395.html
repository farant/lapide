<blockquote>
<p>الطَّرِيقُ إِلَى اللهِ يَسِيرٌ، لِأَنَّ السَّائِرَ فِيهِ يَسِيرُ بِالتَّخَفُّفِ؛ وَلَوْ كَانَ السَّيْرُ بِالتَّحَمُّلِ لَكَانَ شَاقًّا. فَتَخَفَّفْ إِذَنْ إِلَى حَدٍّ تَتْرُكُ فِيهِ كُلَّ شَيْءٍ، وَتُنْكِرُ نَفْسَكَ.</p>
<cite>— غِيغُو الْأَوَّلُ، <a href="guigo_i/Meditationes_ar.html#chapter-ii">تَأَمُّلَاتٌ — الْفَصْلُ الثَّانِي</a></cite>
</blockquote>
