<blockquote>
<p>اللهُ هُوَ الَّذِي طَبِيعَتُهُ الصَّلَاحُ، وَإِرَادَتُهُ الْقُدْرَةُ، وَعَمَلُهُ الرَّحْمَةُ.</p>
<cite>— القِدِّيسُ لَاوُنُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_01_ar.html#god-elohim">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الْأَوَّلُ — «اللهُ (إِلُوهِيمْ): ثَلَاثَةَ عَشَرَ تَعْرِيفًا»</a></cite>
</blockquote>
