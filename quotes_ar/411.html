<blockquote>
<p>مَهْمَا أَصَابَكَ، فَمَا دَامَتْ نَفْسُكَ لَا تَقَعُ فِي حَرَكَةِ الْغَضَبِ أَوِ الْبُغْضِ أَوِ الْحُزْنِ أَوِ الْخَوْفِ، وَلَا فِي أَسْبَابِهَا، فَلَنْ يَضُرَّكَ شَيْءٌ فِي الدَّهْرِ الْآتِي.</p>
<cite>— غِيغُو الْأَوَّلُ، <a href="guigo_i/Meditationes_ar.html#chapter-xiii">تَأَمُّلَاتٌ — الْفَصْلُ الثَّالِثَ عَشَرَ</a></cite>
</blockquote>
