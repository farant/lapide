<blockquote>
<p>أَجْرَى اللهُ خَارِجِيًّا أَمَامَ عَيْنَيْ هَاجَرَ الْجَسَدِيَّتَيْنِ مَا كَانَ يَجْرِي فِي دَاخِلِهَا أَمَامَ عَيْنَيْ قَلْبِهَا.</p>
<cite>— كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_16_ar.html#verse-13">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ السَّادِسَ عَشَرَ — «أَنْتَ إِلَهٌ يَرَانِي»</a></cite>
</blockquote>
