<blockquote>
<p>لَمْ يَشَأْ يُوسُفُ أَنْ يَنْتَقِمَ لِنَفْسِهِ؛ لِأَنَّهُ عَلِمَ أَنَّ لَذَّةَ الِانْتِقَامِ لَحْظِيَّةٌ، وَلَكِنَّ لَذَّةَ الرَّحْمَةِ أَبَدِيَّةٌ.</p>
<cite>— يُوسِيفُوسْ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_50_ar.html#verse-19">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الْخَمْسُونَ — «بَكَى يُوسُفُ»</a></cite>
</blockquote>
