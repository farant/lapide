<blockquote>
<p>شَأْنُكَ أَنْ تَهْتَمَّ بِتَتْبِيلِ الْحَسَاءِ: فَإِنَّ أُذُنَيْكَ مَسْدُودَتَانِ بِالأَوْسَاخِ، فَلا تَسْتَطِيعُ سَمَاعَ الْعَقَائِدِ الْمُقَدَّسَةِ.</p>
<cite>— الْقِدِّيسُ بَاسِيلِيُوسُ الْكَبِيرُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_Preliminares_ar.html#dedicatory-letter">الْمُقَدِّمَاتُ — الرِّسَالَةُ الإِهْدَائِيَّةُ</a></cite>
</blockquote>
