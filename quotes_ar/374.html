<blockquote>
<p>أَرَادَ يَعْقُوبُ أَنْ يُدْفَنَ فِي كَنْعَانَ لِكَيْ يَشْتَاقَ نَسْلُهُ إِلَى السَّمَاءِ الَّتِي كَانَتْ كَنْعَانُ رَمْزًا لَهَا.</p>
<cite>— رُوبِرْتُوسُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_47_ar.html#verses-29-30">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ السَّابِعُ وَالْأَرْبَعُونَ — «الدَّفْنُ فِي كَنْعَانَ»</a></cite>
</blockquote>
