<blockquote>
<p>لَنْ يَكُونَ مَنْفِيًّا مَنِ اللهُ فِي عَقْلِهِ، لِأَنَّ لِلرَّبِّ الْأَرْضَ وَمِلْأَهَا.</p>
<cite>— الْقِدِّيسُ كِبْرِيَانُوسُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_12_ar.html#verse-12-1">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الثَّانِيَ عَشَرَ — «اُخْرُجْ مِنْ أَرْضِكَ»</a></cite>
</blockquote>
