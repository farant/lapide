<blockquote>
<p>حِينَ لَمْ يَبْخَلْ بِوَحِيدِهِ عَلَى الْأَرْضِ، أُمِرَ أَنْ يُحْصِيَ النُّجُومَ بَدَلًا مِنَ الْأَبْنَاءِ فِي السَّمَاءِ.</p>
<cite>— الْقِدِّيسُ إِيرُونِيمُوسْ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_22_ar.html#verse-16">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الثَّانِي وَالْعِشْرُونَ — «لِأَنَّكَ فَعَلْتَ هَذَا الْأَمْرَ»</a></cite>
</blockquote>
