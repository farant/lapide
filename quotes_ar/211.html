<blockquote>
<p>النَّهَارُ يَكْشِفُ الْحَقِيقَةَ، وَالْعُقُوبَةُ الْمُؤَجَّلَةُ لَا يَزَالُ يُمْكِنُ تَنْفِيذُهَا، أَمَّا الَّتِي نُفِّذَتْ بَالْفِعْلِ فَلَا يُمْكِنُ اسْتِرْدَادُهَا.</p>
<cite>— سِنِيكَا، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_18_ar.html#verse-21">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الثَّامِنَ عَشَرَ — «أَنْزِلُ وَأَرَى»</a></cite>
</blockquote>
