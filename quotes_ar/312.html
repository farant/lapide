<blockquote>
<p>فِي الْعَمَلِ الْوَاحِدِ بِعَيْنِهِ، يُوجَدُ دَائِمًا شَيْءٌ صَالِحٌ يُكَافِئُ اللهُ عَلَيْهِ، وَشَيْءٌ سَيِّئٌ يَكْرَهُهُ وَيَمْقُتُهُ.</p>
<cite>— كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_34_ar.html#judith-explained">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الرَّابِعُ وَالثَّلَاثُونَ — «تَفْسِيرُ مَدْحِ يَهُوذِيتَ لِشَمْعُونَ»</a></cite>
</blockquote>
