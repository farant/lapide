<blockquote>
<p>أَوَّلُ الرُّجُوعِ إِلَى الْحَقِّ أَنْ تَسْخَطَ عَلَى نَفْسِكَ فِي الْبَاطِلِ. فَالتَّوْبِيخُ يَسْبِقُ الْإِصْلَاحَ؛ إِذْ لَا يَرْغَبُ الْمَرْءُ فِي تَغْيِيرِ مَا لَا يُسْخِطُهُ.</p>
<cite>— غِيغُو الْأَوَّلُ، <a href="guigo_i/Meditationes_ar.html#chapter-ii">تَأَمُّلَاتٌ — الْفَصْلُ الثَّانِي</a></cite>
</blockquote>
