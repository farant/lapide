<blockquote>
<p>إِنْ كُنْتَ تُحِبُّ إِلَى هَذَا الْحَدِّ، وَإِنْ كَانَتِ الْمَحَبَّةُ ذَاتُهَا تُلْزِمُكَ، فَوَبِّخْ وَاضْرِبْ؛ وَإِنْ فَعَلْتَ غَيْرَ ذَلِكَ فَإِنَّكَ تُدِينُ نَفْسَكَ.</p>
<cite>— غِيغُو الْأَوَّلُ، <a href="guigo_i/Meditationes_ar.html#chapter-xvii">تَأَمُّلَاتٌ — الْفَصْلُ السَّابِعَ عَشَرَ</a></cite>
</blockquote>
