<blockquote>
<p>إِنَّ فَضِيلَةَ نُوحٍ الْبَارِّ هِيَ الَّتِي جَعَلَتْ دُخَانَ الذَّبِيحَةِ وَعَبِيرَهَا رَائِحَةَ طِيبٍ عِنْدَ اللهِ.</p>
<cite>— الْقِدِّيسُ يُوحَنَّا الذَّهَبِيُّ الْفَمِ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_08_ar.html#ch8-verse-21">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الثَّامِنُ — «الرَّائِحَةُ الذَّكِيَّةُ»</a></cite>
</blockquote>
