<blockquote>
<p>طَلَبَ الْبَارُّ الرَّبَّ الَّذِي لَمْ يَرَهُ، بَرِيئًا مِنَ الْفَسَادِ، تَوَّاقًا إِلَى الْأَبَدِيَّةِ.</p>
<cite>— الْقِدِّيسُ أَمْبْرُوسِيُوسُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_08_ar.html#ch8-verse-12">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الثَّامِنُ — «نُقْصَانُ الْمِيَاهِ»</a></cite>
</blockquote>
