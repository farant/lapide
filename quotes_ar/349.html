<blockquote>
<p>فِي الْبَدْءِ اللهُ، ثُمَّ الْكَلِمَةُ، وَمَعَهُمَا الرُّوحُ وَاحِدٌ: هَذِهِ الثَّلَاثَةُ أَزَلِيَّةٌ مَعًا، وَكُلُّهَا تَتَّجِهُ نَحْوَ الْوَاحِدِ.</p>
<cite>— كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_41_ar.html#verse-56">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْفَصْلُ الْحَادِي وَالْأَرْبَعُونَ — «الْآيَةُ ٥٦»</a></cite>
</blockquote>
