<blockquote>
<p>لَقَدْ خَلَقْتَنَا، يَا رَبُّ، لِذَاتِكَ، وَقَلْبُنَا لَا يَهْدَأُ حَتَّى يَسْتَرِيحَ فِيكَ. إِنَّ السَّمَاءَ وَالْأَرْضَ تَصْرُخَانِ، يَا رَبُّ، بِأَنْ نُحِبَّكَ.</p>
<cite>— القِدِّيسُ أُغُسْطِينُوسُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_01_ar.html#he-created">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الْأَوَّلُ — «خَلَقَ»</a></cite>
</blockquote>
