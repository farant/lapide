<blockquote>
<p>لَقَدْ غَلَبَنَا أُسْقُفُ هَذِهِ الْكَنِيسَةِ: هُوَ فَوْقَ التَّهْدِيدَاتِ، أَثْبَتُ مِنَ الْخُطَبِ، أَقْوَى مِنْ كَلِمَاتِ التَّمَلُّقِ.</p>
<cite>— مُودِسْتُوسُ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_Preliminares_ar.html#dedicatory-letter">الْمُقَدِّمَاتُ — الرِّسَالَةُ الإِهْدَائِيَّةُ</a></cite>
</blockquote>
