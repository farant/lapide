<blockquote>
<p>إِنْ أَطَعْتُمْ فَنُورٌ؛ وَإِنْ لَمْ تُطِيعُوا فَأُرْسِلُ عَلَيْكُمْ نَارًا.</p>
<cite>— إِكْلِيمَنْضُسُ الْإِسْكَنْدَرِيُّ، فِي كُورْنِيلِيُوسْ آ لَابِيدِي، <a href="01_genesis_15_ar.html#verse-15-17">تَفْسِيرُ سِفْرِ التَّكْوِينِ، الْإِصْحَاحُ الْخَامِسَ عَشَرَ — «التَّنُّورُ الْمُدَخِّنُ وَمِشْعَلُ النَّارِ»</a></cite>
</blockquote>
