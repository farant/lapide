<blockquote>
<p>إِنْ كَانَ لَكَ أَنْ تُبْغِضَ أَحَدًا، فَلَا تُبْغِضْ أَحَدًا كَمَا تُبْغِضُ نَفْسَكَ. فَمَا مِنْ أَحَدٍ أَلْحَقَ بِكَ مِنَ الْأَذَى مِثْلَمَا أَلْحَقَتْ بِكَ نَفْسُكَ.</p>
<cite>— غِيغُو الْأَوَّلُ، <a href="guigo_i/Meditationes_ar.html#chapter-ii">تَأَمُّلَاتٌ — الْفَصْلُ الثَّانِي</a></cite>
</blockquote>
