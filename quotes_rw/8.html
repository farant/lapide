<blockquote>
<p>Mu by'ukuri kandi mu mutima wanjye, ndi umuswa kurusha abantu bose, kandi ubuhanga bw'abantu ntiburi kumwe nanjye; ndi umwana muto utamenya aho ava n'aho ajya.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_rw.html#life">Ibanze — Ubuzima bwa Cornelius a Lapide</a></cite>
</blockquote>
