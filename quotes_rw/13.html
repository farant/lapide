<blockquote>
<p>Ndagusaba, musaza wanjye nkunda cyane, kuba mu byo, kubyibandaho, kutamenya ikindi, kudashaka ikindi. Ntibigaragara nk'aho ari aha ku isi uherereye mu bwami bwo mu ijuru?</p>
<cite>— Mutagatifu Jeromi, muri Cornelius a Lapide, <a href="02_Clemens_Hieronymi_Du_Culte_rw.html#jerome-to-paulinus">Jeromi ku Pawulini</a></cite>
</blockquote>
