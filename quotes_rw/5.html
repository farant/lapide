<blockquote>
<p>Twatsinzwe n'Umwepiskopi w'iyi Kiliziya; arusha ibikangisho, akomeye mu bitekerezo, arusha amagambo meza. Hagomba kugeragezwa umuntu utinyuka.</p>
<cite>— Modestus, muri Cornelius a Lapide, <a href="01_Preliminares_rw.html#dedicatory-letter">Ibanze — Urwandiko rw'Ishimwe</a></cite>
