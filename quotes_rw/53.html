<cite>— Mena, muri Cornelius a Lapide, <a href="01_genesis_01_rw.html#verse-16">Ibisobanuro ku Ntangiriro, Igice cya I — « Imana Irema Imirasire Ibiri Ikomeye »</a></cite>
