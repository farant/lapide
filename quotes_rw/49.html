<blockquote>
<p>Nta muremyi uruta Imana; nta buhanga buruta Ijambo ry'Imana; nta mpamvu nziza iruta ko ibyiza birengwa n'Uwiza.</p>
<cite>— Mutagatifu Agusitini, muri Cornelius a Lapide, <a href="01_genesis_01_rw.html#verse-4">Ibisobanuro ku Ntangiriro, Igice cya I — « Imana ibona umucyo ko ari mwiza »</a></cite>
</blockquote>
