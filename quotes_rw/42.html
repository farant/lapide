<blockquote>
<p>Waturemye, Nyagasani, kugira ngo tube abawe, kandi umutima wacu ntugarara kugeza aho uriho ahindukira akaruhukira muri Wowe. Ijuru n'isi birasemerera, Nyagasani, ko tugomba kugukunda.</p>
<cite>— Mutagatifu Agusitini, muri Cornelius a Lapide, <a href="01_genesis_01_rw.html#he-created">Ibisobanuro ku Ntangiriro, Igice cya I — « Yaremye »</a></cite>
