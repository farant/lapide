<cite>— Mutagatifu Amburwazi, muri Cornelius a Lapide, <a href="01_genesis_04_rw.html#ch4-verse-3">Ibisobanuro ku Ntangiriro, Igice cya IV — « Hashize Iminsi Myinshi »</a></cite>
