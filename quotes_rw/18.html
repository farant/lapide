<blockquote>
<p>Biturutse ku isi, nta kintu kigera ku Mana kitari kwiniha n'amarira; biturutse mu ijuru, nta kintu kimanukira kuri twe kitari ubugwaneza n'imbabazi.</p>
<cite>— Padiri Lacordaire, muri Cornelius a Lapide, <a href="02_Clemens_Hieronymi_Du_Culte_rw.html#du-culte">Ku Gusenga Yezu Kristu mu Byanditswe</a></cite>
</blockquote>
