<blockquote>
<p>Twige ku isi ibintu ubumenyi bwabyo buzahoraho natwe mu ijuru. Wige nk'aho uzahoraho iteka; ubeho nk'aho uzapfa buri gihe.</p>
<cite>— Mutagatifu Jeromi, muri Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_rw.html#chapter-iv">Ijambo ry'Ibanze n'Ishimwe ry'Ibyanditswe Bitagatifu — « Igice cya IV: Imyanzuro n'Ingero z'Abakurambere ba Kiliziya »</a></cite>
</blockquote>
