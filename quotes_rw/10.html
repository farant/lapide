<p>Kuko ijwi ry'umuntu ubwe rifite ingufu zihishwe, kandi rituruka mu kanwa k'umwanditsi rikinjira mu matwi y'umunyeshuri, rikarusha kuvugira hejuru.</p>
<cite>— Mutagatifu Jeromi, muri Cornelius a Lapide, <a href="02_Clemens_Hieronymi_Du_Culte_rw.html#jerome-to-paulinus">Jeromi ku Pawulini</a></cite>
