<blockquote>
<p>Mu bintu byose bishakwamo inyungu, nta kintu kiruta ubuhinzi, nta kintu gitanga imbuto nyinshi, nta kintu giryoshye, nta kintu gikwiriye umuntu w'umudendezo.</p>
<cite>— Kikero, muri Cornelius a Lapide, <a href="01_genesis_02_rw.html#verse-15">Ibisobanuro ku Ntangiriro, Igice cya II — « Uhoraho Imana Afata Umuntu, Amushyira muri Paradizo »</a></cite>
</blockquote>
