<blockquote>
<p>Ibyo ni iby'abana, bisa n'imikino y'abanyabinyoma — kwigisha ibyo utazi; cyangwa, ngo mvugane uburakari, kutamenya n'uko utazi.</p>
<cite>— Mutagatifu Jeromi, muri Cornelius a Lapide, <a href="02_Clemens_Hieronymi_Du_Culte_rw.html#jerome-to-paulinus">Jeromi ku Pawulini</a></cite>
</blockquote>
