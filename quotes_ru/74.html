<p>Древо жизни есть крест Христов, который, воздвигнутый посреди рая, то есть Церкви, даёт жизнь миру. Посему Невеста, желая взойти на него, говорит: «Взойду на пальму и возьму плоды её, сладкие гортани моей».</p>
<cite>— Корнелий а Лапиде, <a href="01_genesis_02_ru.html#the-tree-of-life">Комментарий на Бытие, Глава II — «Древо жизни»</a></cite>
