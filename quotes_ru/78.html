<blockquote>
<p>Ксеркс, когда покрыл землю своим войском, а море — кораблями, взирая с высоты на всё это множество, застонал и заплакал, повторяя: «Из всех этих людей ни один не будет жив через сто лет».</p>
<cite>— Корнелий а Лапиде, <a href="01_genesis_02_ru.html#verse-17">Комментарий на Бытие, Глава II — «От древа познания не ешь»</a></cite>
</blockquote>
