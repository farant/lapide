<blockquote>
<p>Будем изучать на земле то, знание чего пребудет с нами на небесах. Учись так, словно будешь жить вечно; живи так, словно умрёшь в любое мгновение.</p>
<cite>— св. Иероним, в комментарии Корнелия а Лапиде, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_Pt1_ru.html#chapter-iv">Предисловие и Похвала Священному Писанию — Глава IV: Суждения и примеры Отцов</a></cite>
</blockquote>
