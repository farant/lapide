<blockquote>
<p>«Восприимчивый ум похвален и без учителя. Мы ценим не то, что ты находишь, а то, что ищешь. Мягкий воск, податливый для лепки, даже если руки мастера и ваятеля праздны, всё же по своей природе есть уже всё, чем он может стать».</p>
<cite>— св. Иероним, в кн.: Корнелий а Лапиде, <a href="02_Clemens_Hieronymi_Du_Culte_ru.html#jerome-to-paulinus">Письмо Иеронима к Павлину</a></cite>
</blockquote>
