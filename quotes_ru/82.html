<p>Из всего, от чего ищут какой-либо пользы, нет ничего лучше земледелия, ничего плодоноснее, ничего сладостнее, ничего более достойного свободного человека.</p>
<cite>— Цицерон, в комментарии Корнелия а Лапиде, <a href="01_genesis_02_ru.html#verse-15">Комментарий на Бытие, Глава II — «И взял Господь Бог человека»</a></cite>
