<blockquote>
<p>Сын мой, сын мой, помни о жизни вечной, взирай на небо и созерцай Царствующего там: ибо жизнь у тебя не отнимается, а претворяется в лучшую.</p>
<cite>— мать св. Симфориана, в комментарии Корнелия а Лапиде, <a href="01_genesis_01_ru.html#verse-16">Комментарий на Бытие, Глава I — «И создал Бог два светила великие»</a></cite>
