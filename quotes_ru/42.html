<blockquote>
<p>Ты создал нас, Господи, для Себя, и неспокойно сердце наше, доколе не успокоится в Тебе. Небо и земля взывают, Господи, чтобы мы возлюбили Тебя.</p>
<cite>— блж. Августин, в комментарии Корнелия а Лапиде, <a href="01_genesis_01_ru.html#he-created">Комментарий на Бытие, Глава I — «Сотворил»</a></cite>
</blockquote>
