<blockquote>
<p>«Это детские забавы, подобные играм шарлатанов — учить тому, чего сам не знаешь; или, говоря с негодованием, даже не ведать того, что ты не знаешь».</p>
<cite>— св. Иероним, в кн.: Корнелий а Лапиде, <a href="02_Clemens_Hieronymi_Du_Culte_ru.html#jerome-to-paulinus">Письмо Иеронима к Павлину</a></cite>
