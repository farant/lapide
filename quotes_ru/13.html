<blockquote>
<p>«Молю тебя, возлюбленный брат, среди сего жить, о сем размышлять, ничего иного не знать, ничего иного не искать. Не кажется ли тебе, что уже здесь, на земле, это есть обитель Царства Небесного?»</p>
<cite>— св. Иероним, в кн.: Корнелий а Лапиде, <a href="02_Clemens_Hieronymi_Du_Culte_ru.html#jerome-to-paulinus">Письмо Иеронима к Павлину</a></cite>
</blockquote>
