<blockquote>
<p>«В храме Божием каждый приносит что может: одни приносят золото, серебро и драгоценные камни; другие — виссон, пурпур, багряницу и гиацинт; нам же довольно, если мы приносим кожи и козью шерсть».</p>
<cite>— св. Иероним, в кн.: Корнелий а Лапиде, <a href="02_Clemens_Hieronymi_Du_Culte_ru.html#helmeted-prologue">Пролог в шлеме</a></cite>
</blockquote>
