<blockquote>
<p>Когда кто-либо через наслаждение совершил нечто постыдное, сладость уходит, а постыдное и горестное остаётся. Напротив, в труде добродетелей тяжёлое и горестное уходит, а сладостное и радостное остаётся.</p>
<cite>— Музоний, в Cornelius a Lapide, <a href="01_genesis_03_ru.html#verse-7">Комментарий на Бытие, Глава III — «И открылись глаза у обоих»</a></cite>
</blockquote>
