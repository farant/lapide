<p>Воистину и по совести моей, я глупейший из людей, и мудрость человеческая не со мною; я малое дитя, которое не знает ни выхода своего, ни входа своего.</p>
<cite>— Корнелий а Лапиде, <a href="01_Preliminares_ru.html#life">Предварительные замечания — Жизнеописание Корнелия а Лапиде</a></cite>
