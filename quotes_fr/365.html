<blockquote>
<p>Saint Martin refusa de priver le prêtre Brictio, son calomniateur, de sa charge, en disant : « Si le Christ a supporté Judas, pourquoi ne supporterais-je pas Brictio ? »</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_45_fr.html#charity-of-joseph">Commentaire sur la Genèse, Chapitre XLV — « La charité de Joseph »</a></cite>
</blockquote>
