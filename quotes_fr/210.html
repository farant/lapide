<blockquote>
<p>À tous les hôtes, qu'ils arrivent ou qu'ils partent, la tête inclinée ou le corps entier prosterné à terre, que le Christ soit adoré en eux, lui qui est aussi reçu en eux.</p>
<cite>— saint Benoît, dans Cornelius a Lapide, <a href="01_genesis_18_fr.html#verse-2">Commentaire sur la Genèse, Chapitre XVIII — « Trois hommes »</a></cite>
</blockquote>
