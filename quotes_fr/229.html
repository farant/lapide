<blockquote>
<p>Ce bosquet était l'oratoire et la retraite d'Abraham, où il se retirait de temps à autre loin des soucis et des affaires, lorsqu'il s'apprêtait à s'entretenir avec Dieu.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_21_fr.html#verse-33">Commentaire sur la Genèse, Chapitre XXI — « Il planta un bosquet »</a></cite>
</blockquote>
