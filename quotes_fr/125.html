<blockquote>
<p>Dieu fit miséricordieusement pleuvoir les eaux non pas toutes à la fois, mais peu à peu, afin que pendant ce temps les hommes fussent terrifiés et se repentissent.</p>
<cite>— saint Jean Chrysostome, dans Cornelius a Lapide, <a href="01_genesis_07_fr.html#ch7-verse-12">Commentaire sur la Genèse, Chapitre VII — « Quarante jours »</a></cite>
</blockquote>
