<blockquote>
<p>L'Église est le lieu des Anges, le lieu des Archanges, le royaume de Dieu, le ciel même ; et si vous ne le croyez pas, regardez cette table, c'est-à-dire l'autel.</p>
<cite>— saint Jean Chrysostome, dans Cornelius a Lapide, <a href="01_genesis_28_fr.html#verse-17">Commentaire sur la Genèse, Chapitre XXVIII — « Que ce lieu est terrible »</a></cite>
</blockquote>
