<blockquote>
<p>La mort, du reste, sera pour moi un bienfait : car elle me conduira plus vite à Dieu, pour qui je vis et j'accomplis ma charge, et pour qui j'ai déjà en grande partie quitté ce monde, et vers qui je me hâte depuis longtemps.</p>
<cite>— S. Basile le Grand, <a href="01_Preliminares_fr.html#dedicatory-letter">Préliminaires — Lettre dédicatoire</a></cite>
</blockquote>
