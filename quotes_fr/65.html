<p>Qu'est-ce donc que la bouche de l'homme, sinon un certain sanctuaire de la parole, une fontaine du discours, une salle des mots, un trésor de la volonté ?</p>
<cite>— Saint Ambroise, dans Cornelius a Lapide, <a href="01_genesis_02_fr.html#verse-7">Commentaire sur la Genèse, Chapitre II — « Et le Seigneur Dieu forma l'homme du limon de la terre »</a></cite>
