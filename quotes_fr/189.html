<blockquote>
<p>Le désir et l'amour craignent toutes choses, même celles qui sont sûres ; et ils ne se reposent point jusqu'à ce qu'ils possèdent l'objet aimé, la chose tant désirée.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_15_fr.html#verse-15-2">Commentaire sur la Genèse, Chapitre XV — « Que me donnerez-vous ? »</a></cite>
</blockquote>
