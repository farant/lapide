<blockquote>
<p>Vous nous avez faits, Seigneur, pour vous, et notre cœur est inquiet jusqu'à ce qu'il repose en vous. Le ciel et la terre crient, Seigneur, pour que nous vous aimions.</p>
<cite>— Saint Augustin, dans Cornelius a Lapide, <a href="01_genesis_01_fr.html#he-created">Commentaire sur la Genèse, Chapitre I — « Il créa »</a></cite>
</blockquote>
