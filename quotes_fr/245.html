<blockquote>
<p>Car c'est le propre du sage de se séparer des plaisirs de la chair, d'élever l'âme et de la retirer du corps. Car c'est en cela que consiste se connaître soi-même en tant qu'être humain.</p>
<cite>— Saint Ambroise, in Cornelius a Lapide, <a href="01_genesis_24_fr.html#verse-63">Commentaire sur la Genèse, Chapitre XXIV — « Pour méditer »</a></cite>
</blockquote>
