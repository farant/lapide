<blockquote>
<p>Quoi qu'il t'arrive, aussi longtemps que ton âme ne tombe point dans le mouvement de la colère, de la haine, de la tristesse ou de la crainte, ni dans leurs causes, cela ne te nuira en rien dans le siècle à venir.</p>
<cite>— Guigo Ier, <a href="guigo_i/Meditationes_fr.html#chapter-xiii">Méditations — Chapitre XIII</a></cite>
</blockquote>
