<blockquote>
<p>Vois combien tu ne te connais point toi-même. Car il n'est point de région si éloignée et si inconnue de toi, au sujet de laquelle tu croirais plus aisément quelqu'un te racontant des faussetés.</p>
<cite>— Guigo Ier, <a href="guigo_i/Meditationes_fr.html#chapter-xi">Méditations — Chapitre XI</a></cite>
</blockquote>
