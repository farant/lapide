<blockquote>
<p>Dieu accomplit extérieurement devant les yeux corporels d'Agar ce qui se passait en elle intérieurement aux yeux de son cœur.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_16_fr.html#verse-13">Commentaire sur la Genèse, Chapitre XVI — « Tu es le Dieu qui m'a vue »</a></cite>
</blockquote>
