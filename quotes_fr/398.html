<blockquote>
<p>Le plaisir bestial vient des sens de la chair ; le plaisir diabolique, de tout orgueil, envie et tromperie ; le plaisir philosophique, de la connaissance de la création ; le plaisir angélique, de la connaissance et de l'amour de Dieu.</p>
