<blockquote>
<p>Sors, pourquoi crains-tu, mon âme ? Pourquoi hésites-tu ? Pendant près de soixante-dix ans tu as servi le Christ, et tu crains la mort ?</p>
<cite>— saint Hilarion, dans Cornelius a Lapide, <a href="01_genesis_50_fr.html#dying-words">Commentaire sur la Genèse, Chapitre L — « Paroles de mort des saints et des hommes pieux »</a></cite>
