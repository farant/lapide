<p>Tu veux peindre avec des couleurs du bois qui sera consumé par le feu, quand tu veux que ce que tu consumes soit beau, qu'il s'agisse de nourriture ou de vêtements.</p>
<cite>— Guigo Ier, <a href="guigo_i/Meditationes_fr.html#chapter-iii">Méditations — Chapitre III</a></cite>
