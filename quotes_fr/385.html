<blockquote>
<p>Joseph ne voulut pas se venger ; car il savait que le plaisir de la vengeance est momentané, mais que le plaisir de la miséricorde est éternel.</p>
<cite>— Josèphe, dans Cornelius a Lapide, <a href="01_genesis_50_fr.html#verse-19">Commentaire sur la Genèse, Chapitre L — « Joseph pleura »</a></cite>
</blockquote>
