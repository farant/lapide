<blockquote>
<p>Dieu agit souvent ainsi avec nous : il commande et exige un acte difficile, mais quand il a vu une obéissance empressée, content de cela, il arrête l'exécution.</p>
<cite>— saint Jean Chrysostome, dans Cornelius a Lapide, <a href="01_genesis_22_fr.html#verse-12">Commentaire sur la Genèse, Chapitre XXII — « N'étends pas ta main »</a></cite>
</blockquote>
