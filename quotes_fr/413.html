<blockquote>
<p>La prospérité est un piège ; le couteau qui tranche ce piège, c'est l'adversité. La prospérité est la prison de l'amour de Dieu ; le bélier qui la brise, c'est l'adversité.</p>
<cite>— Guigo Ier, <a href="guigo_i/Meditationes_fr.html#chapter-xiv">Méditations — Chapitre XIV</a></cite>
</blockquote>
