<blockquote>
<p>Voici en somme le tout de la dépravation humaine : abandonner ce qui est meilleur que soi, c'est-à-dire Dieu ; et s'attacher à ce qui est moindre que soi, s'y attachant dans la jouissance, c'est-à-dire les choses temporelles.</p>
<cite>— Guigo Ier, <a href="guigo_i/Meditationes_fr.html#chapter-ix">Méditations — Chapitre IX</a></cite>
</blockquote>
