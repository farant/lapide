<blockquote>
<p>Toute noblesse eut un commencement ignoble ; et ceux qui se glorifient de la noblesse de leurs ancêtres se glorifient non de leur propre vertu, mais de celle d'autrui. Et cela donc est vanité.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_38_fr.html#moral-reflection">Commentaire sur la Genèse, Chapitre XXXVIII — « De l'origine de la noblesse »</a></cite>
</blockquote>
