<blockquote>
<p>Il faut considérer avec tremblement que le Dieu juste et tout-puissant, lorsqu'il est irrité par des péchés précédents, permet à l'esprit aveuglé de tomber encore dans d'autres.</p>
<cite>— saint Grégoire, dans Cornelius a Lapide, <a href="01_genesis_15_fr.html#verse-15-16">Commentaire sur la Genèse, Chapitre XV — « À la quatrième génération »</a></cite>
</blockquote>
