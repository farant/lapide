<blockquote>
<p>Il ne sera pas un exilé, celui qui a Dieu dans son esprit, car la terre est au Seigneur, et tout ce qu'elle contient.</p>
<cite>— saint Cyprien, dans Cornelius a Lapide, <a href="01_genesis_12_fr.html#verse-12-1">Commentaire sur la Genèse, Chapitre XII — « Quitte ton pays »</a></cite>
</blockquote>
