<blockquote>
<p>Dieu voulait qu'Abraham fût étranger en Chanaan et qu'il fût continuellement en pèlerinage, afin de nous enseigner que dans cette vie nous sommes des pèlerins en route vers le ciel.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_20_fr.html#verse-1">Commentaire sur la Genèse, Chapitre XX — « Abraham partit de là »</a></cite>
</blockquote>
