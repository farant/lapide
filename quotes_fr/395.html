<blockquote>
<p>Le chemin vers Dieu est facile, parce qu'on le parcourt en se déchargeant ; il serait difficile si l'on marchait en se chargeant. Décharge-toi donc au point que, ayant mis de côté toutes choses, tu te renonces toi-même.</p>
<cite>— Guigo Ier, <a href="guigo_i/Meditationes_fr.html#chapter-ii">Méditations — Chapitre II</a></cite>
</blockquote>
