<blockquote>
<p>Si donc tu es tenté, méprisé, souffrant, affaibli, attristé, diffamé, mis à mort, torturé, voire pendu ou brûlé, imite Isaac : ce n'est qu'un court moment ; pense à l'éternité.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_22_fr.html#verse-10">Commentaire sur la Genèse, Chapitre XXII — « Il saisit le glaive »</a></cite>
</blockquote>
