<blockquote>
<p>Le commencement du retour à la vérité, c'est de se déplaire à soi-même dans la fausseté. La correction est précédée du reproche. Car on ne se soucie pas de changer ce qui ne déplaît pas.</p>
<cite>— Guigo Ier, <a href="guigo_i/Meditationes_fr.html#chapter-ii">Méditations — Chapitre II</a></cite>
</blockquote>
