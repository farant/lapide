<blockquote>
<p><em>Au commencement est Dieu, puis le Verbe, et avec eux l'Esprit est un : Ces trois sont coéternels, tous tendant vers l'unité.</em></p>
<cite>— Cornelius a Lapide, <a href="01_genesis_41_fr.html#verse-56">Commentaire sur la Genèse, Chapitre XLI — « Verset 56 »</a></cite>
</blockquote>
