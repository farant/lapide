<blockquote>
<p>Ce sont là des puérilités, semblables aux jeux des charlatans, que d'enseigner ce que l'on ignore ; bien plus, pour parler avec indignation, c'est ne pas même savoir que l'on ne sait pas.</p>
<cite>— S. Jérôme, <a href="02_Clemens_Hieronymi_Du_Culte_fr.html#jerome-to-paulinus">Jérôme à Paulin</a></cite>
</blockquote>
