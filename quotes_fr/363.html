<blockquote>
<p>Veux-tu être loué ? Loue un autre. Veux-tu être aimé ? Aime. Veux-tu obtenir les premières places ? Cède-les d'abord à un autre.</p>
<cite>— Saint Jean Chrysostome, in Cornelius a Lapide, <a href="01_genesis_45_fr.html#charity-of-joseph">Commentaire sur la Genèse, Chapitre XLV — « La charité de Joseph »</a></cite>
</blockquote>
