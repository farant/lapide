<blockquote>
<p>Demandez-moi autre chose, et vos mérites recevront leur récompense. Oubliez cet homme : car le roi de France ne venge pas les injures du duc d'Orléans.</p>
<cite>— Louis XII, dans Cornelius a Lapide, <a href="01_genesis_50_fr.html#verse-21">Commentaire sur la Genèse, Chapitre L — « Avec douceur et bonté »</a></cite>
</blockquote>
