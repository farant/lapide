<blockquote>
<p>Puisque tu n'es capturé que par le seul plaisir, seules les choses agréables doivent être évitées. C'est pourquoi l'âme chrétienne n'est jamais en sûreté que dans l'adversité.</p>
<cite>— Guigo Ier, <a href="guigo_i/Meditationes_fr.html#chapter-xiv">Méditations — Chapitre XIV</a></cite>
</blockquote>
