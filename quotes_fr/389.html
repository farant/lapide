<blockquote>
<p>Je n'ai pas vécu de telle sorte que j'aie honte de vivre parmi vous. Mais je ne crains pas non plus de mourir, parce que nous avons un bon Seigneur.</p>
<cite>— saint Ambroise, dans Cornelius a Lapide, <a href="01_genesis_50_fr.html#dying-words">Commentaire sur la Genèse, Chapitre L — « Paroles de mort des saints et des hommes pieux »</a></cite>
</blockquote>
