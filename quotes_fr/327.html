<blockquote>
<p>Dieu sait ordonner et diriger tous les péchés et tous les maux des hommes vers une bonne fin ; c'est pourquoi il tire toujours quelque bien des maux.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_38_fr.html#verse-16">Commentaire sur la Genèse, Chapitre XXXVIII — « Et il s'approcha d'elle »</a></cite>
</blockquote>
