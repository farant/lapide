<blockquote>
<p>Les martyrs disent à Dieu : <em>« À cause de toi nous sommes mis à mort tout le jour »</em> ; toi, tu dis à n'importe quelles choses viles : À cause de vous je suis troublé tout le jour.</p>
<cite>— Guigo Ier, <a href="guigo_i/Meditationes_fr.html#chapter-iv">Méditations — Chapitre IV</a></cite>
</blockquote>
