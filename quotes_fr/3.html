<blockquote>
<p>Celui qui ne possède rien n'est pas sujet à la confiscation de ses biens : à moins que tu n'aies besoin de ces haillons déchirés et usés et de ces quelques livres, en lesquels résident toutes mes richesses et mes ressources.</p>
<cite>— S. Basile le Grand, <a href="01_Preliminares_fr.html#dedicatory-letter">Préliminaires — Lettre dédicatoire</a></cite>
</blockquote>
