<blockquote>
<p>Les dévots se retirent des distractions vers les secrets intérieurs de l'esprit, et là se reposent comme dans le sein de la tranquillité ; tels sont les tabernacles des pieux.</p>
<cite>— saint Grégoire, dans Cornelius a Lapide, <a href="01_genesis_25_fr.html#verse-27">Commentaire sur la Genèse, Chapitre XXV — « Un cultivateur »</a></cite>
</blockquote>
