<blockquote>
<p>Voyez comment Dieu vous pique partout où vous vous étendez au-delà de lui par le désir des créatures — comme une nourrice pique le bras d'un enfant qui l'a étendu hors du berceau, de peur qu'il ne périsse de froid.</p>
<cite>— Guigo Ier, <a href="guigo_i/Meditationes_fr.html#chapter-xiv">Méditations — Chapitre XIV</a></cite>
</blockquote>
