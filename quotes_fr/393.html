<blockquote>
<p>Que les choses temporelles ne soient pas la cause de ta paix, car elle sera aussi vile et fragile qu'elles le sont. Une telle paix, tu la partageras avec les bêtes brutes ; que la tienne soit avec les anges, c'est-à-dire la paix qui procède de la vérité.</p>
<cite>— Guigo Ier, <a href="guigo_i/Meditationes_fr.html#chapter-i">Méditations — Chapitre I</a></cite>
</blockquote>
