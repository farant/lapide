<p>Rien ne maintient l'âme dans la tranquillité et la paix comme la douceur et la modestie. Elles sont plus utiles à celui qui les possède que tout diadème.</p>
<cite>— Saint Jean Chrysostome, dans Cornelius a Lapide, <a href="01_genesis_13_fr.html#verse-13-15">Commentaire sur la Genèse, Chapitre XIII — « Toute la terre que tu vois »</a></cite>
</blockquote>
