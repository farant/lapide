<blockquote>
<p>L'Esprit-Saint ne demeure pas dans les hommes tristes, affligés, mélancoliques, et par conséquent torpides et paresseux, mais dans ceux qui sont alertes, joyeux, vigoureux, énergiques et actifs.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_45_fr.html#verse-27">Commentaire sur la Genèse, Chapitre XLV — « Son esprit revécut »</a></cite>
</blockquote>
