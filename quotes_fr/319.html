<blockquote>
<p>Apprenez en Abraham l'infatigable dévotion de la foi ; en Isaac la pureté d'un esprit sincère ; en Jacob l'endurance dans les labeurs ; en Joseph le miroir de la chasteté.</p>
<cite>— saint Ambroise, dans Cornelius a Lapide, <a href="01_genesis_37_fr.html#verse-2">Commentaire sur la Genèse, Chapitre XXXVII — « Verset 2 »</a></cite>
</blockquote>
