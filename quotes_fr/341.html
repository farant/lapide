<blockquote>
<p>Ce chrétien à qui Julien l'Apostat demanda par sarcasme : « Que fait votre charpentier galiléen ? » répondit : « Il vous prépare un cercueil. »</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_40_fr.html#verse-22">Commentaire sur la Genèse, Chapitre XL — « Afin que la vérité de l'interprète fût prouvée »</a></cite>
