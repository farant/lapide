<blockquote>
<p>Je t'en prie, frère très cher, vis au milieu de ces choses, médite-les, ne connais rien d'autre, ne cherche rien d'autre. Ne te semble-t-il pas que c'est déjà ici-bas la demeure du royaume céleste ?</p>
<cite>— S. Jérôme, <a href="02_Clemens_Hieronymi_Du_Culte_fr.html#jerome-to-paulinus">Jérôme à Paulin</a></cite>
</blockquote>
