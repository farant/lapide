<blockquote>
<p>Heureuse est cette âme qui, embaumée des aromates des vertus, tandis qu'elle demeure dans le cercueil du corps, est conservée pour la vie éternelle.</p>
<cite>— Raban, dans Cornelius a Lapide, <a href="01_genesis_50_fr.html#verse-2">Commentaire sur la Genèse, Chapitre L — « L'embaumement de Jacob »</a></cite>
</blockquote>
