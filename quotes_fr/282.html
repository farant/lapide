<blockquote>
<p>Car de même qu'il appartient à Rachel de comprendre, de méditer, de contempler, ainsi assurément il appartient à Léa de pleurer, de gémir, de soupirer.</p>
<cite>— Richard de Saint-Victor, dans Cornelius a Lapide, <a href="01_genesis_29_fr.html#verse-24-symbolic">Commentaire sur la Genèse, Chapitre XXIX — « Rachel et Léa comme contemplation et action »</a></cite>
</blockquote>
