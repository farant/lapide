<blockquote>
<p>Si tu dis la vérité non par amour de la vérité, mais par le désir de blesser autrui, tu n'obtiendras pas la récompense de celui qui dit la vérité, mais le châtiment d'un insulteur.</p>
<cite>— Guigo Ier, <a href="guigo_i/Meditationes_fr.html#chapter-i">Méditations — Chapitre I</a></cite>
</blockquote>
