<blockquote>
<p>Dans les malheurs inattendus, la connaissance est plus légère que le doute : car une fois la chose connue, on peut trouver une voie vers le salut ; l'hésitation n'accomplit rien.</p>
<cite>— Philon, dans Cornelius a Lapide, <a href="01_genesis_42_fr.html#verse-29">Commentaire sur la Genèse, Chapitre XLII — « Ils lui racontèrent toutes choses »</a></cite>
</blockquote>
