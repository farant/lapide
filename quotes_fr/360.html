<blockquote>
<p>Anacharsis dit à propos que sur la vigne il y a trois grappes et trois coupes. La première coupe est bue pour la santé ; la deuxième pour le plaisir ; la troisième pour l'ivresse, le tort et la folie.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_43_fr.html#verse-34">Commentaire sur la Genèse, Chapitre XLIII — « Verset 34 »</a></cite>
</blockquote>
