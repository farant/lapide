<blockquote>
<p>Conduis-moi, Père, et Toi, souverain du ciel élevé, partout où il Te plaît : nul retard à obéir ; me voici, empressé.</p>
<cite>— Cléanthe, dans Cornelius a Lapide, <a href="01_genesis_17_fr.html#verse-23">Commentaire sur la Genèse, Chapitre XVII — « Aussitôt en ce jour même »</a></cite>
</blockquote>
