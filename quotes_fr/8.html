<blockquote>
<p>En vérité et dans ma conscience, je suis le plus insensé des hommes, et la sagesse humaine n'est pas en moi ; je suis un petit enfant qui ne connaît ni son entrée ni sa sortie.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_fr.html#life">Préliminaires — Vie de Cornelius a Lapide</a></cite>
