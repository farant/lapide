<blockquote>
<p>Jacob vit l'échelle, et le Seigneur appuyé dessus d'en haut, afin d'étendre sa main aux fatigués, afin de provoquer ceux qui montent au labeur par sa propre apparition.</p>
<cite>— saint Jérôme, dans Cornelius a Lapide, <a href="01_genesis_28_fr.html#verse-12-ladder-anagogical">Commentaire sur la Genèse, Chapitre XXVIII — « Que signifie l'échelle anagogiquement ? »</a></cite>
</blockquote>
