<blockquote>
<p>Cette servitude m'a gagné cette souveraineté, cette vente m'a élevé à cette gloire ; cette affliction fut pour moi l'occasion de cet honneur ; cette envie m'a produit cette renommée.</p>
<cite>— Saint Jean Chrysostome, in Cornelius a Lapide, <a href="01_genesis_45_fr.html#father-of-pharaoh">Commentaire sur la Genèse, Chapitre XLV — « Père de Pharaon »</a></cite>
</blockquote>
