<blockquote>
<p>Apprends combien tu dois être empressé, afin que tu puisses être le premier à accueillir l'hôte, de peur qu'un autre ne te devance et ne te prive de l'abondance d'un bon don.</p>
<cite>— saint Ambroise, dans Cornelius a Lapide, <a href="01_genesis_18_fr.html#verse-1">Commentaire sur la Genèse, Chapitre XVIII — « Le Seigneur lui apparut »</a></cite>
</blockquote>
