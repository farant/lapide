<blockquote>
<p>Même si le Seigneur faisait pleuvoir du ciel des pierres et des rochers, ils ne nous nuiront pas si nous sommes tels qu'il nous demande d'être.</p>
<cite>— Saint Gilles, dans Cornelius a Lapide, <a href="01_genesis_41_fr.html#verse-42">Commentaire sur la Genèse, Chapitre XLI — « Verset 42 »</a></cite>
</blockquote>
