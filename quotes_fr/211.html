<p>Le jour révèle la vérité, et un châtiment différé peut encore être infligé, mais un châtiment déjà exécuté ne peut être rappelé.</p>
<cite>— Sénèque, dans Cornelius a Lapide, <a href="01_genesis_18_fr.html#verse-21">Commentaire sur la Genèse, Chapitre XVIII — « Je descendrai et je verrai »</a></cite>
