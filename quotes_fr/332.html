<p>La frugalité dans l'abondance, la générosité dans la pauvreté, la chasteté dans la jeunesse, c'est un martyre sans effusion de sang.</p>
<cite>— saint Bernard, dans Cornelius a Lapide, <a href="01_genesis_39_fr.html#verse-12">Commentaire sur la Genèse, Chapitre XXXIX — « Il s'enfuit »</a></cite>
