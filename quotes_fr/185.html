<p>Les richesses sont à moi, toi tu appartiens à tes richesses : car les richesses sont au service du sage, mais le fou est au pouvoir des richesses.</p>
<cite>— Sénèque, in Cornelius a Lapide, <a href="01_genesis_14_fr.html#verse-14-23">Commentaire sur la Genèse, Chapitre XIV — « Du fil de la trame à la courroie de la sandale »</a></cite>
</blockquote>
