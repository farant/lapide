<blockquote>
<p>Dieu permit que Lot fût capturé à Sodome, pour châtier son choix précipité et sensuel, par lequel, séduit par la fertilité du lieu, il avait préféré habiter parmi les très impies Sodomites.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_14_fr.html#verse-14-12">Commentaire sur la Genèse, Chapitre XIV — « Lot capturé »</a></cite>
</blockquote>
