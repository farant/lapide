<blockquote>
<p>Poiché come appartiene a Rachele comprendere, meditare, contemplare, così certamente appartiene a Lia piangere, gemere, sospirare.</p>
<cite>— Riccardo di San Vittore, in Cornelius a Lapide, <a href="01_genesis_29_it.html#verse-24-symbolic">Commento alla Genesi, Capitolo XXIX — «Simbolicamente: Rachele e Lia come contemplazione e azione»</a></cite>
