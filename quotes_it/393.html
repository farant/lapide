<blockquote>
<p>Non siano le cose temporali la causa della tua pace, poiché essa sarà tanto vile e fragile quanto esse. Una tale pace la condividerai con gli animali bruti; la tua sia con gli angeli, cioè la pace che procede dalla verità.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_it.html#chapter-i">Meditazioni — Capitolo I</a></cite>
</blockquote>
