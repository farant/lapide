<blockquote>
<p>O l'uomo che virilmente si serve delle donne — la moglie con temperanza, la serva con obbedienza, nessuna con intemperanza!</p>
<cite>— Sant'Agostino, in Cornelius a Lapide, <a href="01_genesis_16_it.html#verse-2">Commento alla Genesi, Capitolo XVI — «Il Signore mi ha chiusa»</a></cite>
</blockquote>
