<blockquote>
<p>«Gli occhi che la colpa chiude, la pena li apre,» dice san Gregorio; e come dice san Gregorio Nazianzeno: «La coscienza è un tribunale domestico e veritiero.»</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_42_it.html#verse-21">Commentario sulla Genesi, Capitolo XLII — «Meritiamo di patire queste cose»</a></cite>
