<blockquote>
<p>Felice è quell'anima che, imbalsamata con gli aromi delle virtù, dimorando nel feretro del corpo, è conservata per la vita eterna.</p>
<cite>— Rabano, in Cornelius a Lapide, <a href="01_genesis_50_it.html#verse-2">Commentario sulla Genesi, Capitolo L — «L'imbalsamazione di Giacobbe»</a></cite>
</blockquote>
