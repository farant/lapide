<blockquote>
<p>Giuseppe non volle vendicarsi; sapeva infatti che il piacere della vendetta è momentaneo, ma il piacere della misericordia è sempiterno.</p>
<cite>— Giuseppe Flavio, in Cornelius a Lapide, <a href="01_genesis_50_it.html#verse-19">Commentario sulla Genesi, Capitolo L — «Giuseppe pianse»</a></cite>
</blockquote>
