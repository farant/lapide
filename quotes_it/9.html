<blockquote>
<p>Nel tempio di Dio ciascuno offre ciò che può: gli uni oro, argento e pietre preziose; gli altri offrono bisso, porpora, scarlatto e giacinto. Per noi è già molto se offriamo pelli e peli di capra.</p>
<cite>— San Girolamo, <a href="02_Clemens_Hieronymi_Du_Culte_it.html#helmeted-prologue">Prologo Galeato</a></cite>
</blockquote>
