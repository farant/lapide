<blockquote>
<p>Ci hai fatti, o Signore, per Te, e il nostro cuore è inquieto finché non riposa in Te. Il cielo e la terra gridano, o Signore, che dobbiamo amarTi.</p>
<cite>— S. Agostino, in Cornelius a Lapide, <a href="01_genesis_01_it.html#he-created">Commento alla Genesi, Capitolo I — "Egli creò"</a></cite>
</blockquote>
