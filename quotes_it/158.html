<blockquote>
<p>Fu giustamente condannata la superbia, per la quale avvenne che l'uomo che comandava all'uomo non fosse compreso, lui che non volle comprendere per obbedire a Dio che comandava.</p>
<cite>— Sant'Agostino, in Cornelius a Lapide, <a href="01_genesis_11_it.html#verse-11-8">Commento alla Genesi, Capitolo XI — «E così li divise»</a></cite>
</blockquote>
