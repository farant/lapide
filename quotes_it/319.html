<blockquote>
<p>Impara in Abramo l'instancabile devozione della fede; in Isacco la purezza di un animo sincero; in Giacobbe la sopportazione delle fatiche; in Giuseppe lo specchio della castità.</p>
<cite>— Sant'Ambrogio, in Cornelius a Lapide, <a href="01_genesis_37_it.html#verse-2">Commentario alla Genesi, Capitolo XXXVII — «Versetto 2»</a></cite>
</blockquote>
