<blockquote>
<p>Dio permise che Lot fosse catturato a Sodoma, per castigare la sua scelta precipitosa e sensuale, con la quale, attratto dalla fertilità del luogo, aveva preferito abitare fra gli empiissimi Sodomiti.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_14_it.html#verse-14-12">Commentario sulla Genesi, Capitolo XIV — «Lot catturato»</a></cite>
</blockquote>
