<blockquote>
<p>Il piacere bestiale viene dai sensi della carne; il piacere diabolico da ogni superbia, invidia e inganno; il piacere filosofico dal conoscere la creazione; il piacere angelico dal conoscere e amare Dio.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_it.html#chapter-iii">Meditazioni — Capitolo III</a></cite>
