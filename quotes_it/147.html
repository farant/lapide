<blockquote>
<p>«Ogni uomo giusto, quando comincia a purificarsi, per prima cosa allontana da sé ciò che è tenebroso, immondo e temerario. Ogni impudenza e colpa infatti è tenebrosa e si nutre dei morti come il corvo.»</p>
<cite>— Sant'Ambrogio, in Cornelius a Lapide, <a href="01_genesis_08_it.html#ch8-verse-7">Commento alla Genesi, Capitolo VIII — «Il corvo»</a></cite>
</blockquote>
