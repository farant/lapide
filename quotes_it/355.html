<blockquote>
<p>Coloro che soffrono formulano proposizioni universali a proposito di piccole cose, cosicché se hanno pochi mali, dicono di avere tutti i mali; e se pochi beni mancano loro, dicono che tutto manca.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_42_it.html#verse-36">Commentario sulla Genesi, Capitolo XLII — «Mi avete reso privo di figli»</a></cite>
</blockquote>
