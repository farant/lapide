<blockquote>
<p>«Il diavolo non odia nulla più di chi è umile e ama Dio.» Lo stesso santo in una visione vide il mondo pieno delle insidie dei demoni, e domandò: «Chi ne scamperà, Signore?» Il Signore rispose: «L'umiltà.»</p>
<cite>— Sant'Antonio, in Cornelius a Lapide, <a href="01_genesis_29_it.html#verse-32">Commento alla Genesi, Capitolo XXIX — «Ruben»</a></cite>
</blockquote>
