<blockquote>
<p>Se dici la verità non per amore della verità, ma per desiderio di ferire un altro, non otterrai la ricompensa di chi dice la verità, ma il castigo di un oltraggiatore.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_it.html#chapter-i">Meditazioni — Capitolo I</a></cite>
</blockquote>
