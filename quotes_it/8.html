<blockquote>
<p>In verità e nella mia coscienza, io sono il più stolto degli uomini, e la sapienza degli uomini non è con me; sono un fanciullo piccolo che non conosce la propria entrata né la propria uscita.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_it.html#life">Preliminari — Vita di Cornelius a Lapide</a></cite>
</blockquote>
