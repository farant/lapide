<blockquote>
<p>Dio volle che Abramo fosse straniero nella terra di Canaan e fosse continuamente in pellegrinaggio, per insegnarci che in questa vita siamo pellegrini e in cammino verso il cielo.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_20_it.html#verse-1">Commento alla Genesi, Capitolo XX — «Abramo partì di là»</a></cite>
</blockquote>
