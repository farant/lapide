<blockquote>
<p>«L'umiltà è come un fulmine, che colpisce sì, ma non lascia dietro di sé alcuna traccia; così davvero l'umiltà dissipa ogni peccato, e tuttavia fa sì che l'uomo sia un nulla ai propri occhi.»</p>
<cite>— Sant'Egidio, in Cornelius a Lapide, <a href="01_genesis_18_it.html#verse-27">Commento alla Genesi, Capitolo XVIII — "Ho cominciato"</a></cite>
</blockquote>
