<blockquote>
<p>Figlio mio, figlio mio, ricordati della vita eterna, guarda in alto verso il cielo e contempla Colui che vi regna: poiché la vita non ti è tolta, ma cambiata in meglio.</p>
<cite>— La madre di S. Sinforiano, in Cornelius a Lapide, <a href="01_genesis_01_it.html#verse-16">Commento alla Genesi, Capitolo I — "E Dio fece due grandi luminari"</a></cite>
</blockquote>
