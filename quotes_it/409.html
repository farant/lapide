<blockquote>
<p>Questa è in sintesi l'intera depravazione umana: abbandonare ciò che è migliore di sé, cioè Dio; e attendere a ciò che è inferiore a sé, attaccandovisi nel godimento, cioè le cose temporali.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_it.html#chapter-ix">Meditazioni — Capitolo IX</a></cite>
</blockquote>
