<blockquote>
<p>«A tutti gli ospiti sia in arrivo che in partenza, con il capo inchinato o con tutto il corpo prostrato a terra, si adori in essi Cristo, che in essi è anche accolto.»</p>
<cite>— San Benedetto, in Cornelius a Lapide, <a href="01_genesis_18_it.html#verse-2">Commento alla Genesi, Capitolo XVIII — "Tre uomini"</a></cite>
</blockquote>
