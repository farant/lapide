<blockquote>
<p>Quando Dio comunicò il proprio soffio e la propria anima all'uomo, comunicò se stesso, come se avesse posto il proprio cuore dentro di lui.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_02_it.html#verse-7">Commento alla Genesi, Capitolo II — «Il Signore Dio formò l'uomo dal fango della terra»</a></cite>
</blockquote>
