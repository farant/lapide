<blockquote>
<p>Superbia, sazietà di pane, abbondanza di ogni cosa, ozio e lusso — questo è il peccato di Sodoma. E per questo ne segue la dimenticanza di Dio, che ritiene perpetui i beni presenti.</p>
<cite>— San Girolamo, in Cornelius a Lapide, <a href="01_genesis_13_it.html#verse-13-13">Commento alla Genesi, Capitolo XIII — «I Sodomiti erano pessimi»</a></cite>
</blockquote>
