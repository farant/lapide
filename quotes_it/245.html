<blockquote>
<p>È proprio del sapiente separarsi dai piaceri della carne, elevare l'anima e sottrarla al corpo. Questo infatti significa conoscere se stessi come essere umano.</p>
<cite>— Sant'Ambrogio, in Cornelius a Lapide, <a href="01_genesis_24_it.html#verse-63">Commento alla Genesi, Capitolo XXIV — «Per meditare»</a></cite>
</blockquote>
