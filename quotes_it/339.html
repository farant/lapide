<blockquote>
<p>Le posizioni, le dignità, anzi la vita stessa e tutti gli affari umani sono soltanto un sogno, e tutte le speranze degli uomini sono soltanto i sogni di chi è sveglio, come soleva dire Platone.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_40_it.html#verse-12">Commento alla Genesi, Capitolo XL — «Questa è l'interpretazione del sogno»</a></cite>
</blockquote>
