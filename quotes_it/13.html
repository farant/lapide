<blockquote>
<p>Ti prego, fratello carissimo, vivi in mezzo a queste cose, meditale, non conoscere null'altro, non cercare null'altro. Non ti sembra che sia già quaggiù la dimora del regno celeste?</p>
<cite>— San Girolamo, <a href="02_Clemens_Hieronymi_Du_Culte_it.html#jerome-to-paulinus">Girolamo a Paolino</a></cite>
</blockquote>
