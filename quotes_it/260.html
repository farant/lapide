<blockquote>
<p>Questa è la vera mansuetudine: non quando chi è offeso dai più potenti sopporta con mitezza, ma quando chi è offeso anche da coloro che sono considerati inferiori cede.</p>
<cite>— San Giovanni Crisostomo, in Cornelius a Lapide, <a href="01_genesis_26_it.html#verse-20">Commentario sulla Genesi, Capitolo XXVI — «È nostra»</a></cite>
</blockquote>
