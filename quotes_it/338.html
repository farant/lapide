<blockquote>
<p>Poiché i sogni divini sono rari e possono a malapena distinguersi da quelli demoniaci o vani, la cosa più sicura è disprezzare qualsiasi sogno, a meno che Dio non riveli diversamente.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_40_it.html#on-divination-from-dreams">Commento alla Genesi, Capitolo XL — «Se sia lecito trarre presagi dai sogni»</a></cite>
</blockquote>
