<blockquote>
<p>Qualunque cosa ti accada, purché la tua anima non cada nel moto dell'ira, dell'odio, della tristezza o del timore, né nelle loro cause, nulla ti nuocerà nel secolo a venire.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_it.html#chapter-xiii">Meditazioni — Capitolo XIII</a></cite>
</blockquote>
