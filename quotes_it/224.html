<p>Egli infatti sempre opera e governa ogni cosa, e dispone ciascuna, affinché coloro che Lo servono risplendano come luci, e renda manifesta ovunque la loro virtù.</p>
<cite>— San Giovanni Crisostomo, in Cornelius a Lapide, <a href="01_genesis_20_it.html#moral">Commento alla Genesi, Capitolo XX — «Riflessione morale da San Giovanni Crisostomo»</a></cite>
