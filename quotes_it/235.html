<blockquote>
<p>Acazio, mirabilmente addestrato nell'obbedienza, quando dopo la morte fu chiamato dal sepolcro da un certo anziano e gli fu chiesto se fosse morto, rispose: «Chi è obbediente non può morire.»</p>
<cite>— San Giovanni Climaco, in Cornelius a Lapide, <a href="01_genesis_22_it.html#verse-10">Commento alla Genesi, Capitolo XXII — «Afferrò la spada»</a></cite>
</blockquote>
