<blockquote>
<p>Il giuramento è cosa sacra, in cui si interpone l'autorità e la veracità divina, che pertanto non deve essere prestato con leggerezza o temerariamente, ma con animo confermato e certo in molti modi.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_21_it.html#verse-31">Commento alla Genesi, Capitolo XXI — «Bersabea»</a></cite>
</blockquote>
