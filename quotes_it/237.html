<blockquote>
<p>Quando non risparmia il suo unico figlio sulla terra, gli è comandato di contare le stelle come figli nel cielo.</p>
<cite>— San Girolamo, in Cornelius a Lapide, <a href="01_genesis_22_it.html#verse-16">Commento alla Genesi, Capitolo XXII — «Poiché hai fatto questa cosa»</a></cite>
</blockquote>
