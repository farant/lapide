<blockquote>
<p>Questo dev'essere considerato da noi con tremore: che il Dio giusto e onnipotente, quando è adirato per i peccati precedenti, permette alla mente accecata di cadere in altri ancora.</p>
<cite>— San Gregorio, in Cornelius a Lapide, <a href="01_genesis_15_it.html#verse-15-16">Commento alla Genesi, Capitolo XV — «Nella quarta generazione»</a></cite>
</blockquote>
