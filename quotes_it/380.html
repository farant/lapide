<blockquote>
<p>La povertà di Cristo ci arricchisce, la sua debolezza ci sana, la sua fame ci sazia, la sua morte ci vivifica, la sua sepoltura ci risuscita.</p>
<cite>— Sant'Ambrogio, in Cornelius a Lapide, <a href="01_genesis_49_it.html#asher">Commentario sulla Genesi, Capitolo XLIX — «La profezia e benedizione di Aser»</a></cite>
</blockquote>
