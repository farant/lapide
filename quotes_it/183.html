<blockquote>
<p>Chi vince non deve attribuire a sé la vittoria, ma riferirla a Dio. Questo insegna Abramo, che dal trionfo fu reso più umile, non più superbo: offrì infatti il sacrificio e diede le decime.</p>
<cite>— Sant'Ambrogio, in Cornelius a Lapide, <a href="01_genesis_14_it.html#verse-14-20">Commentario sulla Genesi, Capitolo XIV — «Gli diede le decime»</a></cite>
</blockquote>
