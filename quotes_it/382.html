<blockquote>
<p>Figli carissimi, perseverate nella confessione della fede; Cristo vi attende già con i suoi Santi; combattete per le vostre anime e mostratevi fedeli a Cristo.</p>
<cite>— Santa Felicita, in Cornelius a Lapide, <a href="01_genesis_49_it.html#gad">Commentario sulla Genesi, Capitolo XLIX — «La profezia e benedizione di Gad»</a></cite>
</blockquote>
