<blockquote>
<p>Due amori fanno due città nel mondo intero: l'amore di Dio fa Gerusalemme, l'amore del mondo fa Babilonia; si esamini dunque ciascuno, e troverà di quale città è cittadino.</p>
<cite>— Sant'Agostino, in Cornelius a Lapide, <a href="01_genesis_11_it.html#verse-11-9">Commento alla Genesi, Capitolo XI — «Il suo nome fu chiamato Babele»</a></cite>
</blockquote>
