<blockquote>
<p>Quel cristiano che fu interrogato da Giuliano l'Apostata con sarcasmo: «Che fa il vostro falegname galileo?» rispose: «Prepara una bara per te.»</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_40_it.html#verse-22">Commento alla Genesi, Capitolo XL — «Affinché la verità dell'interprete fosse provata»</a></cite>
</blockquote>
