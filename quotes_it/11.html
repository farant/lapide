<blockquote>
<p>Un ingegno docile è lodevole anche senza maestro. Non consideriamo ciò che trovi, ma ciò che cerchi. La cera molle, facile da plasmare, anche se le mani dell'artigiano e dello scultore non intervengono, possiede tuttavia in potenza tutto ciò che può divenire.</p>
<cite>— San Girolamo, <a href="02_Clemens_Hieronymi_Du_Culte_it.html#jerome-to-paulinus">Girolamo a Paolino</a></cite>
</blockquote>
