<blockquote>
<p>Le ricchezze sono mie, tu sei delle ricchezze: poiché le ricchezze sono al servizio del saggio, ma lo stolto è in potere delle ricchezze.</p>
<cite>— Seneca, in Cornelius a Lapide, <a href="01_genesis_14_it.html#verse-14-23">Commentario sulla Genesi, Capitolo XIV — «Da un filo della trama a un laccio di sandalo»</a></cite>
</blockquote>
