<blockquote>
<p>La via verso Dio è facile, perché si viaggia alleggerendosi; sarebbe ardua se si viaggiasse caricandosi. Alleggerisciti dunque a tal punto che, messe da parte tutte le cose, tu rinunci a te stesso.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_it.html#chapter-ii">Meditazioni — Capitolo II</a></cite>
</blockquote>
