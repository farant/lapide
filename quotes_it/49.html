<blockquote>
<p>Nessun autore è più eccellente di Dio; nessun'arte più efficace della Parola di Dio; nessuna causa migliore di quella che il bene sia creato dal Bene.</p>
<cite>— S. Agostino, in Cornelius a Lapide, <a href="01_genesis_01_it.html#verse-4">Commento alla Genesi, Capitolo I — "E Dio vide che la luce era buona"</a></cite>
</blockquote>
