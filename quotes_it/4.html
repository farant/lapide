<blockquote>
<p>La morte, poi, mi sarà un beneficio: poiché più rapidamente mi invierà a Dio, per il quale vivo e adempio il mio ministero, e in gran parte sono già morto, e verso il quale da lungo tempo mi affretto.</p>
<cite>— S. Basilius Magnus, <a href="01_Preliminares_it.html#dedicatory-letter">Preliminari — Lettera Dedicatoria</a></cite>
</blockquote>
