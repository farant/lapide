<blockquote>
<p>San Martino rifiutò di privare il presbitero Brizio, suo calunniatore, del suo ufficio, dicendo: «Se Cristo sopportò Giuda, perché non dovrei io sopportare Brizio?»</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_45_it.html#charity-of-joseph">Commento alla Genesi, Capitolo XLV — «La carità di Giuseppe»</a></cite>
</blockquote>
