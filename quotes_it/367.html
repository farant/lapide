<blockquote>
<p>«Lo Spirito Santo non dimora negli uomini tristi, afflitti, malinconici, e perciò pigri e indolenti, ma in coloro che sono allegri, gioiosi, vigorosi, energici e operosi.»</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_45_it.html#verse-27">Commento alla Genesi, Capitolo XLV — «Versetto 27: "Il suo spirito si rianimò"»</a></cite>
</blockquote>
