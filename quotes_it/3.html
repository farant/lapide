<blockquote>
<p>Non è soggetto alla confisca dei beni colui che nulla possiede: a meno che tu abbia bisogno di questi cenci laceri e logori, e di pochi libri, nei quali risiedono tutte le mie sostanze e ricchezze.</p>
<cite>— S. Basilius Magnus, <a href="01_Preliminares_it.html#dedicatory-letter">Preliminari — Lettera Dedicatoria</a></cite>
</blockquote>
