<blockquote>
<p>Se dunque sei tentato, disprezzato, soffri, sei indebolito, rattristato, infamato, messo a morte, torturato, anzi sospeso o bruciato, imita Isacco: è un breve tempo; pensa all'eternità.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_22_it.html#verse-10">Commento alla Genesi, Capitolo XXII — «Afferrò la spada»</a></cite>
</blockquote>
