<blockquote>
<p>Che cos'è dunque la bocca dell'uomo, se non un certo santuario della parola, una fonte del discorso, una sala delle parole, un deposito della volontà?</p>
<cite>— S. Ambrogio, in Cornelius a Lapide, <a href="01_genesis_02_it.html#verse-7">Commento alla Genesi, Capitolo II — «Il Signore Dio formò l'uomo dal fango della terra»</a></cite>
</blockquote>
