<blockquote>
<p>Non vi è nulla che possa essere paragonato al regno dei cieli; poiché neppure il mondo intero, pesato su una bilancia uguale, può essere paragonato a una sola anima.</p>
<cite>— Mena, in Cornelius a Lapide, <a href="01_genesis_01_it.html#verse-16">Commento alla Genesi, Capitolo I — "E Dio fece due grandi luminari"</a></cite>
</blockquote>
