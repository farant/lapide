<blockquote>
<p>Poiché sei catturato dal solo piacere, soltanto le cose piacevoli vanno guardate con diffidenza. Perciò l'anima cristiana non è mai al sicuro se non nell'avversità.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_it.html#chapter-xiv">Meditazioni — Capitolo XIV</a></cite>
