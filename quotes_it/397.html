<blockquote>
<p>L'inizio del ritorno alla verità è dispiacersi di sé stessi nella falsità. La correzione è preceduta dal rimprovero. Non ci si cura infatti di cambiare ciò che non dispiace.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_it.html#chapter-ii">Meditazioni — Capitolo II</a></cite>
</blockquote>
