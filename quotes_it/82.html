<blockquote>
<p>Di tutte le cose dalle quali si ricerca un qualche profitto, nulla è migliore dell'agricoltura, nulla più fruttuoso, nulla più dolce, nulla più degno di un uomo libero.</p>
<cite>— Cicerone, in Cornelius a Lapide, <a href="01_genesis_02_it.html#verse-15">Commento alla Genesi, Capitolo II — «Il Signore Dio lo pose nel paradiso»</a></cite>
</blockquote>
