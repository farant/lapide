<blockquote>
<p>Questo bosco era l'oratorio e il ritiro di Abramo, nel quale egli di tanto in tanto si ritirava dalle cure e dagli affari, quando stava per conversare con Dio.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_21_it.html#verse-33">Commento alla Genesi, Capitolo XXI — «Piantò un bosco»</a></cite>
</blockquote>
