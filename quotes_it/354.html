<blockquote>
<p>Nelle sventure inaspettate, la conoscenza è più lieve del dubbio: poiché una volta conosciuta la cosa, si può trovare una via alla salvezza; l'esitazione non giova a nulla.</p>
<cite>— Filone, in Cornelius a Lapide, <a href="01_genesis_42_it.html#verse-29">Commentario sulla Genesi, Capitolo XLII — «Narrarono ogni cosa»</a></cite>
</blockquote>
