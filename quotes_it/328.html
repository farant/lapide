<blockquote>
<p>Ogni nobiltà ebbe un ignobile principio: e coloro che si gloriano della nobiltà dei propri antenati si gloriano non della propria virtù, ma di quella altrui. E questa pertanto è vanità.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_38_it.html#moral-reflection">Commento alla Genesi, Capitolo XXXVIII — «Riflessione morale: sull'origine della nobiltà»</a></cite>
</blockquote>
