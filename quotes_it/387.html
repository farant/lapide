<blockquote>
<p>Chiedimi un'altra cosa, e ai tuoi meriti sarà data la ricompensa. Dimentica quell'uomo: poiché il re di Francia non vendica le ingiurie del duca d'Orléans.</p>
<cite>— Luigi XII, in Cornelius a Lapide, <a href="01_genesis_50_it.html#verse-21">Commentario sulla Genesi, Capitolo L — «Con dolcezza e mitezza»</a></cite>
</blockquote>
