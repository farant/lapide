<blockquote>
<p>L'Amato ti ha sopportato; sopporta anche tu l'Amato. I tuoi peccati non Lo vinsero; che neppure i Suoi flagelli vincano te, e otterrai la benedizione.</p>
<cite>— San Bernardo, in Cornelius a Lapide, <a href="01_genesis_35_it.html#verse-9">Commento alla Genesi, Capitolo XXXV — "Dio apparve di nuovo a Giacobbe"</a></cite>
</blockquote>
