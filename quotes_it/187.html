<blockquote>
<p>Melchisedec è chiamato sacerdote del Dio Altissimo non soltanto perché egli stesso serviva Dio, ma anche perché convertiva e incoraggiava altri alla fede e al culto di Lui.</p>
<cite>— San Dionigi, in Cornelius a Lapide, <a href="01_genesis_14_it.html#verse-14-18">Commentario sulla Genesi, Capitolo XIV — «Melchisedec — pane e vino»</a></cite>
</blockquote>
