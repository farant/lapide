<blockquote>
<p>Questo è il motto di Abele: «Un'offerta grassa darò; una magra non la sacrificherò.» Al contrario, quello di Caino: «Sacrificherò la magra; l'offerta grassa non la darò.»</p>
<cite>— Sant'Ambrogio, in Cornelius a Lapide, <a href="01_genesis_04_it.html#ch4-verse-3">Commentario sulla Genesi, Capitolo IV — «Dopo molti giorni»</a></cite>
</blockquote>
