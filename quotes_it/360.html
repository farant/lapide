<blockquote>
<p>Giustamente Anacarsi disse che sulla vite vi sono tre grappoli e tre coppe. La prima coppa si beve per la salute; la seconda per il piacere; la terza per l'ubriachezza, il danno e la follia.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_43_it.html#verse-34">Commento alla Genesi, Capitolo XLIII — «Versetto 34»</a></cite>
</blockquote>
