<blockquote>
<p>«Desideri essere lodato? Loda un altro. Desideri essere amato? Ama. Desideri ottenere i primi posti? Cedili prima a un altro.»</p>
<cite>— San Giovanni Crisostomo, in Cornelius a Lapide, <a href="01_genesis_45_it.html#charity-of-joseph">Commento alla Genesi, Capitolo XLV — «La carità di Giuseppe»</a></cite>
</blockquote>
