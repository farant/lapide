<blockquote>
<p>Il desiderio e l'amore temono tutte le cose, anche quelle che sono sicure; né trovano pace finché non possiedono l'oggetto amato, la cosa tanto agognata.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_15_it.html#verse-15-2">Commento alla Genesi, Capitolo XV — «Che cosa mi darai?»</a></cite>
</blockquote>
