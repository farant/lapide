<blockquote>
<p>I pii si ritirano dalle distrazioni nei segreti recessi della mente, e là riposano come nel seno della tranquillità; questi sono i tabernacoli dei pii.</p>
<cite>— San Gregorio, in Cornelius a Lapide, <a href="01_genesis_25_it.html#verse-27">Commento alla Genesi, Capitolo XXV — "Un agricoltore"</a></cite>
</blockquote>
