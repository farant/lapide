<blockquote>
<p>Dio misericordiosamente fece piovere le acque non tutte in una volta, ma gradualmente, affinché nel frattempo gli uomini fossero atterriti e si pentissero.</p>
<cite>— San Giovanni Crisostomo, in Cornelius a Lapide, <a href="01_genesis_07_it.html#ch7-verse-12">Commentario sulla Genesi, Capitolo VII — «Quaranta giorni»</a></cite>
</blockquote>
