<blockquote>
<p>La Chiesa è il luogo degli Angeli, il luogo degli Arcangeli, il regno di Dio, il cielo stesso; e se non lo credi, guarda questa mensa, cioè l'altare.</p>
<cite>— San Giovanni Crisostomo, in Cornelius a Lapide, <a href="01_genesis_28_it.html#verse-17">Commento alla Genesi, Capitolo XXVIII — «Quanto è terribile questo luogo»</a></cite>
</blockquote>
