<blockquote>
<p>La prosperità è un laccio; il coltello che taglia questo laccio è l'avversità. La prosperità è la prigione dell'amore di Dio; l'ariete che la abbatte è l'avversità.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_it.html#chapter-xiv">Meditazioni — Capitolo XIV</a></cite>
</blockquote>
