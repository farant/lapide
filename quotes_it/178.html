<blockquote>
<p>Nulla mantiene l'anima in tanta tranquillità e pace quanto la mansuetudine e la modestia. Queste sono più utili a chi le possiede di qualsiasi corona.</p>
<cite>— San Giovanni Crisostomo, in Cornelius a Lapide, <a href="01_genesis_13_it.html#verse-13-15">Commento alla Genesi, Capitolo XIII — «Tutta la terra che vedi»</a></cite>
</blockquote>
