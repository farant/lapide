<blockquote>
<p>Dio spesso agisce così con noi: comanda e domanda un'azione difficile, ma quando ha visto un'obbedienza pronta, di questa contento, ne trattiene l'esecuzione.</p>
<cite>— San Giovanni Crisostomo, in Cornelius a Lapide, <a href="01_genesis_22_it.html#verse-12">Commento alla Genesi, Capitolo XXII — «Non stendere la mano»</a></cite>
</blockquote>
