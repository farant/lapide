<p>Anche se il Signore facesse piovere pietre e sassi dal cielo, non ci nuoceranno se saremo tali quali Egli ci richiede di essere.</p>
<cite>— San Egidio, in Cornelius a Lapide, <a href="01_genesis_41_it.html#verse-42">Commentario sulla Genesi, Capitolo XLI — «Versetto 42»</a></cite>
