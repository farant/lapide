<blockquote>
<p>L'animo del filosofo diviene più nobile da ciò che ha sofferto, e come il ferro rovente è indurito dall'aspersione di acqua fredda, così egli stesso è indurito dai pericoli.</p>
<cite>— San Gregorio Nazianzeno, in Cornelius a Lapide, <a href="01_genesis_32_it.html#verse-24">Commento alla Genesi, Capitolo XXXII — «Un uomo lottò con lui»</a></cite>
</blockquote>
