<blockquote>
<p>במקדש האל כל אחד מקריב מה שביכולתו: יש המקריבים זהב, כסף ואבנים יקרות; אחרים מקריבים שש וארגמן ושני תולעת ותכלת; דיינו אם נקריב עורות ושיער עיזים.</p>
<cite>— קדוש הירונימוס, <a href="02_Clemens_Hieronymi_Du_Culte_he.html#helmeted-prologue">הפרולוג המוגן בקסדה</a></cite>
</blockquote>
