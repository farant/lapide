<blockquote>
<p>אני מתחנן אליך, אחי היקר ביותר, לחיות בין דברים אלה, להגות בהם, לא לדעת דבר אחר, לא לבקש דבר אחר. האם אין זה נראה לך כבר כאן עלי אדמות כמעון של מלכות השמים?</p>
<cite>— קדוש הירונימוס, <a href="02_Clemens_Hieronymi_Du_Culte_he.html#jerome-to-paulinus">הירונימוס אל פאולינוס</a></cite>
