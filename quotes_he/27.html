<p>אין הברה אחת, ואפילו לא קו אחד בכתבי הקודש, שבמעמקיו לא טמון אוצר גדול כלשהו.</p>
<cite>— קדוש יוחנן כריסוסטומוס, בתוך קורנליוס א לפידה, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_he.html#chapter-iv">פתח דבר ושבח כתבי הקודש — פרק ד׳: שיפוטיהם ודוגמאותיהם של אבות הכנסייה</a></cite>
