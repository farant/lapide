<blockquote>
<p>כך שהה מקריוס בשמים עם האל, ואמר לעצמו: <em>"יש לך מלאכים, מלאכים עליונים, כל הכוחות השמימיים, כרובים ושרפים, ואת האל בורא כולם; שם שכון, ואל תרד אל מתחת לשמים, ואל תיפול במחשבות עולם הזה."</em></p>
<cite>— קדוש מקריוס, בפירושו של קורנליוס א לפידה, <a href="01_genesis_05_he.html#ch5-verse-22">פירוש על בראשית, פרק ה — "וַיִּתְהַלֵּךְ חֲנוֹךְ אֶת הָאֱלֹהִים"</a></cite>
</blockquote>
