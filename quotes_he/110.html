<blockquote>
<p>הוא מכחיש, תחילה, כאילו מדובר בנוכחות מי שאינו יודע; הוא מסרב לחובת השמירה על אחיו, כאילו נטול כל שייכות טבעית; הוא מתחמק מן השופט, כאילו חופשי ברצונו. מה תתמה אם לא הכיר בחובת הרחמים, מי שלא הכיר את בוראו?</p>
<cite>— קדוש אמברוסיוס, in קורנליוס א לפידה, <a href="01_genesis_04_he.html#ch4-verse-9">פירוש על בראשית, פרק ד — "לֹא יָדַעְתִּי"</a></cite>
</blockquote>
