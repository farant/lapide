<blockquote>
<p>אילו היית מדמיין לעצמך מקום הראוי לקדושים, שבו כל מי שהזהירו על הארץ במעשים טובים ייהנו מחסד האל ויחיו בעונג אמיתי ורוחני — לא היית רחוק מדמיון הולם לגן העדן.</p>
<cite>— קדוש בסיליוס, in קורנליוס א לפידה, <a href="01_genesis_02_he.html#verse-8">פירוש על בראשית, פרק ב — "פסוק ח"</a></cite>
