<blockquote>
<p>לשמיים אפוא נולדנו; לשמיים נבראנו: זוהי תכליתנו, זוהי מטרתנו. אם נסטה מזאת, לשווא אנחנו בני אדם, לשווא נשאנו עינינו לשמיים ולשמש; מוטב היה לנו להיות בהמות או אבנים.</p>
<cite>— קורנליוס א לפידה, <a href="01_genesis_01_he.html#verse-26">פירוש על בראשית, פרק א — "נעשה אדם בצלמנו כדמותנו"</a></cite>
</blockquote>
