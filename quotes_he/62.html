<p>כל-יכולתו של הבורא כל-יכול היא סיבת קיומו של כל נברא; ואילו כוח זה היה חדל לרגע מלהנהיג את אשר נברא, מיד היה חדל גם דמותם של הנבראים וכל טבעם היה מתמוטט.</p>
