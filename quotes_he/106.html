<blockquote>
<p>אין עונשים כבדים יותר מאשר מצפון רע, שכאשר אין בו אלוהים, אין בו נחמה. ולפיכך יש לקרוא אל המושיע, כדי שאת מי שייסרה הצרה עד לידי וידוי, יוביל הוידוי אל המחילה.</p>
<cite>— קדוש אוגוסטינוס, in קורנליוס א לפידה, <a href="01_genesis_04_he.html#ch4-verse-7">פירוש על בראשית, פרק ד — "אִם תֵּיטִיב"</a></cite>
