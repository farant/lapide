<blockquote>
<p>אמונה חדשה של מי שנתחדשו — חזקה, בוגרת, רוכשת צמיחה של מעלה; לא רופפת, לא עייפה, לא כמושה מזִקנה ולא נטולת מרץ — ראויה לקרבן, שתנוב כנצר ירוק של חכמה ותאדים בלהט נעורים של ההכרה האלוהית.</p>
<cite>— קדוש אמברוסיוס, in קורנליוס א לפידה, <a href="01_genesis_04_he.html#ch4-verse-3">פירוש על בראשית, פרק ד — "מִקֵּץ יָמִים רַבִּים"</a></cite>
</blockquote>
