<blockquote>
<p>אדם לא שמר משמרת להיזהר מערמת הנחש. תמים היה; לא היה פיקח כנגד השטן. שכן הסכים עם השטן המשכנע ולא עם האדון המאיים, ואיבד את החיים שהיו לו, וקיבל את המוות שלא ידע.</p>
<cite>— קדוש יוחנן כריסוסטומוס, in קורנליוס א לפידה, <a href="01_genesis_02_he.html#verse-17">פירוש על בראשית, פרק ב — "פסוק יז"</a></cite>
</blockquote>
