<blockquote>
<p>אלה הם הדברים ששכנעו את העולם כולו לבוז לעולם ולעוני מרצון; אלה הם הדברים הממלאים את המנזרים בנזירים ואת המדבריות בפרושים.</p>
<cite>— קדוש ברנרדוס, בתוך קורנליוס א לפידה, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_he.html#chapter-i">פתח דבר ושבח כתבי הקודש — פרק א׳: על מעלת כתבי הקודש, הכרחיותם ופירותיהם</a></cite>
