<blockquote>
<p>זהו קולו של הבל: "את המיטב שבקודש אתן, לא את הכחוש אקריב." ומנגד, זהו קולו של קין: "את הכחוש אקריב, לא את המיטב שבקודש אתן."</p>
<cite>— קדוש אמברוסיוס, in קורנליוס א לפידה, <a href="01_genesis_04_he.html#ch4-verse-3">פירוש על בראשית, פרק ד — "מִקֵּץ יָמִים רַבִּים"</a></cite>
</blockquote>
