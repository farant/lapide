<blockquote>
<p>לשונותיהם וידיהם של הכותבים הקדושים לא היו אלא עטיה של אותה רוח הקודש, עד כדי כך שנראה שלא היו כותבים שונים, אלא עטים שונים של כותב אחד.</p>
<cite>— קורנליוס א לפידה, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_he.html#sacred-writers-as-pens">פתח דבר ושבח כתבי הקודש — הכותבים הקדושים כעטיה של רוח הקודש</a></cite>
