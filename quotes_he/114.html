<blockquote>
<p>קין, הבכור, נולד משני הורי המין האנושי והשתייך לעיר האדם; הבל, הצעיר, השתייך לעיר האלוהים. כך בכלל המין האנושי כולו... ימלכו בלא קץ לנצח נצחים.</p>
<cite>— קדוש אוגוסטינוס, in קורנליוס א לפידה, <a href="01_genesis_04_he.html#ch4-verse-17">פירוש על בראשית, פרק ד — "אִשְׁתּוֹ"</a></cite>
</blockquote>
