<blockquote>
<p>נכנסתי למנזר בגיל שבע, ושם הקדשתי את כל מאמצי להגות בכתובים כל ימי חיי, ובתוך שמירת המשמעת הסדירה והטיפול היומי בשירה בכנסייה, מצאתי תמיד מתיקות בין ללמוד, בין ללמד, בין לכתוב.</p>
<cite>— בדה הנכבד, בתוך קורנליוס א לפידה, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_he.html#chapter-iv">פתח דבר ושבח כתבי הקודש — פרק ד׳: שיפוטיהם ודוגמאותיהם של אבות הכנסייה</a></cite>
</blockquote>
