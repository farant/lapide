<blockquote>
<p>אלוהים ברא את העולם לתכלית זו: ראשית, להכין לאדם בית מלכותי, ואף ממלכה; שנית, להעמיד לו תיאטרון של כל הדברים וגן עדן של כל מיני תענוג; שלישית, להעניק לו ספר שבו יראה ויקרא את בוראו.</p>
<cite>— קורנליוס א לפידה, <a href="01_genesis_01_he.html#god-elohim">פירוש על בראשית, פרק א — "אלוהים: שלוש עשרה הגדרות"</a></cite>
</blockquote>
