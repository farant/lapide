<blockquote>
<p>אם מישהו אחוז בתשוקה לדעת אף דברים עתידיים, יהיה לו לב טהור; כי אני מאמין שנשמה המשרתת את האל, אם התמידה באותה שלמות שבה נולדה מחדש, יכולה לדעת יותר מן השדים.</p>
<cite>— קדוש אנטוניוס, בתוך קורנליוס א לפידה, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_he.html#chapter-v">פתח דבר ושבח כתבי הקודש — פרק ה׳: על ההכנות הנדרשות ללימוד זה</a></cite>
</blockquote>
