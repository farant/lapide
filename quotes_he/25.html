<blockquote>
<p>נלמד עלי אדמות את הדברים שידיעתם תישאר עמנו בשמיים. למד כאילו תחיה לעולם; חיה כאילו תמות לעולם.</p>
<cite>— קדוש הירונימוס, בתוך קורנליוס א לפידה, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_he.html#chapter-iv">פתח דבר ושבח כתבי הקודש — פרק ד׳: שיפוטיהם ודוגמאותיהם של אבות הכנסייה</a></cite>
