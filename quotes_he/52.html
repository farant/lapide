<blockquote>
<p>בני, בני, זכור את חיי הנצח, הרם את עיניך לשמיים והבט אל השולט שם: כי החיים אינם נלקחים ממך, אלא מתחלפים לטובה.</p>
<cite>— אמו של קדוש סימפוריאנוס, בתוך קורנליוס א לפידה, <a href="01_genesis_01_he.html#verse-16">פירוש על בראשית, פרק א — "ויעש אלוהים את שני המאורות הגדולים"</a></cite>
