<blockquote>
<p>קיסר השמיים, אדון המלאכים והבני אדם, שלח אליך את אגרותיו למען חייך, ואתה מזניח לקרוא אותן בלהיטות! שכן מהם כתבי הקודש אם לא מעין אגרת מאת האל הכל-יכול אל בריותיו?</p>
<cite>— קדוש גרגוריוס, בתוך קורנליוס א לפידה, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_he.html#section-one">פתח דבר ושבח כתבי הקודש — חלק ראשון</a></cite>
</blockquote>
