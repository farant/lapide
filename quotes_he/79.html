<blockquote>
<p>צלאח א-דין, מלך מצרים וסוריה, אשר נטל את ארץ הקודש מידי הנוצרים, כשעמד למות בסביבות שנת 1180, ציווה לשאת דגל עם בד תכריכים בכל מחנותיו, ולכרוז להכריז: "זה כל מה שצלאח א-דין, שליט סוריה ומצרים, מכל ממלכתו, ייקח עתה עמו."</p>
<cite>— קורנליוס א לפידה, <a href="01_genesis_02_he.html#verse-17">פירוש על בראשית, פרק ב — "פסוק יז"</a></cite>
