<blockquote>
<p>אדם נרדם כדי שחוה תיברא; המשיח מת כדי שהכנסייה תיברא. בעוד אדם ישן, חוה נוצרה מצלעו; כשהמשיח מת, צלעו נדקרה ברומח, כדי שהסקרמנטים יזרמו ממנה, ובאמצעותם תיווצר הכנסייה.</p>
<cite>— קדוש אוגוסטינוס, in קורנליוס א לפידה, <a href="01_genesis_02_he.html#verse-21">פירוש על בראשית, פרק ב — "פסוק כא"</a></cite>
</blockquote>
