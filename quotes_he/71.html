<blockquote>
<p>בגן העדן היו כל מיני ציפורים, שביופי צבעיהן ובמוסיקה הטבעית שלהן ובמתיקות הרמוניית שירתן העניקו לאדם עונג שאין לתארו. היו שם גם מחזות של בעלי חיים שונים. אך כולם היו מאולפים, נשמעים לאדם, חיים ביניהם בהרמוניה ובשלום.</p>
<cite>— קדוש בסיליוס, in קורנליוס א לפידה, <a href="01_genesis_02_he.html#verse-8">פירוש על בראשית, פרק ב — "פסוק ח"</a></cite>
</blockquote>
