<blockquote>
<p>כסרכסס, כשכיסה את הארץ בצבאו ואת הים בצי ספינותיו, השקיף ממקום גבוה על כל ההמון הזה, נאנח ובכה, באומרו שוב ושוב: "מכל אלה, אף אחד לא יהיה בחיים לאחר מאה שנה."</p>
