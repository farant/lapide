<blockquote>
<p>רוח הפתוחה ללמוד ראויה לשבח גם ללא מורה. איננו שופטים את מה שמצאת אלא את מה שחיפשת. שעווה רכה, נוחה לעיצוב, גם אם ידי האומן והפסל בטלות, היא בכל זאת מכוח סגולתה כל מה שביכולתה להיות.</p>
<cite>— קדוש הירונימוס, <a href="02_Clemens_Hieronymi_Du_Culte_he.html#jerome-to-paulinus">הירונימוס אל פאולינוס</a></cite>
</blockquote>
