<blockquote>
<p>האישה נבראה בידי הבורא מסוגלת למעלות בדיוק כמו האיש. שכן לא רק בשר נלקח לבניית האישה, אלא גם עצם מעצמותיו; מכאן שאנו הנשים חייבות להשיב לאדון לא פחות מהגברים את איתנות האמונה והעקביות, וכן סבלנות בעת צרה.</p>
<cite>— קדושה יוליטה, in קורנליוס א לפידה, <a href="01_genesis_02_he.html#verse-23">פירוש על בראשית, פרק ב — "פסוק כג"</a></cite>
</blockquote>
