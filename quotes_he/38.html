<blockquote>
<p>בישוף צריך להיות כמלאך, שאינו כפוף לשום סערה אנושית או מידה רעה. ראוי למי שנוטל על עצמו את הנהגת הזולת להצטיין בתפארת מידות כזו, שכשמש יאפיל על כל האחרים, כניצוצות הכוכבים, בזוהרו שלו.</p>
<cite>— קדוש יוחנן כריסוסטומוס, בתוך קורנליוס א לפידה, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_he.html#moses-virtues">פתח דבר ושבח כתבי הקודש — מידותיו של מֹשֶׁה</a></cite>
</blockquote>
