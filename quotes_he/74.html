<p>עץ החיים הוא צלב המשיח, אשר הוקם בתוך גן העדן — כלומר הכנסייה — ונותן חיים לעולם. על כן הכלה, המשתוקקת לעלות עליו, אומרת: "אֶעֱלֶה בְתָמָר אֹחֲזָה בְּסַנְסִנָּיו, מְתוּקִים לְחִכִּי."</p>
