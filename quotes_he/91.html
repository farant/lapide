<blockquote>
<p>כשאדם עושה דבר מגונה מתוך תענוג, העריבות חולפת אך הגנאי והעצב נשארים. לעומת זאת, ביגיעת המידות הטובות, הקושי והצער חולפים, אך העריבות והשמחה נשארות.</p>
<cite>— מוסוניוס, in קורנליוס א לפידה, <a href="01_genesis_03_he.html#verse-7">פירוש על בראשית, פרק ג — "ותפקחנה עיני שניהם"</a></cite>
