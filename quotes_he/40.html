<blockquote>
<p>מֹשֶׁה, עבד האל הנאמן ביותר, עניו בסירובו לשליחות כה גדולה, ציית בקבלתה, נאמן בשמירתה, נמרץ בביצועה, ערני בהנהגת העם, חמור בתיקון, נלהב באהבה, סבלני בסבל.</p>
<cite>— קדוש אוגוסטינוס, בתוך קורנליוס א לפידה, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_he.html#praises-of-moses">פתח דבר ושבח כתבי הקודש — שבחי מֹשֶׁה מכתבי הקודש ומאבות הכנסייה</a></cite>
</blockquote>
