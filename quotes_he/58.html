<blockquote>
<p>הצלם אכן יכול להישרף בגיהינום, אך לא להיכלות; יכול ללהוט, אך לא להיחרב. הדמות אינה כן; אלא או שהיא נשארת בטוב, או אם הנשמה חוטאת, היא משתנה באופן עלוב ונעשית דומה לבהמות חסרות תבונה.</p>
<cite>— קדוש ברנרדוס, בתוך קורנליוס א לפידה, <a href="01_genesis_01_he.html#verse-26">פירוש על בראשית, פרק א — "נעשה אדם בצלמנו כדמותנו"</a></cite>
</blockquote>
