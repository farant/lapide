<blockquote>
<p>נפלא הוא עומק דבריך, ה׳, שפני השטח שלהם, הנה, לפנינו, מקסים את הקטנים, אך נפלא הוא העומק, אלוהי, עומק נפלא; מפחיד הוא להביט לתוכו: יראת כבוד ורעד של אהבה.</p>
<cite>— קדוש אוגוסטינוס, בתוך קורנליוס א לפידה, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_he.html#the-fathers">פתח דבר ושבח כתבי הקודש — הגנת אבות הכנסייה על הברית הישנה</a></cite>
</blockquote>
