<blockquote>
<p>דבר אחד בלבד ידוע לי שאפשר להעמיד לצד [הבשורה]: המראה הראשון של האלפים באחד מאותם רגעים שבהם השלג, השמים, השמש, הירוק והצללים השיגו הרמוניה מושלמת. עוצרים, וצעקה נפלטת. כך הוא גם עם הבשורה; היא עוצרת אתכם ומביאה אתכם להשמיע צעקה.</p>
<cite>— האב לקורדר, <a href="02_Clemens_Hieronymi_Du_Culte_he.html#du-culte">על פולחן ישוע המשיח בכתבי הקודש</a></cite>
