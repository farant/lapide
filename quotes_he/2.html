<blockquote>
<p>הוא היה חושב עצמו למאושר ביותר אילו יכול היה לפחות לתת דין וחשבון ראוי ביום ה' על העדר הקטן הזה שהופקד בידיו; שכן דין חמור יותר ייתבע אז הן על נשמות שטופלו כראוי והן על כסף שהוצא כהלכה, מכפי שבני התמותה סבורים בדרך כלל או מעוניינים לחשוב.</p>
<cite>— יוחנן פישר, בתוך קורנליוס א לפידה, <a href="01_Preliminares_he.html#dedicatory-letter">הקדמות — "אגרת ההקדשה"</a></cite>
</blockquote>
