<blockquote>
<p>הפילוסוף סקונדוס, כשנשאל על ידי הקיסר אדריאנוס "מהו האדם?", השיב: "שׂכל מגושם, הבל של זמן, צופה של חיים, נוסע חולף, נפש עמלה." אפיקטטוס אמר: "האדם הוא נר המוצב ברוח, אורח של מקומו, דמות של חוק, סיפור של פורענות, עבד של מוות."</p>
<cite>— קורנליוס א לפידה, <a href="01_genesis_02_he.html#verse-7">פירוש על בראשית, פרק ב — "פסוק ז"</a></cite>
