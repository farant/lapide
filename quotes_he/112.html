<blockquote>
<p>אלה הם, אפוא, ארבעת החטאים הנוראים הזועקים אל השמים בלשון הכתוב: ראשית, רצח קרובים, כרציחתו של קין; שנית, חטא סדום; שלישית, שכר פועלים שנעשקו; רביעית, דיכוי אלמנות, יתומים ועניים.</p>
<cite>— קורנליוס א לפידה, <a href="01_genesis_04_he.html#ch4-verse-10">פירוש על בראשית, פרק ד — "קוֹל דְּמֵי אָחִיךָ"</a></cite>
