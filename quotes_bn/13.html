<blockquote>
<p>আমি তোমাকে প্রার্থনা করি, প্রিয়তম ভ্রাতা, এসবের মধ্যে বাস করো, এগুলো নিয়ে ধ্যান করো, অন্য কিছু জানতে চেও না, অন্য কিছু খুঁজো না। এটা কি তোমার কাছে ইহজগতেই স্বর্গরাজ্যের আবাসস্থল বলে মনে হয় না?</p>
<cite>— সন্ত হিয়েরোনিমুস, <a href="02_Clemens_Hieronymi_Du_Culte_bn.html#jerome-to-paulinus">হিয়েরোনিমুস পাউলিনুসকে</a></cite>
</blockquote>
