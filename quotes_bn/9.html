<blockquote>
<p>ঈশ্বরের মন্দিরে প্রত্যেকে যা পারে তা-ই উৎসর্গ করে: কেউ কেউ সোনা, রূপা ও মূল্যবান পাথর উৎসর্গ করে; অন্যেরা মিহি মসিনা বস্ত্র, বেগুনি, লাল ও নীলকান্তমণি-রঙের কাপড় উৎসর্গ করে; আমাদের পক্ষে চামড়া ও ছাগলের লোম উৎসর্গ করতে পারলেই মঙ্গল।</p>
<cite>— সন্ত হিয়েরোনিমুস, <a href="02_Clemens_Hieronymi_Du_Culte_bn.html#helmeted-prologue">শিরস্ত্রাণযুক্ত ভূমিকা</a></cite>
</blockquote>
