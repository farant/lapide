<blockquote>
<p>মানুষের মুখ কী, যদি না বাক্যের এক মন্দির, বক্তৃতার এক ঝরনা, শব্দের এক সভাগৃহ, ইচ্ছার এক ভাণ্ডার?</p>
<cite>— সন্ত আম্ব্রোসিউস, কর্নেলিউস আ লাপিদে, <a href="01_genesis_02_bn.html#verse-7">আদিপুস্তকের ভাষ্য, অধ্যায় ২ — "এবং প্রভু ঈশ্বর ভূমির ধূলি থেকে মানুষকে গড়লেন"</a></cite>
</blockquote>
