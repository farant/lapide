<blockquote>
<p>শিক্ষক ছাড়াও একটি শিক্ষণীয় মন প্রশংসনীয়। আমরা বিচার করি না তুমি কী পেয়েছ, বরং তুমি কী খোঁজ। নরম মোম, সহজে আকার দেওয়া যায়—কারিগর ও ভাস্করের হাত নিষ্ক্রিয় থাকলেও—তবুও নিজ গুণে সে যা হতে পারে তা-ই হয়ে থাকে।</p>
<cite>— সন্ত হিয়েরোনিমুস, <a href="02_Clemens_Hieronymi_Du_Culte_bn.html#jerome-to-paulinus">হিয়েরোনিমুস পাউলিনুসকে</a></cite>
</blockquote>
