<blockquote>
<p>পবিত্র শাস্ত্রের ঐশী বাণী এমন একটি নদী যা একই সঙ্গে অগভীর ও গভীর, যেখানে মেষশাবক হাঁটতে পারে এবং হাতি সাঁতার কাটতে পারে।</p>
