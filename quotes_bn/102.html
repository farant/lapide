<blockquote>
<p>এটি হেবলের আদর্শ বাক্য: "আমি মোটা নৈবেদ্য দেব; শীর্ণ নৈবেদ্য উৎসর্গ করব না।" বিপরীতে, কয়িনের আদর্শ বাক্য: "আমি শীর্ণ নৈবেদ্য উৎসর্গ করব; মোটা নৈবেদ্য দেব না।"</p>
<cite>— সন্ত আম্ব্রোসিউস, কর্নেলিউস আ লাপিদে, <a href="01_genesis_04_bn.html#ch4-verse-3">আদিপুস্তকের ভাষ্য, অধ্যায় ৪ — "পদ ৩: বহু দিন পরে"</a></cite>
</blockquote>
