<blockquote>
<p>খ্রীষ্টানরা পূর্বদিকে মুখ করে প্রার্থনা করে, যেন তারা স্বর্গোদ্যানের কথা স্মরণ করে, যেখান থেকে তারা পাপের কারণে বিতাড়িত হয়েছিল।</p>
<cite>— সন্ত ক্রিসোস্তোমুস, থিওডোরেটুস এবং দামাস্কীয় যোহন, কর্নেলিউস আ লাপিদে, <a href="01_genesis_02_bn.html#verse-8">আদিপুস্তকের ভাষ্য, অধ্যায় ২ — "এবং প্রভু ঈশ্বর একটি আনন্দের উদ্যান রোপণ করলেন"</a></cite>
</blockquote>
