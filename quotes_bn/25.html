<blockquote>
<p>পৃথিবীতে সেই বিষয়গুলো শিখে নাও যেগুলোর জ্ঞান স্বর্গেও স্থায়ী থাকবে। এমনভাবে অধ্যয়ন করো যেন তুমি চিরকাল বাঁচবে; এমনভাবে জীবনযাপন করো যেন তুমি চিরকাল মৃত্যুবরণ করবে।</p>
<cite>— সন্ত হিয়েরোনিমুস, কর্নেলিউস আ লাপিদে-তে, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_bn.html#chapter-iv">পবিত্র শাস্ত্রের ভূমিকা ও স্তুতি — অধ্যায় ৪: ধর্মপিতাগণের বিচার ও দৃষ্টান্তসমূহ</a></cite>
</blockquote>
