<blockquote>
<p>সর্বদা পান করা ভালো, না সর্বদা আহার করা ভালো? নিশ্চয়ই, যেমন উভয়ের পর্যায়ক্রমে প্রয়োজন, তেমনি পর্যায়ক্রমে প্রার্থনা করা ও পবিত্র শাস্ত্র অধ্যয়ন করা উচিত।</p>
<cite>— যোর্দান, কর্নেলিউস আ লাপিদে-তে, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_bn.html#saintly-examples">পবিত্র শাস্ত্রের ভূমিকা ও স্তুতি — শাস্ত্র অধ্যয়নের সাধু দৃষ্টান্তসমূহ</a></cite>
</blockquote>
