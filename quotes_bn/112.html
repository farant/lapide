<blockquote>
<p>চারটি ভয়ঙ্কর পাপ আছে যা শাস্ত্রের ভাষায় স্বর্গে কাঁদে: প্রথম, ভ্রাতৃহত্যা, যেমন কয়িনের ছিল; দ্বিতীয়, সদোমের পাপ; তৃতীয়, শ্রমিকদের প্রতারিত মজুরি; চতুর্থ, বিধবা, অনাথ ও দরিদ্রের প্রতি নিপীড়ন।</p>
<cite>— কর্নেলিউস আ লাপিদে, <a href="01_genesis_04_bn.html#ch4-verse-10">আদিপুস্তকের ভাষ্য, অধ্যায় ৪ — "পদ ১০: রক্তের কণ্ঠস্বর"</a></cite>
</blockquote>
