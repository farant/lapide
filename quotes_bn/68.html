<blockquote>
<p>ঈশ্বর যখন মানুষকে তাঁর নিজের নিশ্বাস ও আত্মা দান করলেন, তখন তিনি যেন নিজেকেই দান করলেন, যেন তিনি নিজের হৃদয় তার ভেতরে স্থাপন করলেন।</p>
<cite>— কর্নেলিউস আ লাপিদে, <a href="01_genesis_02_bn.html#verse-7">আদিপুস্তকের ভাষ্য, অধ্যায় ২ — "এবং প্রভু ঈশ্বর ভূমির ধূলি থেকে মানুষকে গড়লেন"</a></cite>
</blockquote>
