<p>হোমার রাজাকে জনগণের রাখাল বলে অভিহিত করেছেন, কেননা তাঁর কর্তব্য হলো প্রজাদের পালন করা, যেমন একজন রাখাল মেষদের খাওয়ায়, তাদের লোম ছাড়ানো নয়।</p>
