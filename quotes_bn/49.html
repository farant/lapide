<blockquote>
<p>ঈশ্বরের চেয়ে উৎকৃষ্ট কোনো রচয়িতা নেই; ঈশ্বরের বাক্যের চেয়ে কার্যকর কোনো শিল্প নেই; মঙ্গলময় কর্তৃক মঙ্গল সৃষ্টি হওয়ার চেয়ে উত্তম কোনো কারণ নেই।</p>
<cite>— সন্ত আউগুস্তিনুস, কর্নেলিউস আ লাপিদে, <a href="01_genesis_01_bn.html#verse-4">আদিপুস্তকের ভাষ্য, অধ্যায় ১ — "ঈশ্বর দেখলেন যে আলো ভালো"</a></cite>
</blockquote>
