<blockquote>
<p>স্বর্গরাজ্যের সঙ্গে তুলনীয় কিছুই নেই; কেননা সমগ্র পৃথিবীকেও যদি সমান দাঁড়িপাল্লায় ওজন করা হয়, তবু তা একটিমাত্র আত্মার সঙ্গে তুলনা করা যায় না।</p>
<cite>— মেনাস, কর্নেলিউস আ লাপিদে, <a href="01_genesis_01_bn.html#verse-16">আদিপুস্তকের ভাষ্য, অধ্যায় ১ — "এবং ঈশ্বর দুটি বড় জ্যোতিষ্ক সৃষ্টি করলেন"</a></cite>
</blockquote>
