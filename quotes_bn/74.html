<blockquote>
<p>জীবনবৃক্ষ হলো খ্রীষ্টের ক্রুশ, যা স্বর্গোদ্যানের মাঝখানে — অর্থাৎ মণ্ডলীতে — উত্থিত হয়ে বিশ্বকে জীবন দান করে। তাই বধূ সেই বৃক্ষে আরোহণের ইচ্ছা করে বলেন: "আমি খেজুর গাছে উঠব এবং তার ফল ধরব, যা আমার মুখে মিষ্ট।"</p>
<cite>— কর্নেলিউস আ লাপিদে, <a href="01_genesis_02_bn.html#the-tree-of-life">আদিপুস্তকের ভাষ্য, অধ্যায় ২ — "জীবনবৃক্ষ"</a></cite>
</blockquote>
