<blockquote>
<p>হে প্রভু, তুমি আমাদের তোমার জন্যই সৃষ্টি করেছ, আর আমাদের হৃদয় অশান্ত থাকে যতক্ষণ না তোমাতে বিশ্রাম পায়। স্বর্গ ও পৃথিবী চিৎকার করে বলে, হে প্রভু, আমাদের তোমাকে ভালোবাসা উচিত।</p>
<cite>— সন্ত আউগুস্তিনুস, কর্নেলিউস আ লাপিদে, <a href="01_genesis_01_bn.html#he-created">আদিপুস্তকের ভাষ্য, অধ্যায় ১ — "তিনি সৃষ্টি করলেন"</a></cite>
</blockquote>
