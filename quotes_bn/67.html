<blockquote>
<p>তিনি ফুঁ দিলেন, এটি দেখাতে যে ঈশ্বরের পক্ষে আত্মা সৃষ্টি করা তেমনই সহজ যেমন মানুষের পক্ষে শ্বাস ফেলা।</p>
<cite>— থিওডোরেটুস, কর্নেলিউস আ লাপিদে, <a href="01_genesis_02_bn.html#verse-7">আদিপুস্তকের ভাষ্য, অধ্যায় ২ — "এবং প্রভু ঈশ্বর ভূমির ধূলি থেকে মানুষকে গড়লেন"</a></cite>
</blockquote>
