<blockquote>
<p>পবিত্র লেখকদের জিহ্বা ও হাত একই পবিত্র আত্মার লেখনী ছাড়া আর কিছু ছিল না, এতটাই যে তাঁরা বিভিন্ন লেখক নন, বরং একজন লেখকের বিভিন্ন কলম বলে মনে হন।</p>
<cite>— কর্নেলিউস আ লাপিদে, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_bn.html#sacred-writers-as-pens">পবিত্র শাস্ত্রের ভূমিকা ও স্তুতি — পবিত্র আত্মার লেখনী হিসেবে শাস্ত্রকারগণ</a></cite>
</blockquote>
