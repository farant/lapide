<blockquote>
<p>আমরা এই মণ্ডলীর বিশপের কাছে পরাজিত হয়েছি; তিনি ভীতি-প্রদর্শনের ঊর্ধ্বে, যুক্তিতে অটল, মিষ্টবাক্যের চেয়ে দৃঢ়তর। অন্য কোনো ভীরু ব্যক্তিকে পরীক্ষা করা দরকার।</p>
<cite>— মোদেস্তুস, কর্নেলিউস আ লাপিদে-তে, <a href="01_Preliminares_bn.html#dedicatory-letter">প্রাথমিক বিষয়সমূহ — উৎসর্গপত্র</a></cite>
