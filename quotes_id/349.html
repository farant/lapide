<blockquote>
<p>Pada mulanya adalah Allah, kemudian Firman, dan dengan keduanya Roh adalah satu: Ketiganya bersama kekal, semuanya menuju ke dalam satu kesatuan.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_41_id.html#verse-56">Tafsir atas Kitab Kejadian, Bab XLI — "Ayat 56"</a></cite>
</blockquote>
