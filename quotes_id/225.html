<blockquote>
<p>Allah menghendaki Ibrahim menjadi orang asing di Kanaan dan terus-menerus dalam pengembaraan, untuk mengajarkan kepada kita bahwa dalam kehidupan ini kita adalah para musafir yang sedang menuju ke surga.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_20_id.html#verse-1">Tafsir Kitab Kejadian, Bab XX — "Ibrahim Pergi dari Sana"</a></cite>
</blockquote>
