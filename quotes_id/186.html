<blockquote>
<p>Allah mengizinkan Lot ditawan di Sodom, untuk menghajar pilihannya yang tergesa-gesa dan bernafsu, yang dengannya, terpikat oleh kesuburan tempat itu, ia lebih memilih untuk tinggal di antara orang-orang Sodom yang paling fasik.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_14_id.html#verse-14-12">Komentar atas Kejadian, Bab XIV — "Lot Ditawan"</a></cite>
</blockquote>
