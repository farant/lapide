<blockquote>
<p>Maka jika engkau dicobai, dihina, menderita, dilemahkan, disedihkan, difitnah, dimatikan, disiksa, bahkan digantung atau dibakar, tirulah Ishak: itu hanya sebentar; pikirkanlah kekekalan.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_22_id.html#verse-10">Tafsir atas Kitab Kejadian, Bab XXII — "Ia Mengambil Pedang"</a></cite>
</blockquote>
