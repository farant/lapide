<blockquote>
<p>Berbahagialah jiwa yang, dibalsamkan dengan rempah-rempah kebajikan, selagi tinggal dalam peti mati tubuh, dipelihara untuk kehidupan kekal.</p>
<cite>— Rabanus, dalam Cornelius a Lapide, <a href="01_genesis_50_id.html#verse-2">Tafsir Kitab Kejadian, Bab L — "Pembalsaman Yakub"</a></cite>
</blockquote>
