<blockquote>
<p>Biarlah orang lain pergi ke Yerusalem; engkau pergilah sejauh kesabaran atau kerendahan hati. Sebab inilah bagimu pergi keluar dari dunia; yang lain itu adalah pergi ke dalam dunia.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_id.html#chapter-xv">Meditasi — Bab XV</a></cite>
</blockquote>
