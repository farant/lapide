<blockquote>
<p>Para martir berkata kepada Allah: "Karena Engkau, kami dibunuh sepanjang hari"; engkau berkata kepada hal-hal yang tidak berharga: Karena engkau, aku terganggu sepanjang hari.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_id.html#chapter-iv">Meditasi — Bab IV</a></cite>
</blockquote>
