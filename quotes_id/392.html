<blockquote>
<p>Jika engkau mengatakan kebenaran bukan karena cinta akan kebenaran, melainkan karena keinginan untuk melukai orang lain, engkau tidak akan memperoleh pahala orang yang berkata benar, tetapi hukuman seorang pencela.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_id.html#chapter-i">Meditasi — Bab I</a></cite>
</blockquote>
