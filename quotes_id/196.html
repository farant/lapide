<blockquote>
<p>Sungguh laki-laki itu, yang dengan jantan menggunakan perempuan — istrinya dengan penuh kesederhanaan, hambanya dengan penuh ketaatan, tidak seorang pun dengan ketidaksederhanaan!</p>
<cite>— Santo Agustinus, dalam Cornelius a Lapide, <a href="01_genesis_16_id.html#verse-2">Tafsir Kitab Kejadian, Bab XVI — "Tuhan Telah Menutupku"</a></cite>
</blockquote>
