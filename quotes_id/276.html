<blockquote>
<p>Gereja adalah tempat para Malaikat, tempat para Malaikat Agung, kerajaan Allah, surga itu sendiri; dan jika engkau tidak percaya, lihatlah meja ini, yaitu altar.</p>
<cite>— Santo Krisostomus, in Cornelius a Lapide, <a href="01_genesis_28_id.html#verse-17">Komentar atas Kitab Kejadian, Bab XXVIII — "Betapa Dahsyatnya Tempat Ini"</a></cite>
</blockquote>
