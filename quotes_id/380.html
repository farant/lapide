<blockquote>
<p>Kemiskinan Kristus memperkaya kita, kelemahan-Nya menyembuhkan, kelaparan-Nya memuaskan, kematian-Nya menghidupkan, penguburan-Nya membangkitkan kita.</p>
<cite>— Santo Ambrosius, dalam Cornelius a Lapide, <a href="01_genesis_49_id.html#asher">Tafsir atas Kitab Kejadian, Bab XLIX — "Nubuat dan Berkat Asyer"</a></cite>
</blockquote>
