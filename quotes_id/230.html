<blockquote>
<p>Sumpah adalah suatu hal yang suci, di mana wibawa dan kebenaran ilahi dilibatkan, yang oleh karena itu tidak boleh diucapkan secara gegabah atau sembrono, melainkan dengan pikiran yang teguh dan yakin dalam banyak hal.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_21_id.html#verse-31">Komentar atas Kejadian, Bab XXI — "Bersyeba"</a></cite>
</blockquote>
