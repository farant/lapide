<blockquote>
<p>Tidak ada yang menjaga jiwa dalam ketenangan dan kedamaian seperti kelembutan dan kesederhanaan. Hal-hal ini lebih bermanfaat bagi pemiliknya daripada mahkota mana pun.</p>
<cite>— Santo Yohanes Krisostomus, dalam Cornelius a Lapide, <a href="01_genesis_13_id.html#verse-13-15">Tafsir atas Kitab Kejadian, Bab XIII — "Seluruh Tanah yang Kaulihat"</a></cite>
</blockquote>
