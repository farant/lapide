<blockquote>
<p>Yusuf tidak ingin membalas dendam; karena ia tahu bahwa kenikmatan pembalasan hanyalah sesaat, tetapi kenikmatan belas kasihan adalah kekal.</p>
<cite>— Yosefus, dalam Cornelius a Lapide, <a href="01_genesis_50_id.html#verse-19">Tafsir Kitab Kejadian, Bab L — "Yusuf Menangis"</a></cite>
</blockquote>
