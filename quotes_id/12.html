<blockquote>
<p>Adalah hal yang kekanak-kanakan, seperti permainan tukang obat, mengajarkan apa yang tidak diketahui; bahkan, untuk berbicara dengan rasa geram, tidak mengetahui pun bahwa seseorang tidak mengetahui.</p>
<cite>— Santo Hieronimus, <a href="02_Clemens_Hieronymi_Du_Culte_id.html#jerome-to-paulinus">Hieronimus kepada Paulinus</a></cite>
</blockquote>
