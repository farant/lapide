<blockquote>
<p>Pelajarilah dalam diri Ibrahim kesetiaan iman yang tak kenal lelah; dalam diri Ishak kemurnian pikiran yang tulus; dalam diri Yakub ketabahan dalam penderitaan; dalam diri Yusuf cermin kesucian.</p>
<cite>— Santo Ambrosius, dalam Cornelius a Lapide, <a href="01_genesis_37_id.html#verse-2">Tafsir atas Kitab Kejadian, Bab XXXVII — "Ayat 2"</a></cite>
</blockquote>
