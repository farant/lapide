<blockquote>
<p>Yakub adalah seorang pekerja yang baik bahkan dalam tidurnya, karena ia menyelesaikan lebih banyak urusan dengan Allah ketika tidur daripada ketika terjaga.</p>
<cite>— Santo Ambrosius, in Cornelius a Lapide, <a href="01_genesis_28_id.html#verse-11-moral">Komentar atas Kitab Kejadian, Bab XXVIII — "Meletakkannya di Bawah Kepalanya (Moral)"</a></cite>
</blockquote>
