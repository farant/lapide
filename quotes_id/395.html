<blockquote>
<p>Jalan menuju Allah itu mudah, karena orang berjalan dengan melepaskan beban; akan sulit jika orang berjalan dengan memikul beban. Oleh karena itu, lepaskanlah bebanmu sedemikian rupa sehingga, setelah menyisihkan segala sesuatu, engkau menyangkal dirimu sendiri.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_id.html#chapter-ii">Meditasi — Bab II</a></cite>
</blockquote>
