<blockquote>
<p>Awal dari kembali kepada kebenaran adalah merasa tidak puas dengan diri sendiri dalam kepalsuan. Teguran mendahului perbaikan. Sebab orang tidak peduli untuk mengubah apa yang tidak mengganggunya.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_id.html#chapter-ii">Meditasi — Bab II</a></cite>
