<blockquote>
<p>Ketika Allah menyampaikan nafas dan jiwa-Nya kepada manusia, Ia menyampaikan diri-Nya sendiri, seolah-olah Ia telah menanamkan hati-Nya sendiri di dalam diri manusia.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_02_id.html#verse-7">Tafsir atas Kitab Kejadian, Bab II — "Ayat 7: Maka Tuhan Allah Membentuk Manusia dari Debu Tanah"</a></cite>
</blockquote>
