<blockquote>
<p>Lihatlah betapa engkau tidak mengenal dirimu sendiri. Sebab tidak ada wilayah yang begitu jauh dan asing bagimu yang membuatmu lebih mudah percaya kepada seseorang yang berkata dusta.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_id.html#chapter-xi">Meditasi — Bab XI</a></cite>
</blockquote>
