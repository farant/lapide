<blockquote>
<p>Engkau telah menjadikan kami, ya Tuhan, bagi-Mu, dan hati kami gelisah sampai ia beristirahat di dalam-Mu. Langit dan bumi berseru, ya Tuhan, agar kami mengasihi-Mu.</p>
<cite>— Santo Agustinus, dalam Cornelius a Lapide, <a href="01_genesis_01_id.html#he-created">Tafsir atas Kitab Kejadian, Bab I — "Dia Menciptakan"</a></cite>
</blockquote>
