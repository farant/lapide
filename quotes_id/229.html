<blockquote>
<p>Kebun ini adalah tempat doa dan tempat menyepi Ibrahim, ke mana ia sesekali menarik diri dari segala kekhawatiran dan urusan, tatkala ia hendak bersekutu dengan Allah.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_21_id.html#verse-33">Komentar atas Kejadian, Bab XXI — "Ia Menanam Kebun"</a></cite>
</blockquote>
