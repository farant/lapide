<blockquote>
<p>Anak-anakku yang terkasih, bertahanlah dalam pengakuan iman; Kristus sudah menunggumu bersama para orang kudus-Nya; berjuanglah demi jiwamu dan tunjukkanlah dirimu setia kepada Kristus.</p>
<cite>— Santa Felisitas, dalam Cornelius a Lapide, <a href="01_genesis_49_id.html#gad">Tafsir atas Kitab Kejadian, Bab XLIX — "Nubuat dan Berkat Gad"</a></cite>
</blockquote>
