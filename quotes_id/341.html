<blockquote>
<p>Orang Kristen yang ditanya oleh Yulianus si Murtad dengan nada mengejek: "Apa yang sedang dikerjakan oleh tukang kayu Galilea-mu itu?" menjawab: "Ia sedang menyiapkan peti mati untukmu."</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_40_id.html#verse-22">Tafsir Kitab Kejadian, Bab XL — "Agar Kebenaran Penafsir Terbukti"</a></cite>
</blockquote>
