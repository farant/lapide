<blockquote>
<p>Pimpinlah aku, ya Bapa, dan Engkau, penguasa langit yang tinggi, ke mana saja Engkau berkenan: tiada penundaan dalam menaati; aku di sini, siap sedia.</p>
<cite>— Kleantes, dalam Cornelius a Lapide, <a href="01_genesis_17_id.html#verse-23">Tafsir atas Kitab Kejadian, Bab XVII — "Pada Hari Itu Juga"</a></cite>
</blockquote>
