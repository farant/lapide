<blockquote>
<p>Allah tahu bagaimana mengatur dan mengarahkan segala dosa dan kejahatan manusia menuju tujuan yang baik: dari situlah Ia selalu menarik kebaikan dari kejahatan.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_38_id.html#verse-16">Komentar atas Kitab Kejadian, Bab XXXVIII — "Dan Ia Menghampiri Dia"</a></cite>
</blockquote>
