<blockquote>
<p>Inilah pada pokoknya seluruh kerusakan manusia: meninggalkan yang lebih baik daripada dirinya, yaitu Allah; dan mengurus yang lebih rendah daripada dirinya, melekat padanya dalam kenikmatan, yaitu hal-hal duniawi.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_id.html#chapter-ix">Meditasi — Bab IX</a></cite>
</blockquote>
