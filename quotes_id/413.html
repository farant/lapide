<blockquote>
<p>Kemakmuran adalah jerat; pisau yang memotong jerat ini adalah kesengsaraan. Kemakmuran adalah penjara bagi cinta akan Allah; alat pendobrak yang meruntuhkannya adalah kesengsaraan.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_id.html#chapter-xiv">Meditasi — Bab XIV</a></cite>
</blockquote>
