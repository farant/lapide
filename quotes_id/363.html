<blockquote>
<p>Maukah engkau dipuji? Pujilah orang lain. Maukah engkau dicintai? Cintailah. Maukah engkau memperoleh tempat pertama? Berikanlah dahulu tempat itu kepada orang lain.</p>
<cite>— Santo Krisostomus, dalam Cornelius a Lapide, <a href="01_genesis_45_id.html#charity-of-joseph">Tafsir atas Kitab Kejadian, Bab XLV — "Kasih Yusuf"</a></cite>
</blockquote>
