<blockquote>
<p>Sesungguhnya dan dalam hati nuraniku, akulah yang paling bodoh di antara manusia, dan hikmat manusia tidak ada padaku; aku adalah anak kecil yang tidak mengetahui jalan masuk maupun jalan keluarku.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_id.html#life">Pendahuluan — Riwayat Hidup Cornelius a Lapide</a></cite>
