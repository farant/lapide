<blockquote>
<p>Roh Kudus tidak tinggal dalam diri orang-orang yang sedih, berduka, murung, dan karenanya lamban serta malas, tetapi dalam diri mereka yang ceria, gembira, giat, gesit, dan aktif.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_45_id.html#verse-27">Tafsir atas Kitab Kejadian, Bab XLV — "Ayat 27: Rohnya Hidup Kembali"</a></cite>
</blockquote>
