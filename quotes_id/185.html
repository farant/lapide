<blockquote>
<p>Kekayaan itu milikku, engkau adalah milik kekayaanmu: sebab kekayaan berada dalam pelayanan orang bijak, tetapi orang bodoh berada dalam kuasa kekayaan.</p>
<cite>— Seneca, dalam Cornelius a Lapide, <a href="01_genesis_14_id.html#verse-14-23">Komentar atas Kejadian, Bab XIV — "Dari Seutas Benang sampai Tali Sandal"</a></cite>
