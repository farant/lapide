<blockquote>
<p>Apa pun yang terjadi padamu, selama jiwamu tidak jatuh ke dalam gerakan amarah, kebencian, kesedihan, atau ketakutan, dan tidak pula ke dalam penyebab-penyebabnya, hal itu tidak akan merugikanmu di kehidupan yang akan datang.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_id.html#chapter-xiii">Meditasi — Bab XIII</a></cite>
</blockquote>
