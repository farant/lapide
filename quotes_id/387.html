<blockquote>
<p>Mintalah hal lain kepadaku, dan jasamu akan menerima ganjarannya. Lupakanlah orang itu: sebab Raja Prancis tidak membalas dendam atas luka hati yang diderita Duke Orleans.</p>
<cite>— Louis XII, dalam Cornelius a Lapide, <a href="01_genesis_50_id.html#verse-21">Tafsir Kitab Kejadian, Bab L — "Dengan Ramah dan Lembut"</a></cite>
</blockquote>
