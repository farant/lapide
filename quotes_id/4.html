<blockquote>
<p>Kematian, selanjutnya, akan menjadi anugerah bagiku: karena ia akan mengirimku lebih cepat kepada Allah, bagi-Nya aku hidup dan menunaikan tugasku, dan sebagian besar aku telah mati, dan kepada-Nya sejak lama aku bergegas.</p>
<cite>— Santo Basilius Agung, <a href="01_Preliminares_id.html#dedicatory-letter">Pendahuluan — Surat Persembahan</a></cite>
</blockquote>
