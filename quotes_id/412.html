<blockquote>
<p>Lihatlah bagaimana Allah menusukmu di mana pun engkau mengulurkan tangan melampaui-Nya melalui nafsu akan makhluk ciptaan — bagaikan seorang ibu asuh yang menusuk lengan bayi yang terjulur keluar dari buaian, agar ia tidak binasa oleh dingin.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_id.html#chapter-xiv">Meditasi — Bab XIV</a></cite>
</blockquote>
