<p>"Mata yang ditutup oleh kesalahan, dibuka oleh hukuman," kata Santo Gregorius; dan sebagaimana kata Santo Gregorius Nazianzus: "Hati nurani adalah pengadilan domestik dan sejati."</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_42_id.html#verse-21">Tafsir Kitab Kejadian, Pasal XLII — "Kita Layak Menderita Hal-Hal Ini"</a></cite>
