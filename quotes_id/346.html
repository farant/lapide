<blockquote>
<p>Sekalipun Tuhan menghujani batu dan batu karang dari langit, hal itu tidak akan mencelakai kita jika kita menjadi seperti yang Ia kehendaki.</p>
<cite>— Santo Egidius, dalam Cornelius a Lapide, <a href="01_genesis_41_id.html#verse-42">Tafsir atas Kitab Kejadian, Bab XLI — "Ayat 42"</a></cite>
</blockquote>
