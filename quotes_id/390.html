<blockquote>
<p>Pergilah, mengapa engkau takut, jiwaku? Mengapa engkau ragu-ragu? Selama hampir tujuh puluh tahun engkau telah melayani Kristus, dan engkau masih takut akan kematian?</p>
<cite>— Santo Hilarion, dalam Cornelius a Lapide, <a href="01_genesis_50_id.html#dying-words">Tafsir Kitab Kejadian, Bab L — "Kata-Kata Terakhir Para Kudus dan Orang-Orang Saleh"</a></cite>
</blockquote>
