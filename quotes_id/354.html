<blockquote>
<p>Dalam kemalangan yang tak terduga, pengetahuan lebih ringan daripada keraguan: sebab setelah perkaranya diketahui, jalan keselamatan dapat ditemukan; keraguan tidak menyelesaikan apa pun.</p>
<cite>— Filo, dalam Cornelius a Lapide, <a href="01_genesis_42_id.html#verse-29">Tafsir Kitab Kejadian, Pasal XLII — "Mereka Menceritakan Segala Sesuatu"</a></cite>
</blockquote>
