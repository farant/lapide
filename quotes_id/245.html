<blockquote>
<p>Sebab adalah tanda orang bijak, memisahkan diri dari kenikmatan daging, meninggikan jiwa, dan menariknya dari tubuh. Sebab inilah artinya mengenal diri sendiri sebagai manusia.</p>
<cite>— Santo Ambrosius, dalam Cornelius a Lapide, <a href="01_genesis_24_id.html#verse-63">Komentar atas Kitab Kejadian, Bab XXIV — "Untuk Bermeditasi"</a></cite>
</blockquote>
