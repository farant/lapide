<blockquote>
<p>Orang-orang saleh menarik diri dari gangguan-gangguan ke dalam rahasia batin pikiran, dan di sana beristirahat seolah-olah di dalam pangkuan ketenangan; inilah kemah-kemah orang yang beriman.</p>
<cite>— Santo Gregorius, dalam Cornelius a Lapide, <a href="01_genesis_25_id.html#verse-27">Tafsir Kitab Kejadian, Bab XXV — "Seorang Petani"</a></cite>
</blockquote>
