<blockquote>
<p>Karena engkau ditawan oleh kenikmatan semata, hanya hal-hal yang menyenangkan yang harus diwaspadai. Oleh karena itu, jiwa Kristiani tidak pernah aman kecuali dalam kesengsaraan.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_id.html#chapter-xiv">Meditasi — Bab XIV</a></cite>
