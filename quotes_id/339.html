<blockquote>
<p>Kedudukan, kehormatan, bahkan kehidupan itu sendiri, dan segala urusan manusia, hanyalah sebuah mimpi, dan segala harapan manusia hanyalah mimpi-mimpi orang yang terjaga, sebagaimana Plato biasa berkata.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_40_id.html#verse-12">Tafsir Kitab Kejadian, Bab XL — "Inilah Tafsir Mimpi Itu"</a></cite>
</blockquote>
