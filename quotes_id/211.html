<blockquote>
<p>Hari menyingkapkan kebenaran, dan hukuman yang ditangguhkan masih dapat dilaksanakan, tetapi yang telah dilaksanakan tidak dapat ditarik kembali.</p>
<cite>— Seneka, dalam Cornelius a Lapide, <a href="01_genesis_18_id.html#verse-21">Tafsir atas Kitab Kejadian, Bab XVIII — "Aku Akan Turun dan Melihat"</a></cite>
