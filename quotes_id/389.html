<blockquote>
<p>Aku tidak hidup sedemikian rupa sehingga aku harus malu hidup di antara kalian. Tetapi aku juga tidak takut untuk mati, karena kita memiliki Tuhan yang baik.</p>
<cite>— Santo Ambrosius, dalam Cornelius a Lapide, <a href="01_genesis_50_id.html#dying-words">Tafsir Kitab Kejadian, Bab L — "Kata-Kata Terakhir Para Kudus dan Orang-Orang Saleh"</a></cite>
