<blockquote>
<p>Aku memohon kepadamu, saudara yang terkasih, hiduplah di tengah-tengah hal-hal ini, renungkanlah, jangan mengenal hal lain, jangan mencari hal lain. Tidakkah menurutmu ini sudah merupakan tempat tinggal kerajaan surga di bumi ini?</p>
<cite>— Santo Hieronimus, <a href="02_Clemens_Hieronymi_Du_Culte_id.html#jerome-to-paulinus">Hieronimus kepada Paulinus</a></cite>
</blockquote>
