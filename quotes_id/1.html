<blockquote>
<p>Homerus menyebut raja sebagai gembala rakyat, karena ia harus, sebagaimana gembala terhadap domba-dombanya, bukan menguliti mereka, melainkan menggembalakan mereka.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_id.html#dedicatory-letter">Pendahuluan — Surat Persembahan</a></cite>
</blockquote>
