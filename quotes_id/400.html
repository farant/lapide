<blockquote>
<p>Engkau ingin mengecat dengan warna-warni kayu yang akan dimakan api, ketika engkau menginginkan agar apa yang engkau habiskan itu tampak indah, baik makanan maupun pakaian.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_id.html#chapter-iii">Meditasi — Bab III</a></cite>
