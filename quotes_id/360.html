<blockquote>
<p>Anacharsis berkata bahwa pada pohon anggur terdapat tiga tandan dan tiga piala. Piala pertama diminum untuk kesehatan; yang kedua untuk kesenangan; yang ketiga untuk kemabukan, kecelakaan, dan kegilaan.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_43_id.html#verse-34">Komentar atas Kejadian, Bab XLIII — "Ayat 34"</a></cite>
</blockquote>
