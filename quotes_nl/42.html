<blockquote>
<p>Gij hebt ons gemaakt, o Heer, voor Uzelf, en ons hart is onrustig totdat het rust vindt in U. Hemel en aarde roepen, o Heer, dat wij U moeten liefhebben.</p>
<cite>— H. Augustinus, in Cornelius a Lapide, <a href="01_genesis_01_nl.html#he-created">Commentaar op Genesis, Hoofdstuk I — „Hij schiep”</a></cite>
</blockquote>
