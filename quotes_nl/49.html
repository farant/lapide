<blockquote>
<p>Geen maker is voortreffelijker dan God, geen kunst doeltreffender dan het Woord van God, geen oorzaak beter dan dat het goede door het Goede geschapen wordt.</p>
<cite>— H. Augustinus, in Cornelius a Lapide, <a href="01_genesis_01_nl.html#verse-4">Commentaar op Genesis, Hoofdstuk I — „Vers 4”</a></cite>
