<blockquote>
<p>In de tempel Gods offert een ieder wat hij kan: sommigen offeren goud, zilver en edelstenen; anderen offeren fijn linnen en purper en scharlaken en hyacint; het gaat ons goed als wij huiden en geitenhaar aanbieden.</p>
<cite>— H. Hiëronymus, <a href="02_Clemens_Hieronymi_Du_Culte_nl.html#helmeted-prologue">De gehelmde proloog</a></cite>
</blockquote>
