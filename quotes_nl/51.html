<blockquote>
<p>Zoon, zoon, gedenk het eeuwige leven, aanschouw de hemel en zie Hem die daar heerst: want het leven wordt u niet ontnomen, maar ten goede veranderd.</p>
<cite>— De moeder van de H. Symphorianus, in Cornelius a Lapide, <a href="01_genesis_01_nl.html#verse-16">Commentaar op Genesis, Hoofdstuk I — „Vers 16”</a></cite>
</blockquote>
