<blockquote>
<p>Dit zijn kinderachtigheden, gelijk aan de spelletjes van kwakzalvers — te onderwijzen wat gij niet weet; of liever, om met verontwaardiging te spreken, niet eens te weten dàt gij niet weet.</p>
<cite>— H. Hiëronymus, <a href="02_Clemens_Hieronymi_Du_Culte_nl.html#jerome-to-paulinus">Hiëronymus aan Paulinus</a></cite>
</blockquote>
