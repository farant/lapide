<blockquote>
<p>De dood zal mij bovendien tot weldaad strekken: zij zal mij sneller naar God zenden, voor wie ik leef en wiens dienst ik vervul, wiens dood ik grotendeels reeds ben gestorven, en naar wie ik reeds lang haast.</p>
<cite>— H. Basilius de Grote, <a href="01_Preliminares_nl.html#dedicatory-letter">Preliminares — Opdrachtsbrief</a></cite>
</blockquote>
