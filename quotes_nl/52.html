<blockquote>
<p>Er is niets dat vergeleken kan worden met het koninkrijk der hemelen; want de gehele wereld, op een eerlijke weegschaal gewogen, kan niet worden vergeleken met één enkele ziel.</p>
<cite>— H. Menas, in Cornelius a Lapide, <a href="01_genesis_01_nl.html#verse-16">Commentaar op Genesis, Hoofdstuk I — „Vers 16"</a></cite>
</blockquote>
