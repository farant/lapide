<blockquote>
<p>Een man die niets bezit, is niet aan verbeurdverklaring van goederen onderworpen — tenzij gij misschien deze gescheurde en versleten lompen van mij nodig hebt, en deze weinige boeken, waarin al mijn have en goed bestaan.</p>
<cite>— H. Basilius de Grote, <a href="01_Preliminares_nl.html#dedicatory-letter">Preliminares — Opdrachtsbrief</a></cite>
