<blockquote>
<p>Ik smeek u, allerliefste broeder, te midden van deze dingen te leven, erover te mediteren, niets anders te kennen, niets anders te zoeken. Schijnt het u niet reeds hier op aarde een verblijfplaats van het hemelse koninkrijk?</p>
<cite>— H. Hiëronymus, <a href="02_Clemens_Hieronymi_Du_Culte_nl.html#jerome-to-paulinus">Hiëronymus aan Paulinus</a></cite>
</blockquote>
