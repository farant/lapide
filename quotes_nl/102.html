<blockquote>
<p>Dit is het devies van Abel: „Een vet offer zal ik brengen; een mager offer zal ik niet offeren." Daarentegen dat van Kaïn: „Het magere zal ik offeren; het vette offer zal ik niet brengen."</p>
<cite>— H. Ambrosius, in Cornelius a Lapide, <a href="01_genesis_04_nl.html#ch4-verse-3">Commentaar op Genesis, Hoofdstuk IV — „Na vele dagen"</a></cite>
</blockquote>
