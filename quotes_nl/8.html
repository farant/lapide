<blockquote>
<p>Waarlijk en naar mijn geweten, ik ben de dwaaste der mensen, en de wijsheid der mensen is niet met mij; ik ben een klein kind dat zijn eigen uitgaan noch ingaan kent.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_nl.html#life">Preliminares — Leven van Cornelius a Lapide</a></cite>
