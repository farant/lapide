<blockquote>
<p>"Ginawa Mo kami, O Panginoon, para sa Iyong Sarili, at ang aming puso ay hindi mapakali hanggang sa ito ay mapahinga sa Iyo;" at: "Ang langit at lupa ay sumisigaw, O Panginoon, na dapat naming ibigin Ka."</p>
<cite>— San Agustin, in Cornelius a Lapide, <a href="01_genesis_01_tl.html#he-created">Komentaryo sa Genesis, Kabanata I — "Nilikha Niya"</a></cite>
