<blockquote>
<p>Ang walang ari-arian ay hindi maaaring masamsaman ng mga pag-aari: maliban na lang kung kailangan mo ang mga punit at gusgusing basahan kong ito, at ang ilang aklat, kung saan nananahan ang lahat ng aking kayamanan at yaman.</p>
<cite>— San Basilio Magno, <a href="01_Preliminares_tl.html#dedicatory-letter">Preliminares — Liham ng Paghahandog</a></cite>
</blockquote>
