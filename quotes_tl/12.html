<blockquote>
<p>Ang mga ito ay mga parang laruan ng mga bata, katulad ng mga laro ng mga magdaraya — ang magturo ng hindi mo alam; o sa halip, upang magsalita nang may pagkayamot, ang hindi man lamang malaman na wala kang alam.</p>
<cite>— San Jeronimo, <a href="02_Clemens_Hieronymi_Du_Culte_tl.html#jerome-to-paulinus">Jeronimo kay Paulino</a></cite>
</blockquote>
