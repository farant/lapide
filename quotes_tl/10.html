<blockquote>
<p>Sapagkat ang buhay na tinig ay may taglay na nakatagong kapangyarihan, at ibinubuhos mula sa bibig ng may-akda sa mga tainga ng mag-aaral, ito ay tumutunog nang mas malakas.</p>
<cite>— San Jeronimo, <a href="02_Clemens_Hieronymi_Du_Culte_tl.html#jerome-to-paulinus">Jeronimo kay Paulino</a></cite>
</blockquote>
