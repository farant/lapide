<p>Walang pantig, wala kahit isang kudlit sa mga banal na Sulat, na sa kalaliman nito ay walang nakatagong dakilang kayamanan.</p>
<cite>— San Crisostomo, in Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_tl.html#chapter-iv">Paunang Salita at Papuri sa Banal na Kasulatan — Kabanata IV: Mga Hatol at Halimbawa ng mga Ama ng Simbahan</a></cite>
