<blockquote>
<p>Walang maipapantay sa kaharian ng langit; sapagkat ang buong sanlibutan man, na itinimbang sa pantay na timbangan, ay hindi maipapantay sa isang kaluluwa.</p>
<cite>— San Menas, in Cornelius a Lapide, <a href="01_genesis_01_tl.html#verse-16">Komentaryo sa Genesis, Kabanata I — "Talatang 16: At Ginawa ng Diyos ang Dalawang Dakilang Tanglaw"</a></cite>
