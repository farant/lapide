<blockquote>
<p>Tunay nga at sa aking budhi, ako ang pinakahamak sa mga lalaki, at ang karunungan ng tao ay wala sa akin; ako ay isang munting bata na hindi alam ang kanyang pagpasok at paglabas.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_tl.html#life">Preliminares — Ang Buhay ni Cornelio a Lapide</a></cite>
</blockquote>
