<blockquote>
<p>かくして聖クリスティナは、乙女にして殉教者であったが、イタリアのティルスの町の長官であった父ウルバヌスの銀の偶像を打ち砕き、その甘言を堅い意志をもって退け、脅迫を嘲笑した。鞭にも鉤爪にも引き裂かれても、その不屈の心を変えることはなかった。それどころか、引き裂かれた自らの肉片を父に投げつけてこう言った。「哀れな者よ、この肉で満足するがよい。お前が生んだ者を食らうことはできよう。しかし、お前の不敬に同意させることは断じてできぬ」。見よ、断固たる意志がいかに情念と苦痛と暴君と死とを支配するかを。</p>
<cite>— コルネリウス・ア・ラピデ、<a href="01_genesis_04_ja.html#ch4-verse-7">創世記註解　第四章</a></cite>
</blockquote>
