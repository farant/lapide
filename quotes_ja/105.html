<blockquote>
<p>罪、すなわち罪の罰は、犬あるいはケルベロスのように罪の門の前に伏して、罪の復讐者としてこれを包囲する。お前が悪を行えば直ちにそれはお前のもとに来たり、お前に吠えかかり、お前を噛み、お前を引き裂くであろう。この犬とは良心の虫、精神の動揺と憤怒、罪人の頭上に迫る神の怒り、苦難、苦悶、そして神が罪を罰し給う現世と永遠のすべての災厄のことである。</p>
<cite>— コルネリウス・ア・ラピデ、<a href="01_genesis_04_ja.html#ch4-verse-7">創世記註解　第四章 —「もしお前が善を行うならば」</a></cite>
</blockquote>
