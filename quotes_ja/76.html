<blockquote>
<p>かくして木は中央に立ち、人間の意志を試みていた。それは人間が、脅かす神に聞き従うか、誘う悪魔に聞き従うかを試みていたのである。人間もまた、主と敵との間に、命と死との間に、滅びと救いとの間に立っていた。今や神は救うために脅し、今や蛇は苦しめるために誘う。今や神を通じて厳しさが命を告げ、今や悪魔を通じて甘言が死をもたらす。そして（ああ、何たる悲しみか！）神が脅すと軽んじられ、悪魔が誘うと聞き従われる。神のもとには厳しさがあるが、それは慈愛に満ちている。悪魔のもとには甘言があるが、それは有害なものである。</p>
<cite>— 聖クリソストモス、コルネリウス・ア・ラピデに引用、<a href="01_genesis_02_ja.html#verse-17">創世記註解　第二章</a></cite>
</blockquote>
