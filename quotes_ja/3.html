<blockquote>
<p>何も持たぬ者に財産の没収は及ばない。もしこの擦り切れ、破れ果てた衣と、わずかな書物が必要であるならば別であるが、私の全ての富と資力はそれらに尽きている。流刑については、私はそれを知らない。なぜなら、私はいかなる特定の地にも縛られておらず、今住んでいるこの土地さえ自分のものとは呼ばないからである。そしていかなる地に投げ出されようとも、そこを自分の地と見なす。いや、より正確に言えば、全ての大地は神のものであり、私はその中の旅人にして巡礼者であると知っている。</p>
<cite>— 聖バシリウス、コルネリウス・ア・ラピデ<a href="01_Preliminares_ja.html#dedicatory-letter">序論 — 献呈の書簡</a>より</cite>
</blockquote>
