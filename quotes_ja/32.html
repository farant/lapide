<blockquote>
<p>この真にして本物の知恵は、読書によってではなく塗油によって、文字によってではなく霊によって、学識によってではなく主の戒めの実践によって教えられるのである。汝は誤っている、誤っているのだ。この世の師から、ただキリストの弟子たち、すなわち世の蔑視者のみが神の賜物によって到達するものを見出せると考えるならば。</p>
<cite>— 聖ベルナルドゥス、コルネリウス・ア・ラピデに引用、<a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ja.html#chapter-v">聖書への序文と賛辞 — 第五章：この学問に必要な心構え</a></cite>
</blockquote>
