<blockquote>
<p><em>ゴルゴタはかつて頭蓋骨にちなんで名づけられた場所、<br />
ここは大地の中心、ここに勝利のしるしがある、<br />
大いなる骨がここに見出されたと、我らの祖先は教えた、<br />
ここに最初の人間が葬られたと我らは伝え受けた、<br />
ここでキリストは苦しみたもう、聖なる血によって大地は潤い、<br />
古きアダムの塵が、キリストの血と<br />
混じり合い、滴り落ちる水の力によって洗い清められんがためである。</em></p>
<cite>— テルトゥリアヌス、コルネリウス・ア・ラピデに引用、<a href="01_genesis_05_ja.html#ch5-verse-5">創世記註解　第五章</a></cite>
</blockquote>
