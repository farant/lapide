<blockquote>
<p>各人について「そして死んだ」と付け加えられているのは、罪を犯したアダムに対して神が下した死の宣告がいかに確実に効力を発したかを見るためである。されば我ら一人一人が思い巡らすべきである――やがて私についても「そして死んだ」と言われるであろうと。これこそ私の、そしてすべての人の紋章であり、あるいはやがてそうなるであろう墓碑銘である。すなわち、コルネリウスは何年生き、何年に死んだと。聖ヒエロニムスは言う、「自らが死すべき者であることを常に思う者は、すべてのものを容易に軽んずるのである」と。</p>
<cite>— コルネリウス・ア・ラピデ、<a href="01_genesis_05_ja.html#ch5-verse-5">創世記註解　第五章</a></cite>
</blockquote>
