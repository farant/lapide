<blockquote>
<p>人間は惨めであるがゆえに、また一時的な存在でもあるべきである。かくして神にも悪魔にも似ない者とされる。神は永遠であり幸福であり、その永遠の幸福は幸福なる永遠である。悪魔はこの二つのうち一方、すなわち幸福を失った。しかし永遠性は失わなかった。それゆえ悪魔には永遠の不幸、不幸なる永遠がある。「人間に憐れみをかけよう」と神は言われる。「そして人間は幸福を失ったのだから、この不幸な者から永遠性をも奪い去ろう。そうすれば、どちらの点においても我々の一人のようにはならないのだから」。</p>
<cite>— ルペルトゥス、コルネリウス・ア・ラピデに引用、<a href="01_genesis_03_ja.html#verse-22">創世記註解　第三章</a></cite>
</blockquote>
