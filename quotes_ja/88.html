<blockquote>
<p>悪魔は死を段階的に、また年月をかけて分割し、若者を説き伏せてこう言う——「お前は花盛りの青春と活力の中で死ぬことはない」と。学者たちを説き伏せてはこう言う——「お前は学業を終えるまで死ぬことはない」と。要するに、少なくともあと一年は生き続けるだろうと思わない老人は一人もいない。ここから次の最も真実なる格言が導かれる——「死はすべての人それぞれにとって、すべての人それぞれが思うよりも近くにある」と。</p>
<cite>— コルネリウス・ア・ラピデ、<a href="01_genesis_03_ja.html#verse-4">創世記註解　第三章</a></cite>
</blockquote>
