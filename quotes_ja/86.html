<blockquote>
<p>ピュグマリオンの妹ディドは、多くの金銀を集めてアフリカへ航海し、そこにカルタゴを建設した。リビアの王ヒアルバスから婚姻を求められると、かつての夫シカエウスの記念に薪を積み上げ、その上に身を投じた。他の男に嫁ぐよりも燃えることを選んだのである。貞潔な一人の女がカルタゴを建てた。しかしその同じ都市は、やがて貞潔の誉れを失うことになった。というのも、ハスドルバルの妻は、カルタゴが陥落して火に包まれたとき、ローマ人に捕らえられることを悟ると、二人の幼子を両腕に抱えて、わが家の炎の中へ身を躍らせたからである。</p>
<cite>— コルネリウス・ア・ラピデ、<a href="01_genesis_02_ja.html#verse-24">創世記註解　第二章</a></cite>
</blockquote>
