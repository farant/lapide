<blockquote>
<p>別の場所でお前を残してきたのに、おおアダムよ、別の場所でお前を見つける。栄光をもってお前を包んでいたのに、お前は栄光のうちに私の前を歩んでいた。今はお前が裸で、隠れ場を求めているのを見る。あの蛇の偉大な約束はどこへ行ったのか。お前の最初の心の安らかさはどこにあるのか。魂の平静さはどこにあるのか。良心の平和と確かさはどこにあるのか。あれほど多くの善きものの所有と、あらゆる悪しきものからの解放はどこへ行ったのか。</p>
<cite>— コルネリウス・ア・ラピデ、<a href="01_genesis_03_ja.html#verse-9">創世記註解　第三章</a></cite>
</blockquote>
