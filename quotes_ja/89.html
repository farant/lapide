<blockquote>
<p>あらゆる行いと思いにおいて、今日あるいは今すぐ死ぬかのように自らを保つべきである。朝になれば、夕方まで生きないと思え。夕方になれば、朝を約束することをあえてするな。それゆえ常に備えをなし、死がお前を無防備なままに見出すことのないように生きよ。時のある間に、不滅の富を積み重ねよ。自らの魂の救いのほかは何も思わず、神のことのみを心がけよ。己をこの地上における旅人と寄留者として保て。心を自由に保ち、神へと向かって上に挙げよ——なぜなら、ここにはとどまるべき都はないのだから。</p>
<cite>— トマス・ア・ケンピス、コルネリウス・ア・ラピデに引用、<a href="01_genesis_03_ja.html#verse-4">創世記註解　第三章</a></cite>
</blockquote>
