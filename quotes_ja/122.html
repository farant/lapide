<blockquote>
<p>エノクがエリヤと同様にいまだ死んでいないということは、信仰にきわめて近い事柄である。テルトゥリアヌスは彼らを永遠の候補者と呼び、こう述べている。「永遠の候補者として、彼らはあらゆる悪徳、あらゆる損害、あらゆる不正と侮辱からの肉体の免除を学んでいるのである。」また聖エイレナイオスは彼らを「不死を先取りする者たち」と呼ぶ。すなわち、その予兆と、いわば影のごときものを受けている者たちである。</p>
<cite>— コルネリウス・ア・ラピデ、<a href="01_genesis_05_ja.html#ch5-verse-24">創世記註解　第五章</a></cite>
</blockquote>
