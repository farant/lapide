<blockquote>
<p>かくしてモーセはしばしば幕屋に入り、また出る。内にあっては観想に引き上げられ、外にあっては弱き者たちの務めに圧迫される。内にあっては神の秘義を思い巡らし、外にあっては肉の者たちの重荷を担う。外にあって何を決すべきか不確かな時には、祈りを通じて主に諮るべきであるという範を、指導者たちに示しているのである。</p>
<cite>— 聖グレゴリウス、コルネリウス・ア・ラピデに引用、<a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_Pt1_ja.html#praises-of-moses">聖書への序文と賛辞 — 聖書と教父たちによるモーセへの賛辞</a></cite>
</blockquote>
