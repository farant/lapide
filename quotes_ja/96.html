<blockquote>
<p>人間とは何か。アリストテレスによれば、人間とは運命の玩具、不安定さの象、腐敗の鏡、時間の略奪物である。また死の奴隷、通り過ぎる旅人である。プラウトゥスによれば、神が弄ぶ毬である。セネカによれば、弱く壊れやすい身体、裸で武装もなく、他者の助けを必要とする者である。トリスメギストゥスによれば、腐敗の絆、生ける死、感覚ある屍、動き回る墓である。ソポクレスによれば、幻影と薄い影である。ピンダロスによれば、影の夢である。</p>
<cite>— コルネリウス・ア・ラピデ、<a href="01_genesis_03_ja.html#verse-19">創世記註解　第三章</a></cite>
</blockquote>
