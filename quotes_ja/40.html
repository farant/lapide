<blockquote>
<p>モーセ、神の最も忠実なる僕。かくも大いなる務めを辞退するにおいて謙遜、それを引き受けるにおいて従順、それを守るにおいて忠実、それを遂行するにおいて剛毅、民を治めるにおいて警醒、矯正するにおいて烈々、愛するにおいて熱烈、忍耐するにおいて堅忍であった。</p>
<cite>— 聖アウグスティヌス、コルネリウス・ア・ラピデに引用、<a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ja.html#praises-of-moses">聖書への序文と賛辞 — 聖書と教父たちによるモーセへの賛辞</a></cite>
</blockquote>
