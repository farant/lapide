<blockquote>
<p>カインを告発するのはその声ではなく、その魂でもない。お前自身が流した血の声が告発するのである。それゆえ、お前を告発するのは兄弟ではなく、お前自身の罪業である。しかしまた大地も証人である。血を受けた大地が。兄弟が赦しても、大地は赦さない。兄弟が沈黙しても、大地が断罪する。大地こそがお前に対する証人であり裁き主である。したがって、天上のもの――天空、太陽、月、星、座天使、主天使、権天使、能天使、智天使、熾天使――もまたカインを断罪したことは疑いない。下位のものが断罪した者を、天の清らかなる判決がいかにして赦免し得ようか。</p>
<cite>— 聖アンブロシウス、コルネリウス・ア・ラピデに引用、<a href="01_genesis_04_ja.html#ch4-verse-10">創世記註解　第四章</a></cite>
</blockquote>
