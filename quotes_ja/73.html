<blockquote>
<p>聖ドロテアは殉教のために長官ファブリキウスのもとへ連れて行かれたとき、喜んでいた。なぜなら彼女は、あらゆる花と果実の芳しさで春めく楽園を持つ花婿のもとへ赴くと言っていたからである。書記テオフィルスが冗談交じりに、到着したならばそこから薔薇をいくつか送ってほしいと頼むと、「送りましょう」と彼女は答えた。斬首されたのち、ある少年が新鮮な薔薇の入った小籠を持ってテオフィルスの前に現れ、それらはドロテアが花婿の楽園から送ったものだと告げた。冬の盛りのことであった。そこでテオフィルスはキリストの信仰に回心し、殉教の死を遂げた。</p>
<cite>— コルネリウス・ア・ラピデ、<a href="01_genesis_02_ja.html#verse-8">創世記註解　第二章</a></cite>
</blockquote>
