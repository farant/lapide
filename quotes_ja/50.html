<blockquote>
<p>時間的なものと永遠なるものの間にはこのような違いがある。時間的なものは手に入れる前にはより強く愛されるが、手に入れると色あせてしまう。なぜなら、魂を満たすものは、朽ちることなき喜びの真にして確かなる永遠性のみだからである。しかし永遠なるものは、望まれていた時よりも、獲得された時にこそより熱く愛される。なぜなら、そこにおいて愛徳は、信仰が信じ、希望が望んだものよりも多くのものを得るからである。</p>
<cite>— 聖アウグスティヌス、コルネリウス・ア・ラピデに引用、<a href="01_genesis_01_ja.html#verse-14">創世記註解　第一章</a></cite>
</blockquote>
