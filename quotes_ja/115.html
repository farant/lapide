<blockquote>
<p>神は両者に一つの名を与えたのであり、それは夫婦が二つの体において一人の人間であるかのごとくであることを知り、名において一つであるように、魂と意志においても一つに結ばれるべきであることを悟るためである。第二に、アダムの名によって、自らが大地の子であること――卑しく、土くれのごとく、脆く、死すべき者であり、やがて大地に帰るべき者であることが告げ知らされる。アダムよ、思い起こせ、汝は「アダマ」すなわち土と塵であり、塵に帰るのであると。</p>
<cite>— コルネリウス・ア・ラピデ、<a href="01_genesis_05_ja.html#ch5-verse-2">創世記註解　第五章</a></cite>
</blockquote>
