<blockquote>
<p>「神以外のいかなるものへの欲望も、私の心に上ったことはない」と彼は言う。「地上の事物について、神は私から何も隠したまわなかった。私は昼に眠りを取らず、夜に休息を得ず、神を求め続けた。あらゆる願いを、私はただちに神より受けた。幾万の者が神のみ前に立つのをしばしば見、義人たちの合唱を見た。殉教者たちの群れを見、修道者たちの生活の姿を見た。すべての者の業は神を讃えていた。義人たちが永遠に歓喜しているのを見た。」</p>
<cite>— アヌフ、コルネリウス・ア・ラピデに引用、<a href="01_genesis_05_ja.html#ch5-verse-22">創世記註解　第五章</a></cite>
</blockquote>
