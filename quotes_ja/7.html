<blockquote>
<p>私の修室のみが――それは私にとって全地上よりも忠実にして親しく、地上における天国のごとくに思われる――そして沈黙のみが、私の住まいである。修室に住まい、聖なる書斎に通い、天に住まう者たらんと努める。聖なる観想と読書と著述の閑暇を、いや、むしろその務めを追い求める。私は三位一体の唯一の神に自らを委ね、その神託と霊感を受け、熟考し、祝う。キリストの足もとに座し、その唇にすがりついて命の言葉を飲み、それを後に他の人々に注ぎ出すのである。</p>
<cite>— コルネリウス・ア・ラピデ、<a href="01_Preliminares_ja.html#life">序論 — コルネリウス・ア・ラピデの生涯</a></cite>
</blockquote>
