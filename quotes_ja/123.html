<blockquote>
<p>聖パコミウスの伝記において、ある哲学者が聖パコミウスの弟子テオドルスに三つの謎を提示し、テオドルスがこれに見事に答えたと伝えられている。第一の問い――生まれずして死んだ者は誰か。テオドルスは答えた、アダムであると。第二の問い――生まれたが、まだ死んでいない者は誰か。答えた、移されたエノクであると。第三の問い――死んだが、朽ちなかった者は誰か。答えた、塩の柱と化したロトの妻であると。</p>
<cite>— コルネリウス・ア・ラピデ、<a href="01_genesis_05_ja.html#ch5-verse-24">創世記註解　第五章</a></cite>
</blockquote>
