<blockquote>
<p>この世界という偉大なる業において、三つのことを考えるべきである。すなわち、それが何であるか、いかにしてあるか、何のためにあるかである。事物の存在そのものにおいて、計り知れぬ力が讃えられる。その様態においては、比類なき知恵が輝き出る。何のために造られたかを黙想するならば、かくも有益なる仁慈、かくも仁慈なる有益さが現れ出て、いかに恩知らずの者をも恩恵の多さと偉大さで圧倒し得るほどである。まことに万物は、最も力強く無から、最も知恵深く美しく、最も慈しみ深く有益に創造されたのである。</p>
<cite>— 聖ベルナルドゥス、コルネリウス・ア・ラピデに引用、<a href="01_genesis_01_ja.html#verse-31">創世記註解　第一章</a></cite>
</blockquote>
