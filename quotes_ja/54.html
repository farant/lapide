<blockquote>
<p>かくも大いなる悪が犯されようとも、天に固定された星々は、創造主が定め置きたもうた天の軌道を逸れることがない。聖なる者たちもまた然るべきである——ただし、その心が天に据えられているならば。高きにある者、高きことを思う者は、まさにその高きことへの想いゆえに忍耐強くなるのである。地上でいかなることが犯されようと、彼らは自らの旅路を全うするまで顧みない。なぜなら、忍耐を失う者は天から落ちるからである。</p>
<cite>— 聖アウグスティヌス、コルネリウス・ア・ラピデに引用、<a href="01_genesis_01_ja.html#verse-16">創世記註解　第一章</a></cite>
</blockquote>
