<blockquote>
<p>我らは預言書と使徒書簡を、信仰の記憶のために、希望の慰めのために、愛の勧めのために読む。声を合わせて調和し、その調和によって天の喇叭のごとく、死すべき生の惰眠から自らを奮い起こし、天の召命の報いに向かって邁進するのである。</p>
<cite>— 聖アウグスティヌス、コルネリウス・ア・ラピデに引用、<a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_Pt1_ja.html#utility-iv">聖書への序文と賛辞 — 四、旧約聖書は寓意的豊かさにおいて新約聖書を凌駕する</a></cite>
</blockquote>
