<blockquote>
<p>誘惑には七つの種類がある。一つ目は執拗なる誘惑であり、厚かましく絶えず迫り来るものである。二つ目は疑惑の誘惑であり、心を疑いの霞で包み込むものである。三つ目は突然の誘惑であり、理性の判断を先取りするものである。四つ目は隠れた誘惑であり、熟慮の順序を密かに逃れるものである。五つ目は暴力的な誘惑であり、我々の力を超えるものである。六つ目は欺瞞の誘惑であり、心を惑わすものである。七つ目は入り組んだ誘惑であり、様々な道によって妨げられるものである。</p>
<cite>— 聖ベルナルドゥス、コルネリウス・ア・ラピデに引用、<a href="01_genesis_03_ja.html#verse-1">創世記註解　第三章</a></cite>
</blockquote>
