<blockquote>
<p>アレクサンドリア総主教、施しの聖ヨハネスは、自らのために墓を建てさせたが、未完成のままにしておくよう命じた。そして祝祭日ごとに、多くの人々の前で、職人たちに次のように言わせることを望んだ。「主よ、あなたの墓はまだ完成しておりません。どうかついに完成するよう命じてください。死がいつの時に来るかは定かではないのですから。」セネカは言う、「いかなる場所で死が汝を待ち受けているかは定かではない。されば汝はあらゆる場所で死を待ち構えよ。」</p>
<cite>— コルネリウス・ア・ラピデ、<a href="01_genesis_05_ja.html#ch5-verse-5">創世記註解　第五章</a></cite>
</blockquote>
