<blockquote>
<p>蚤や蚊の肢体を誰が配置したのか、それらがそれぞれの秩序を持ち、命を持ち、運動を持つように。一匹の小さき、極めて微細な生き物を考えてみよ、何でもよい。その肢体の秩序、それを動かす生命の活力を考えるならば、この生き物は自らのために死を逃れ、命を愛し、快楽を求め、苦痛を避け、さまざまな感覚を発揮し、自らにふさわしい運動に力強く活動している。蚊に血を吸う針を与えたのは誰か。なんと細い管で吸い上げることか。これらを配置したのは誰か。これらを造ったのは誰か。最も小さきもののうちに畏怖せよ、偉大なる方を讃えよ。</p>
<cite>— 聖アウグスティヌス、コルネリウス・ア・ラピデに引用、<a href="01_genesis_01_ja.html#verse-24">創世記註解　第一章</a></cite>
</blockquote>
