<blockquote>
<p>Gịnị bụ ọnụ mmadụ, ma ọ bụghị ụlọ nsọ ụfọdụ nke okwu, isi mmiri nke mkparịta ụka, ụlọ nzukọ nke okwu, ụlọ nkwakọba nke uche?</p>
<cite>— Nsọ Ambroz, n'ime Cornelius a Lapide, <a href="01_genesis_02_ig.html#verse-7">Nkọwa banyere Jenesis, Isi Nke Abụọ — "Onyenweanyị Chineke Kpụrụ Mmadụ site n'Ite Aja nke Ụwa"</a></cite>
