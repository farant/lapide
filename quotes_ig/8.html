<blockquote>
<p>N'ezie na n'ime akọnuche m, abụ m onye nzuzu karịsịa n'etiti ndị mmadụ, amamihe ndị mmadụ adịghịkwa n'ebe m nọ; abụ m nwata nta nke amaghị ịpụ ya maọbụ ịbata ya.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_ig.html#life">Ihe Mmalite — Ndụ Cornelius a Lapide</a></cite>
</blockquote>
