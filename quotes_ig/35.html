<blockquote>
<p>Ọ kaara mma ịṅụ mmiri oge niile, ka ọ bụ iri nri oge niile? N'ezie, dịka a chọrọ ha abụọ n'ụzọ mgbanwe, otu a o kwesịrị ekwesị ikpe ekpere na ịmụ Akwụkwọ Nsọ n'usoro.</p>
<cite>— Nsọ Jọdan, n'ime Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ig.html#saintly-examples">Prooemium et Encomium Sacrae Scripturae — Ihe Atụ Ndị Nsọ nke Ọmụmụ Akwụkwọ Nsọ</a></cite>
</blockquote>
