<blockquote>
<p>Ana m arịọ gị, nwanne m nke m hụrụ n'anya, ka ị biri n'etiti ihe ndị a, ka ị tụgharịa uche n'elu ha, ka ị ghara ịmata ihe ọzọ, ka ị ghara ịchọ ihe ọzọ. Ọ dịghị yiri gị dịka ebe obibi nke alaeze eluigwe dị ebe a n'ụwa?</p>
<cite>— Nsọ Hieronimọs, <a href="02_Clemens_Hieronymi_Du_Culte_ig.html#jerome-to-paulinus">Hieronimọs nye Paulinus</a></cite>
</blockquote>
