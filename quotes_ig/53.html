<blockquote>
<p>Ọ dịghị ihe ọ bụla a pụrụ itụnyere ya na alaeze eluigwe; n'ihi na ụwa niile ọ bụla, a tụlere ya n'ihe ọtụtụ ha, enweghị ike ịha ya na otu mkpụrụ obi.</p>
<cite>— Nsọ Menas, n'ime Cornelius a Lapide, <a href="01_genesis_01_ig.html#verse-16">Nkọwa banyere Jenesis, Isi nke Mbụ — "Chineke Mere Ìhè Abụọ Dị Ukwuu"</a></cite>
