<p>Nwa m, nwa m, cheta ndụ ebighị ebi, lelie anya n'eluigwe, ma hụ Onye ahụ na-achị eze ebe ahụ: n'ihi na a naghị anapụ gị ndụ, kama a na-agbanwe ya ka ọ dị mma karịa.</p>
<cite>— Nne Nsọ Simphorian, n'ime Cornelius a Lapide, <a href="01_genesis_01_ig.html#verse-16">Nkọwa banyere Jenesis, Isi nke Mbụ — "Chineke Mere Ìhè Abụọ Dị Ukwuu"</a></cite>
