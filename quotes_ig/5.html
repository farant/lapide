<blockquote>
<p>Bishọp nke Ụka a emerila anyị; ọ ka ịba ụba karịa egwu, o siri ike karịa n'ịrụ ụka, o sie ike karịa okwu ọma. A ga-enwerịrị ịnwale mmadụ ụfọdụ na-atụ egwu karịa.</p>
<cite>— Modestus, n'ime Cornelius a Lapide, <a href="01_Preliminares_ig.html#dedicatory-letter">Ihe Mmalite — Akwụkwọ Ozi Nyefeye</a></cite>
</blockquote>
