<blockquote>
<p>Ị kere anyị, Onyenweanyị, maka onwe Gị, obi anyị enwekwaghị udo ruo mgbe ọ ga-ezu ike n'ime Gị. Eluigwe na ụwa na-eti mkpu, Onyenweanyị, ka anyị hụ Gị n'anya.</p>
<cite>— Nsọ Augustin, n'ime Cornelius a Lapide, <a href="01_genesis_01_ig.html#he-created">Nkọwa banyere Jenesis, Isi nke Mbụ — "Ọ Kere"</a></cite>
</blockquote>
