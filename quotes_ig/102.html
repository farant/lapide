<blockquote>
<p>Nke a bụ ụkpụrụ Ebel: "Aja abụba ka m ga-enye; nke tara ahụ agaghị m achụ aja." N'ụzọ megidere nke a, nke Ken sịrị: "Nke tara ahụ ka m ga-achụ aja; aja abụba agaghị m enye."</p>
<cite>— Nsọ Ambroz, na Cornelius a Lapide, <a href="01_genesis_04_ig.html#ch4-verse-3">Nkọwa banyere Jenesis, Isi Nke Anọ — "Mgbe Ọtụtụ Ụbọchị Gachara"</a></cite>
</blockquote>
