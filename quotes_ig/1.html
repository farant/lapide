<blockquote>
<p>Homer kpọrọ eze onye ọzụzụ atụrụ nke ndị mmadụ, n'ihi na ọ kwesịrị ịzụ ha nri, dịka onye ọzụzụ atụrụ na-azụ atụrụ, ọ bụghị ịkpụchapụ ajị ha.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_ig.html#dedicatory-letter">Ihe Mmalite — Akwụkwọ Ozi Nyefeye</a></cite>
