<blockquote>
<p>N'ihi na olu nke onye dị ndụ nwere ike zoro ezo ụfọdụ, ma ọ bụrụ na o si n'ọnụ onye dere ya wụpụta n'ime ntị onye na-amụta ihe, ọ na-ada ụda karịa.</p>
<cite>— Nsọ Hieronimọs, <a href="02_Clemens_Hieronymi_Du_Culte_ig.html#jerome-to-paulinus">Hieronimọs nye Paulinus</a></cite>
</blockquote>
