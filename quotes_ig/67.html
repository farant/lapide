<blockquote>
<p>Ọ kụrụ ume, igosi na ọ dị mfe nye Chineke ịke mkpụrụ obi dịka o si dịrị mmadụ mfe ịkụ ume.</p>
<cite>— Teodoret, n'ime Cornelius a Lapide, <a href="01_genesis_02_ig.html#verse-7">Nkọwa banyere Jenesis, Isi Nke Abụọ — "Onyenweanyị Chineke Kpụrụ Mmadụ site n'Ite Aja nke Ụwa"</a></cite>
</blockquote>
