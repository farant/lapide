<blockquote>
<p>Osisi ndụ bụ obe Kraịst, nke e weliri n'etiti paradaịs — ya bụ, Ụka — na-enye ụwa ndụ. Ya mere Nwanyom na-achọ ịrịgo ya na-asị: "Aga m arịgo osisi nkwụ ahụ were mkpụrụ ya, nke na-atọ ụtọ na-amasị m."</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_02_ig.html#the-tree-of-life">Nkọwa banyere Jenesis, Isi Nke Abụọ — "Osisi Ndụ"</a></cite>
</blockquote>
