<blockquote>
<p>Ọ dịghị silabụl, ọ bụladị otu obere akara, n'ime Akwụkwọ Nsọ, nke ọ dịghị nnukwu akụ zoro ezo n'ime omimi ya.</p>
<cite>— Nsọ Jọn Krisọstọm, n'ime Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ig.html#chapter-iv">Prooemium et Encomium Sacrae Scripturae — Isi Nke Anọ: "Ikpe na Ihe Atụ nke Ndị Nna Ụka"</a></cite>
</blockquote>
