<blockquote>
<p>Okwu Chineke nke Akwụkwọ Nsọ bụ osimiri nke dị omimi ma dịkwa ala, nke nwatụrụ nwere ike ịga ije n'ime ya ma enyi nwekwaa ike igwu mmiri n'ime ya.</p>
<cite>— Nsọ Gregori, n'ime Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ig.html#chapter-v">Prooemium et Encomium Sacrae Scripturae — Isi Nke Ise: "Banyere Njikere A Chọrọ Maka Nnyọcha A"</a></cite>
</blockquote>
