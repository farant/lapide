<blockquote>
<p>Este es el lema de Abel: «Una ofrenda generosa daré; una mezquina no sacrificaré.» Por el contrario, el de Caín: «Sacrificaré lo mezquino; la ofrenda generosa no la daré.»</p>
<cite>— San Ambrosio, en Cornelius a Lapide, <a href="01_genesis_04_es.html#ch4-verse-3">Comentario sobre el Génesis, Capítulo IV — "Versículo 3: Post Multos Dies"</a></cite>
</blockquote>
