<blockquote>
<p>Cualquier cosa que te suceda, mientras tu alma no caiga en el movimiento de la ira, el odio, la tristeza o el temor, ni en sus causas, nada te dañará en el siglo venidero.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_es.html#chapter-xiii">Meditaciones — Capítulo XIII</a></cite>
</blockquote>
