<blockquote>
<p>La muerte, además, será un beneficio para mí: me enviará más pronto a Dios, para quien vivo y en cuyo servicio estoy ocupado, y cuya muerte en gran parte ya he muerto, y hacia quien hace tiempo que me apresuro.</p>
<cite>— San Basilio Magno, <a href="01_Preliminares_es.html#dedicatory-letter">Preliminares — Carta Dedicatoria</a></cite>
</blockquote>
