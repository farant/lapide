<blockquote>
<p>Cuando la luz divina ilumina el corazón humano, inmediatamente surgen tentaciones del diablo, de modo que se sienten más apremiados por las tentaciones que cuando no veían los rayos de la luz interior.</p>
<cite>— San Gregorio, en Cornelius a Lapide, <a href="02_exodus_05_es.html#verse-19">Comentario al Éxodo, Capítulo V — «Se vieron en aprieto»</a></cite>
</blockquote>
