<blockquote>
<p>El placer bestial procede de los sentidos de la carne; el placer diabólico, de toda soberbia, envidia y engaño; el placer filosófico, de conocer la creación; el placer angélico, de conocer y amar a Dios.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_es.html#chapter-iii">Meditaciones — Capítulo III</a></cite>
