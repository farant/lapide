<blockquote>
<p>La Iglesia es el lugar de los Ángeles, el lugar de los Arcángeles, el reino de Dios, el cielo mismo; y si no lo crees, mira esta mesa, es decir, el altar.</p>
<cite>— San Juan Crisóstomo, en Cornelius a Lapide, <a href="01_genesis_28_es.html#verse-17">Comentario sobre el Génesis, Capítulo XXVIII — «¡Cuán terrible es este lugar!»</a></cite>
</blockquote>
