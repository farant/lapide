<blockquote>
<p>Si alguien cortase todos los cabellos de tu cabeza, no te haría daño, excepto cuando tocase los que aún están adheridos al cuero cabelludo. Así, nada te hiere a menos que alguien toque aquellas cosas que han fijado sus raíces en ti por medio del deseo.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_es.html#chapter-iv">Meditaciones — Capítulo IV</a></cite>
</blockquote>
