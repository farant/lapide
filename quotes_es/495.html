<blockquote>
<p>Arme la oración a quienes salen de su morada; reciba a quienes regresan de la calle: que el cuerpo no descanse en su asiento antes de que la oración haya alimentado el alma.</p>
<cite>— San Jerónimo, en Cornelius a Lapide, <a href="02_exodus_30_es.html#verse-1">Comentario al Éxodo, Capítulo XXX — «El altar del incienso»</a></cite>
</blockquote>
