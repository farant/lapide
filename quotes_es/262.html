<blockquote>
<p>El abad Juan, visitando al anacoreta Pesio, le preguntó qué progreso había hecho en 40 años en el desierto. Él respondió: «Que el sol que ilumina todas las cosas nunca me ha visto comer, ni airado.»</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_26_es.html#verse-29-examples">Comentario sobre el Génesis, Capítulo XXVI — «Ejemplos de los pacíficos»</a></cite>
</blockquote>
