<blockquote>
<p>En el templo de Dios cada uno ofrece lo que puede: unos ofrecen oro, plata y piedras preciosas; otros ofrecen lino fino, púrpura, escarlata y jacinto; a nosotros nos va bien si ofrecemos pieles y pelo de cabra.</p>
<cite>— San Jerónimo, <a href="02_Clemens_Hieronymi_Du_Culte_es.html#helmeted-prologue">El Prólogo Galeado</a></cite>
</blockquote>
