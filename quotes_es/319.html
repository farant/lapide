<blockquote>
<p>«Aprended en Abrahán la incansable devoción de la fe; en Isaac la pureza de una mente sincera; en Jacob la paciencia en los trabajos; en José el espejo de la castidad.»</p>
<cite>— San Ambrosio, en Cornelius a Lapide, <a href="01_genesis_37_es.html#verse-2">Comentario sobre el Génesis, Capítulo XXXVII — «Versículo 2»</a></cite>
</blockquote>
