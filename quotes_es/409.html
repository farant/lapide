<blockquote>
<p>Esto es, en suma, toda la depravación humana: abandonar lo que es mejor que uno mismo, es decir, Dios; y atender a lo que es inferior a uno mismo, aferrándose a ello con deleite, es decir, las cosas temporales.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_es.html#chapter-ix">Meditaciones — Capítulo IX</a></cite>
</blockquote>
