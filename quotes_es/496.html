<blockquote>
<p>Tales deben ser aquellos a quienes se ha encomendado el cuidado de las almas, que prefieran perecer con los que les fueron confiados antes que salvarse sin ellos.</p>
<cite>— San Juan Crisóstomo, en Cornelius a Lapide, <a href="02_exodus_32_es.html#verse-11">Comentario al Éxodo, Capítulo XXXII — «Pero Moisés oró»</a></cite>
</blockquote>
