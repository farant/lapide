<blockquote>
<p>Los años, las horas y las edades pasadas no los tenemos; ni tampoco los futuros; vivimos por momentos y puntos de tiempo fugaz. Ni lo que es futuro es mío, ni lo que fue: pendo de un punto de tiempo fugaz.</p>
<cite>— Séneca, en Cornelius a Lapide, <a href="02_exodus_06_es.html#verse-20">Comentario al Éxodo, Capítulo VI — «Jocabed, su parienta»</a></cite>
</blockquote>
