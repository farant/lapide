<blockquote>
<p>Este bosque era el oratorio y retiro de Abraham, al cual se retiraba de vez en cuando de las preocupaciones y los negocios, cuando iba a tratar con Dios.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_21_es.html#verse-33">Comentario sobre el Génesis, Capítulo XXI — «Plantó un bosque»</a></cite>
</blockquote>
