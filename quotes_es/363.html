<p>¿Quieres ser alabado? Alaba a otro. ¿Quieres ser amado? Ama. ¿Quieres obtener los primeros puestos? Cédelos primero a otro.</p>
<cite>— San Juan Crisóstomo, en Cornelius a Lapide, <a href="01_genesis_45_es.html#charity-of-joseph">Comentario sobre el Génesis, Capítulo XLV — «La caridad de José»</a></cite>
