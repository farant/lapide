<blockquote>
<p>En las desgracias inesperadas, el conocimiento es más ligero que la duda: pues una vez conocido el asunto, puede encontrarse un camino hacia la salvación; la vacilación no resuelve nada.</p>
<cite>— Filón, en Cornelius a Lapide, <a href="01_genesis_42_es.html#verse-29">Comentario sobre el Génesis, Capítulo XLII — «Le contaron todas las cosas»</a></cite>
</blockquote>
