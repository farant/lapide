<blockquote>
<p>Te ruego, hermano queridísimo, que vivas entre estas cosas, que medites en ellas, que no conozcas otra cosa ni busques otra cosa. ¿No te parece que ya aquí en la tierra se halla una morada del reino celestial?</p>
<cite>— San Jerónimo, <a href="02_Clemens_Hieronymi_Du_Culte_es.html#jerome-to-paulinus">Jerónimo a Paulino</a></cite>
</blockquote>
