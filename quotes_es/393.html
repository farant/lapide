<blockquote>
<p>Que las cosas temporales no sean la causa de tu paz, pues será tan despreciable y frágil como ellas. Tal paz la compartirás con los animales irracionales; que la tuya sea con los ángeles, es decir, la paz que procede de la verdad.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_es.html#chapter-i">Meditaciones — Capítulo I</a></cite>
</blockquote>
