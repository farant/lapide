<blockquote>
<p>La batalla contra el diablo es común a mujeres y varones, y a menudo en tal combate las mujeres han luchado con más bravura que los hombres y han brillado con insignes trofeos.</p>
<cite>— San Juan Crisóstomo, en Cornelius a Lapide, <a href="02_exodus_38_es.html#verse-8">Comentario al Éxodo, Capítulo XXXVIII — «Los espejos de las mujeres»</a></cite>
</blockquote>
