<blockquote>
<p>Aquel cristiano al que Juliano el Apóstata preguntó con sarcasmo: «¿Qué está haciendo vuestro carpintero galileo?», respondió: «Está preparando un ataúd para ti.»</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_40_es.html#verse-22">Comentario sobre el Génesis, Capítulo XL — «Para que la verdad del intérprete fuese probada»</a></cite>
</blockquote>
