<blockquote>
<p>San Martín rehusó privar al presbítero Bricio, su calumniador, de su cargo, diciendo: «Si Cristo soportó a Judas, ¿por qué no he de soportar yo a Bricio?»</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_45_es.html#charity-of-joseph">Comentario sobre el Génesis, Capítulo XLV — «La caridad de José»</a></cite>
</blockquote>
