<blockquote>
<p>Pues es propio del hombre sabio separarse de los placeres de la carne, elevar el alma y retirarla del cuerpo. Porque esto es lo que significa conocerse a sí mismo como ser humano.</p>
<cite>— San Ambrosio, en Cornelius a Lapide, <a href="01_genesis_24_es.html#verse-63">Comentario sobre el Génesis, Capítulo XXIV — «Para meditar»</a></cite>
</blockquote>
