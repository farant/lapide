<blockquote>
<p>Guíame, Padre, y Tú, gobernador del alto cielo, adondequiera que te plazca: no hay demora en obedecer; aquí estoy, presto.</p>
<cite>— Cleantes, en Cornelius a Lapide, <a href="01_genesis_17_es.html#verse-23">Comentario sobre el Génesis, Capítulo XVII — «Inmediatamente en aquel mismo día»</a></cite>
</blockquote>
