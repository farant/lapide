<blockquote>
<p>Aquella servidumbre me conquistó esta soberanía, aquella venta me elevó a esta gloria; aquella aflicción fue para mí la ocasión de este honor; aquella envidia me produjo este renombre.</p>
<cite>— San Juan Crisóstomo, en Cornelius a Lapide, <a href="01_genesis_45_es.html#father-of-pharaoh">Comentario sobre el Génesis, Capítulo XLV — «Padre de Faraón»</a></cite>
