<blockquote>
<p>Así como el humo ahuyenta a las abejas, y el mal olor ahuyenta a las palomas: así el miserable y pútrido pecado repele al ángel custodio de nuestra vida.</p>
<cite>— San Basilio, en Cornelius a Lapide, <a href="02_exodus_23_es.html#verse-20">Comentario sobre el Éxodo, Capítulo XXIII — «He aquí que envío a Mi ángel»</a></cite>
</blockquote>
