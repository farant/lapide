<blockquote>
<p>Dios es para Sí mismo la suprema luz, pero para nosotros es la suprema oscuridad: así como el sol es brillante en sí mismo, pero para el ojo débil y enfermizo del búho es opaco, oscuro e invisible.</p>
<cite>— Cornelius a Lapide, <a href="02_exodus_20_es.html#verse-22">Comentario al Éxodo, Capítulo XX — «Moisés se acercó a la oscuridad»</a></cite>
</blockquote>
