<blockquote>
<p>Las riquezas son mías, vosotros pertenecéis a vuestras riquezas: pues las riquezas están al servicio del sabio, pero el necio está en poder de las riquezas.</p>
<cite>— Séneca, en Cornelius a Lapide, <a href="01_genesis_14_es.html#verse-14-23">Comentario sobre el Génesis, Capítulo XIV — «Desde un hilo hasta la correa de una sandalia»</a></cite>
</blockquote>
