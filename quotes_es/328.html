<blockquote>
<p>«Toda nobleza tuvo un inicio innoble: y los que se glorían en la nobleza de sus antepasados se glorían no en su propia virtud, sino en la ajena. Y esto, por tanto, es vanidad.»</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_38_es.html#moral-reflection">Comentario sobre el Génesis, Capítulo XXXVIII — «Reflexión moral: Sobre el origen de la nobleza»</a></cite>
</blockquote>
