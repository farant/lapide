<blockquote>
<p>Muy hermosas en formación, las estrellas avanzan en su esplendor: ¡cuán bello, pues, y cuán hermoso es su Creador; cuán hermoso es sobre todos los hijos e hijas de los hombres!</p>
<cite>— Cornelius a Lapide, <a href="01_Genesis_Synopsis_Historiae_Chronologiae_Doxologia_es.html#doxology">Sinopsis de la Historia, Cronología y Doxología del Génesis — «Doxología de Dios Creador»</a></cite>
</blockquote>
