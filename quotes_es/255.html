<blockquote>
<p>Los piadosos se retiran de las distracciones hacia los secretos interiores de la mente, y allí descansan como en el seno de la tranquilidad; estos son los tabernáculos de los piadosos.</p>
<cite>— San Gregorio, en Cornelius a Lapide, <a href="01_genesis_25_es.html#verse-27">Comentario sobre el Génesis, Capítulo XXV — «Labrador»</a></cite>
</blockquote>
