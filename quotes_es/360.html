<blockquote>
<p>Anacarsis dijo que en la vid hay tres racimos y tres copas. La primera copa se bebe por la salud; la segunda por el placer; la tercera por la embriaguez, el daño y la locura.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_43_es.html#verse-34">Comentario sobre el Génesis, Capítulo XLIII — «Versículo 34»</a></cite>
</blockquote>
