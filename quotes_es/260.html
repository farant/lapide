<blockquote>
<p>Pues esta es la verdadera mansedumbre: no cuando el ofendido por el más poderoso lo soporta con dulzura, sino cuando el ofendido incluso por los que son considerados inferiores cede.</p>
<cite>— San Juan Crisóstomo, en Cornelius a Lapide, <a href="01_genesis_26_es.html#verse-20">Comentario sobre el Génesis, Capítulo XXVI — «Es nuestra»</a></cite>
</blockquote>
