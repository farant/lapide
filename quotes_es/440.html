<p>¿Sabes, hija, quién soy yo y quién eres tú? Serás bienaventurada si lo sabes. Yo soy el que soy; tú eres la que no es.</p>
<cite>— Bta. Catalina de Siena, en Cornelius a Lapide, <a href="02_exodus_03_es.html#verse-16">Comentario al Éxodo, Capítulo III — «Visitando os he visitado»</a></cite>
