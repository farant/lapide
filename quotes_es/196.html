<blockquote>
<p>¡Oh varón, usando varonilmente de las mujeres: de su esposa con templanza, de su sierva con obediencia, de ninguna con intemperancia!</p>
<cite>— San Agustín, en Cornelius a Lapide, <a href="01_genesis_16_es.html#verse-2">Comentario sobre el Génesis, Capítulo XVI — «El Señor me ha cerrado»</a></cite>
</blockquote>
