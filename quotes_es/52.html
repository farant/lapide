<blockquote>
<p>Hijo mío, hijo mío, acuérdate de la vida eterna, mira hacia el cielo y contempla a Aquel que allí reina: pues la vida no te es arrebatada, sino mudada por otra mejor.</p>
<cite>— La madre de San Sinforiano, en Cornelius a Lapide, <a href="01_genesis_01_es.html#verse-16">Comentario sobre el Génesis, Capítulo I — «E hizo Dios dos grandes lumbreras»</a></cite>
</blockquote>
