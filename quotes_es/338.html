<blockquote>
<p>Puesto que los sueños divinos son raros, y apenas pueden distinguirse de los demoníacos o vanos, lo más seguro es despreciar absolutamente todos los sueños, a menos que Dios revele otra cosa.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_40_es.html#on-divination-from-dreams">Comentario sobre el Génesis, Capítulo XL — «Si es lícito adivinar por los sueños»</a></cite>
</blockquote>
