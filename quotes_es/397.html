<blockquote>
<p>El principio del retorno a la verdad es sentir desagrado de uno mismo en la falsedad. La corrección es precedida por el reproche. Pues nadie se preocupa de cambiar lo que no le desagrada.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_es.html#chapter-ii">Meditaciones — Capítulo II</a></cite>
</blockquote>
