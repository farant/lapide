<blockquote>
<p>La soberbia fue justamente condenada, por la cual sucedió que el hombre que daba órdenes al hombre no fuera entendido, él que no quiso entender para obedecer a Dios que daba órdenes.</p>
<cite>— San Agustín, en Cornelius a Lapide, <a href="01_genesis_11_es.html#verse-11-8">Comentario sobre el Génesis, Capítulo XI — «Y así los dividió»</a></cite>
</blockquote>
