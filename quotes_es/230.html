<blockquote>
<p>El juramento es cosa sagrada, en la cual se interpone la autoridad y veracidad divinas, que por tanto no debe aplicarse temeraria ni ligeramente, sino con ánimo confirmado y cierto de múltiples maneras.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_21_es.html#verse-31">Comentario sobre el Génesis, Capítulo XXI — «Bersabé»</a></cite>
</blockquote>
