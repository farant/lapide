<blockquote>
<p>«Pedidme otra cosa, y vuestros méritos recibirán su recompensa. Olvidaos de ese hombre: pues el Rey de Francia no venga las injurias del Duque de Orleans.»</p>
<cite>— Luis XII, en Cornelius a Lapide, <a href="01_genesis_50_es.html#verse-21">Comentario sobre el Génesis, Capítulo L — «Con dulzura y suavidad»</a></cite>
