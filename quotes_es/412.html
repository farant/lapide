<blockquote>
<p>Mira cómo Dios te punza dondequiera que te extiendes más allá de él por el deseo de las criaturas, como una nodriza que pincha el brazo de un niño que ha sido extendido fuera de la cuna, para que no perezca de frío.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_es.html#chapter-xiv">Meditaciones — Capítulo XIV</a></cite>
</blockquote>
