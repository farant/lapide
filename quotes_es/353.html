<p>«Los ojos que la culpa cierra, la pena los abre», dice San Gregorio; y como dice San Gregorio Nacianceno: «La conciencia es un tribunal doméstico y verdadero.»</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_42_es.html#verse-21">Comentario sobre el Génesis, Capítulo XLII — «Con razón sufrimos estas cosas»</a></cite>
