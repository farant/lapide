<blockquote>
<p>Melquisedec es llamado sacerdote del Dios Altísimo, no solo porque él mismo servía a Dios, sino también porque convirtió y animó a otros a la fe y al culto de Él.</p>
<cite>— San Dionisio, en Cornelius a Lapide, <a href="01_genesis_14_es.html#verse-14-18">Comentario sobre el Génesis, Capítulo XIV — «Melquisedec — pan y vino»</a></cite>
</blockquote>
