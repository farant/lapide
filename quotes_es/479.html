<blockquote>
<p>Puedo recorrer, Señor, cielo y tierra, mar y tierra firme, y en ningún lugar te encontraré sino en la cruz: allí duermes, allí alimentas, allí descansas al mediodía.</p>
<cite>— San Bernardo, en Cornelius a Lapide, <a href="02_exodus_15_es.html#verse-25">Comentario al Éxodo, Capítulo XV — «Le mostró un madero»</a></cite>
</blockquote>
