<blockquote>
<p>Dios permitió que Lot fuera capturado en Sodoma, para castigar su precipitada y sensual elección, por la cual, atraído por la fertilidad del lugar, había preferido habitar entre los impísimos sodomitas.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_14_es.html#verse-14-12">Comentario sobre el Génesis, Capítulo XIV — «Lot capturado»</a></cite>
</blockquote>
