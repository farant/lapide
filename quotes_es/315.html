<blockquote>
<p>El Amado te soportó a ti; soporta tú también al Amado. Tus pecados no lo vencieron a Él; que tampoco sus azotes te venzan a ti, y obtendrás la bendición.</p>
<cite>— San Bernardo, en Cornelius a Lapide, <a href="01_genesis_35_es.html#verse-9">Comentario sobre el Génesis, Capítulo XXXV — «Y Dios apareció de nuevo a Jacob»</a></cite>
</blockquote>
