<blockquote>
<p>«Si, pues, sois tentados, despreciados, sufrís, enfermáis, estáis tristes, difamados, mortificados, atormentados, e incluso si sois colgados o quemados, imitad a Isaac: es poco; pensad en la eternidad.»</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_22_es.html#verse-10">Comentario sobre el Génesis, Capítulo XXII — «Tomó la espada»</a></cite>
</blockquote>
