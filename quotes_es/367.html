<blockquote>
<p>El Espíritu Santo no permanece en los hombres tristes, afligidos, melancólicos, y por tanto perezosos e indolentes, sino en los animosos, alegres, vigorosos, resueltos y activos.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_45_es.html#verse-27">Comentario sobre el Génesis, Capítulo XLV — «Revivió su espíritu»</a></cite>
</blockquote>
