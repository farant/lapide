<blockquote>
<p>Cuando alguien objetó a Platón: «Tú que eres maestro, ¿eres también discípulo? ¿Y hasta cuándo aprenderás?», respondió: «Hasta que no me arrepienta de hacerme más sabio.»</p>
<cite>— Platón, en Cornelius a Lapide, <a href="02_exodus_18_es.html#verse-18">Comentario al Éxodo, Capítulo XVIII — «Te consumirás con un trabajo insensato»</a></cite>
</blockquote>
