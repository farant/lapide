<blockquote>
<p>El ayuno es la muerte del pecado, la destrucción de las ofensas, el remedio de la salvación, la raíz de la gracia, el fundamento de la castidad: por este peldaño, como por un carro, Elías ascendió.</p>
<cite>— San Ambrosio, en Cornelius a Lapide, <a href="02_exodus_34_es.html#on-fasting">Comentario sobre el Éxodo, Capítulo XXXIV — «Sobre el ayuno»</a></cite>
</blockquote>
