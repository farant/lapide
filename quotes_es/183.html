<blockquote>
<p>El que vence no debe atribuirse la victoria a sí mismo, sino atribuirla a Dios. Abraham lo enseña, a quien su triunfo hizo más humilde, no más orgulloso: pues ofreció sacrificio y dio el diezmo.</p>
<cite>— San Ambrosio, en Cornelius a Lapide, <a href="01_genesis_14_es.html#verse-14-20">Comentario sobre el Génesis, Capítulo XIV — «Le dio el diezmo»</a></cite>
</blockquote>
