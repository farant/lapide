<blockquote>
<p>El camino hacia Dios es fácil, porque se recorre aligerándose de cargas; sería difícil si se recorriera cargándose. Por tanto, aligérate hasta tal punto que, dejadas de lado todas las cosas, te niegues a ti mismo.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_es.html#chapter-ii">Meditaciones — Capítulo II</a></cite>
</blockquote>
