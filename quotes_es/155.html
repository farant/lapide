<blockquote>
<p>Dos amores hacen dos ciudades en todo el mundo: el amor de Dios hace Jerusalén, el amor del mundo hace Babilonia; examínese, pues, cada uno a sí mismo, y hallará de qué ciudad es ciudadano.</p>
<cite>— San Agustín, en Cornelius a Lapide, <a href="01_genesis_11_es.html#verse-11-9">Comentario sobre el Génesis, Capítulo XI — «Se llamó su nombre Babel»</a></cite>
</blockquote>
