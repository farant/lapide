<blockquote>
<p>Dios quiso que Abraham fuese extranjero en Canaán y estuviese continuamente en peregrinación, a fin de enseñarnos que en esta vida somos peregrinos y caminamos hacia el cielo.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_20_es.html#verse-1">Comentario sobre el Génesis, Capítulo XX — «Abraham partió de allí»</a></cite>
</blockquote>
