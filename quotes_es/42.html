<p>Nos has hecho, oh Señor, para Ti, y nuestro corazón está inquieto hasta que descanse en Ti. El cielo y la tierra claman, oh Señor, que debemos amarte.</p>
<cite>— San Agustín, en Cornelius a Lapide, <a href="01_genesis_01_es.html#he-created">Comentario sobre el Génesis, Capítulo I — «Creó»</a></cite>
