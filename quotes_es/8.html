<blockquote>
<p>Verdaderamente y en mi conciencia, soy el más necio de los hombres, y la sabiduría de los hombres no está conmigo; soy un niño pequeño que no conoce su salir ni su entrar.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_es.html#life">Preliminares — La Vida de Cornelius a Lapide</a></cite>
</blockquote>
