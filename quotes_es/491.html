<blockquote>
<p>Un hombre bueno, aunque sirva, es libre; pero un hombre malo, aunque reine, es esclavo; y no de un solo amo, sino, lo que es más grave, de tantos amos como vicios tiene.</p>
<cite>— San Agustín, en Cornelius a Lapide, <a href="02_exodus_23_es.html#verse-33">Comentario sobre el Éxodo, Capítulo XXIII — «Si sirves a sus dioses»</a></cite>
</blockquote>
