<blockquote>
<p>«José no quiso vengarse; pues sabía que el placer de la venganza es momentáneo, pero el placer de la misericordia es eterno.»</p>
<cite>— Josefo, en Cornelius a Lapide, <a href="01_genesis_50_es.html#verse-19">Comentario sobre el Génesis, Capítulo L — «José lloró»</a></cite>
</blockquote>
