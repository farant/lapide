<blockquote>
<p>Esto debe ser considerado por nosotros con temblor, que el Dios justo y omnipotente, cuando se aíra por los pecados precedentes, permite que la mente cegada caiga en otros más.</p>
<cite>— San Gregorio, en Cornelius a Lapide, <a href="01_genesis_15_es.html#verse-15-16">Comentario sobre el Génesis, Capítulo XV — «En la Cuarta Generación»</a></cite>
</blockquote>
