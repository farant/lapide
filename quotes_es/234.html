<blockquote>
<p>«Así trata Dios a menudo con nosotros: manda y exige una obra difícil, pero cuando ha visto una voluntad obediente, contento con eso, detiene la ejecución.»</p>
<cite>— San Juan Crisóstomo, en Cornelius a Lapide, <a href="01_genesis_22_es.html#verse-12">Comentario sobre el Génesis, Capítulo XXII — «No extiendas tu mano»</a></cite>
</blockquote>
