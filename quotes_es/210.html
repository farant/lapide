<blockquote>
<p>A todos los huéspedes que llegan o que parten, con la cabeza inclinada o con todo el cuerpo postrado en tierra, sea adorado Cristo en ellos, pues Él mismo es recibido en ellos.</p>
<cite>— San Benito, en Cornelius a Lapide, <a href="01_genesis_18_es.html#verse-2">Comentario sobre el Génesis, Capítulo XVIII — «Tres varones»</a></cite>
</blockquote>
