<p>Kay ang buhi nga tingog adunay usa ka tinago nga gahom, ug gibubo gikan sa baba sa tagsulat ngadto sa mga dalunggan sa tinun-an, mas kusog kini nga midahunog.</p>
<cite>— Jeronimo, <a href="02_Clemens_Hieronymi_Du_Culte_ceb.html#jerome-to-paulinus">Si Jeronimo ngadto kang Paulino</a></cite>
