<blockquote>
<p>Unsa man ang baba sa tawo, kondili usa ka balaang dapit sa sinultihan, usa ka tuboran sa pakiglantugi, usa ka hawanan sa mga pulong, usa ka tipiganan sa kabubut-on?</p>
<cite>— San Ambrosio, sa Cornelius a Lapide, <a href="01_genesis_02_ceb.html#verse-7">Komentaryo sa Genesis, Kapitulo II — "Giumol sa Ginoong Dios ang Tawo gikan sa Lapok sa Yuta"</a></cite>
</blockquote>
