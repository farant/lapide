<blockquote>
<p>Sa tropologiya, ang kahoy sa kinabuhi mao ang Bulahang Birhen, kang kinsa natawo ang Kinabuhi — ang Dios nga nahimong tawo, si Kristo Hesus.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_02_ceb.html#the-tree-of-life">Komentaryo sa Genesis, Kapitulo II — "Ang Kahoy sa Kinabuhi"</a></cite>
</blockquote>
