<blockquote>
<p>Nag-ampo ako kanimo, minahal kaayo nga igsoon, nga magpuyo ka taliwala niining mga butanga, magpamalandong niini, walay lain nga mahibaloan, walay lain nga pangitaon. Dili ba daw alang kanimo dinhi na sa yuta usa ka puloy-anan sa langitnong gingharian?</p>
<cite>— Jeronimo, <a href="02_Clemens_Hieronymi_Du_Culte_ceb.html#jerome-to-paulinus">Si Jeronimo ngadto kang Paulino</a></cite>
</blockquote>
