<blockquote>
<p>Walay bisan unsa nga ikatandi sa gingharian sa langit; kay ang tibuok kalibutan, bisan timbangon sa parehas nga timbangan, dili ikatandi sa usa ka kalag.</p>
<cite>— Menas, sa Cornelius a Lapide, <a href="01_genesis_01_ceb.html#verse-16">Komentaryo sa Genesis, Kapitulo I — "Ug gibuhat sa Dios ang duha ka dagkong kahayag"</a></cite>
</blockquote>
