<blockquote>
<p>Gitawag ni Homero ang hari nga magbalantay sa mga katawhan, tungod kay angay niyang pakan-on sila, sama sa magbalantay nga nagpakaon sa mga karnero, ug dili sila panitan.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_ceb.html#dedicatory-letter">Mga Preliminar — Sulat nga Paghalad</a></cite>
