<blockquote>
<p>Sa tinuod ug sa akong konsiyensya, ako ang labing buang sa mga tawo, ug ang kaalam sa mga tawo wala kanako; usa ako ka gamay nga bata nga wala mahibalo sa iyang paggawas o pagsulod.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_ceb.html#life">Mga Preliminar — Ang Kinabuhi ni Cornelius a Lapide</a></cite>
</blockquote>
