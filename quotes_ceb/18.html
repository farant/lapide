<p>Gikan sa yuta, wala gayoy moabot sa Dios kondili ang pag-agulo ug ang pagbakho; gikan sa langit, wala gayoy molugsong ngari kanato kondili ang kalumo ug ang pagpasaylo.</p>
<cite>— P. Lacordaire, <a href="02_Clemens_Hieronymi_Du_Culte_ceb.html#du-culte">Bahin sa Pagsimba kang Jesukristo diha sa mga Kasulatan</a></cite>
