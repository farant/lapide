<blockquote>
<p>Ang diosnong pulong sa Balaang Kasulatan usa ka suba nga patag ug lawom, diin ang karnero makalakaw ug ang elepante makalangoy.</p>
<cite>— San Gregorio, diha kang Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ceb.html#chapter-v">Pasiuna ug Pagdayeg sa Balaang Kasulatan — Kapitulo V: "Bahin sa mga Disposisyon nga Gikinahanglan alang niining Pagtuon"</a></cite>
</blockquote>
