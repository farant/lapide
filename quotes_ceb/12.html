<blockquote>
<p>Kining mga butanga sa mga bata, sama sa mga dula sa mga charlatan — ang pagtudlo sa wala nimo mahibal-i; o hinuon, sa pagsulti uban sa kasuko, ang dili pagkahibalo nga wala ka man gani mahibalo.</p>
<cite>— Jeronimo, <a href="02_Clemens_Hieronymi_Du_Culte_ceb.html#jerome-to-paulinus">Si Jeronimo ngadto kang Paulino</a></cite>
</blockquote>
