<blockquote>
<p>Walay silaba, walay bisan usa ka kudlit sa balaang mga Letra, diin sa kalawom niini walay natagong dakong bahandi.</p>
<cite>— San Crisostomo, diha kang Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ceb.html#chapter-iv">Pasiuna ug Pagdayeg sa Balaang Kasulatan — Kapitulo IV: "Ang mga Hukom ug Panig-ingnan sa mga Amahan"</a></cite>
