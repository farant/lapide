<blockquote>
<p>Ang imong trabaho mao ang pag-atiman sa timpla sa mga sabaw; kay tungod kay ang imong mga dalunggan napuno sa hugaw, dili ka makadungog sa balaang doktrina.</p>
<cite>— San Basilio nga Bantogan, in Cornelius a Lapide, <a href="01_Preliminares_ceb.html#dedicatory-letter">Mga Preliminar — Sulat nga Paghalad</a></cite>
