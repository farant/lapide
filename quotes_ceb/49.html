<blockquote>
<p>Walay tagsulat nga mas labaw kay sa Dios; walay arte nga mas epektibo kay sa Pulong sa Dios; walay hinungdan nga mas maayo kay sa ang maayo buhaton sa Maayo.</p>
<cite>— San Agustin, sa Cornelius a Lapide, <a href="01_genesis_01_ceb.html#verse-4">Komentaryo sa Genesis, Kapitulo I — "Ug nakita sa Dios ang kahayag nga maayo kini"</a></cite>
</blockquote>
