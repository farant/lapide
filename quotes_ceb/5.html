<blockquote>
<p>Napildi kita sa Obispo niining Simbahan; labaw siya sa mga hulga, mas lig-on sa mga argumento, mas kusgan sa mga malambing nga pulong. Kinahanglan sulayon ang usa ka mas talawan nga tawo.</p>
<cite>— Modestus, in Cornelius a Lapide, <a href="01_Preliminares_ceb.html#dedicatory-letter">Mga Preliminar — Sulat nga Paghalad</a></cite>
</blockquote>
