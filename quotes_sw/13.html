<blockquote>
<p>Nakuomba, ndugu yangu mpendwa, uishi katikati ya mambo haya, uyatafakari, usijue kitu kingine, usitafute kitu kingine. Je, haikuonekani kwako kuwa tayari hapa duniani ni makao ya ufalme wa mbinguni?</p>
<cite>— Jeromu, <a href="02_Clemens_Hieronymi_Du_Culte_sw.html#jerome-to-paulinus">Jeromu kwa Paulino</a></cite>
