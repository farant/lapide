<blockquote>
<p>Haya ndiyo maneno yaliyoushawishi ulimwengu wote kudharau ulimwengu na kupenda umaskini wa hiari; haya ndiyo maneno yanayojaza nyumba za watawa kwa wamonaki na majangwa kwa wanaoishi peke yao.</p>
<cite>— Bernardo, katika Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_sw.html#chapter-i">Dibaji na Sifa ya Maandiko Matakatifu — Sura ya I</a></cite>
</blockquote>
