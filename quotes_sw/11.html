<blockquote>
<p>Akili inayopenda kufundishwa inastahili sifa hata bila mwalimu. Hatuangalii ulichokipata bali unachokitafuta. Nta laini, rahisi kuumbwa, hata kama mikono ya fundi na mchongaji iko tulivu, hata hivyo kwa asili yake ni kila kitu iwezacho kuwa.</p>
<cite>— Jeromu, <a href="02_Clemens_Hieronymi_Du_Culte_sw.html#jerome-to-paulinus">Jeromu kwa Paulino</a></cite>
</blockquote>
