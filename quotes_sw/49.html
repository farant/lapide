<blockquote>
<p>Hakuna mwandishi aliye bora kuliko Mungu; hakuna sanaa yenye nguvu kuliko Neno la Mungu; hakuna sababu iliyo bora kuliko kwamba kilicho chema kiumbwe na Mwema.</p>
<cite>— Mtakatifu Agostino, katika Cornelius a Lapide, <a href="01_genesis_01_sw.html#verse-4">Ufafanuzi juu ya Mwanzo, Sura ya I — "Aya ya 4: Na Mungu akaona nuru ya kuwa ni njema"</a></cite>
</blockquote>
