<blockquote>
<p>Na tujifunze duniani mambo ambayo maarifa yake yatabaki nasi mbinguni. Jifunze kana kwamba utaishi daima; ishi kana kwamba utakufa daima.</p>
<cite>— Jeromu, katika Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_sw.html#chapter-iv">Dibaji na Sifa ya Maandiko Matakatifu — Sura ya IV</a></cite>
</blockquote>
