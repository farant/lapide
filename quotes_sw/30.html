<blockquote>
<p>Hotuba ya kimungu ya Maandiko Matakatifu ni mto wenye kina kifupi na kina kirefu, ambamo mwanakondoo anaweza kutembea na tembo anaweza kuogelea.</p>
<cite>— Gregori, katika Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_sw.html#chapter-v">Dibaji na Sifa ya Maandiko Matakatifu — Sura ya V</a></cite>
</blockquote>
