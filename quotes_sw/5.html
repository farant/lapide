<blockquote>
<p>Tumeshindwa na Askofu wa Kanisa hili; yeye ni mkuu kuliko vitisho, imara zaidi katika hoja, na hodari zaidi kuliko maneno laini. Ni lazima ajaribiwe mtu mwingine mwoga zaidi.</p>
<cite>— Modestus, katika Cornelius a Lapide, <a href="01_Preliminares_sw.html#dedicatory-letter">Mambo ya Awali — Barua ya Kutoa Wakfu</a></cite>
</blockquote>
