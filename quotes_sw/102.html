<blockquote>
<p>Hii ndiyo kauli mbiu ya Habili: "Sadaka nono nitatoa; sadaka konda sitaitoa dhabihu." Kinyume chake, ile ya Kaini: "Sadaka konda nitatoa dhabihu; sadaka nono sitaitoa."</p>
<cite>— Mtakatifu Ambrosi, katika Cornelius a Lapide, <a href="01_genesis_04_sw.html#ch4-verse-3">Ufafanuzi juu ya Mwanzo, Sura ya IV — "Aya ya 3: Baada ya siku nyingi"</a></cite>
</blockquote>
