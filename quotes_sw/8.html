<blockquote>
<p>Kwa kweli na kwa dhamiri yangu, mimi ndiye mpumbavu zaidi miongoni mwa watu, na hekima ya wanadamu haimo ndani yangu; mimi ni mtoto mdogo asiyejua kutoka kwake wala kuingia kwake.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_sw.html#life">Mambo ya Awali — Maisha ya Cornelius a Lapide</a></cite>
