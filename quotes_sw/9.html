<blockquote>
<p>Katika hekalu la Mungu kila mmoja hutoa kile awezacho: wengine hutoa dhahabu, fedha, na mawe ya thamani; wengine hutoa kitani safi na zambarau na nyekundu na samawati; yatutosha sisi kama tukitoa ngozi na manyoya ya mbuzi.</p>
<cite>— Jeromu, <a href="02_Clemens_Hieronymi_Du_Culte_sw.html#helmeted-prologue">Utangulizi Wenye Kofia ya Chuma</a></cite>
</blockquote>
