<p>Hakuna kitu kinachoweza kulinganishwa na ufalme wa mbinguni; kwa maana ulimwengu wote, ukipimwa katika mizani sawa, hauwezi kulinganishwa na roho moja.</p>
<cite>— Menas, katika Cornelius a Lapide, <a href="01_genesis_01_sw.html#verse-16">Ufafanuzi juu ya Mwanzo, Sura ya I — "Aya ya 16: Na Mungu akafanya mianga miwili mikubwa"</a></cite>
