<blockquote>
<p>Je, ni bora kunywa daima, au kula daima? Hakika, kama vile vyote viwili vinahitajika kwa zamu, ndivyo inavyofaa kuomba na kusoma Maandiko Matakatifu kwa zamu.</p>
<cite>— Yordani, katika Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_sw.html#saintly-examples">Dibaji na Sifa ya Maandiko Matakatifu — Mifano ya Watakatifu</a></cite>
</blockquote>
