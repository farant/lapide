<blockquote>
<p>Du hast uns, o Herr, auf Dich hin geschaffen, und unruhig ist unser Herz, bis es ruht in Dir. Himmel und Erde rufen, o Herr, dass wir Dich lieben sollen.</p>
<cite>— hl. Augustinus, in Cornelius a Lapide, <a href="01_genesis_01_de.html#he-created">Kommentar zur Genesis, Kapitel I — „Er erschuf”</a></cite>
</blockquote>
