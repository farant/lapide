<p>Das göttliche Wort der Heiligen Schrift ist ein Fluss, flach und tief zugleich, in dem das Lamm wandeln und der Elefant schwimmen kann.</p>
<cite>— hl. Gregor, in Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_de.html#chapter-v">Kapitel V: Über die erforderlichen Geisteshaltungen</a></cite>
