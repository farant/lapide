<blockquote>
<p>Lasst uns auf Erden lernen, was mit uns in den Himmeln fortbestehen wird. Studiere so, als würdest du ewig leben; lebe so, als würdest du stets sterben.</p>
<cite>— hl. Hieronymus, in Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_de.html#chapter-iv">Kapitel IV: Urteile und Beispiele der Kirchenväter</a></cite>
</blockquote>
