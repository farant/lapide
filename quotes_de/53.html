<blockquote>
<p>Es gibt nichts, was mit dem Himmelreich verglichen werden könnte; denn nicht einmal die ganze Welt, auf gleicher Waage gewogen, kann mit einer einzigen Seele verglichen werden.</p>
<cite>— hl. Menas, in Cornelius a Lapide, <a href="01_genesis_01_de.html#verse-16">Kommentar zur Genesis, Kapitel I — „Und Gott machte zwei große Lichter"</a></cite>
</blockquote>
