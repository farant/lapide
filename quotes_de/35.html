<blockquote>
<p>Ist es etwa besser, immer zu trinken oder immer zu essen? Gewiss, wie beides im Wechsel nötig ist, so ziemt es sich, das Beten und das Studium der Heiligen Schrift abwechselnd zu pflegen.</p>
<cite>— hl. Jordan, in Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_de.html#saintly-examples">Heilige Beispiele des Schriftstudiums</a></cite>
</blockquote>
