<blockquote>
<p>Wahrhaftig und nach meinem Gewissen bin ich der törichtste der Menschen, und die Weisheit der Menschen ist nicht bei mir; ich bin ein kleines Kind, das sein eigenes Ausgehen und Eingehen nicht kennt.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_de.html#life">Vorbemerkungen — Das Leben des Cornelius a Lapide</a></cite>
</blockquote>
