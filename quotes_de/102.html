<blockquote>
<p>Dies ist der Wahlspruch Abels: „Ein fettes Opfer will ich geben; ein mageres will ich nicht darbringen.” Im Gegenteil der des Kain: „Ich will das Magere opfern; das fette Opfer will ich nicht geben.”</p>
<cite>— hl. Ambrosius, in Cornelius a Lapide, <a href="01_genesis_04_de.html#ch4-verse-3">Kommentar zur Genesis, Kapitel IV — „Nach vielen Tagen”</a></cite>
</blockquote>
