<blockquote>
<p>Es hat nämlich die lebendige Stimme ein gewisses verborgenes Etwas, und aus dem Munde des Urhebers in die Ohren des Schülers gegossen, erklingt sie mit größerer Kraft.</p>
<cite>— Hl. Hieronymus, in Cornelius a Lapide, <a href="02_Clemens_Hieronymi_Du_Culte_de.html#jerome-to-paulinus">Die Vorrede des hl. Hieronymus, II — Hieronymus an Paulinus</a></cite>
</blockquote>
