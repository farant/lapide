<blockquote>
<p>Euer Geschäft ist es, euch um die Würze der Brühen zu kümmern; denn da eure Ohren mit Unrat verstopft sind, könnt ihr die heilige Lehre nicht vernehmen.</p>
<cite>— hl. Basilius der Große, in Cornelius a Lapide, <a href="01_Preliminares_de.html#dedicatory-letter">Vorbemerkungen — Widmungsbrief</a></cite>
</blockquote>
