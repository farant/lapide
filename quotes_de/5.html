<blockquote>
<p>Wir sind vom Bischof dieser Kirche besiegt worden; er ist erhaben über Drohungen, standhafter im Streitgespräch, stärker als Schmeichelworte. Man muß es mit einem furchtsamen Manne versuchen.</p>
<cite>— Modestus, in Cornelius a Lapide, <a href="01_Preliminares_de.html#dedicatory-letter">Vorbemerkungen — Widmungsbrief</a></cite>
</blockquote>
