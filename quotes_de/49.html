<p>Kein Urheber ist vortrefflicher als Gott; keine Kunst wirksamer als das Wort Gottes; keine Ursache besser, als daß Gutes vom Guten geschaffen werde.</p>
<cite>— hl. Augustinus, in Cornelius a Lapide, <a href="01_genesis_01_de.html#verse-4">Kommentar zur Genesis, Kapitel I — „Und Gott sah, daß das Licht gut war"</a></cite>
