<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Search — Cornelius a Lapide</title>
<link rel="stylesheet" href="style.css" />
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="canonical" href="https://lapide.org/search.html">
<meta name="description" content="Search Cornelius a Lapide's English biblical commentary.">
<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
<style>
  /* Pagefind's UI ships no dark theme; match the site's dark palette (style.css).
     Must load AFTER pagefind-ui.css so this :root override wins on source order. */
  @media (prefers-color-scheme: dark) {
    :root {
      --pagefind-ui-primary: #8ab4f8;
      --pagefind-ui-text: #e0e0e0;
      --pagefind-ui-background: #1e1e1e;
      --pagefind-ui-border: #333333;
      --pagefind-ui-tag: #333333;
    }
  }
</style>
</head>
<body>
<h1>Search the Commentary</h1>
<p><a href="index.html">← Back to index</a></p>
<div id="search"></div>
<script src="/pagefind/pagefind-ui.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    new PagefindUI({ element: "#search", showSubResults: true, highlightParam: "highlight" });
  });
</script>
</body>
</html>
