<blockquote>
<p>เมื่อพระเจ้าทรงมอบลมปราณและวิญญาณของพระองค์แก่มนุษย์ พระองค์ทรงมอบพระองค์เอง ประหนึ่งว่าพระองค์ได้วางดวงพระหฤทัยของพระองค์ไว้ในตัวเขา</p>
<cite>— คอร์เนลิอุส อา ลาปีเด, <a href="01_genesis_02_th.html#verse-7">อรรถาธิบายปฐมกาล บทที่ ๒ — "และพระเจ้าทรงปั้นมนุษย์จากดินของแผ่นดิน"</a></cite>
</blockquote>
