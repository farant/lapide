<blockquote>
<p>คริสตชนสวดภาวนาโดยหันหน้าไปทางทิศตะวันออก เพื่อระลึกถึงสวนอุทยาน ซึ่งพวกเขาถูกขับไล่ออกมาเพราะบาป</p>
<cite>— นักบุญยอห์น คริซอสตอม, เทโอโดเรตุส, และดามัสเซนุส, in คอร์เนลิอุส อา ลาปีเด, <a href="01_genesis_02_th.html#verse-8">อรรถาธิบายปฐมกาล บทที่ ๒ — "และพระเจ้าทรงปลูกสวนอุทยานแห่งความสุข"</a></cite>
</blockquote>
