<blockquote>
<p>ไม่มีผู้สร้างใดประเสริฐกว่าพระเจ้า ไม่มีศิลปะใดทรงพลังกว่าพระวจนะของพระเจ้า ไม่มีเหตุใดดีกว่าการที่ความดีถูกสร้างขึ้นโดยพระผู้ทรงความดี</p>
<cite>— นักบุญออกัสติน, in คอร์เนลิอุส อา ลาปีเด, <a href="01_genesis_01_th.html#verse-4">อรรถาธิบายปฐมกาล บทที่ 1 — "ข้อ 4: พระเจ้าทรงเห็นว่าความสว่างนั้นดี"</a></cite>
</blockquote>
