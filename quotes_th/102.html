<blockquote>
<p>นี่คือคำขวัญของอาแบล "ข้าพเจ้าจะถวายเครื่องบูชาอันอ้วนพี จะไม่ถวายสิ่งที่ผอมแห้ง" ในทางตรงกันข้าม คำขวัญของกาอินคือ "ข้าพเจ้าจะถวายสิ่งที่ผอมแห้ง จะไม่ถวายเครื่องบูชาอันอ้วนพี"</p>
<cite>— นักบุญแอมโบรส, ใน คอร์เนลิอุส อา ลาปีเด, <a href="01_genesis_04_th.html#ch4-verse-3">อรรถาธิบายปฐมกาล บทที่ 4 — "ข้อ 3: หลังจากผ่านไปหลายวัน"</a></cite>
</blockquote>
