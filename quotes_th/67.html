<blockquote>
<p>พระองค์ทรงเป่าลมปราณ เพื่อแสดงให้เห็นว่าการสร้างวิญญาณนั้นง่ายสำหรับพระเจ้า เฉกเช่นการเป่าลมนั้นง่ายสำหรับมนุษย์</p>
<cite>— เทโอโดเรตุส, in คอร์เนลิอุส อา ลาปีเด, <a href="01_genesis_02_th.html#verse-7">อรรถาธิบายปฐมกาล บทที่ ๒ — "และพระเจ้าทรงปั้นมนุษย์จากดินของแผ่นดิน"</a></cite>
</blockquote>
