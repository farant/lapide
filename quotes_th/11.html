<blockquote>
<p>จิตใจที่พร้อมเรียนรู้นั้นน่าสรรเสริญแม้ปราศจากครู เรามิได้พิจารณาสิ่งที่ท่านค้นพบ แต่พิจารณาสิ่งที่ท่านแสวงหา ขี้ผึ้งที่อ่อนนุ่ม ง่ายแก่การปั้นแต่ง แม้มือของช่างฝีมือและประติมากรจะหยุดนิ่ง ก็ยังเป็นสิ่งที่มันสามารถเป็นได้ทั้งหมดโดยคุณสมบัติของมันเอง</p>
<cite>— นักบุญเจอโรม, <a href="02_Clemens_Hieronymi_Du_Culte_th.html#jerome-to-paulinus">จดหมายของนักบุญเจอโรมถึงเปาลีนุส</a></cite>
</blockquote>
