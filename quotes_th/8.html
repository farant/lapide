<blockquote>
<p>โดยแท้จริงและตามมโนธรรมของข้าพเจ้า ข้าพเจ้าเป็นคนโง่เขลาที่สุดในบรรดามนุษย์ทั้งหลาย และปัญญาของมนุษย์มิได้อยู่กับข้าพเจ้า ข้าพเจ้าเป็นเพียงเด็กน้อยที่ไม่รู้จักแม้กระทั่งการออกและการเข้าของตนเอง</p>
<cite>— คอร์เนลิอุส อา ลาปีเด, <a href="01_Preliminares_th.html#life">เอกสารเบื้องต้น — ชีวประวัติของคอร์เนลิอุส อา ลาปีเด</a></cite>
</blockquote>
