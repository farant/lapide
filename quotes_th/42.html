<blockquote>
<p>ข้าแต่พระเจ้า พระองค์ทรงสร้างข้าพเจ้าทั้งหลายมาเพื่อพระองค์ และจิตใจของข้าพเจ้าทั้งหลายก็กระวนกระวายอยู่จนกว่าจะได้พักสงบในพระองค์ สวรรค์และแผ่นดินร้องประกาศ ข้าแต่พระเจ้า ว่าข้าพเจ้าทั้งหลายควรรักพระองค์</p>
<cite>— นักบุญออกัสติน, in คอร์เนลิอุส อา ลาปีเด, <a href="01_genesis_01_th.html#he-created">อรรถาธิบายปฐมกาล บทที่ 1 — "พระองค์ทรงสร้าง"</a></cite>
</blockquote>
