<blockquote>
<p>ในพระวิหารของพระเจ้า แต่ละคนถวายสิ่งที่ตนสามารถ บ้างถวายทองคำ เงิน และอัญมณี บ้างถวายผ้าป่านเนื้อดี สีม่วง สีแดง และสีฟ้าอมม่วง สำหรับเรานั้น นับว่าดีแล้วหากเราจะถวายได้เพียงหนังสัตว์และขนแพะ</p>
<cite>— นักบุญเจอโรม, <a href="02_Clemens_Hieronymi_Du_Culte_th.html#helmeted-prologue">อารัมภบทสวมเกราะ</a></cite>
</blockquote>
