<blockquote>
<p>พระวาจาอันศักดิ์สิทธิ์ของพระคัมภีร์เป็นดั่งแม่น้ำที่ทั้งตื้นและลึก ซึ่งลูกแกะอาจเดินลุยได้ และช้างอาจว่ายน้ำได้</p>
<cite>— นักบุญเกรกอรี, in คอร์เนลิอุส อา ลาปีเด, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_th.html#chapter-v">Prooemium et Encomium Sacrae Scripturae — บทที่ 5: "ว่าด้วยคุณสมบัติที่จำเป็นสำหรับการศึกษานี้"</a></cite>
</blockquote>
