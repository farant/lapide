<blockquote>
<p>ไม่มีสิ่งใดจะเทียบได้กับอาณาจักรสวรรค์ เพราะแม้โลกทั้งใบเมื่อชั่งในตาชั่งที่เท่าเทียมกัน ก็ไม่อาจเทียบได้กับวิญญาณดวงเดียว</p>
<cite>— นักบุญเมนัส, in คอร์เนลิอุส อา ลาปีเด, <a href="01_genesis_01_th.html#verse-16">อรรถาธิบายปฐมกาล บทที่ 1 — "ข้อ 16: พระเจ้าทรงสร้างดวงสว่างใหญ่สองดวง"</a></cite>
</blockquote>
