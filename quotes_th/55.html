<blockquote>
<p>เพียงแค่ส่องสว่างอย่างเดียวนั้นไร้ประโยชน์ เพียงแค่ลุกไหม้อย่างเดียวนั้นยังน้อยไป ทั้งลุกไหม้และส่องสว่างนั้นจึงสมบูรณ์แบบ</p>
<cite>— นักบุญเบอร์นาร์ด, in คอร์เนลิอุส อา ลาปีเด, <a href="01_genesis_01_th.html#verse-16">อรรถาธิบายปฐมกาล บทที่ 1 — "ข้อ 16: พระเจ้าทรงสร้างดวงสว่างใหญ่สองดวง"</a></cite>
</blockquote>
