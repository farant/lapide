<blockquote>
<p>จงเรียนรู้สิ่งต่างๆ บนแผ่นดินโลกที่ความรู้นั้นจะคงอยู่กับเราในสวรรค์ จงศึกษาประหนึ่งว่าท่านจะมีชีวิตอยู่ตลอดไป จงดำเนินชีวิตประหนึ่งว่าท่านจะตายอยู่เสมอ</p>
<cite>— นักบุญเจอโรม, in คอร์เนลิอุส อา ลาปีเด, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_th.html#chapter-iv">Prooemium et Encomium Sacrae Scripturae — บทที่ 4: "คำวินิจฉัยและแบบอย่างของบรรดาปิตาจารย์"</a></cite>
</blockquote>
