<blockquote>
<p>แล้วปากของมนุษย์คืออะไรเล่า ถ้ามิใช่สถานศักดิ์สิทธิ์แห่งวาจา ธารแห่งวาทศิลป์ ท้องพระโรงแห่งถ้อยคำ คลังแห่งเจตจำนง?</p>
<cite>— นักบุญแอมโบรส, in คอร์เนลิอุส อา ลาปีเด, <a href="01_genesis_02_th.html#verse-7">อรรถาธิบายปฐมกาล บทที่ ๒ — "และพระเจ้าทรงปั้นมนุษย์จากดินของแผ่นดิน"</a></cite>
</blockquote>
