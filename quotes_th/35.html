<blockquote>
<p>ดื่มอยู่เสมอกับกินอยู่เสมอ อย่างไหนดีกว่ากัน? แน่นอนว่าทั้งสองอย่างจำเป็นต้องสลับกัน ฉันใดก็ฉันนั้น การภาวนาและการศึกษาพระคัมภีร์ก็สมควรสลับกันไป</p>
<cite>— นักบุญจอร์แดน, in คอร์เนลิอุส อา ลาปีเด, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_th.html#saintly-examples">Prooemium et Encomium Sacrae Scripturae — "แบบอย่างของนักบุญในการศึกษาพระคัมภีร์"</a></cite>
</blockquote>
