<blockquote>
<p>มนุษย์ที่ไม่มีประวัติศาสตร์ ย่อมอยู่ในหลุมฝังศพของตนอย่างสมบูรณ์ ชนชาติที่ยังไม่ได้บอกเล่าประวัติศาสตร์ของตนเอง ก็ยังไม่ถือกำเนิด</p>
<cite>— คุณพ่อลากอร์แดร์, <a href="02_Clemens_Hieronymi_Du_Culte_th.html#du-culte">ว่าด้วยการนมัสการพระเยซูคริสต์ในพระคัมภีร์</a></cite>
</blockquote>
