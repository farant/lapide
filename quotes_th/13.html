<blockquote>
<p>ข้าพเจ้าวิงวอนท่าน พี่น้องที่รักยิ่ง จงดำเนินชีวิตท่ามกลางสิ่งเหล่านี้ จงภาวนาใคร่ครวญในสิ่งเหล่านี้ จงไม่รู้จักสิ่งอื่นใด จงไม่แสวงหาสิ่งอื่นใด ท่านไม่เห็นหรือว่านี่คือที่ประทับของอาณาจักรสวรรค์บนแผ่นดินนี้แล้ว</p>
<cite>— นักบุญเจอโรม, <a href="02_Clemens_Hieronymi_Du_Culte_th.html#jerome-to-paulinus">จดหมายของนักบุญเจอโรมถึงเปาลีนุส</a></cite>
</blockquote>
