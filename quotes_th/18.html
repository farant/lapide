<blockquote>
<p>จากแผ่นดิน ไม่มีสิ่งใดขึ้นไปถึงพระเจ้านอกจากเสียงคร่ำครวญและเสียงร่ำไห้ จากสวรรค์ ไม่มีสิ่งใดลงมาสู่เรานอกจากความอ่อนโยนและการอภัย</p>
<cite>— คุณพ่อลากอร์แดร์, <a href="02_Clemens_Hieronymi_Du_Culte_th.html#du-culte">ว่าด้วยการนมัสการพระเยซูคริสต์ในพระคัมภีร์</a></cite>
</blockquote>
