<blockquote>
<p>ในบรรดากิจการทั้งปวงที่แสวงหาผลประโยชน์ ไม่มีสิ่งใดดีกว่าเกษตรกรรม ไม่มีสิ่งใดอุดมสมบูรณ์กว่า ไม่มีสิ่งใดหอมหวานกว่า ไม่มีสิ่งใดคู่ควรกับอิสรชนยิ่งกว่า</p>
<cite>— ซิเซโร, in คอร์เนลิอุส อา ลาปีเด, <a href="01_genesis_02_th.html#verse-15">อรรถาธิบายปฐมกาล บทที่ ๒ — "พระเจ้าจึงทรงนำมนุษย์ไปไว้ในสวนอุทยาน"</a></cite>
</blockquote>
