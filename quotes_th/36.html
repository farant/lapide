<blockquote>
<p>ลิ้นและมือของบรรดาผู้เขียนพระคัมภีร์มิใช่สิ่งอื่นใดนอกจากปากกาของพระจิตเจ้าองค์เดียวกัน จนกระทั่งดูเหมือนว่าท่านเหล่านั้นมิใช่ผู้เขียนหลายคน แต่เป็นปากกาหลายด้ามของผู้เขียนองค์เดียว</p>
<cite>— คอร์เนลิอุส อา ลาปีเด, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_th.html#sacred-writers-as-pens">Prooemium et Encomium Sacrae Scripturae — "ผู้เขียนพระคัมภีร์ในฐานะปากกาของพระจิตเจ้า"</a></cite>
</blockquote>
