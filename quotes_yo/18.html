<blockquote>
<p>Láti orí ilẹ̀, ohun tí ó ń dé ọ̀dọ̀ Ọlọ́run ni ìkerora àti ẹ̀dùn nìkan; láti ọ̀run, ohun tí ó ń sọ̀kalẹ̀ sí ọ̀dọ̀ wa ni ìfẹ́ inú rere àti ìdáríjì nìkan.</p>
<cite>— Bàbá Lacordaire, nínú Corneliu a Lapide, <a href="02_Clemens_Hieronymi_Du_Culte_yo.html#du-culte">Ìjọ́sìn Jesu Kristi nínú Ìwé Mímọ́</a></cite>
</blockquote>
