<blockquote>
<p>Lóòótọ́ àti nínú ẹ̀rí-ọkàn mi, èmi ni aṣiwèrè jù lọ nínú àwọn ènìyàn, ọgbọ́n ènìyàn kò sì sí lọ́dọ̀ mi; ọmọdé kékeré ni mí tí kò mọ ìwọlé àti ìjáde rẹ̀.</p>
<cite>— Corneliu a Lapide, <a href="01_Preliminares_yo.html#life">Àwọn Ọ̀rọ̀ Ìṣáájú — Ìgbésí Ayé Corneliu a Lapide</a></cite>
