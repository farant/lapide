<blockquote>
<p>Ó sẹ́, ní àkọ́kọ́, bí ẹni pé níwájú ẹni tí kò mọ̀; ó kọ ojúṣe ìtọ́jú arákùnrin, bí ẹni tí ẹ̀dá ti yọ̀ọ́ kúrò; ó kọ adájọ́, bí ẹni tí ìfẹ́-inú ọ̀fẹ́ wà. Kí ló mú ọ yà pé kò mọ ìṣàánú, ẹni tí kò mọ Ẹlẹ́dàá rẹ̀?</p>
<cite>— Ambrosu Mímọ́, nínú Cornelius a Lapide, <a href="01_genesis_04_yo.html#ch4-verse-9">Àlàyé Lórí Gẹnẹsisi, Orí Kẹrin — "Èmi Kò Mọ̀"</a></cite>
</blockquote>
