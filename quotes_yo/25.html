<blockquote>
<p>Ẹ jẹ́ kí a kọ́ lórí ilẹ̀ àwọn ohun tí ìmọ̀ wọn yóò bá wa dúró ní ọ̀run. Ṣe ìkẹ́kọ̀ọ́ bí ẹni pé ìwọ yóò wà láàyè títí láé; ṣe ìgbé ayé bí ẹni pé ìwọ yóò kú nígbàkúùgbà.</p>
<cite>— Hieronimu Mímọ́, nínú Corneliu a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_yo.html#chapter-iv">Ọ̀rọ̀ Ìṣáájú àti Ìyìn Ìwé Mímọ́ — Orí Kẹrin: Àwọn Ìdájọ́ àti Àpẹẹrẹ Àwọn Bàbá Ìjọ</a></cite>
</blockquote>
