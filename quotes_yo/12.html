<blockquote>
<p>Àwọn nǹkan wọ̀nyí jẹ́ ti ọmọdékùnrin, tí ó jọ eré àwọn aláṣèjù, láti máa kọ́ni ohun tí ẹni kò mọ̀; ju bẹ́ẹ̀ lọ, láti sọ̀rọ̀ pẹ̀lú ìbínú, kódà ni láti mọ̀ pé ẹni kò mọ̀.</p>
<cite>— Hieronimu Mímọ́, nínú Corneliu a Lapide, <a href="02_Clemens_Hieronymi_Du_Culte_yo.html#jerome-to-paulinus">Hieronimu sí Paulinọ̀sì</a></cite>
</blockquote>
