<blockquote>
<p>Kò sí olùdá tí ó ga ju Ọlọ́run lọ; kò sí ọgbọ́n tí ó lágbára ju ọ̀rọ̀ Ọlọ́run lọ; kò sì sí ìdí tí ó dára ju kí ohun rere jẹ́ ẹ̀dá Ẹni Rere lọ.</p>
<cite>— Augustini Mímọ́, nínú Corneliu a Lapide, <a href="01_genesis_01_yo.html#verse-4">Àlàyé lórí Gẹnẹsisi, Orí I — Ẹsẹ 4</a></cite>
</blockquote>
