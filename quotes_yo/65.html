<blockquote>
<p>Kí ni ẹnu ènìyàn, bí kò ṣe ibi mímọ́ ọ̀rọ̀ sísọ kan, orísun ìjíròrò, gbọ̀ngàn àwọn ọ̀rọ̀, ilé-ìṣúra ìfẹ́-inú?</p>
<cite>— Ambrosu Mímọ́, nínú Corneliu a Lapide, <a href="01_genesis_02_yo.html#verse-7">Àlàyé lórí Gẹnẹsisi, Orí II — "Olúwa Ọlọ́run Sì Mọ Ènìyàn Láti Inú Amọ̀ Ilẹ̀"</a></cite>
</blockquote>
