<blockquote>
<p>Homeru pe ọba ní olùṣọ́ àwọn ènìyàn, nítorí pé ó gbọ́dọ̀, bí olùṣọ́ àgùntàn pẹ̀lú àwọn àgùntàn rẹ̀, kì í ṣe láti gún irun wọn, ṣùgbọ́n láti bọ́ wọn.</p>
<cite>— Corneliu a Lapide, <a href="01_Preliminares_yo.html#dedicatory-letter">Àwọn Ọ̀rọ̀ Ìṣáájú — Lẹ́tà Ìfọ̀rọ̀wérọ̀</a></cite>
</blockquote>
