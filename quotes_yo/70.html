<blockquote>
<p>Àwọn Kristẹni máa ń gbàdúrà tí wọ́n yí padà sí Ìlà-Oòrùn, kí wọ́n lè rántí párádísè, ibi tí a ti lé wọn kúrò nípasẹ̀ ẹṣẹ̀.</p>
<cite>— Krisostomu Mímọ́, Teodorẹ́tọ̀si, àti Damasẹ́nọ̀si, nínú Corneliu a Lapide, <a href="01_genesis_02_yo.html#verse-8">Àlàyé lórí Gẹnẹsisi, Orí II — "Olúwa Ọlọ́run Sì Gbìn Ọgbà Ìgbádùn"</a></cite>
</blockquote>
