<blockquote>
<p>Kò sí sílábù kan, kò sì sí àmì kékeré kan nínú Ìwé Mímọ́ tí ìṣúra ńlá kan kò fi pamọ́ sínú ìjìnlẹ̀ rẹ̀.</p>
<cite>— Krisostomu Mímọ́, nínú Corneliu a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_yo.html#chapter-iv">Ọ̀rọ̀ Ìṣáájú àti Ìyìn Ìwé Mímọ́ — Orí Kẹrin: Àwọn Ìdájọ́ àti Àpẹẹrẹ Àwọn Bàbá Ìjọ</a></cite>
</blockquote>
