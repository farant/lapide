<blockquote>
<p>Èyí ni ọ̀rọ̀ àmì Abeli: "Ẹbọ ọlọ́ràá ni èmi yóò rú; èyí tí kò sanra ni èmi kì yóò fi rúbọ." Ní ìlòdì sí èyí, ti Kaini: "Èyí tí kò sanra ni èmi yóò fi rúbọ; ẹbọ ọlọ́ràá ni èmi kì yóò rú."</p>
<cite>— Ambrosu Mímọ́, nínú Cornelius a Lapide, <a href="01_genesis_04_yo.html#ch4-verse-3">Àlàyé Lórí Gẹnẹsisi, Orí Kẹrin — "Lẹ́yìn Ọ̀pọ̀lọpọ̀ Ọjọ́"</a></cite>
</blockquote>
