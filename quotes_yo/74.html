<blockquote>
<p>Igi ìyè ni àgbélébù Kristi, èyí tí a gbé ga ní àárín párádísè — ìyẹn ni Ìjọ — tí ó ń fún ayé ní ìyè. Nítorí náà Ìyàwó náà, tí ó fẹ́ gun ún, sọ pé: "Èmi yóò gun igi ọ̀pẹ náà, èmi yóò sì mú èso rẹ̀ tí ó dùn sí ẹnu mi."</p>
<cite>— Corneliu a Lapide, <a href="01_genesis_02_yo.html#the-tree-of-life">Àlàyé lórí Gẹnẹsisi, Orí II — "Igi Ìyè"</a></cite>
</blockquote>
