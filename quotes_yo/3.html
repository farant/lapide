<blockquote>
<p>Ẹni tí kò ní nǹkan kan kò wà lábẹ́ ìgbàmúlẹ̀ ohun ìní rẹ̀: àfi bí o bá nílò àwọn aṣọ dígí wọ̀nyí tí wọ́n yà tí wọ́n sì jó, àti àwọn ìwé díẹ̀ wọ̀nyí, nínú èyí tí gbogbo ọrọ̀ mi àti ohun ìní mi wà.</p>
<cite>— Basili Ńlá Mímọ́, nínú Corneliu a Lapide, <a href="01_Preliminares_yo.html#dedicatory-letter">Àwọn Ọ̀rọ̀ Ìṣáájú — Lẹ́tà Ìfọ̀rọ̀wérọ̀</a></cite>
</blockquote>
