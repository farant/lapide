<blockquote>
<p>Nínú tẹ́mpílì Ọlọ́run, olúkúlùkù ń rúbọ ohun tí ó lè rú: àwọn kan ń rú wúrà, fàdákà, àti òkúta iyebíye; àwọn mìíràn ń rú aṣọ ọ̀gbọ̀, aṣọ àlùkò, aṣọ pupa àti aṣọ hyasíntì. Fún àwa, ó dára fún wa bí a bá lè rú awọ àti irun ewúrẹ́.</p>
<cite>— Hieronimu Mímọ́, nínú Corneliu a Lapide, <a href="02_Clemens_Hieronymi_Du_Culte_yo.html#helmeted-prologue">Ọ̀rọ̀ Ìṣáájú Oníbòrí-Ogun</a></cite>
</blockquote>
