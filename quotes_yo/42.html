<blockquote>
<p>Ìwọ ni ó dá wa, Olúwa, fún ara Rẹ, ọkàn wa sì kò ní ìsinmi títí ó fi sinmi nínú Rẹ. Ọ̀run àti ayé ń kígbe, Olúwa, kí a lè fẹ́ Ọ.</p>
<cite>— Augustini Mímọ́, nínú Corneliu a Lapide, <a href="01_genesis_01_yo.html#he-created">Àlàyé lórí Gẹnẹsisi, Orí I — "Ó Dá"</a></cite>
