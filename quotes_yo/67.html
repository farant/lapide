<blockquote>
<p>Ó fẹ́, láti fi hàn pé ó rọrùn fún Ọlọ́run láti dá ọkàn bí ó ti rọrùn fún ènìyàn láti fẹ́.</p>
<cite>— Teodorẹ́tọ̀si, nínú Corneliu a Lapide, <a href="01_genesis_02_yo.html#verse-7">Àlàyé lórí Gẹnẹsisi, Orí II — "Olúwa Ọlọ́run Sì Mọ Ènìyàn Láti Inú Amọ̀ Ilẹ̀"</a></cite>
</blockquote>
