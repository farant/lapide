<blockquote>
<p>Nítorí pé ohùn alààyè ní ohun ìpamọ́ kan tí a kò mọ̀, àti pé, nígbà tí a bá gbé e láti ẹnu olùkọ́ sí etí akẹ́kọ̀ọ́, ó máa ń dún lágbára jù lọ.</p>
<cite>— Hieronimu Mímọ́, nínú Corneliu a Lapide, <a href="02_Clemens_Hieronymi_Du_Culte_yo.html#jerome-to-paulinus">Hieronimu sí Paulinọ̀sì</a></cite>
