<blockquote>
<p>"Fún ọ̀run ni a bí wa, fún ọ̀run ni a dá wa: èyí ni òpin wa, èyí ni àfojúsùn wa. Bí a bá yapa kúrò nínú èyí, lásán ni àwa jẹ́ ènìyàn, lásán ni a wo ọ̀run àti oòrùn; ó ìbá sàn jù kí a ti jẹ́ ẹranko tàbí òkúta."</p>
<cite>— Corneliu a Lapide, <a href="01_genesis_01_yo.html#verse-26">Àlàyé lórí Gẹnẹsisi, Orí I — Ẹsẹ 26</a></cite>
</blockquote>
