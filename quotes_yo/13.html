<blockquote>
<p>Mo bẹ̀ ọ́, arákùnrin ọ̀wọ́n mi jù lọ, gbé láàárín àwọn nǹkan wọ̀nyí, ṣe àṣàrò wọn, má mọ ohunkóhun mìíràn, má wá ohunkóhun mìíràn. Ṣé kò dà bí ẹni pé ibùgbé ìjọba ọ̀run ti wà níhìn-ín lórí ayé yìí?</p>
<cite>— Hieronimu Mímọ́, nínú Corneliu a Lapide, <a href="02_Clemens_Hieronymi_Du_Culte_yo.html#jerome-to-paulinus">Hieronimu sí Paulinọ̀sì</a></cite>
</blockquote>
