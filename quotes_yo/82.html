<blockquote>
<p>Nínú gbogbo ohun tí a ti lè wá èrè nínú rẹ̀, kò sí ohun tí ó dára ju iṣẹ́ àgbẹ̀ lọ, kò sí ohun tí ó lẹ́sọ̀ sí i, kò sí ohun tí ó dùn mọ́ni sí i, kò sí ohun tí ó yẹ ẹni ọ̀fẹ́ sí i.</p>
<cite>— Sisero, nínú Corneliu a Lapide, <a href="01_genesis_02_yo.html#verse-15">Àlàyé lórí Gẹnẹsisi, Orí II — "Olúwa Ọlọ́run Sì Mú Ènìyàn, Ó Sì Fi Í Sínú Párádísè"</a></cite>
</blockquote>
