<blockquote>
<p>Nígbà tí Ọlọ́run fi ẹ̀mí àti ọkàn Rẹ̀ fún ènìyàn, Ara Rẹ̀ ni Ó fi fún un, bí ẹni pé Ó fi ọkàn Rẹ̀ tìkára Rẹ̀ sínú rẹ̀.</p>
<cite>— Corneliu a Lapide, <a href="01_genesis_02_yo.html#verse-7">Àlàyé lórí Gẹnẹsisi, Orí II — "Olúwa Ọlọ́run Sì Mọ Ènìyàn Láti Inú Amọ̀ Ilẹ̀"</a></cite>
</blockquote>
