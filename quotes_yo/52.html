<blockquote>
<p>"Ọmọ mi, ọmọ mi, rántí ìyè àìnípẹ̀kun, wo ọ̀run sókè, kí o sì wo Ẹni tí ń ṣe olú ọba níbẹ̀: nítorí a kò gbà ìyè rẹ lọ́wọ́ rẹ, ṣùgbọ́n a yí i padà sí ohun tí ó dára jù."</p>
<cite>— Ìyá Simforiani Mímọ́, nínú Corneliu a Lapide, <a href="01_genesis_01_yo.html#verse-16">Àlàyé lórí Gẹnẹsisi, Orí I — Ẹsẹ 16</a></cite>
</blockquote>
