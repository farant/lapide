<blockquote>
<p>புனித நூலின் தெய்வீக வாக்கு ஆழமற்றதும் ஆழமானதுமான ஓர் ஆறு; அதில் ஆட்டுக்குட்டி நடக்கவும், யானை நீந்தவும் முடியும்.</p>
<cite>— புனித கிரகோரியுஸ், கொர்னேலியுஸ் அ லாப்பிதே எழுதிய <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ta.html#chapter-v">புனித நூலின் முன்னுரையும் புகழுரையும் — அத்தியாயம் V: "இவ்வாய்வுக்குத் தேவையான மனநிலைகள் பற்றி"</a> நூலில்</cite>
</blockquote>
