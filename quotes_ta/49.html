<blockquote>
<p>கடவுளை விட மேலான படைப்பாளர் இல்லை; கடவுளின் வார்த்தையை விட வல்லமையான கலை இல்லை; நன்மையானவரால் நன்மை படைக்கப்படுவதை விடச் சிறந்த காரணம் இல்லை.</p>
<cite>— புனித அகுஸ்தீனுஸ், கொர்னேலியுஸ் அ லாப்பிதே எழுதிய <a href="01_genesis_01_ta.html#verse-4">தொடக்க நூல் விளக்கவுரை, அதிகாரம் I — "ஒளி நல்லது என்று கடவுள் கண்டார்"</a> நூலில்</cite>
</blockquote>
