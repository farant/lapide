<blockquote>
<p>புனித எழுத்துக்களில் ஒரு எழுத்தோ, ஒரு கோடோ கூட இல்லை, அதன் ஆழத்தில் ஏதேனும் பெரிய பொக்கிஷம் மறைந்திராமல்.</p>
<cite>— புனித கிறிசோஸ்தோமுஸ், கொர்னேலியுஸ் அ லாப்பிதே எழுதிய <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ta.html#chapter-iv">புனித நூலின் முன்னுரையும் புகழுரையும் — அத்தியாயம் IV: "திருச்சபைத் தந்தையரின் தீர்ப்புகள் மற்றும் முன்மாதிரிகள்"</a> நூலில்</cite>
</blockquote>
