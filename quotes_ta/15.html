<blockquote>
<p>வரலாறு இல்லாத மனிதன் முழுவதுமாகத் தன் கல்லறையில் இருக்கிறான்; தன் சொந்த வரலாற்றைப் பதிவு செய்யாத மக்கள் இன்னும் பிறக்கவில்லை.</p>
<cite>— சபைத் தந்தை லக்கோர்தேர், <a href="02_Clemens_Hieronymi_Du_Culte_ta.html#du-culte">திருநூல்களில் இயேசு கிறிஸ்துவின் வழிபாடு</a></cite>
</blockquote>
