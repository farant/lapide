<blockquote>
<p>இவை குழந்தைத்தனமானவை, கூத்தாடிகளின் விளையாட்டுக்கு ஒப்பானவை — நீர் அறியாததைக் கற்பிப்பது; அல்லது மாறாக, கோபத்துடன் சொல்வதென்றால், நீர் அறியவில்லை என்பதைக்கூட அறியாதிருப்பது.</p>
<cite>— புனித ஹியரோனிமுஸ், <a href="02_Clemens_Hieronymi_Du_Culte_ta.html#jerome-to-paulinus">ஹியரோனிமுஸிலிருந்து பவுலீனுஸுக்கு</a></cite>
</blockquote>
