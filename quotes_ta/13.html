<blockquote>
<p>அன்புக்குரிய சகோதரரே, இவற்றின் நடுவில் வாழவும், இவற்றைத் தியானிக்கவும், வேறு எதையும் அறியாதிருக்கவும், வேறு எதையும் தேடாதிருக்கவும் உம்மை மன்றாடுகிறேன். இது ஏற்கெனவே இவ்வுலகிலேயே விண்ணரசின் உறைவிடமாக உமக்குத் தோன்றவில்லையா?</p>
<cite>— புனித ஹியரோனிமுஸ், <a href="02_Clemens_Hieronymi_Du_Culte_ta.html#jerome-to-paulinus">ஹியரோனிமுஸிலிருந்து பவுலீனுஸுக்கு</a></cite>
</blockquote>
