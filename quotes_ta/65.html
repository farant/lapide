<blockquote>
<p>மனிதனின் வாய் என்ன, பேச்சின் ஒரு புனிதத்தலம், உரையின் ஊற்று, வார்த்தைகளின் மண்டபம், விருப்பத்தின் களஞ்சியம் அல்லவா?</p>
<cite>— புனித அம்புரோசியுஸ், கொர்னேலியுஸ் அ லாப்பிதே எழுதிய <a href="01_genesis_02_ta.html#verse-7">தொடக்க நூல் விளக்கவுரை, அதிகாரம் II — "ஆண்டவராகிய கடவுள் நிலத்தின் மண்ணிலிருந்து மனிதனை உருவாக்கினார்"</a> நூலில்</cite>
</blockquote>
