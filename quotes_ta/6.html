<blockquote>
<p>குழம்புகளின் சுவையைக் கவனிப்பது உன் வேலை; ஏனெனில் உன் காதுகள் அழுக்கால் அடைக்கப்பட்டிருப்பதால், புனிதமான கோட்பாட்டைக் கேட்க உன்னால் இயலாது.</p>
<cite>— புனித பசிலியுஸ், கொர்னேலியுஸ் அ லாப்பிதே எழுதிய <a href="01_Preliminares_ta.html#dedicatory-letter">முன்னுரைகள் — சமர்ப்பண மடல்</a> நூலில்</cite>
</blockquote>
