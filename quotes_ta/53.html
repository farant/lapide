<blockquote>
<p>விண்ணரசுக்கு ஒப்பிடக்கூடியது எதுவும் இல்லை; ஏனெனில் முழு உலகமும் சம தராசில் நிறுத்தப்பட்டாலும், ஒரே ஓர் ஆன்மாவுக்கு இணையாக அதை ஒப்பிட இயலாது.</p>
<cite>— புனித மேனாஸ், கொர்னேலியுஸ் அ லாப்பிதே எழுதிய <a href="01_genesis_01_ta.html#verse-16">தொடக்க நூல் விளக்கவுரை, அதிகாரம் I — "கடவுள் இரண்டு பெரிய சுடர்களை உருவாக்கினார்"</a> நூலில்</cite>
</blockquote>
