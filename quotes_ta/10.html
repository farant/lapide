<blockquote>
<p>உயிருள்ள குரல் ஓர் அறியப்படாத மறைந்த வல்லமையைக் கொண்டுள்ளது; ஆசிரியரின் வாயிலிருந்து மாணவரின் செவிகளில் பாய்ச்சப்படும்போது, அது மிகவும் வலிமையாக ஒலிக்கிறது.</p>
<cite>— புனித ஹியரோனிமுஸ், <a href="02_Clemens_Hieronymi_Du_Culte_ta.html#jerome-to-paulinus">ஹியரோனிமுஸிலிருந்து பவுலீனுஸுக்கு</a></cite>
</blockquote>
