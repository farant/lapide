<blockquote>
<p>இத்திருச்சபையின் ஆயரால் நாம் தோற்கடிக்கப்பட்டோம்; அவர் அச்சுறுத்தல்களுக்கு மேலானவர், வாதத்தில் உறுதியானவர், இனிய சொற்களை விடவும் வலிமையானவர். இன்னும் மனத்தைரியம் குறைந்த ஒருவனை முயற்சிக்க வேண்டும்.</p>
<cite>— மொதெஸ்துஸ், கொர்னேலியுஸ் அ லாப்பிதே எழுதிய <a href="01_Preliminares_ta.html#dedicatory-letter">முன்னுரைகள் — சமர்ப்பண மடல்</a> நூலில்</cite>
</blockquote>
