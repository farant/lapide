<blockquote>
<p>பிளாட்டோ என்பவர் ஆத்திக மொழியில் பேசும் மோசே அல்லாமல் வேறு யார்?</p>
<cite>— நுமேனியுஸ், கொர்னேலியுஸ் அ லாப்பிதே எழுதிய <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ta.html#moses-and-christ">புனித நூலின் முன்னுரையும் புகழுரையும் — "மோசேயும் கிறிஸ்துவும்: பத்தொன்பது ஒப்புமைகள்"</a> நூலில்</cite>
</blockquote>
