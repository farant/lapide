<blockquote>
<p>கடவுள் என்பவர், தமது இயல்பே நன்மையாகவும், தமது சித்தமே வல்லமையாகவும், தமது செயலே இரக்கமாகவும் உள்ளவர்.</p>
<cite>— லியோ, கொர்னேலியுஸ் அ லாப்பிதே எழுதிய <a href="01_genesis_01_ta.html#god-elohim">தொடக்க நூல் விளக்கவுரை, அதிகாரம் I — "கடவுள் (எலோஹிம்): பதின்மூன்று வரையறைகள்"</a> நூலில்</cite>
</blockquote>
