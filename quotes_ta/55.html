<blockquote>
<p>வெறுமனே ஒளிர்வது வீண், வெறுமனே எரிவது சொற்பம், எரிவதும் ஒளிர்வதும் சேர்ந்ததே நிறைவு.</p>
<cite>— புனித பெர்னார்துஸ், கொர்னேலியுஸ் அ லாப்பிதே எழுதிய <a href="01_genesis_01_ta.html#verse-16">தொடக்க நூல் விளக்கவுரை, அதிகாரம் I — "கடவுள் இரண்டு பெரிய சுடர்களை உருவாக்கினார்"</a> நூலில்</cite>
</blockquote>
