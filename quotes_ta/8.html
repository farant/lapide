<blockquote>
<p>உண்மையாகவும் என் மனசாட்சியின்படியும், நான் மனிதர்களில் மிகவும் அறிவற்றவன், மனிதர்களின் ஞானம் என்னிடம் இல்லை; நான் தன்னுடைய போதலையும் வருதலையும் அறியாத ஒரு சிறு குழந்தை.</p>
<cite>— கொர்னேலியுஸ் அ லாப்பிதே, <a href="01_Preliminares_ta.html#life">முன்னுரைகள் — கொர்னேலியுஸ் அ லாப்பிதேயின் வாழ்க்கை</a></cite>
</blockquote>
