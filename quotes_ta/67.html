<blockquote>
<p>ஒரு மனிதன் மூச்சுவிடுவது எவ்வளவு எளிதோ, அவ்வளவு எளிதாகக் கடவுள் ஆன்மாவைப் படைக்கிறார் என்பதைக் காட்டவே அவர் ஊதினார்.</p>
<cite>— தியோடோரேட்டுஸ், கொர்னேலியுஸ் அ லாப்பிதே எழுதிய <a href="01_genesis_02_ta.html#verse-7">தொடக்க நூல் விளக்கவுரை, அதிகாரம் II — "ஆண்டவராகிய கடவுள் நிலத்தின் மண்ணிலிருந்து மனிதனை உருவாக்கினார்"</a> நூலில்</cite>
</blockquote>
