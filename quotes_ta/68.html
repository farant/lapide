<blockquote>
<p>கடவுள் தமது சொந்த மூச்சையும் ஆன்மாவையும் மனிதனுக்கு அளித்தபோது, தம்மையே அளித்தார், தமது சொந்த இதயத்தை அவனுக்குள் வைத்ததைப் போல.</p>
<cite>— கொர்னேலியுஸ் அ லாப்பிதே, <a href="01_genesis_02_ta.html#verse-7">தொடக்க நூல் விளக்கவுரை, அதிகாரம் II — "ஆண்டவராகிய கடவுள் நிலத்தின் மண்ணிலிருந்து மனிதனை உருவாக்கினார்"</a></cite>
</blockquote>
