<blockquote>
<p><em>«Uxor Lot salis statua effecta, suo exemplo fatuos condivit, in proposito sancto, quo tendunt proficientes, noxia curiositate retro non debere respicere.»</em></p>
<cite>— S. Prosper Aquitanus, in Cornelius a Lapide, <a href="01_genesis_19_lt.html#verse-26">Commentaria in Genesim, Caput XIX — "Versus 26: Uxor Lot versa est in statuam salis"</a></cite>
</blockquote>
