<blockquote>
<p>Dolentes pro re modica faciunt propositiones universales, ut si pauca mala habeant, dicant se omnia habere; et si pauca bona eis desint, dicant sibi omnia deesse.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_42_lt.html#verse-36">Commentarium in Genesim, Caput XLII — "Absque Liberis Me Esse Fecistis"</a></cite>
</blockquote>
