<p>Mors est portus tranquillus, vera requies, somnus, ad meliora migratio, a malis liberatio, migratio a terra ad coelum, ab hominibus ad angelos, et ad ipsum angelorum Dominum.</p>
<cite>— S. Ioannes Chrysostomus, in Cornelio a Lapide, <a href="01_genesis_49_lt.html#verses-29-32">Genesis XLIX — "Mors Jacobi"</a></cite>
