<blockquote>
<p>Bonorum proscriptioni obnoxius non est, qui nihil habet: nisi forte laceris et detritis hisce pannis indiges, ac paucis libellis, in quibus omnes mihi facultates et copiæ sunt.</p>
<cite>— S. Basilius Magnus, <a href="01_Preliminares_lt.html#dedicatory-letter">Preliminares — Epistola Dedicatoria</a></cite>
</blockquote>
