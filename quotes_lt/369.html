<blockquote>
<p>Si mei similes erunt, idem hic agellus illos alet, qui me ad hanc dignitatem perduxit: sin dissimiles sunt futuri, nolo meis impensis illorum ali augerique luxuriam.</p>
<cite>— Phocion, in Cornelio a Lapide, <a href="01_genesis_46_lt.html#verse-34">Genesis XLVI — "Versus 34"</a></cite>
</blockquote>
