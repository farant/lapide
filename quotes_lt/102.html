<blockquote>
<p>Abelis est haec vox: «Sacrum pingue dabo, non macrum sacrificabo.» Caini ex adverso haec: «Sacrificabo macrum, non dabo pingue sacrum.»</p>
<cite>— S. Ambrosius, in Cornelius a Lapide, <a href="01_genesis_04_lt.html#ch4-verse-3">Commentarium in Genesim, Caput IV — "Post Multos Dies"</a></cite>
</blockquote>
