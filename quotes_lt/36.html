<blockquote>
<p>Horum sacrorum Scriptorum linguae et manus, nihil aliud fuerunt quam ejusdem Spiritus Sancti calami, adeo ut non tam diversi scriptores, quam diversi unius scriptoris calami fuisse videantur.</p>
<cite>— Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_lt.html#sacred-writers-as-pens">Proemium et Encomium Sacrae Scripturae — Scriptores Sacri ut calami Spiritus Sancti</a></cite>
</blockquote>
