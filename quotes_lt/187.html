<blockquote>
<p>Melchisedech dici sacerdotem Dei altissimi, non tantum eo quod illi ipse serviret, sed quod et alios ad ejus fidem cultumque converteret ac promoveret.</p>
<cite>— S. Dionysius, in Cornelius a Lapide, <a href="01_genesis_14_lt.html#verse-14-18">Commentaria in Genesim, Caput XIV — "Melchisedech — Panis et Vinum"</a></cite>
</blockquote>
