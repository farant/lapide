<blockquote>
<p>Cellæ solius — quæ mihi fida, tota terra charior est, adeoque cœlum terrestre videtur — et silentii solius sum incola, cellicola et sacri Musæi assecla, cœlicola esse contendo.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_lt.html#life">Preliminares — Vita Cornelii a Lapide</a></cite>
</blockquote>
