<blockquote>
<p>Disce quam impiger esse debeas, ut possis praevenire hospitem, ne quis praeveniat, et te boni muneris defraudet copia.</p>
<cite>— S. Ambrosius, in Cornelius a Lapide, <a href="01_genesis_18_lt.html#verse-1">Commentaria in Genesim, Caput XVIII — "Apparuit autem ei Dominus"</a></cite>
</blockquote>
