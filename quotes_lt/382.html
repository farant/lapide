<blockquote>
<p>Filii, charissimi, in fidei confessione persistite, vos jam exspectat Christus cum Sanctis suis; pugnate pro animabus vestris, et fideles vos exhibete Christo.</p>
<cite>— S. Felicitas, in Cornelio a Lapide, <a href="01_genesis_49_lt.html#gad">Genesis XLIX — "Prophetia et Benedictio Gad"</a></cite>
</blockquote>
