<blockquote>
<p>In casibus inopinatis levior est cognitio, quam dubitatio: nam re cognita potest inveniri ad salutem aditus; haesitatio nihil expedit.</p>
<cite>— Philo, in Cornelius a Lapide, <a href="01_genesis_42_lt.html#verse-29">Commentarium in Genesim, Caput XLII — "Narraverunt Ei Omnia"</a></cite>
</blockquote>
