<blockquote>
<p>Si non movet te natura communis, moveat saltem imago mea: homo enim est imago mea; vide ergo ne eum occidendo, coelestis regis vivam imaginem demoliaris.</p>
<cite>— S. Chrysostomus, in Cornelio a Lapide, <a href="01_genesis_09_lt.html#verse-9-6">Commentarium in Genesim, Caput IX — "Quicumque Effuderit Humanum Sanguinem"</a></cite>
</blockquote>
