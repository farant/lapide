<blockquote>
<p>Haec enim vere mansuetudo est, non quando quis offensus a potentioribus mansuete fert, sed quando quis ab his etiam qui inferiores putantur, offensus cedit.</p>
<cite>— S. Chrysostomus, in Cornelio a Lapide, <a href="01_genesis_26_lt.html#verse-20">Commentaria in Genesim, Caput XXVI — "Nostra Est"</a></cite>
</blockquote>
