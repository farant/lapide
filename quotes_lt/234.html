<blockquote>
<p>Ita saepe nobiscum agit Deus; factum difficile mandat et poscit, sed ubi voluntatem obsequentem viderit, ea contentus executionem inhibet.</p>
<cite>— S. Joannes Chrysostomus, in Cornelio a Lapide, <a href="01_genesis_22_lt.html#verse-12">Commentaria in Genesim, Caput XXII — "Ne Extendas Manum"</a></cite>
</blockquote>
