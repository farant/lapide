<blockquote>
<p>Superbia, saturitas panis, rerum omnium abundantia, otium et deliciae peccatum sodomiticum est; et propter hoc sequitur Dei oblivio, quae praesentia bona putat esse perpetua.</p>
<cite>— S. Hieronymus, apud Cornelium a Lapide, <a href="01_genesis_13_lt.html#verse-13-13">Commentarium in Genesim, Caput XIII — "Sodomitae Pessimi Erant"</a></cite>
</blockquote>
