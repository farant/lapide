<blockquote>
<p>Discamus a Rebecca, quam providendum sit ne invidia iracundiam excitet, iracundia in parricidium proruat. Veniat Rebecca, hoc est patientia, bona custos innocentiae; suadeat ut irae locum demus.</p>
<cite>— S. Ambrosius, in Cornelio a Lapide, <a href="01_genesis_27_lt.html#verse-46">Commentaria in Genesim, Caput XXVII — "Versus 46"</a></cite>
</blockquote>
