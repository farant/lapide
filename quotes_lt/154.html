<blockquote>
<p>Nemrod erat robustus venator, non tam ferarum, quam hominum; quia vi et insidiis homines captabat et opprimebat, vel spoliando, vel necando, vel in servitutem adducendo.</p>
<cite>— S. Augustinus, apud Cornelium a Lapide, <a href="01_genesis_10_lt.html#verse-10-9">Commentarium in Genesim, Caput X — "Robustus Venator coram Domino"</a></cite>
</blockquote>
