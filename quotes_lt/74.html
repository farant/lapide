<blockquote>
<p>Arbor vitae est crux Christi, quae in medio paradisi, id est Ecclesiae, erecta vitam dat mundo: in quam proinde conscendere gestiens Sponsa ait: Ascendam in palmam, et apprehendam fructus dulces gutturi meo.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_02_lt.html#the-tree-of-life">Commentarium in Genesim, Caput II</a></cite>
</blockquote>
