<blockquote>
<p>Permisit Deus Lot in Sodomis capi, ut castigaret ejus praeproperam et sensualem electionem, qua inter impiissimos Sodomitas, illectus loci fertilitate, habitare praeelegerat.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_14_lt.html#verse-14-12">Commentaria in Genesim, Caput XIV — "Lot Captus"</a></cite>
</blockquote>
