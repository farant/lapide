<p>Merito ergo canit B. Nazianzenus in Carm.: «Felix qui Christum fortunis omnibus emit.» Et S. Augustinus: «Quid est gloriosius homini, quam sua vendere, et Christum emere?»</p>
<cite>— S. Gregorius Nazianzenus et S. Augustinus, in Cornelio a Lapide, <a href="01_genesis_26_lt.html#verse-12-tropology">Commentaria in Genesim, Caput XXVI — "Sensus Tropologicus"</a></cite>
