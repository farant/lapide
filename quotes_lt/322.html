<blockquote>
<p>Venditus est a fratribus Joseph, ne ab eis adoraretur; sed ideo est adoratus, quia est venditus. Sic divinum consilium, dum devitatur, impletur; sic humana sapientia, dum reluctatur, comprehenditur.</p>
<cite>— S. Gregorius, in Cornelius a Lapide, <a href="01_genesis_37_lt.html#verse-28">Commentarium in Genesim, Caput XXXVII — "Versus 28"</a></cite>
</blockquote>
