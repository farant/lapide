<blockquote>
<p>Hebraeorum traditio est, Abramum hac eadem de causa proprie in ignem, ut habet Esdras, a Chaldaeis injectum, sed ex eo per miraculum a Deo liberatum esse.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_11_lt.html#verse-11-28">Commentarium in Genesim, Caput XI — "Versus 28: Ur Chaldaeorum"</a></cite>
</blockquote>
