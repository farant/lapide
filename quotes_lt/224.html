<blockquote>
<p>Nam semper omnia ita facit et tractat, et singula dispensat, ut qui sibi serviunt quasi luminaria reluceant, et eorum virtutem ubique manifestam faciat.</p>
<cite>— S. Joannes Chrysostomus, in Cornelius a Lapide, <a href="01_genesis_20_lt.html#moral">Commentaria in Genesim, Caput XX — "Reflexio Moralis ex S. Chrysostomo"</a></cite>
</blockquote>
