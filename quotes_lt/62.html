<blockquote>
<p>Omnipotentia omnipotentis Creatoris est causa subsistendi omni creaturae; quae vis si ab eis quae condita sunt regendis aliquando cessaret, simul et illorum cessaret species omnisque natura concideret.</p>
<cite>— S. Augustinus, in Cornelius a Lapide, <a href="01_genesis_02_lt.html#verse-2-2">Commentarium in Genesim, Caput II</a></cite>
</blockquote>
