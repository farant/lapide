<blockquote>
<p>Recte damnatam superbiam, qua factum est, ut non intelligeretur homo jubens homini, qui noluit intelligere, ut obediret Deo jubenti.</p>
<cite>— S. Augustinus, apud Cornelium a Lapide, <a href="01_genesis_11_lt.html#verse-11-8">Commentarium in Genesim, Caput XI — "Versus 8: Atque Ita Divisit Eos"</a></cite>
</blockquote>
