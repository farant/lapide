<blockquote>
<p>Coelo ergo nati, coelo creati sumus: hic finis, hic scopus noster: ab hoc si aberremus, frustra homines sumus, frustra coelum solemque suspeximus; satius foret bruta aut saxa fuisse.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_01_lt.html#verse-26">Commentarium in Genesim, Caput I</a></cite>
</blockquote>
