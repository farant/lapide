<blockquote>
<p>Cum quis per voluptatem aliquid turpe gessit, quod suave est abit, quod turpe et triste est manet. E contrario in labore virtutum, quod durum et triste est abit, quod suave et laetum est manet.</p>
<cite>— Musonius, in Cornelius a Lapide, <a href="01_genesis_03_lt.html#verse-7">Commentarium in Genesim, Caput III</a></cite>
</blockquote>
