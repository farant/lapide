<blockquote>
<p>Omnis nobilitas ignobile habuit principium: et qui in avorum nobilitate gloriantur, non in sua, sed in aliena virtute gloriantur. Et hoc ergo vanitas est.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_38_lt.html#moral-reflection">Commentarium in Genesim, Caput XXXVIII — "Reflexio Moralis: De Origine Nobilitatis"</a></cite>
</blockquote>
