<blockquote>
<p>Est enim jusjurandum res sacra, in qua interponitur divina auctoritas et veracitas, quae proinde non temere, nec leviter, sed animo multipliciter confirmato et certo adhibenda est.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_21_lt.html#verse-31">Commentaria in Genesim, Caput XXI — "Bersabee"</a></cite>
</blockquote>
