<blockquote>
<p>Deum enim tunc vapores, aerem aliaque in aquas resolvebat continuo per 40 dies, easque misericorditer, non simul, sed sensim depluit, ut interim terrerentur et poeniterent homines.</p>
<cite>— S. Chrysostomus, in Cornelius a Lapide, <a href="01_genesis_07_lt.html#ch7-verse-12">Commentarium in Genesim, Caput VII — "Quadraginta Dies"</a></cite>
</blockquote>
