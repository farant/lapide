<cite>— S. Augustinus, in Cornelius a Lapide, <a href="01_genesis_42_lt.html#josephs-secrecy">Commentarium in Genesim, Caput XLII — "Cur Joseph 23 Annis Incognitus Mansit"</a></cite>
