<blockquote>
<p>Sustinuit te dilectus; sustine tu dilectum. Non illum vicere peccata tua, te quoque illius flagella non superent, et obtinebis benedictionem.</p>
<cite>— S. Bernardus, in Cornelius a Lapide, <a href="01_genesis_35_lt.html#verse-9">Commentarium in Genesim, Caput XXXV — "Apparuit Autem Iterum Deus Jacob"</a></cite>
</blockquote>
