<blockquote>
<p>Vide hic quam infida et fallacia sint hominum consilia, ut non nobis, sed Deo fidere discamus. Ita quotidie maxime eos adversarios experimur, quos nimis commendavimus, vel promovimus.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_16_lt.html#verse-5">Commentaria in Genesim, Caput XVI — "Inique Agis Contra Me"</a></cite>
</blockquote>
