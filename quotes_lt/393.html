<blockquote>
<p>Non sint temporalia causa pacis tuæ; tam vilis enim et tam fragilis erit quam illa. Hæc pax tibi communis erit cum brutis; tua sit cum angelis, id est, quæ de veritate procedit.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_lt.html#chapter-i">Meditationes, Capitulum I</a></cite>
</blockquote>
