<blockquote>
<p>Joannes Abbas, visens Pesium Anachoretam, rogavit eum quid per 40 annos in eremo profecisset? respondit ille: «Quod sol omnia collustrans nunquam me manducantem vidit, nec iratum.»</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_26_lt.html#verse-29-examples">Commentaria in Genesim, Caput XXVI — "Pacificorum Exempla"</a></cite>
</blockquote>
