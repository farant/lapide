<blockquote>
<p>Qui vincit, non debet arrogare sibi victoriam, sed deferre Deo. Hoc Abraham docet, qui triumpho humilior factus est, non superbior: sacrificium denique obtulit, decimas dedit.</p>
<cite>— S. Ambrosius, in Cornelius a Lapide, <a href="01_genesis_14_lt.html#verse-14-20">Commentaria in Genesim, Caput XIV — "Dedit Ei Decimas"</a></cite>
</blockquote>
