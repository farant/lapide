<blockquote>
<p>Humilitas est instar fulminis, quod ferit quidem, sed nulla post se relinquit vestigia; ita sane humilitas omne peccatum dissipat, et tamen ut homo in oculis suis sit nihil, efficit.</p>
<cite>— S. Aegidius, in Cornelius a Lapide, <a href="01_genesis_18_lt.html#verse-27">Commentaria in Genesim, Caput XVIII — "Coepi"</a></cite>
</blockquote>
