<blockquote>
<p>Nate, nate, memento aeternae vitae, coelum suspice, et ibi regnantem intuere: tibi enim vita non eripitur, sed mutatur in melius.</p>
<cite>— Mater S. Symphoriani, in Cornelius a Lapide, <a href="01_genesis_01_lt.html#verse-16">Commentarium in Genesim, Caput I</a></cite>
</blockquote>
