<blockquote>
<p>Apte vocatur hebraice Nemrod, id est rebellis, quia primus hic fuit tyrannus, qui alios oppressit et sibi servire coegit, fuitque Dei contemptor. Primus ergo in orbe princeps et rex fuit Nemrod, isque tyrannus.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_10_lt.html#verse-10-8">Commentarium in Genesim, Caput X — "Chus Genuit Nemrod"</a></cite>
</blockquote>
