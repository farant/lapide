<blockquote>
<p>Sic et Christianus ille rogatus a Juliano Apostata per sarcasmum: «Quid facit Galilaeus faber vester?» respondit: «Loculum tibi parat.»</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_40_lt.html#verse-22">Commentarium in Genesim, Caput XL — "Ut Conjectoris Veritas Probaretur"</a></cite>
</blockquote>
