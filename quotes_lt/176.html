<blockquote>
<p>Infirmior amoeniora eligit, utiliora fastidit. Plerumque enim ubi fructus impares sunt, prudentior amaeniora declinat. Cito invidiam movent, cito in se excitant mentem avari.</p>
<cite>— S. Ambrosius, apud Cornelium a Lapide, <a href="01_genesis_13_lt.html#verse-13-11">Commentarium in Genesim, Caput XIII — "Elegitque Sibi Lot"</a></cite>
</blockquote>
