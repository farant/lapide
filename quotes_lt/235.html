<blockquote>
<p>Achatium in obedientia mire exercitatum, cum post mortem e sepulcro a sene quodam evocaretur, rogareturque an mortuus esset, respondisse: «Obediens mori nequit.»</p>
<cite>— S. Joannes Climacus, in Cornelio a Lapide, <a href="01_genesis_22_lt.html#verse-10">Commentaria in Genesim, Caput XXII — "Arripuit Gladium"</a></cite>
</blockquote>
