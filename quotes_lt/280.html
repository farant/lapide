<blockquote>
<p>«Diabolus nil pejus colit, quam humilem et Dei amantem,» ait S. Antonius apud Athanasium. Idem per visum vidit mundum plenum laqueis daemonum, et rogavit: «Quis eos evadet, Domine?» respondit Dominus: «Humilitas.»</p>
<cite>— S. Antonius, in Cornelius a Lapide, <a href="01_genesis_29_lt.html#verse-32">Commentarium in Genesim, Caput XXIX — "Ruben"</a></cite>
</blockquote>
