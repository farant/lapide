<blockquote>
<p>Si hinc peccati horrorem, inde inferni dolorem corporaliter cernerem, et necessario uni eorum immergi deberem, prius infernum quam peccatum appeterem.</p>
<cite>— S. Anselmus, in Cornelius a Lapide, <a href="01_genesis_39_lt.html#verse-9">Commentarium in Genesim, Caput XXXIX — "Versus 9: Quomodo ergo possum hoc malum facere?"</a></cite>
</blockquote>
