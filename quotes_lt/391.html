<blockquote>
<p>Haec tria in vita servavi quae vobis commendo: primo, minus sensui meo quam alterius credidi; secundo, laesus de laedente vindictam non expetivi; tertio, nemini scandalum facere volui.</p>
<cite>— S. Bernardus, in Cornelio a Lapide, <a href="01_genesis_50_lt.html#dying-words">Commentarius in Genesim, Caput L — «Verba Morientium Sanctorum»</a></cite>
</blockquote>
