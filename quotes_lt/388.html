<blockquote>
<p>Quid ergo vultis ursos et leones regnare? Hominum clementia, belluarum feritas propria est. Malo multos mea clementia servare, quam paucos mea severitate perdere.</p>
<cite>— Alfonsus, Rex Aragonum, in Cornelio a Lapide, <a href="01_genesis_50_lt.html#verse-21">Commentarius in Genesim, Caput L — «Blande ac Leniter»</a></cite>
</blockquote>
