<blockquote>
<p>Oro te, frater charissime, inter haec vivere, ista meditari, nihil aliud nosse, nihil quaerere. Nonne tibi videtur jam hic in terris regni coelestis habitaculum?</p>
<cite>— S. Hieronymus, <a href="02_Clemens_Hieronymi_Du_Culte_lt.html#jerome-to-paulinus">Hieronymus Paulino</a></cite>
</blockquote>
