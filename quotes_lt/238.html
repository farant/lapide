<blockquote>
<p>Si ergo tentaris, contemneris, doles, infirmaris, tristaris, infamaris, mortificaris, cruciaris, imo suspenderis, combureris, Isaacum imitare: modicum est, aeternitatem cogita.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_22_lt.html#verse-10">Commentaria in Genesim, Caput XXII — "Arripuit Gladium"</a></cite>
</blockquote>
