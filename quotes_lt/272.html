<blockquote>
<p>Itane huic intenta est illa majestas, cui gubernatio universitatis incumbit, et cura saeculorum ad sola transfertur negotia, imo otia amoris? Ita plane. Omnia enim propter electos.</p>
<cite>— S. Bernardus, in Cornelio a Lapide, <a href="01_genesis_28_lt.html#verse-12-ladder-moral">Commentaria in Genesim, Caput XXVIII — "Moraliter: Cura Dei erga suos"</a></cite>
</blockquote>
