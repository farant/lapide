<blockquote>
<p>Negat, primum, quasi apud ignorantem; recusat fraternae munus custodiae, quasi exsors naturae; declinat judicem, quasi liber arbitrii. Quid miraris, si pietatem non agnovit, qui non agnovit auctorem?</p>
<cite>— S. Ambrosius, in Cornelius a Lapide, <a href="01_genesis_04_lt.html#ch4-verse-9">Commentarium in Genesim, Caput IV — "Nescio"</a></cite>
</blockquote>
