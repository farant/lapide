<blockquote>
<p>Tu aliud a me pete, et meritis tuis gratia erit. De isto omitte: nam rex Galliae non ulciscitur injurias Ducis Aurelianensis.</p>
<cite>— Ludovicus XII, in Cornelio a Lapide, <a href="01_genesis_50_lt.html#verse-21">Commentarius in Genesim, Caput L — «Blande ac Leniter»</a></cite>
</blockquote>
