<blockquote>
<p>Mors porro beneficii loco mihi erit: citius enim me ad Deum transmittet cui vivo, et munere meo fungor, maximaque ex parte mortem obii, et ad quem jampridem propero.</p>
<cite>— S. Basilius Magnus, <a href="01_Preliminares_lt.html#dedicatory-letter">Preliminares — Epistola Dedicatoria</a></cite>
</blockquote>
