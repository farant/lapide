<blockquote>
<p>Unus hic Abram justus plus Deo curae est, quam Pharao cum omni regno, et propter unum justum etiam regem flagellat: quis igitur non libenter serviat Deo, qui tam fideliter suis adest et assistit?</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_12_lt.html#verse-12-17">Commentarium in Genesim, Caput XII — "Flagellavit Dominus Pharaonem"</a></cite>
</blockquote>
