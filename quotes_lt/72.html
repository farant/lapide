<blockquote>
<p>Quod si locum aliquem cogitaveris sanctorum capacem, in quo omnes qui in terra bonis operibus resplenduerunt, gratia Dei fruantur, et in vera ac spiritali jucunditate vivant, non aberraveris a decenti de paradiso similitudine.</p>
<cite>— S. Basilius, in Cornelius a Lapide, <a href="01_genesis_02_lt.html#verse-8">Commentarium in Genesim, Caput II</a></cite>
</blockquote>
