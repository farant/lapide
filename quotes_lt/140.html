<blockquote>
<p>Manebat, ait, ante vini inventionem omnibus inconcussa libertas; nemo sciebat a consorte naturae suae obsequia servitutis exigere: non esset hodie servitus, si ebrietas non fuisset.</p>
<cite>— S. Ambrosius, in Cornelio a Lapide, <a href="01_genesis_09_lt.html#verse-9-25">Commentarium in Genesim, Caput IX — "Maledictus Chanaan"</a></cite>
</blockquote>
