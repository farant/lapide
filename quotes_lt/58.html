<blockquote>
<p>Imago siquidem in gehenna uri poterit, non exuri, ardere, sed non deleri. Similitudo non sic; sed aut manet in bono, aut, si peccaverit anima, mutatur miserabiliter jumentis insipientibus similata.</p>
<cite>— S. Bernardus, in Cornelius a Lapide, <a href="01_genesis_01_lt.html#verse-26">Commentarium in Genesim, Caput I</a></cite>
</blockquote>
