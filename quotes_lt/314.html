<blockquote>
<p>Christus videri vult, non videre; quasi strenuus dux, devoti militis vult vultum sustolli in sua vulnera: sua non sentiet, dum illius intuebitur vulnera Christi miles.</p>
<cite>— S. Bernardus, in Cornelius a Lapide, <a href="01_genesis_35_lt.html#verse-9">Commentarium in Genesim, Caput XXXV — "Apparuit Autem Iterum Deus Jacob"</a></cite>
</blockquote>
