<blockquote>
<p>Narrant historici quod Xerxes, cum suo exercitu terram, classibus mare sterneret, ex edito loco omnem hanc multitudinem contemplans ingemuerit et fleverit, dictitans: «Ex hisce omnibus nemo post centum annos superstes erit.»</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_02_lt.html#verse-17">Commentarium in Genesim, Caput II</a></cite>
</blockquote>
