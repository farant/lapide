<blockquote>
<p>Noe non genere, sed justitia laudatur: probati enim viri genus, virtutis prosapia est; quia sicut hominum genus, homines: ita animarum genus, virtutes sunt.</p>
<cite>— S. Ambrosius, in Cornelio a Lapide, <a href="01_genesis_06_lt.html#ch6-verse-9">Commentarium in Genesim, Caput VI — "Noe, Vir Justus"</a></cite>
</blockquote>
