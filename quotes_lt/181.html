<blockquote>
<p>Vide hic morem Dei, qui solet impios per impios punire: sunt enim impii virga et flagellum Dei. Sic Judaeos punivit per Chaldaeos, Chaldaeos per Persas, Persas per Graecos, Graecos per Romanos, Romanos per Gothos.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_14_lt.html#verse-14-7">Commentaria in Genesim, Caput XIV — "Fons Misphat et Cades"</a></cite>
</blockquote>
