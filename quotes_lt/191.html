<blockquote>
<p>Hoc cum tremore nobis considerandum est, quod justus et omnipotens Deus, cum irascitur praecedentibus peccatis, permittit ut caecata mens etiam in alia delabatur.</p>
<cite>— S. Gregorius, in Cornelius a Lapide, <a href="01_genesis_15_lt.html#verse-15-16">Commentaria in Genesim, Caput XV — "Generatione Quarta"</a></cite>
</blockquote>
