<blockquote>
<p>In templo Dei offert unusquisque quod potest: alii aurum, argentum, et lapides pretiosos: alii byssum et purpuram et coccum offerunt, et hyacinthum: nobiscum bene agitur, si obtulerimus pelles et caprarum pilos.</p>
<cite>— S. Hieronymus, <a href="02_Clemens_Hieronymi_Du_Culte_lt.html#helmeted-prologue">Prologus Galeatus</a></cite>
</blockquote>
