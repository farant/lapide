<blockquote>
<p>Ingenium docile, et sine doctore laudabile est. Non quid invenias, sed quid quaeras consideramus. Mollis cera, et ad formandum facilis, etiam si artificis et plastae cessent manus: tamen virtute totum est quidquid esse potest.</p>
<cite>— S. Hieronymus, <a href="02_Clemens_Hieronymi_Du_Culte_lt.html#jerome-to-paulinus">Hieronymus Paulino</a></cite>
</blockquote>
