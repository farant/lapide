<blockquote>
<p>Dormit Adam ut fiat Eva, moritur Christus ut fiat Ecclesia. Dormiente Adam fit Eva de latere: mortuo Christo lancea perforatur latus, ut superfluant Sacramenta, quibus formetur Ecclesia.</p>
<cite>— S. Augustinus, in Cornelius a Lapide, <a href="01_genesis_02_lt.html#verse-21">Commentarium in Genesim, Caput II</a></cite>
</blockquote>
