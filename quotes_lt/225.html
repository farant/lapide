<blockquote>
<p>Deus volebat eum in Chanaan esse peregrinum, et assidue peregrinari, ut doceret nos in hac vita esse peregrinos et tendere ad coelum.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_20_lt.html#verse-1">Commentaria in Genesim, Caput XX — "Versus 1: Profectus Inde Abraham"</a></cite>
</blockquote>
