<blockquote>
<p>Tunc enim Deus exaltare incipit, cum humiliat; et quo quemque plus exaltare intendit, eo profundius eum humiliat. Ita fecit in Joseph, et maxime in Christo. Thalamus ergo virtutis et gloriae est adversitas et dejectio.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_37_lt.html#verse-28">Commentarium in Genesim, Caput XXXVII — "Versus 28"</a></cite>
</blockquote>
