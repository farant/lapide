<blockquote>
<p>Quia somnia divina rara sunt, et vix a daemoniacis aut vanis dignosci possunt: hinc tutissimum est somnia quaelibet contemnere, nisi Deus aliud revelet.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_40_lt.html#on-divination-from-dreams">Commentarium in Genesim, Caput XL — "An Ex Somniis Liceat Divinare"</a></cite>
</blockquote>
