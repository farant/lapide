<blockquote>
<p>Provocantur feminae meminisse dignitatis suae, et alere filios suos: haec enim matrum gratia, hic honos; denique eos plus amare illos solent, quos ipsae matres lactarunt.</p>
<cite>— S. Ambrosius, in Cornelius a Lapide, <a href="01_genesis_21_lt.html#verse-7">Commentaria in Genesim, Caput XXI — "Quis auditurum crederet Abraham"</a></cite>
</blockquote>
