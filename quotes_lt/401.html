<blockquote>
<p>Si omnes capillos capitis tui abscindat quis, non te lædet, nisi cum eos qui capiti adhærent tetigerit. Sic te non lædunt, nisi ea, quæ per concupiscentiam in te fixere radices, quis tangat.</p>
<cite>— Guigo I, <a href="guigo_i/Meditationes_lt.html#chapter-iv">Meditationes, Capitulum IV</a></cite>
</blockquote>
