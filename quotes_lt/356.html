<blockquote>
<p>Cum ergo derelictus et perditus videris, animos sume, scito prosperam fortunam stare ante januam, tibique imminere. Ecce enim Dominus ex alto nos aspicit, certantes intuetur et corroborat, atque praemia disponit et praeparat.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_43_lt.html#verse-14">Commentarium in Genesim, Caput XLIII — "Versus 14"</a></cite>
</blockquote>
