<blockquote>
<p>Melote hujus caelum clausit, pluviarumque descensum stitit. Et lingua Prophetae frenum fuit caelo: purpura autem amictus, et diademate circumibat quaerens Prophetam.</p>
<cite>— S. Joannes Chrysostomus, in Cornelius a Lapide, <a href="01_genesis_18_lt.html#verse-32">Commentaria in Genesim, Caput XVIII — "Non Delebo Propter Decem"</a></cite>
</blockquote>
