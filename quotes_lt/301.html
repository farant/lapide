<blockquote>
<p>Philosophi animus, ex eo quod passus est generosior redditur, atque ut caudens ferrum frigidae aquae aspersione, sic ipse periculis obdurescit.</p>
<cite>— S. Gregorius Nazianzenus, in Cornelius a Lapide, <a href="01_genesis_32_lt.html#verse-24">Commentarium in Genesim, Caput XXXII — "Luctabatur Homo cum Eo"</a></cite>
