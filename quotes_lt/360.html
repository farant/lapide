<blockquote>
<p>Apposite dixit Anacharsis in vite esse tres botros, et tres calices. Primus calix bibitur sanitatis; secundus, voluptatis; tertius, ebrietatis, injuriae et insaniae.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_43_lt.html#verse-34">Commentarium in Genesim, Caput XLIII — "Versus 34"</a></cite>
</blockquote>
