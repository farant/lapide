<blockquote>
<p>Omnis justus quando mundare se incipit, quae tenebrosa sunt, et immunda et temeraria, primo a se repellit. Siquidem omnis impudentia atque culpa tenebrosa est, et mortuis pascitur sicut corvus.</p>
<cite>— S. Ambrosius, in Cornelio a Lapide, <a href="01_genesis_08_lt.html#ch8-verse-7">Commentarium in Genesim, Caput VIII — "Corvus"</a></cite>
</blockquote>
