<blockquote>
<p>Isten templomában ki-ki azt ajánlja fel, amit tud: egyesek aranyat, ezüstöt és drágaköveket; mások finom vásznat, bíbort, skarlátot és jácintot ajánlanak fel; velünk jól van dolgunk, ha bőröket és kecskeszőrt ajánlhatunk fel.</p>
<cite>— Szent Jeromos, <a href="02_Clemens_Hieronymi_Du_Culte_hu.html#helmeted-prologue">A Sisakos Előszó</a></cite>
</blockquote>
