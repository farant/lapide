<blockquote>
<p>Ezt a fecsegő vénasszony, ezt a szenilis öregember, ezt a szószátyár szofista, ezt mindenki elbitorolja, szétszaggatja és tanítja, mielőtt megtanulná. Mások felvont szemöldökkel, nagy szavakat mérlegelve, asszonykák körében bölcselkednek a szent betűkről.</p>
<cite>— Szent Jeromos, <a href="02_Clemens_Hieronymi_Du_Culte_hu.html#jerome-to-paulinus">Jeromos Paulinushoz</a></cite>
</blockquote>
