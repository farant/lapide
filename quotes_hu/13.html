<blockquote>
<p>Kérlek, legkedvesebb testvérem, ezek között élj, ezekről elmélkedj, mást ne ismerj, mást ne keress. Vajon nem tűnik-e úgy neked, hogy már itt a földön a mennyei ország lakóhelye ez?</p>
<cite>— Szent Jeromos, <a href="02_Clemens_Hieronymi_Du_Culte_hu.html#jerome-to-paulinus">Jeromos Paulinushoz</a></cite>
</blockquote>
