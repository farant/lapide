<blockquote>
<p>Minden dolog közül, amelyből valamilyen hasznot keresünk, semmi sem jobb a földművelésnél, semmi sem termékenyebb, semmi sem édesebb, semmi sem méltóbb a szabad emberhez.</p>
<cite>— Cicero, in Cornelius a Lapide, <a href="01_genesis_02_hu.html#verse-15">Kommentár a Teremtés könyvéhez, II. fejezet — „Az Úr Isten a Paradicsomba helyezte az embert”</a></cite>
</blockquote>
