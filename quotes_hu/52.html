<blockquote>
<p>Fiam, fiam, emlékezz az örök életre, tekints fel az égre, és nézd azt, aki ott uralkodik: mert az életedet nem elveszik tőled, hanem jobbra cserélik.</p>
<cite>— Szent Symphorianus édesanyja, in Cornelius a Lapide, <a href="01_genesis_01_hu.html#verse-16">Kommentár a Teremtés könyvéhez, I. fejezet — „És alkotta Isten a két nagy világító testet”</a></cite>
</blockquote>
