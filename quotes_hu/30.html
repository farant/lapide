<blockquote>
<p>A Szentírás isteni beszéde olyan folyam, amely egyszerre sekély és mély, amelyben a bárány járhat és az elefánt úszhat.</p>
<cite>— Szent Gergely, in Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_hu.html#chapter-v">A Szentírás előszava és magasztalása — V. fejezet: „A tanulmányhoz szükséges felkészültségről”</a></cite>
</blockquote>
