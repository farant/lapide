<blockquote>
<p>Magadnak teremtettél minket, Urunk, és nyugtalan a szívünk, amíg Tebenned meg nem nyugszik. Az ég és a föld kiáltják, Urunk, hogy szeressünk Téged.</p>
<cite>— Szent Ágoston, in Cornelius a Lapide, <a href="01_genesis_01_hu.html#he-created">Kommentár a Teremtés könyvéhez, I. fejezet — „Teremtette”</a></cite>
</blockquote>
