<blockquote>
<p>Vajon jobb-e mindig inni, vagy mindig enni? Bizonyára, ahogyan felváltva mindkettőre szükség van, úgy az imádság és a Szentírás tanulmányozása is felváltva illik.</p>
<cite>— Szent Jordán, in Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_hu.html#saintly-examples">A Szentírás előszava és magasztalása — „Szentek példái a Szentírás tanulmányozásában”</a></cite>
</blockquote>
