<blockquote>
<p>Nincs kiválóbb alkotó Istennél; nincs hatékonyabb művészet Isten Igéjénél; nincs jobb ok annál, mint hogy a Jó hozza létre a jót.</p>
<cite>— Szent Ágoston, in Cornelius a Lapide, <a href="01_genesis_01_hu.html#verse-4">Kommentár a Teremtés könyvéhez, I. fejezet — „És látta Isten a világosságot, hogy jó”</a></cite>
</blockquote>
