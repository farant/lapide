<p>A keresztények kelet felé fordulva imádkoznak, hogy emlékezzenek a Paradicsomra, amelyből a bűn által kiűzettek.</p>
<cite>— Aranyszájú Szent János, Theodorétosz és Damaszkuszi Szent János, in Cornelius a Lapide, <a href="01_genesis_02_hu.html#verse-8">Kommentár a Teremtés könyvéhez, II. fejezet — „És az Úr Isten gyönyörűség kertjét ültette”</a></cite>
