<blockquote>
<p>Tanuljuk meg a földön azokat a dolgokat, amelyeknek ismerete megmarad velünk a mennyben. Úgy tanulj, mintha örökké élnél; úgy élj, mintha mindig meghalnál.</p>
<cite>— Szent Jeromos, in Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_hu.html#chapter-iv">A Szentírás előszava és magasztalása — IV. fejezet: „Az egyházatyák ítéletei és példái”</a></cite>
</blockquote>
