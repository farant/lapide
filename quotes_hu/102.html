<blockquote>
<p>Ábelé ez a jelmondat: „Kövér áldozatot adok, soványat nem áldozok.” Káiné ellenben ez: „Soványt áldozok, kövér áldozatot nem adok.”</p>
<cite>— Szent Ambrus, in Cornelius a Lapide, <a href="01_genesis_04_hu.html#ch4-verse-3">Kommentár a Teremtés könyvéhez, IV. fejezet — „3. vers: Sok nap múltán”</a></cite>
