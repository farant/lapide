<blockquote>
<p>Nincs egyetlen szótag, sőt egyetlen vonás sem a szent Írásokban, amelynek mélyén valamilyen nagy kincs ne rejtőznék.</p>
<cite>— Aranyszájú Szent János, in Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_hu.html#chapter-iv">A Szentírás előszava és magasztalása — IV. fejezet: „Az egyházatyák ítéletei és példái”</a></cite>
</blockquote>
