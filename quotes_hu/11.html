<blockquote>
<p>A tanulékony elme tanító nélkül is dicséretre méltó. Nem azt tekintjük, mit találsz, hanem mit keresel. A puha viasz, amelyet könnyű formálni, még ha a mesterember és a szobrász keze tétlen is marad, mégis a maga képessége folytán mindaz, amivé válhat.</p>
<cite>— Szent Jeromos, <a href="02_Clemens_Hieronymi_Du_Culte_hu.html#jerome-to-paulinus">Jeromos Paulinushoz</a></cite>
</blockquote>
