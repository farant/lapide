<blockquote>
<p>Mi más tehát az ember szája, mint a beszéd valamiféle szentélye, az értekezés forrása, a szavak csarnoka, az akarat tárháza?</p>
<cite>— Szent Ambrus, in Cornelius a Lapide, <a href="01_genesis_02_hu.html#verse-7">Kommentár a Teremtés könyvéhez, II. fejezet — „Akkor az Úr Isten megalkotta az embert a föld porából”</a></cite>
</blockquote>
