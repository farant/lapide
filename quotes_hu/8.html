<blockquote>
<p>„Valóban és lelkiismeretem szerint én vagyok a legostobább az emberek között, és az emberi bölcsesség nincs velem; kisgyermek vagyok, aki nem ismeri a maga kimenetelét és bejövetelét.”</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_hu.html#life">Preliminares — Cornelius a Lapide élete</a></cite>
</blockquote>
