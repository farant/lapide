<blockquote>
<p>A szent Szerzők nyelvei és kezei nem voltak egyebek, mint ugyanazon Szentlélek tollai, olyannyira, hogy nem annyira különböző szerzőknek, mint inkább egyetlen Szerző különböző tollainak tűnnek.</p>
<cite>— Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_hu.html#sacred-writers-as-pens">A Szentírás előszava és magasztalása — „A szent szerzők mint a Szentlélek tollai”</a></cite>
</blockquote>
