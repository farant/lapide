<blockquote>
<p>Vi har besegrats av denne kyrkas biskop; han är överlägsen hot, fastare i argument, starkare än smicker. Någon mer feg man måste prövas.</p>
<cite>— Modestus, i Cornelius a Lapide, <a href="01_Preliminares_sv.html#dedicatory-letter">Inledning — Tillägnansbrev</a></cite>
