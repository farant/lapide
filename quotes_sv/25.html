<blockquote>
<p>Låt oss lära på jorden de ting vars kunskap skall bestå hos oss i himlen. Studera som om du alltid skall leva; lev som om du alltid skall dö.</p>
<cite>— S:t Hieronymus, i Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_sv.html#chapter-iv">Förord och lovprisning av den Heliga Skrift — Kapitel IV</a></cite>
