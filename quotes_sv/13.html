<blockquote>
<p>Jag beder dig, käraste broder, lev bland dessa ting, begrunda dem, känn till inget annat, sök inget annat. Synes det dig inte att detta redan här på jorden är det himmelska rikets boning?</p>
<cite>— S:t Hieronymus, i Cornelius a Lapide, <a href="02_Clemens_Hieronymi_Du_Culte_sv.html#jerome-to-paulinus">Hieronymus till Paulinus</a></cite>
</blockquote>
