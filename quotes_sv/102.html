<blockquote>
<p>Detta är Abels valspråk: "Ett fett offer skall jag giva; ett magert skall jag icke offra." Kains valspråk däremot: "Jag skall offra det magra; det feta offret skall jag icke giva."</p>
<cite>— S:t Ambrosius, i Cornelius a Lapide, <a href="01_genesis_04_sv.html#ch4-verse-3">Kommentar till Första Moseboken, kapitel IV — "Efter många dagar"</a></cite>
</blockquote>
