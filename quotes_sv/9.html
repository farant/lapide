<blockquote>
<p>I Guds tempel offrar var och en vad han kan: somliga guld, silver och ädla stenar; andra offrar fint linne, purpur, scharlakan och hyacint. Det går väl för oss om vi kan offra skinn och gethår.</p>
<cite>— S:t Hieronymus, i Cornelius a Lapide, <a href="02_Clemens_Hieronymi_Du_Culte_sv.html#helmeted-prologue">Den hjälmprydda prologen</a></cite>
</blockquote>
