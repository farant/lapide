<blockquote>
<p>Sannerligen och i mitt samvete, jag är den dåraktigaste bland män, och människors visdom är icke hos mig; jag är ett litet barn som icke känner sin egen utgång eller ingång.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_sv.html#life">Inledning — Cornelius a Lapides levnad</a></cite>
</blockquote>
