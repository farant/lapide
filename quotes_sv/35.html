<blockquote>
<p>Är det bättre att alltid dricka, eller alltid äta? Förvisso, liksom bådadera behövs omväxlande, så höves det att be och studera den Heliga Skrift omväxlande.</p>
<cite>— S:t Jordanus, i Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_sv.html#saintly-examples">Förord och lovprisning av den Heliga Skrift — Heliga föredömen i skriftstudium</a></cite>
</blockquote>
