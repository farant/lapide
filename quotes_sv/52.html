<blockquote>
<p>Min son, min son, tänk på det eviga livet, se upp mot himlen och skåda Honom som regerar där: ty livet tas inte ifrån dig, utan förvandlas till det bättre.</p>
<cite>— S:t Symphorians moder, i Cornelius a Lapide, <a href="01_genesis_01_sv.html#verse-16">Kommentar till Första Moseboken, kapitel I — "Och Gud gjorde de två stora ljusen"</a></cite>
