<blockquote>
<p>Ty den levande rösten har något fördolt i sig, och överförd från författarens mun till lärjungens öron, klingar den med större kraft.</p>
<cite>— S:t Hieronymus, i Cornelius a Lapide, <a href="02_Clemens_Hieronymi_Du_Culte_sv.html#jerome-to-paulinus">Hieronymus till Paulinus</a></cite>
</blockquote>
