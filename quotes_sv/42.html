<blockquote>
<p>Du har skapat oss, o Herre, för dig själv, och vårt hjärta är oroligt till dess att det finner vila i dig. Himmel och jord ropar, o Herre, att vi skall älska dig.</p>
<cite>— S:t Augustinus, i Cornelius a Lapide, <a href="01_genesis_01_sv.html#he-created">Kommentar till Första Moseboken, kapitel I — "Han skapade"</a></cite>
</blockquote>
