<blockquote>
<p>Detta är barnsligt, likt charlatanernas lekar: att undervisa i det man själv inte kan. Ja, för att tala med förtrytelse, att inte ens veta att man inte vet.</p>
<cite>— S:t Hieronymus, i Cornelius a Lapide, <a href="02_Clemens_Hieronymi_Du_Culte_sv.html#jerome-to-paulinus">Hieronymus till Paulinus</a></cite>
</blockquote>
