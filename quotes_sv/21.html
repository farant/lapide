<blockquote>
<p>Dessa är de ord som övertygade hela världen till förakt för världen och frivillig fattigdom; dessa är de ord som fyller klostren för munkar och ödemarkerna för eremiter.</p>
<cite>— S:t Bernhard, i Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_sv.html#chapter-i">Förord och lovprisning av den Heliga Skrift — Kapitel I</a></cite>
