<blockquote>
<p>Av alla ting ur vilka någon vinst eftersträvas, finns intet som är bättre än jordbruket, intet mer fruktbart, intet ljuvligare, intet mer värdigt en fri människa.</p>
<cite>— Cicero, i Cornelius a Lapide, <a href="01_genesis_02_sv.html#verse-15">Kommentar till Första Moseboken, Kapitel II — "Herren Gud tog människan och satte henne i paradiset"</a></cite>
</blockquote>
