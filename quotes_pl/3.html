<blockquote>
<p>Konfiskacie dóbr nie podlega ten, kto niczego nie posiada — chyba że potrzebujesz tych podartych i wytartych łachmanów oraz kilku książeczek, w których zawiera się cały mój majątek i całe moje bogactwo.</p>
<cite>— św. Bazyli Wielki, <a href="01_Preliminares_pl.html#dedicatory-letter">Preliminaria — List dedykacyjny</a></cite>
