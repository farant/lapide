<blockquote>
<p>W świątyni Bożej każdy ofiaruje, co może: jedni złoto, srebro i kamienie drogie; inni ofiarują bisior, purpurę, szkarłat i hiacynt. Z nami dobrze się dzieje, jeśli złożymy w ofierze skóry i koźle sierści.</p>
<cite>— św. Hieronim, <a href="02_Clemens_Hieronymi_Du_Culte_pl.html#helmeted-prologue">Prolog w hełmie</a></cite>
</blockquote>
