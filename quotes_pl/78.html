<blockquote>
<p>Opowiadają historycy, że Kserkses, gdy swoim wojskiem pokrywał ziemię, a flotą morze, z wyniosłego miejsca kontemplując całą tę rzeszę, westchnął i zapłakał, powtarzając: „Z tych wszystkich nikt nie będzie żył po stu latach.”</p>
<cite>— Korneliusz a Lapide, <a href="01_genesis_02_pl.html#verse-17">Komentarz do Księgi Rodzaju, Rozdział II</a></cite>
</blockquote>
