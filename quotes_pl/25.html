<blockquote>
<p>Uczmy się na ziemi tego, czego wiedza przetrwa z nami w niebie. Tak studiuj, jakbyś miał żyć wiecznie; tak żyj, jakbyś miał umrzeć jutro.</p>
<cite>— św. Hieronim, w: Korneliusz a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_pl.html#chapter-iv">Wstęp i Pochwała Pisma Świętego — Rozdział IV: Osądy i przykłady Ojców</a></cite>
</blockquote>
