<blockquote>
<p>Śmierć zaś będzie dla mnie dobrodziejstwem, gdyż prędzej przeniesie mnie do Boga, dla którego żyję i pełnię swoją posługę, i dla którego już w znacznej części umarłem, i do którego od dawna spieszę.</p>
<cite>— św. Bazyli Wielki, <a href="01_Preliminares_pl.html#dedicatory-letter">Preliminaria — List dedykacyjny</a></cite>
</blockquote>
