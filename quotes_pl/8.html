<blockquote>
<p>Prawdziwie i w sumieniu moim jestem najgłupszym z mężów i mądrość ludzka nie jest ze mną; jestem małym dzieckiem, nie znającym wejścia swego ani wyjścia.</p>
<cite>— Korneliusz a Lapide, <a href="01_Preliminares_pl.html#life">Preliminaria — Życie Korneliusza a Lapide</a></cite>
