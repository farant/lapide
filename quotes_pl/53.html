<blockquote>
<p>Nie ma niczego, co mogłoby się równać z królestwem niebieskim; cały bowiem świat, choćby rzetelnie zważony, nie może się równać jednej duszy.</p>
<cite>— św. Menas, w: Korneliusz a Lapide, <a href="01_genesis_01_pl.html#verse-16">Komentarz do Księgi Rodzaju, Rozdział I</a></cite>
