<blockquote>
<p>Synu, synu, pamiętaj o życiu wiecznym, spójrz ku niebu i tam kontempluj Tego, który króluje; tobie bowiem życie nie jest odbierane, lecz zamieniane na lepsze.</p>
<cite>— Matka św. Symforiana, w: Korneliusz a Lapide, <a href="01_genesis_01_pl.html#verse-16">Komentarz do Księgi Rodzaju, Rozdział I</a></cite>
</blockquote>
