<blockquote>
<p>Gdy ktoś przez rozkosz popełnił coś haniebnego, to co przyjemne — odchodzi, a to co haniebne i smutne — pozostaje. Przeciwnie zaś w trudzie cnót: to co twarde i smutne — odchodzi, a to co słodkie i radosne — pozostaje.</p>
<cite>— Muzoniusz, in Korneliusz a Lapide, <a href="01_genesis_03_pl.html#verse-7">Komentarz do Księgi Rodzaju, Rozdział III</a></cite>
</blockquote>
