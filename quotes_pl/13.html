<blockquote>
<p>Proszę cię, bracie najdroższy, żyj pośród tych rzeczy, rozważaj je, niczego innego nie znaj, niczego innego nie szukaj. Czyż nie wydaje ci się, że już tu na ziemi jest to mieszkanie królestwa niebieskiego?</p>
<cite>— św. Hieronim, <a href="02_Clemens_Hieronymi_Du_Culte_pl.html#jerome-to-paulinus">Hieronim do Paulina</a></cite>
</blockquote>
