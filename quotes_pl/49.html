<p>Nie ma twórcy doskonalszego niż Bóg, ani sztuki skuteczniejszej niż słowo Boże, ani przyczyny lepszej niż ta, aby dobro zostało stworzone przez Dobro.</p>
<cite>— św. Augustyn, w: Korneliusz a Lapide, <a href="01_genesis_01_pl.html#verse-4">Komentarz do Księgi Rodzaju, Rozdział I</a></cite>
