<blockquote>
<p>Abla jest ta mowa: „Ofiaruję tłustą świętość, nie złożę chudej ofiary.” Kaina zaś, przeciwnie, ta: „Złożę chudą ofiarę, nie dam tłustej świętości.”</p>
<cite>— św. Ambroży, in Korneliusz a Lapide, <a href="01_genesis_04_pl.html#ch4-verse-3">Komentarz do Księgi Rodzaju, Rozdział IV — „Post Multos Dies”</a></cite>
</blockquote>
