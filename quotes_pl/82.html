<blockquote>
<p>Ze wszystkich zajęć, z których czerpie się jakąś korzyść, nie ma nic lepszego od rolnictwa, nic obfitszego, nic słodszego, nic bardziej godnego człowieka wolnego.</p>
<cite>— Cyceron, w: Korneliusz a Lapide, <a href="01_genesis_02_pl.html#verse-15">Komentarz do Księgi Rodzaju, Rozdział II</a></cite>
</blockquote>
