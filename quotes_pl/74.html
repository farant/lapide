<blockquote>
<p>Drzewo życia jest krzyżem Chrystusa, który wzniesiony pośrodku raju, to jest Kościoła, daje życie światu; pragnąc nań wstąpić, Oblubienica mówi: „Wstąpię na palmę i zerwę jej słodkie owoce.”</p>
<cite>— Korneliusz a Lapide, <a href="01_genesis_02_pl.html#the-tree-of-life">Komentarz do Księgi Rodzaju, Rozdział II</a></cite>
</blockquote>
