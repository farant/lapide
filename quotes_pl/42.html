<blockquote>
<p>Stworzyłeś nas, Panie, dla siebie i niespokojne jest serce nasze, dopóki nie spocznie w Tobie. Niebo i ziemia wołają, Panie, abyśmy Cię miłowali.</p>
<cite>— św. Augustyn, w: Korneliusz a Lapide, <a href="01_genesis_01_pl.html#he-created">Komentarz do Księgi Rodzaju, Rozdział I</a></cite>
