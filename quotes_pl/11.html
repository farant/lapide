<blockquote>
<p>Umysł pojętny jest chwalebny nawet bez nauczyciela. Zważamy nie na to, co znajdziesz, lecz czego szukasz. Miękki wosk, łatwy do kształtowania, nawet gdy ręce rzemieślnika i rzeźbiarza spoczywają, posiada w sobie moc tego wszystkiego, czym może się stać.</p>
<cite>— św. Hieronim, <a href="02_Clemens_Hieronymi_Du_Culte_pl.html#jerome-to-paulinus">Hieronim do Paulina</a></cite>
</blockquote>
