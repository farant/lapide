<blockquote>
<p>એવું કંઈ નથી જે સ્વર્ગના રાજ્ય સાથે સરખાવી શકાય; કેમ કે સમગ્ર જગતને પણ સમતોલ ત્રાજવામાં મૂકવામાં આવે, તો તે એક જ આત્મા સાથે સરખાવી શકાય નહીં.</p>
<cite>— સંત મેનાસ, કોર્નેલિયુસ આ લાપિદેમાં, <a href="01_genesis_01_gu.html#verse-16">ઉત્પત્તિ પર ભાષ્ય, અધ્યાય ૧ — "ઈશ્વરે બે મહાન જ્યોતિઓ બનાવી"</a></cite>
</blockquote>
