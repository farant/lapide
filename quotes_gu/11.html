<blockquote>
<p>શીખવા-યોગ્ય બુદ્ધિ ગુરુ વિના પણ પ્રશંસનીય છે. તું શું શોધી કાઢે છે એ નહીં, પણ તું શું શોધે છે એ અમે જોઈએ છીએ. કોમળ મીણ, જે આકાર આપવા સહેલું છે, કારીગર અને શિલ્પીના હાથ નિષ્ક્રિય રહે તોપણ, પોતાની યોગ્યતાથી જ તે જે કંઈ બની શકે છે તે સર્વ બની શકે છે.</p>
<cite>— સંત હિએરોનિમુસ, <a href="02_Clemens_Hieronymi_Du_Culte_gu.html#jerome-to-paulinus">હિએરોનિમુસનો પૌલિનુસને પત્ર</a></cite>
</blockquote>
