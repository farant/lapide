<blockquote>
<p>હું તને વિનંતી કરું છું, અતિપ્રિય ભાઈ, આ બાબતો વચ્ચે જીવવા, એમના પર મનન કરવા, બીજું કંઈ ન જાણવા, બીજું કંઈ ન શોધવા. શું તને એમ નથી લાગતું કે અહીં પૃથ્વી પર જ આ સ્વર્ગીય રાજ્યનું નિવાસસ્થાન છે?</p>
<cite>— સંત હિએરોનિમુસ, <a href="02_Clemens_Hieronymi_Du_Culte_gu.html#jerome-to-paulinus">હિએરોનિમુસનો પૌલિનુસને પત્ર</a></cite>
</blockquote>
