<p>અમે આ મંડળીના બિશપથી પરાજિત થયા છીએ; તેઓ ધમકીઓથી ઉપર છે, વાણીમાં વધુ દૃઢ છે, અને મીઠા શબ્દોની ખુશામત કરતાં વધુ બળવાન છે. કોઈ વધુ બીકણ માણસને અજમાવવો પડશે.</p>
