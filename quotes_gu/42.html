<blockquote>
<p>હે પ્રભુ, તમે અમને તમારા માટે જ સર્જ્યા છે, અને અમારું હૃદય અશાંત રહે છે જ્યાં સુધી તે તમારામાં વિશ્રામ ન પામે. સ્વર્ગ અને પૃથ્વી પોકાર કરે છે, હે પ્રભુ, કે અમે તમને પ્રેમ કરીએ.</p>
<cite>— સંત આગસ્તીનુસ, કોર્નેલિયુસ આ લાપિદેમાં, <a href="01_genesis_01_gu.html#he-created">ઉત્પત્તિ પર ભાષ્ય, અધ્યાય ૧ — "તેણે સૃષ્ટિ કરી"</a></cite>
</blockquote>
