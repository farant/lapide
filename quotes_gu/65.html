<blockquote>
<p>મનુષ્યનું મુખ ત્યારે શું છે, જો વાણીનું એક પવિત્રસ્થાન, વાર્તાલાપનું ઝરણું, શબ્દોનો સભાગૃહ, ઇચ્છાનો ભંડાર ન હોય?</p>
<cite>— સંત આમ્બ્રોસિયુસ, કોર્નેલિયુસ આ લાપિદેમાં, <a href="01_genesis_02_gu.html#verse-7">ઉત્પત્તિ પર ભાષ્ય, અધ્યાય ૨ — "શ્લોક ૭: પ્રભુ ઈશ્વરે મનુષ્યને પૃથ્વીની માટીમાંથી ઘડ્યો"</a></cite>
</blockquote>
