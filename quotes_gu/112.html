<blockquote>
<p>શાસ્ત્રની ભાષામાં ચાર ઘોર પાપો છે જે સ્વર્ગ સામે પોકાર કરે છે: પહેલું, ભ્રાતૃહત્યા, જેવું કાઇનનું હતું; બીજું, સોદોમનું પાપ; ત્રીજું, મજૂરોની ઠગાયેલી મજૂરી; ચોથું, વિધવાઓ, અનાથોની અને ગરીબોની સતામણી.</p>
<cite>— કોર્નેલિયુસ આ લાપિદે, <a href="01_genesis_04_gu.html#ch4-verse-10">ઉત્પત્તિ પર ભાષ્ય, અધ્યાય ૪ — "શ્લોક ૧૦: રક્તનો અવાજ"</a></cite>
</blockquote>
