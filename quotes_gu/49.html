<blockquote>
<p>ઈશ્વર કરતાં વધુ શ્રેષ્ઠ કોઈ રચયિતા નથી; ઈશ્વરના વચન કરતાં વધુ સામર્થ્યવાન કોઈ કળા નથી; મંગલમય દ્વારા મંગલનું સર્જન થાય તેના કરતાં વધુ ઉત્તમ કોઈ કારણ નથી.</p>
<cite>— સંત આગસ્તીનુસ, કોર્નેલિયુસ આ લાપિદેમાં, <a href="01_genesis_01_gu.html#verse-4">ઉત્પત્તિ પર ભાષ્ય, અધ્યાય ૧ — "પદ ૪: અને ઈશ્વરે પ્રકાશ જોયો કે તે સારો હતો"</a></cite>
</blockquote>
