<blockquote>
<p>સાચે જ અને મારા અંતઃકરણમાં, હું પુરુષોમાં સૌથી મૂર્ખ છું, અને મનુષ્યોની બુદ્ધિ મારી પાસે નથી; હું એક નાનું બાળક છું જે પોતાનું બહાર જવું કે અંદર આવવું પણ જાણતું નથી.</p>
