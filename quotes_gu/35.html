<blockquote>
<p>શું હંમેશાં પીવું શ્રેષ્ઠ છે, કે હંમેશાં ખાવું? ખરેખર, જેમ બંને એક પછી એક જરૂરી છે, તેમ વારાફરતી પ્રાર્થના કરવી અને પવિત્ર શાસ્ત્રનું અધ્યયન કરવું ઉચિત છે.</p>
<cite>— સંત જોર્દાનુસ, કોર્નેલિયુસ આ લાપિદેમાં, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_gu.html#saintly-examples">પવિત્ર શાસ્ત્રની પ્રસ્તાવના અને પ્રશસ્તિ — શાસ્ત્ર-અધ્યયનમાં સંતોના ઉદાહરણો</a></cite>
</blockquote>
