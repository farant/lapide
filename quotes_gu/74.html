<blockquote>
<p>જીવનનું વૃક્ષ ખ્રિસ્તનો ક્રૂસ છે, જે પારાદીસની — એટલે કે મંડળીની — મધ્યે ઊભો કરાયેલો જગતને જીવન આપે છે; તેથી તે પર ચઢવાની ઇચ્છા રાખતી વધૂ કહે છે: "હું ખજૂરીના ઝાડ પર ચઢીશ, અને મારા તાળવાને મીઠાં લાગે એવાં તેનાં ફળ પકડીશ."</p>
<cite>— કોર્નેલિયુસ આ લાપિદે, <a href="01_genesis_02_gu.html#the-tree-of-life">ઉત્પત્તિ પર ભાષ્ય, અધ્યાય ૨ — "જીવનનું વૃક્ષ"</a></cite>
</blockquote>
