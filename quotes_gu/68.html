<blockquote>
<p>જ્યારે ઈશ્વરે મનુષ્યને પોતાનો નિશ્વાસ અને આત્મા આપ્યો, ત્યારે તેણે જાણે પોતાને જ આપ્યો, જાણે પોતાનું હૃદય તેની અંદર મૂક્યું હોય.</p>
<cite>— કોર્નેલિયુસ આ લાપિદે, <a href="01_genesis_02_gu.html#verse-7">ઉત્પત્તિ પર ભાષ્ય, અધ્યાય ૨ — "શ્લોક ૭: પ્રભુ ઈશ્વરે મનુષ્યને પૃથ્વીની માટીમાંથી ઘડ્યો"</a></cite>
</blockquote>
