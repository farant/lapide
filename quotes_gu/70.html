<blockquote>
<p>ખ્રિસ્તીઓ પૂર્વ તરફ મુખ કરીને પ્રાર્થના કરે છે, જેથી તેઓ પારાદીસનું સ્મરણ કરે, જ્યાંથી તેઓ પાપને કારણે હાંકી કઢાયા હતા.</p>
<cite>— સંત ક્રિસોસ્તોમુસ, થિઓદોરેતુસ અને દમાસ્કસના યોહાન, કોર્નેલિયુસ આ લાપિદેમાં, <a href="01_genesis_02_gu.html#verse-8">ઉત્પત્તિ પર ભાષ્ય, અધ્યાય ૨ — "શ્લોક ૮: પ્રભુ ઈશ્વરે આનંદનું પારાદીસ રોપ્યું હતું"</a></cite>
</blockquote>
