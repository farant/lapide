<blockquote>
<p>કેમ કે જીવંત વાણીમાં કોઈ ગૂઢ શક્તિ રહેલી છે, અને જ્યારે તે રચયિતાના મુખમાંથી શિષ્યના કાનોમાં રેડાય છે, ત્યારે તે વધારે પ્રબળતાથી ગુંજે છે.</p>
