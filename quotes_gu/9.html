<blockquote>
<p>ઈશ્વરના મંદિરમાં દરેક જણ જે અર્પી શકે તે અર્પે છે: કેટલાક સોનું, રૂપું અને બહુમૂલ્ય રત્નો અર્પે છે; બીજાઓ ઝીણું શણ, જાંબુડી, કિરમજી અને નીલમણિરંગનું વસ્ત્ર અર્પે છે; આપણા માટે તો સારું જ છે જો આપણે ચામડાં અને બકરાંના વાળ અર્પીએ.</p>
<cite>— સંત હિએરોનિમુસ, <a href="02_Clemens_Hieronymi_Du_Culte_gu.html#helmeted-prologue">શિરસ્ત્રાણયુક્ત પ્રસ્તાવના</a></cite>
</blockquote>
