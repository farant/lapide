<blockquote>
<p>મારા પુત્ર, મારા પુત્ર, અનંત જીવનને યાદ રાખ, સ્વર્ગ તરફ દૃષ્ટિ કર, અને ત્યાં જે રાજ્ય કરી રહ્યા છે તેમને જો: કેમ કે જીવન તારી પાસેથી છીનવાઈ રહ્યું નથી, પણ વધુ સારામાં બદલાઈ રહ્યું છે.</p>
<cite>— સંત સિમ્ફોરિયાનુસની માતા, કોર્નેલિયુસ આ લાપિદેમાં, <a href="01_genesis_01_gu.html#verse-16">ઉત્પત્તિ પર ભાષ્ય, અધ્યાય ૧ — "ઈશ્વરે બે મહાન જ્યોતિઓ બનાવી"</a></cite>
</blockquote>
