<blockquote>
<p>તેણે ફૂંક મારી, એ બતાવવા માટે કે ઈશ્વર માટે આત્મા સર્જવો એટલો જ સહજ છે જેટલો મનુષ્ય માટે ફૂંક મારવી.</p>
<cite>— સંત થિઓદોરેતુસ, કોર્નેલિયુસ આ લાપિદેમાં, <a href="01_genesis_02_gu.html#verse-7">ઉત્પત્તિ પર ભાષ્ય, અધ્યાય ૨ — "શ્લોક ૭: પ્રભુ ઈશ્વરે મનુષ્યને પૃથ્વીની માટીમાંથી ઘડ્યો"</a></cite>
