<blockquote>
<p>પવિત્ર લેખકોની જીભ અને હાથ એક જ પવિત્ર આત્માની લેખણીઓ સિવાય બીજું કંઈ ન હતાં, એટલે સુધી કે તેઓ વિવિધ લેખકો જેવા નહિ, બલ્કે એક જ લેખકની વિવિધ લેખણીઓ જેવા જણાય છે.</p>
<cite>— કોર્નેલિયુસ આ લાપિદે, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_gu.html#sacred-writers-as-pens">પવિત્ર શાસ્ત્રની પ્રસ્તાવના અને પ્રશસ્તિ — પવિત્ર આત્માની લેખણીઓ રૂપે પવિત્ર લેખકો</a></cite>
</blockquote>
