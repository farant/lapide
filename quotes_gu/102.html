<blockquote>
<p>આ આબેલનું સૂત્ર છે: "પુષ્ટ અર્પણ હું આપીશ; દુર્બળ હું બલિદાન નહીં કરું." તેનાથી વિપરીત, કાઇનનું: "હું દુર્બળ બલિદાન કરીશ; પુષ્ટ અર્પણ હું નહીં આપીશ."</p>
<cite>— સંત આમ્બ્રોસિયુસ, કોર્નેલિયુસ આ લાપિદેમાં, <a href="01_genesis_04_gu.html#ch4-verse-3">ઉત્પત્તિ પર ભાષ્ય, અધ્યાય ૪ — "શ્લોક ૩: ઘણા દિવસો પછી"</a></cite>
</blockquote>
