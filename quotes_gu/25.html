<blockquote>
<p>પૃથ્વી પર એ વાતો શીખીએ જેનું જ્ઞાન સ્વર્ગમાં પણ આપણી સાથે ટકી રહેશે. એવી રીતે અધ્યયન કર, જાણે તું હંમેશ માટે જીવનાર છે; એવી રીતે જીવ, જાણે તું હંમેશ માટે મરનાર છે.</p>
<cite>— સંત હિએરોનિમુસ, કોર્નેલિયુસ આ લાપિદેમાં, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_gu.html#chapter-iv">પવિત્ર શાસ્ત્રની પ્રસ્તાવના અને પ્રશસ્તિ — પ્રકરણ IV: ધર્મપિતાઓના નિર્ણયો અને ઉદાહરણો</a></cite>
</blockquote>
