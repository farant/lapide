<blockquote>
<p>در معبد خدا هر کس آنچه می‌تواند تقدیم می‌کند: برخی طلا و نقره و سنگ‌های گران‌بها پیشکش می‌آورند؛ دیگران کتان نفیس و ارغوان و قرمز و آسمانی می‌آورند؛ خوشا به حال ما اگر پوست‌ها و موی بز تقدیم کنیم.</p>
<cite>— هیرونیموس، <a href="02_Clemens_Hieronymi_Du_Culte_fa.html#helmeted-prologue">مقدمه زره‌پوش</a></cite>
</blockquote>
