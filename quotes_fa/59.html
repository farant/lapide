<blockquote>
<p>پس برای آسمان زاده شدیم؛ برای آسمان آفریده شدیم: این غایت ماست، این مقصد ماست. اگر از این منحرف شویم، بیهوده انسانیم، بیهوده به آسمان و خورشید نگریسته‌ایم؛ بهتر بود که چارپایان بی‌زبان یا سنگ می‌بودیم.</p>
<cite>— کورنلیوس آ لاپیده، <a href="01_genesis_01_fa.html#verse-26">تفسیر پیدایش، فصل اول — «آیه ۲۶: انسان را به صورت و شباهت خود بسازیم»</a></cite>
</blockquote>
