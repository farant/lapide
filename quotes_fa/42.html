<blockquote>
<p>ای خداوند، تو ما را برای خود آفریدی، و دل ما بی‌قرار است تا آن‌گاه که در تو آرام یابد. آسمان و زمین فریاد بر‌می‌آورند، ای خداوند، که ما باید تو را دوست بداریم.</p>
<cite>— قدیس آگوستینوس، در کورنلیوس آ لاپیده، <a href="01_genesis_01_fa.html#he-created">تفسیر پیدایش، فصل اول — «او آفرید»</a></cite>
