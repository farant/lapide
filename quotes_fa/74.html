<blockquote>
<p>درخت حیات، صلیب مسیح است که در میان بهشت — یعنی کلیسا — برافراشته شده و به جهان حیات می‌بخشد. از همین رو عروس، که مشتاق بالا رفتن از آن است، می‌گوید: «بر نخل بالا خواهم رفت و میوه‌هایش را خواهم چید که کام مرا شیرین است.»</p>
<cite>— کورنلیوس آ لاپیده، <a href="01_genesis_02_fa.html#the-tree-of-life">تفسیر سِفر پیدایش، باب دوم — «درخت حیات»</a></cite>
