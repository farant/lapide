<blockquote>
<p>پسرم، پسرم، حیات جاودانی را به یاد آور، به آسمان بنگر و آن کسی را ببین که در آنجا فرمان‌روایی می‌کند: زیرا زندگی از تو گرفته نمی‌شود، بلکه به بهتر تبدیل می‌گردد.</p>
<cite>— مادر قدیس سمفوریانوس، در کورنلیوس آ لاپیده، <a href="01_genesis_01_fa.html#verse-16">تفسیر پیدایش، فصل اول — «آیه ۱۶: و خدا دو نور بزرگ ساخت»</a></cite>
</blockquote>
