<blockquote>
<p>زبان‌ها و دست‌های نویسندگان مقدس چیزی نبودند جز قلم‌های همان روح‌القدس، به‌گونه‌ای که آنان نه چندین نویسندهٔ متفاوت، بلکه قلم‌های متفاوت یک نویسنده به نظر می‌رسند.</p>
<cite>— کورنلیوس آ لاپیده، <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_fa.html#sacred-writers-as-pens">نویسندگان مقدس همچون قلم‌های روح‌القدس</a></cite>
</blockquote>
