<blockquote>
<p>ذهنی آموختنی حتی بدون آموزگار نیز ستودنی است. ما نه آنچه را یافته‌ای، بلکه آنچه را می‌جویی می‌سنجیم. مومِ نرم و آسان‌شکل، حتی اگر دست‌های صنعتگر و پیکرتراش بی‌کار باشد، به نیروی ذاتی خود هر آن چیزی هست که می‌تواند باشد.</p>
<cite>— هیرونیموس، <a href="02_Clemens_Hieronymi_Du_Culte_fa.html#jerome-to-paulinus">هیرونیموس به پاولینوس</a></cite>
</blockquote>
