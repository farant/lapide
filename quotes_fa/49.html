<blockquote>
<p>هیچ صانعی برتر از خدا نیست؛ هیچ هنری کاراتر از کلام خدا نیست؛ هیچ علتی نیکوتر از آن نیست که نیکی به دست نیکو آفریده شود.</p>
<cite>— قدیس آگوستینوس، در کورنلیوس آ لاپیده، <a href="01_genesis_01_fa.html#verse-4">تفسیر پیدایش، فصل اول — «آیه ۴: و خدا نور را دید که نیکو بود»</a></cite>
</blockquote>
