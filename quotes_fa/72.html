<cite>— قدیس باسیلیوس، در کورنلیوس آ لاپیده، <a href="01_genesis_02_fa.html#verse-8">تفسیر سِفر پیدایش، باب دوم — «خداوند خدا بهشتِ نعمت را غرس نمود»</a></cite>
