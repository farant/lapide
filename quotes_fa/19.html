<blockquote>
<p>امپراتور آسمان، خداوند فرشتگان و انسان‌ها، نامه‌های خود را برای زندگی شما فرستاده است، و شما از خواندن مشتاقانهٔ آن‌ها غفلت می‌ورزید! زیرا کتاب مقدس چیست جز نوعی نامه از خدای قادر مطلق به مخلوق خویش؟</p>
<cite>— گریگوریوس، در کورنلیوس آ لاپیده، <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_fa.html#section-one">مقدمه و ستایش کتاب مقدس — بخش اول</a></cite>
</blockquote>
