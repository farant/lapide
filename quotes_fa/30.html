<blockquote>
<p>کلام الهی کتاب مقدس رودخانه‌ای است هم کم‌عمق و هم ژرف، که برّه در آن گام می‌زند و فیل در آن شنا می‌کند.</p>
<cite>— گریگوریوس، در کورنلیوس آ لاپیده، <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_fa.html#chapter-v">فصل پنجم: دربارهٔ استعدادهای لازم برای این مطالعه</a></cite>
</blockquote>
