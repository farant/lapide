<blockquote>
<p>اسقف باید فرشته‌ای باشد، مصون از هر آشفتگی و رذیلت بشری. سزاوار است کسی که حکمرانی بر دیگران را بر عهده می‌گیرد، در چنان شکوه فضیلتی سرآمد باشد که همچون خورشید، همگان را — چون جرقه‌های ستارگان — در فروغ خویش ناپیدا سازد.</p>
<cite>— کریسوستوموس، در کورنلیوس آ لاپیده، <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_fa.html#moses-virtues">فضایل موسی</a></cite>
</blockquote>
