<blockquote>
<p>در هفت‌سالگی به صومعه وارد شدم و در آنجا تمام عمرم را وقف تأمل در کتب مقدس کردم، و در کنار رعایت نظم رهبانی و مراقبت روزانه از سرودخوانی در کلیسا، همواره خواندن، یا آموزاندن، یا نوشتن را شیرین یافتم.</p>
<cite>— بید، در کورنلیوس آ لاپیده، <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_fa.html#chapter-iv">فصل چهارم: داوری‌ها و نمونه‌های آبای کلیسا</a></cite>
</blockquote>
