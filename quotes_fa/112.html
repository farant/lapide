<blockquote>
<p>چهار گناه هولناک وجود دارد که در زبان کتاب مقدس به آسمان فریاد برمی‌آورند: نخست، برادرکشی، همچون گناه قائن؛ دوم، گناه سدوم؛ سوم، مزد ربوده‌شده کارگران؛ چهارم، ستم بر بیوگان، یتیمان و فقیران.</p>
<cite>— کورنلیوس آ لاپیده، <a href="01_genesis_04_fa.html#ch4-verse-10">تفسیر سِفر پیدایش، باب چهارم — «آواز خون»</a></cite>
