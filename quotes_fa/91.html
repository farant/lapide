<blockquote>
<p>چون کسی از راه لذت کاری شرم‌آور انجام دهد، آنچه شیرین بود می‌رود و آنچه شرم‌آور و اندوهبار است باقی می‌ماند. برعکس، در رنج فضیلت‌ها، آنچه دشوار و غمناک است می‌رود و آنچه شیرین و شادی‌بخش است باقی می‌ماند.</p>
<cite>— موسونیوس، در کورنلیوس آ لاپیده، <a href="01_genesis_03_fa.html#verse-7">تفسیر سِفر پیدایش، باب سوم — «و چشمان هر دو باز شد»</a></cite>
</blockquote>
