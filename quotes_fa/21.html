<blockquote>
<p>این‌ها همان کلماتی هستند که تمام جهان را به بی‌اعتنایی به دنیا و فقر داوطلبانه ترغیب کردند؛ این‌ها همان کلماتی هستند که صومعه‌ها را برای راهبان و بیابان‌ها را برای زاهدان پر می‌کنند.</p>
<cite>— برناردوس، در کورنلیوس آ لاپیده، <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_fa.html#chapter-i">فصل اول: دربارهٔ فضیلت، ضرورت و ثمره کتاب مقدس</a></cite>
</blockquote>
