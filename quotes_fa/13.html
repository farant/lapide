<blockquote>
<p>از تو می‌خواهم، ای برادر عزیزترین، که در میان این‌ها زندگی کنی، در آن‌ها تأمل نمایی، هیچ چیز دیگر ندانی و هیچ چیز دیگر نجویی. آیا چنین نمی‌نماید که از هم‌اکنون بر روی زمین در جایگاه ملکوت آسمانی ساکن هستی؟</p>
<cite>— هیرونیموس، <a href="02_Clemens_Hieronymi_Du_Culte_fa.html#jerome-to-paulinus">هیرونیموس به پاولینوس</a></cite>
