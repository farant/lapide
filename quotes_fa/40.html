<blockquote>
<p>موسی، وفادارترین بندهٔ خدا، فروتن در سرباز زدن از چنین خدمت بزرگی، مطیع در پذیرش آن، امین در حفظ آن، نیرومند در اجرای آن، هوشیار در حکمرانی بر قوم، سختگیر در اصلاح، سوزان در محبت، شکیبا در تحمل.</p>
<cite>— آگوستینوس، در کورنلیوس آ لاپیده، <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_fa.html#praises-of-moses">ستایش‌های موسی از کتاب مقدس و آبای کلیسا</a></cite>
</blockquote>
