<blockquote>
<p>اگر کسی آرزوی دانستن حتی امور آینده را دارد، بگذار قلبی پاک داشته باشد؛ زیرا ایمان دارم که روحی که خدا را خدمت می‌کند، اگر در آن پاکی‌ای که در آن تولد تازه یافته پایدار مانده باشد، می‌تواند بیش از شیاطین بداند.</p>
<cite>— آنتونیوس، در کورنلیوس آ لاپیده، <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_fa.html#chapter-v">فصل پنجم: دربارهٔ استعدادهای لازم برای این مطالعه</a></cite>
</blockquote>
