<blockquote>
<p>شگفت‌انگیز است ژرفای کلمات تو، ای خداوند، که سطحشان اینک در برابر ماست و کودکان را مسحور می‌کند، اما شگفت‌انگیز است آن ژرفا، ای خدای من، ژرفایی شگفت‌انگیز؛ خیره شدن بدان هراس‌انگیز است: هراسی از تجلیل، و لرزه‌ای از عشق.</p>
<cite>— آگوستینوس، در کورنلیوس آ لاپیده، <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_fa.html#the-fathers">دفاع آبای کلیسا از عهد عتیق</a></cite>
</blockquote>
