<blockquote>
<p>بیاموزیم بر روی زمین آن چیزهایی را که شناخت‌شان در آسمان با ما باقی خواهد ماند. چنان مطالعه کن که گویی همیشه زنده خواهی بود؛ چنان زندگی کن که گویی همیشه خواهی مرد.</p>
<cite>— هیرونیموس، در کورنلیوس آ لاپیده، <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_fa.html#chapter-iv">فصل چهارم: داوری‌ها و نمونه‌های آبای کلیسا</a></cite>
</blockquote>
