<blockquote>
<p>خشایارشا، چون زمین را با سپاهش و دریا را با ناوگانش پوشانده بود، از بلندایی بر این همه خلق نگریست و ناله و گریه سر داد و پیوسته می‌گفت: «از همه اینان، پس از صد سال حتی یک تن زنده نخواهد بود.»</p>
<cite>— کورنلیوس آ لاپیده، <a href="01_genesis_02_fa.html#verse-17">تفسیر سِفر پیدایش، باب دوم — «از درخت معرفت مخور»</a></cite>
