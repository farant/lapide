<blockquote>
<p>Să învățăm pe pământ cele a căror cunoaștere va rămâne cu noi în ceruri. Studiază ca și cum ai trăi veșnic; trăiește ca și cum ai muri în orice clipă.</p>
<cite>— Sf. Ieronim, în Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ro.html#chapter-iv">Proemiu și Elogiu al Sfintei Scripturi — Capitolul IV: Judecățile și exemplele Părinților</a></cite>
</blockquote>
