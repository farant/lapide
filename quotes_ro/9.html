<blockquote>
<p>În templul lui Dumnezeu, fiecare oferă ce poate: unii oferă aur, argint și pietre prețioase; alții oferă in fin și purpură și stacojiu și iacint; cu noi merge bine dacă oferim piei și păr de capră.</p>
<cite>— Sf. Ieronim, în Cornelius a Lapide, <a href="02_Clemens_Hieronymi_Du_Culte_ro.html#helmeted-prologue">Prologul cu coif</a></cite>
</blockquote>
