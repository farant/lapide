<blockquote>
<p>Treaba ta este să te îngrijești de asezonarea supelor; căci, fiindcă urechile tale sunt înfundate cu murdărie, nu poți auzi învățătura sfântă.</p>
<cite>— Sf. Vasile cel Mare, în Cornelius a Lapide, <a href="01_Preliminares_ro.html#dedicatory-letter">Preliminarii — Scrisoare dedicatorie</a></cite>
