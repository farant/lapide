<blockquote>
<p>Dintre toate lucrurile din care se caută vreun folos, nimic nu este mai bun decât agricultura, nimic mai rodnic, nimic mai dulce, nimic mai demn de un om liber.</p>
<cite>— Cicero, în Cornelius a Lapide, <a href="01_genesis_02_ro.html#verse-15">Comentariu la Facerea, Capitolul II — „Domnul Dumnezeu a luat pe om și l-a așezat în rai"</a></cite>
