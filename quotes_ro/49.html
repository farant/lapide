<blockquote>
<p>Nu există autor mai desăvârșit decât Dumnezeu, nici artă mai lucrătoare decât Cuvântul lui Dumnezeu, nici pricină mai bună decât aceasta: ca binele să fie creat de Bine.</p>
<cite>— Sf. Augustin, în Cornelius a Lapide, <a href="01_genesis_01_ro.html#verse-4">Comentariu la Facerea, Capitolul I — „Versetul 4: Și a văzut Dumnezeu lumina că era bună”</a></cite>
</blockquote>
