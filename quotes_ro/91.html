<blockquote>
<p>Când cineva a săvârșit ceva rușinos prin plăcere, ceea ce a fost dulce se duce, ceea ce este rușinos și trist rămâne. Dimpotrivă, în osteneala virtuților, ceea ce este greu și trist se duce, ceea ce este dulce și vesel rămâne.</p>
<cite>— Musoniu, in Cornelius a Lapide, <a href="01_genesis_03_ro.html#verse-7">Comentariu la Facerea, Capitolul III</a></cite>
</blockquote>
