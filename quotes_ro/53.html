<blockquote>
<p>Nimic nu poate fi comparat cu Împărăția cerurilor; căci lumea întreagă, cântărită în cumpănă dreaptă, nu poate fi comparată cu un singur suflet.</p>
<cite>— Sf. Mina, în Cornelius a Lapide, <a href="01_genesis_01_ro.html#verse-16">Comentariu la Facerea, Capitolul I — „Versetul 16: Și a făcut Dumnezeu cei doi luminători mari”</a></cite>
