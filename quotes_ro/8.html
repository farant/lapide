<blockquote>
<p>Cu adevărat și pe conștiința mea, sunt cel mai neghiob dintre oameni, și înțelepciunea oamenilor nu este cu mine; sunt un copilaș care nu-și cunoaște propria ieșire și intrare.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_ro.html#life">Preliminarii — Viața lui Cornelius a Lapide</a></cite>
</blockquote>
