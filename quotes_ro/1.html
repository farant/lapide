<blockquote>
<p>Homer îl numește pe rege păstorul popoarelor, pentru că el trebuie să le hrănească, așa cum păstorul hrănește oile, și nu să le jumulească.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_ro.html#dedicatory-letter">Preliminarii — Scrisoare dedicatorie</a></cite>
</blockquote>
