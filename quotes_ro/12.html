<blockquote>
<p>Acestea sunt lucruri copilărești, asemenea jocurilor șarlatanilor — a învăța ceea ce nu știi; sau mai degrabă, ca să vorbesc cu indignare, nici măcar a nu ști că nu știi.</p>
<cite>— Sf. Ieronim, în Cornelius a Lapide, <a href="02_Clemens_Hieronymi_Du_Culte_ro.html#jerome-to-paulinus">Ieronim către Paulin</a></cite>
</blockquote>
