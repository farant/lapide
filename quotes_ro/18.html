<blockquote>
<p>De pe pământ, nimic nu ajunge la Dumnezeu decât geamătul și plângerea; din cer, nimic nu coboară până la noi decât blândețea și iertarea.</p>
<cite>— Pr. Lacordaire, în Cornelius a Lapide, <a href="02_Clemens_Hieronymi_Du_Culte_ro.html#du-culte">Despre cultul lui Isus Hristos în Scripturi</a></cite>
</blockquote>
