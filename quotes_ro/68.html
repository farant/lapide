<blockquote>
<p>Când Dumnezeu a împărtășit omului propria Sa suflare și propriul Său suflet, S-a împărtășit pe Sine Însuși, ca și cum Și-ar fi pus propria inimă în el.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_02_ro.html#verse-7">Comentariu la Facerea, Capitolul II — „Și Domnul Dumnezeu a plăsmuit pe om din țărâna pământului”</a></cite>
</blockquote>
