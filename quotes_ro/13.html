<blockquote>
<p>Te rog, preaiunite frate, să trăiești printre aceste lucruri, să meditezi asupra lor, să nu cunoști nimic altceva, să nu cauți nimic altceva. Nu ți se pare că aceasta este deja, aici pe pământ, un lăcaș al împărăției cerești?</p>
<cite>— Sf. Ieronim, în Cornelius a Lapide, <a href="02_Clemens_Hieronymi_Du_Culte_ro.html#jerome-to-paulinus">Ieronim către Paulin</a></cite>
</blockquote>
