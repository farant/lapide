<blockquote>
<p>Am fost biruiți de Episcopul acestei Biserici; el este mai presus de amenințări, mai ferm în argumente, mai puternic decât cuvintele frumoase. Trebuie încercat un om mai fricos.</p>
<cite>— Modestus, în Cornelius a Lapide, <a href="01_Preliminares_ro.html#dedicatory-letter">Preliminarii — Scrisoare dedicatorie</a></cite>
</blockquote>
