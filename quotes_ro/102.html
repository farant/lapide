<blockquote>
<p>Aceasta este deviza lui Abel: „Jertfă grasă voi aduce; una slabă nu voi sacrifica.” Dimpotrivă, aceea a lui Cain: „Voi sacrifica ce e slab; jertfa grasă nu o voi da.”</p>
<cite>— Sf. Ambrozie, in Cornelius a Lapide, <a href="01_genesis_04_ro.html#ch4-verse-3">Comentariu la Facerea, Capitolul IV</a></cite>
</blockquote>
