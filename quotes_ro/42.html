<blockquote>
<p>Ne-ai făcut, Doamne, pentru Tine, și neliniștită este inima noastră până ce se va odihni în Tine. Cerul și pământul strigă, Doamne, ca să Te iubim.</p>
<cite>— Sf. Augustin, în Cornelius a Lapide, <a href="01_genesis_01_ro.html#he-created">Comentariu la Facerea, Capitolul I — „El a creat"</a></cite>
</blockquote>
