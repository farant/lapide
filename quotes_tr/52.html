<blockquote>
<p>Oğlum, oğlum, ebedî hayatı hatırla, gözlerini göğe kaldır ve orada hüküm süren Zâtı gör; çünkü hayat senden alınmıyor, daha iyisi ile değiştiriliyor.</p>
<cite>— Aziz Symphorianus'un annesi, in Cornelius a Lapide, <a href="01_genesis_01_tr.html#verse-16">Yaratılış Tefsiri, Bölüm I — "Ve Tanrı iki büyük ışık yaptı"</a></cite>
</blockquote>
