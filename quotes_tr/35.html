<p>Daima içmek mi yoksa daima yemek mi daha iyidir? Şüphesiz, nasıl her ikisi de dönüşümlü olarak gerekliyse, dua etmek ve Kutsal Yazı'yı okumak da sırayla yapılmalıdır.</p>
<cite>— Aziz Jordanus, in Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_tr.html#saintly-examples">Kutsal Yazı'nın Önsözü ve Övgüsü — Azizlerin Kutsal Yazı Çalışmasına Dair Örnekleri</a></cite>
