<blockquote>
<p>Bilgisi gökte de bizimle kalacak olan şeyleri yeryüzünde öğrenelim. Daima yaşayacakmış gibi çalış; daima ölecekmişsin gibi yaşa.</p>
<cite>— Aziz Hieronymus, in Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_tr.html#chapter-iv">Kutsal Yazı'nın Önsözü ve Övgüsü — Bölüm IV</a></cite>
</blockquote>
