<blockquote>
<p>Kadiri Mutlak Yaratıcı'nın kudreti, her yaratılmışın var olma sebebidir; bu güç, yarattığı şeyleri yönetmekten bir an bile geri dursa, derhal onların biçimi ve tüm tabiatı çökerdi.</p>
<cite>— Aziz Augustinus, in Cornelius a Lapide, <a href="01_genesis_02_tr.html#verse-2-2">Yaratılış Tefsiri, Bölüm II — "Ayet 2: Tanrı Yedinci Günde İşini Tamamladı"</a></cite>
