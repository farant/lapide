<blockquote>
<p>Öyleyse gök için doğduk; gök için yaratıldık: amacımız budur, hedefimiz budur. Bundan saparsak, boşuna insanız, boşuna göğe ve güneşe baktık; kaba hayvanlar veya taşlar olmak daha iyi olurdu.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_01_tr.html#verse-26">Yaratılış Tefsiri, Bölüm I — "İnsanı Kendi suretimizde ve benzeyişimizde yaratalım"</a></cite>
