<blockquote>
<p>Kutsal Yazıların diliyle göğe feryat eden dört korkunç günah vardır: birincisi, Kâin'inki gibi kardeş katli; ikincisi, Sodom günahı; üçüncüsü, işçilerin gasp edilmiş ücretleri; dördüncüsü, dulların, yetimlerin ve fakirlerin ezilmesi.</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_04_tr.html#ch4-verse-10">Yaratılış Tefsiri, Bölüm IV — "Kanın sesi"</a></cite>
