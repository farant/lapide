<blockquote>
<p>Öğrenmeye açık bir zihin, hocası olmasa bile övgüye değerdir. Biz senin ne bulduğuna değil, ne aradığına bakarız. Yumuşak balmumu, şekil verilmesi kolaydır; sanatkârın ve heykeltıraşın elleri dursa bile, kendi erdemiyle olabileceği her şeydir.</p>
<cite>— Aziz Hieronymus, <a href="02_Clemens_Hieronymi_Du_Culte_tr.html#jerome-to-paulinus">Hieronymus'tan Paulinus'a</a></cite>
</blockquote>
