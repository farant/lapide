<blockquote>
<p>Bunlar, bütün dünyayı dünyayı hor görmeye ve gönüllü yoksulluğa ikna eden sözlerdir; bunlar, keşişler için manastırları ve münzeviler için çölleri dolduran sözlerdir.</p>
<cite>— Aziz Bernardus, in Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_tr.html#chapter-i">Kutsal Yazı'nın Önsözü ve Övgüsü — Bölüm I</a></cite>
</blockquote>
