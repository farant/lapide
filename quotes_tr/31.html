<blockquote>
<p>Gelecek şeyleri bile bilme arzusu taşıyan biri varsa, kalbi saf olsun; zira ben inanıyorum ki, Tanrı'ya hizmet eden bir ruh, yeniden doğduğu saflıkta sebat etmişse, cinlerden daha fazlasını bilebilir.</p>
<cite>— Aziz Antonius, in Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_tr.html#chapter-v">Kutsal Yazı'nın Önsözü ve Övgüsü — Bölüm V</a></cite>
</blockquote>
