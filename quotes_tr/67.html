<blockquote>
<p>Theodoretus'un söylediğine göre, Tanrı önce üflemiştir; böylece bir ruhu yaratmanın Tanrı için, bir insanın nefes alması kadar kolay olduğunu göstermiştir.</p>
<cite>— Theodoretus, in Cornelius a Lapide, <a href="01_genesis_02_tr.html#verse-7">Yaratılış Tefsiri, Bölüm II — "Ayet 7: Rab Tanrı insanı yerin toprağından biçimlendirdi"</a></cite>
</blockquote>
