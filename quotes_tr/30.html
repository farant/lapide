<blockquote>
<p>Kutsal Yazı'nın ilâhî söylemi, hem sığ hem de derin bir nehirdir; kuzunun yürüyebildiği ve filin yüzebildiği bir nehir.</p>
<cite>— Aziz Gregorius, in Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_tr.html#chapter-v">Kutsal Yazı'nın Önsözü ve Övgüsü — Bölüm V</a></cite>
</blockquote>
