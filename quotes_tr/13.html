<blockquote>
<p>Sana yalvarırım, en sevgili kardeşim, bu şeyler arasında yaşa, bunları tefekkür et, başka bir şey bilme, başka bir şey arama. Sana daha şimdiden burada, yeryüzünde, göksel krallığın bir meskeni gibi görünmüyor mu?</p>
<cite>— Aziz Hieronymus, <a href="02_Clemens_Hieronymi_Du_Culte_tr.html#jerome-to-paulinus">Hieronymus'tan Paulinus'a</a></cite>
</blockquote>
