<blockquote>
<p>Tanrı'dan daha mükemmel bir yaratıcı, Tanrı'nın Kelâmından daha etkili bir sanat, İyi olan tarafından iyinin yaratılmasından daha iyi bir sebep yoktur.</p>
<cite>— Aziz Augustinus, in Cornelius a Lapide, <a href="01_genesis_01_tr.html#verse-4">Yaratılış Tefsiri, Bölüm I — "Ve Tanrı ışığın iyi olduğunu gördü"</a></cite>
</blockquote>
