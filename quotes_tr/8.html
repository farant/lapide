<blockquote>
<p>Hakikaten ve vicdanım üzerine söylüyorum ki insanların en akılsızıyım ve insanların hikmeti bende yoktur; girişini de çıkışını da bilmeyen küçük bir çocuğum.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_tr.html#life">Ön Bilgiler — Cornelius a Lapide'nin Hayatı</a></cite>
