<blockquote>
<p>Herhangi bir kazanç elde edilen şeylerin hepsinden, tarımdan daha iyi, daha verimli, daha tatlı ve özgür bir insana daha layık hiçbir şey yoktur.</p>
<cite>— Cicero, in Cornelius a Lapide, <a href="01_genesis_02_tr.html#verse-15">Yaratılış Tefsiri, Bölüm II — "Ayet 15: Rab Tanrı insanı alıp cennet bahçesine yerleştirdi"</a></cite>
