<blockquote>
<p>Bu Kilisenin Piskoposu tarafından mağlup edildik; o, tehditlere boyun eğmez, tartışmada daha sağlamdır, güzel sözlere karşı daha güçlüdür. Daha ürkek birini denemek gerekir.</p>
<cite>— Modestus, in Cornelius a Lapide, <a href="01_Preliminares_tr.html#dedicatory-letter">Ön Bilgiler — İthaf Mektubu</a></cite>
</blockquote>
