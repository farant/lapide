<blockquote>
<p>Bizi Kendin için yarattın, ey Rabbimiz, ve kalbimiz Sende huzur buluncaya dek huzursuzdur. Gök ve yer, ey Rabbimiz, Seni sevmemiz gerektiğini haykırır.</p>
<cite>— Aziz Augustinus, in Cornelius a Lapide, <a href="01_genesis_01_tr.html#he-created">Yaratılış Tefsiri, Bölüm I — "Yarattı"</a></cite>
</blockquote>
