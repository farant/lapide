<blockquote>
<p>Bunlar çocukça şeylerdir, şarlatanların oyunlarına benzer — bilmediğin şeyi öğretmek; daha doğrusu, öfkeyle söyleyeyim, bilmediğini bile bilmemek.</p>
<cite>— Aziz Hieronymus, <a href="02_Clemens_Hieronymi_Du_Culte_tr.html#jerome-to-paulinus">Hieronymus'tan Paulinus'a</a></cite>
</blockquote>
