<blockquote>
<p>Hâbil'in düsturu şudur: "Semiz bir kurban sunacağım; cılız olanı takdim etmeyeceğim." Kâin'inki ise bunun tam tersidir: "Cılız olanı kurban edeceğim; semiz kurbanı sunmayacağım."</p>
<cite>— Aziz Ambrosius, in Cornelius a Lapide, <a href="01_genesis_04_tr.html#ch4-verse-3">Yaratılış Tefsiri, Bölüm IV — "Günler geçtikten sonra"</a></cite>
</blockquote>
