<blockquote>
<p>Kutsal Yazarların dilleri ve elleri, aynı Kutsal Ruh'un kalemlerinden başka bir şey değildi; öyle ki farklı yazarlar değil, tek bir Yazarın farklı kalemleri olmuş gibi görünürler.</p>
<cite>— Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_tr.html#sacred-writers-as-pens">Kutsal Yazı'nın Önsözü ve Övgüsü — Kutsal Ruh'un Kalemleri Olarak Kutsal Yazarlar</a></cite>
</blockquote>
