<blockquote>
<p>Tanrı'nın mabedinde herkes elinden geleni sunar: kimileri altın, gümüş ve kıymetli taşlar sunar; kimileri ince keten, erguvan, kırmızı ve lacivert kumaş sunar; bizim için, deri ve keçi kılı sunabildiysek ne mutlu bize.</p>
<cite>— Aziz Hieronymus, <a href="02_Clemens_Hieronymi_Du_Culte_tr.html#helmeted-prologue">Miğferli Önsöz</a></cite>
</blockquote>
