<blockquote>
<p>Biri haz yoluyla utanç verici bir şey yaptığında, tatlı olan gider, utanç verici ve acı olan kalır. Aksine, erdemlerin meşakkatinde, zor ve acı olan gider, tatlı ve sevinçli olan kalır.</p>
<cite>— Musonius, in Cornelius a Lapide, <a href="01_genesis_03_tr.html#verse-7">Yaratılış Tefsiri, Bölüm III — "İkisinin de gözleri açıldı"</a></cite>
</blockquote>
