<blockquote>
<p>ക്രിസ്ത്യാനികൾ കിഴക്കോട്ടു തിരിഞ്ഞ് പ്രാർഥിക്കുന്നു, അങ്ങനെ പാപത്താൽ ബഹിഷ്കരിക്കപ്പെട്ട പറുദീസായെ അവർ ഓർക്കേണ്ടതിന്.</p>
<cite>— വിശുദ്ധ ക്രിസോസ്തോമൂസ്, തെയോഡൊറേത്തൂസ്, ദമാസ്കസിലെ യോഹന്നാൻ, in Cornelius a Lapide, <a href="01_genesis_02_ml.html#verse-8">ഉല്പത്തി വ്യാഖ്യാനം, അധ്യായം II — "വാക്യം 8: കർത്താവായ ദൈവം ഒരു ആനന്ദോദ്യാനം നട്ടു"</a></cite>
</blockquote>
