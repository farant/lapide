<blockquote>
<p>ആട്ടിക്ക ഭാഷയിൽ സംസാരിക്കുന്ന മോശയല്ലാതെ മറ്റെന്താണ് പ്ലേറ്റോ?</p>
<cite>— നുമേനിയൂസ്, in Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ml.html#moses-and-christ">വിശുദ്ധ ഗ്രന്ഥത്തിന്റെ മുഖവുരയും പ്രശംസയും — "മോശയും ക്രിസ്തുവും: പത്തൊമ്പത് സമാന്തരങ്ങൾ"</a></cite>
</blockquote>
