<blockquote>
<p>ഹോമറോസ് രാജാവിനെ ജനങ്ങളുടെ ഇടയൻ എന്നു വിളിക്കുന്നു, എന്തെന്നാൽ ഒരു ഇടയൻ ആടുകളെ മേയ്ക്കുന്നതുപോലെ അവൻ അവരെ പോഷിപ്പിക്കേണ്ടതാണ്, അല്ലാതെ അവരെ കൊള്ളയടിക്കേണ്ടതല്ല.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_ml.html#dedicatory-letter">പ്രാരംഭകാര്യങ്ങൾ — സമർപ്പണ ലേഖനം</a></cite>
</blockquote>
