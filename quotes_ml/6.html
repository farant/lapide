<blockquote>
<p>ചാറുകൾക്ക് രുചിചേർക്കുന്നത് നോക്കുക എന്നതാണ് നിൻ്റെ കാര്യം; കാരണം നിൻ്റെ ചെവികൾ അഴുക്കുകൊണ്ട് അടഞ്ഞിരിക്കുന്നതിനാൽ വിശുദ്ധ ഉപദേശം കേൾക്കാൻ നിനക്ക് കഴിയില്ല.</p>
<cite>— വിശുദ്ധ ബസിലിയൂസ് മഹാനായവൻ, in Cornelius a Lapide, <a href="01_Preliminares_ml.html#dedicatory-letter">പ്രാരംഭകാര്യങ്ങൾ — സമർപ്പണ ലേഖനം</a></cite>
</blockquote>
