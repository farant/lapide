<blockquote>
<p>ഭൂമിയിൽനിന്ന് ദൈവത്തിങ്കലേക്ക് എത്തുന്നത് ഞരക്കവും വിലാപവും മാത്രം; സ്വർഗത്തിൽനിന്ന് നമ്മിലേക്ക് ഇറങ്ങിവരുന്നത് കാരുണ്യവും ക്ഷമയും മാത്രം.</p>
<cite>— ഫാ. ലക്കോർദേർ, <a href="02_Clemens_Hieronymi_Du_Culte_ml.html#du-culte">തിരുവെഴുത്തുകളിൽ യേശുക്രിസ്തുവിന്റെ ആരാധന</a></cite>
