<blockquote>
<p>ലാഭം തേടുന്ന സകല കാര്യങ്ങളിലും കൃഷിയെക്കാൾ നല്ലതോ, ഫലപ്രദമായതോ, മധുരതരമായതോ, സ്വതന്ത്ര മനുഷ്യന് യോഗ്യതരമായതോ മറ്റൊന്നുമില്ല.</p>
<cite>— സിസെറോ, in Cornelius a Lapide, <a href="01_genesis_02_ml.html#verse-15">ഉല്പത്തി വ്യാഖ്യാനം, അധ്യായം II — "വാക്യം 15: കർത്താവായ ദൈവം മനുഷ്യനെ എടുത്ത് പറുദീസായിൽ ആക്കി"</a></cite>
</blockquote>
