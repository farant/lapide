<blockquote>
<p>സത്യമായും എൻ്റെ മനസ്സാക്ഷിയിലും, ഞാൻ മനുഷ്യരിൽ ഏറ്റവും മൂഢനാണ്, മനുഷ്യരുടെ ജ്ഞാനം എന്നോടുകൂടെ ഇല്ല; സ്വന്തം പുറപ്പാടും വരവും അറിയാത്ത ഒരു ചെറിയ ശിശുവാണ് ഞാൻ.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_ml.html#life">പ്രാരംഭകാര്യങ്ങൾ — കൊർണേലിയൂസ് ആ ലാപ്പിദെയുടെ ജീവിതം</a></cite>
</blockquote>
