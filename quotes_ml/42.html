<blockquote>
<p>കർത്താവേ, നീ ഞങ്ങളെ നിനക്കുവേണ്ടി സൃഷ്ടിച്ചു, നിന്നിൽ വിശ്രമിക്കുന്നതുവരെ ഞങ്ങളുടെ ഹൃദയം അസ്വസ്ഥമാണ്. കർത്താവേ, ഞങ്ങൾ നിന്നെ സ്നേഹിക്കണമെന്ന് ആകാശവും ഭൂമിയും വിളിച്ചുപറയുന്നു.</p>
<cite>— വിശുദ്ധ അഗസ്റ്റിനൂസ്, in Cornelius a Lapide, <a href="01_genesis_01_ml.html#he-created">ഉല്പത്തി വ്യാഖ്യാനം, അധ്യായം I — "അവൻ സൃഷ്ടിച്ചു"</a></cite>
</blockquote>
