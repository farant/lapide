<blockquote>
<p>ദൈവത്തെക്കാൾ ഉത്തമനായ ഗ്രന്ഥകാരൻ ഇല്ല; ദൈവവചനത്തെക്കാൾ ഫലപ്രദമായ കല ഇല്ല; നന്മയാൽ നന്മ സൃഷ്ടിക്കപ്പെടുന്നതിനെക്കാൾ ഉത്തമമായ കാരണം ഇല്ല.</p>
<cite>— വിശുദ്ധ അഗസ്റ്റിനൂസ്, in Cornelius a Lapide, <a href="01_genesis_01_ml.html#verse-4">ഉല്പത്തി വ്യാഖ്യാനം, അധ്യായം I — "വാക്യം 4: ദൈവം വെളിച്ചം നല്ലതെന്നു കണ്ടു"</a></cite>
</blockquote>
