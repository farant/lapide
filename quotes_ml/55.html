<blockquote>
<p>വെറുതെ പ്രകാശിക്കുന്നത് വ്യർഥമാണ്, വെറുതെ ജ്വലിക്കുന്നത് അൽപ്പമാണ്, ജ്വലിക്കുകയും പ്രകാശിക്കുകയും ചെയ്യുന്നതാണ് പൂർണം.</p>
<cite>— വിശുദ്ധ ബെർണാർദൂസ്, in Cornelius a Lapide, <a href="01_genesis_01_ml.html#verse-16">ഉല്പത്തി വ്യാഖ്യാനം, അധ്യായം I — "വാക്യം 16: ദൈവം രണ്ടു വലിയ ജ്യോതിസ്സുകളെ ഉണ്ടാക്കി"</a></cite>
</blockquote>
