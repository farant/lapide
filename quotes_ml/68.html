<blockquote>
<p>ദൈവം തന്റെ സ്വന്തം ശ്വാസവും ആത്മാവും മനുഷ്യനു നൽകിയപ്പോൾ, അവൻ തന്നെത്തന്നെ നൽകി, തന്റെ സ്വന്തം ഹൃദയം അവനിൽ സ്ഥാപിച്ചതുപോലെ.</p>
<cite>— കൊർണേലിയൂസ് ആ ലാപ്പിഡെ, <a href="01_genesis_02_ml.html#verse-7">ഉല്പത്തി വ്യാഖ്യാനം, അധ്യായം II — "വാക്യം 7: കർത്താവായ ദൈവം ഭൂമിയിലെ കളിമണ്ണിൽനിന്ന് മനുഷ്യനെ രൂപപ്പെടുത്തി"</a></cite>
</blockquote>
