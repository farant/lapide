<blockquote>
<p>വിശുദ്ധ ലേഖനങ്ങളിൽ ഒരു അക്ഷരമോ ഒരൊറ്റ വരയോ പോലും ഇല്ല, അതിന്റെ ആഴങ്ങളിൽ എന്തെങ്കിലും മഹത്തായ നിധി മറഞ്ഞിരിക്കാത്തതായി.</p>
<cite>— വിശുദ്ധ ക്രിസോസ്തോമൂസ്, in Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ml.html#chapter-iv">വിശുദ്ധ ഗ്രന്ഥത്തിന്റെ മുഖവുരയും പ്രശംസയും — നാലാം അധ്യായം: "സഭാപിതാക്കന്മാരുടെ വിധികളും മാതൃകകളും"</a></cite>
</blockquote>
