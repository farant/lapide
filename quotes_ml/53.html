<blockquote>
<p>സ്വർഗ്ഗരാജ്യത്തോട് താരതമ്യം ചെയ്യാവുന്ന ഒന്നുമില്ല; കാരണം മുഴുവൻ ലോകത്തെയും തുല്യമായ തുലാസിൽ തൂക്കിയാലും ഒരൊറ്റ ആത്മാവിനോട് അതിനെ താരതമ്യം ചെയ്യാൻ കഴിയില്ല.</p>
<cite>— മേനാസ്, in Cornelius a Lapide, <a href="01_genesis_01_ml.html#verse-16">ഉല്പത്തി വ്യാഖ്യാനം, അധ്യായം I — "വാക്യം 16: ദൈവം രണ്ടു വലിയ ജ്യോതിസ്സുകളെ ഉണ്ടാക്കി"</a></cite>
</blockquote>
