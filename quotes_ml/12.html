<blockquote>
<p>ഇവ ബാലിശമായ കാര്യങ്ങളാണ്, കള്ളവേഷക്കാരുടെ വിനോദങ്ങൾക്കു സമാനം — നിനക്ക് അറിയാത്തത് പഠിപ്പിക്കുക; അല്ലെങ്കിൽ, ക്ഷോഭത്തോടെ പറയട്ടെ, നിനക്ക് അറിയില്ലെന്നുപോലും അറിയാതിരിക്കുക.</p>
<cite>— ഹിയെറോനിമൂസ്, <a href="02_Clemens_Hieronymi_Du_Culte_ml.html#jerome-to-paulinus">ഹിയെറോനിമൂസ് പൗലിനൂസിന്</a></cite>
</blockquote>
