<blockquote>
<p>ഒരു ആത്മാവിനെ സൃഷ്ടിക്കുക ദൈവത്തിന് ഒരു മനുഷ്യൻ ശ്വസിക്കുന്നതുപോലെ എളുപ്പമാണെന്ന് കാണിക്കാനാണ് അവൻ ശ്വസിച്ചത്.</p>
<cite>— തെയോഡൊറേത്തൂസ്, in Cornelius a Lapide, <a href="01_genesis_02_ml.html#verse-7">ഉല്പത്തി വ്യാഖ്യാനം, അധ്യായം II — "വാക്യം 7: കർത്താവായ ദൈവം ഭൂമിയിലെ കളിമണ്ണിൽനിന്ന് മനുഷ്യനെ രൂപപ്പെടുത്തി"</a></cite>
</blockquote>
