<blockquote>
<p>വിശുദ്ധ ഗ്രന്ഥത്തിന്റെ ദൈവിക പ്രഭാഷണം ആഴം കുറഞ്ഞതും ആഴമേറിയതുമായ ഒരു നദിയാണ്, അതിൽ കുഞ്ഞാടിന് നടക്കാനും ആനയ്ക്ക് നീന്താനും കഴിയും.</p>
<cite>— വിശുദ്ധ ഗ്രെഗോരിയൂസ്, in Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ml.html#chapter-v">വിശുദ്ധ ഗ്രന്ഥത്തിന്റെ മുഖവുരയും പ്രശംസയും — അഞ്ചാം അധ്യായം: "ഈ പഠനത്തിന് ആവശ്യമായ മനോഭാവങ്ങൾ"</a></cite>
</blockquote>
