<blockquote>
<p>ഒരു മെത്രാന് ഉദ്യാനത്തിന്റെ ആവശ്യമില്ല, അദ്ദേഹത്തിന്റെ ഉദ്യാനം വിശുദ്ധ ബൈബിൾ ആയിരുന്നു.</p>
<cite>— വിശുദ്ധ കാർലോസ് ബൊറോമേയൂസ്, in Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_ml.html#saintly-examples">വിശുദ്ധ ഗ്രന്ഥത്തിന്റെ മുഖവുരയും പ്രശംസയും — "തിരുവെഴുത്ത് പഠനത്തിന്റെ വിശുദ്ധ മാതൃകകൾ"</a></cite>
</blockquote>
