<blockquote>
<p>ഈ സഭയുടെ മെത്രാനാൽ നാം പരാജിതരായിരിക്കുന്നു; ഭീഷണികളെക്കാൾ അവൻ ഉന്നതനാണ്, വാദത്തിൽ കൂടുതൽ ദൃഢനാണ്, മധുരവാക്കുകളെക്കാൾ ശക്തനാണ്. കൂടുതൽ ഭീരുവായ ആരെയെങ്കിലും പരീക്ഷിക്കണം.</p>
<cite>— Modestus, in Cornelius a Lapide, <a href="01_Preliminares_ml.html#dedicatory-letter">പ്രാരംഭകാര്യങ്ങൾ — സമർപ്പണ ലേഖനം</a></cite>
</blockquote>
