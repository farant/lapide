<blockquote>
<p>巴尔拉姆将死亡比作一只不断追赶人的独角兽。那人奔逃，在逃跑中落入一个深坑，偶然攀住一棵正被两只老鼠啃噬的树。坑底有一条火龙，张着大口要吞噬此人。那人看见了这一切，却愚蠢地俯身去舔从树上滴落的少许蜂蜜，忘记了一切危险。独角兽追上了他；树被老鼠啃断；树倒了，那人便被火龙攫住吞噬。深坑就是世界；树就是生命；两只老鼠是白昼与黑夜；火龙是地狱的深渊；那滴蜂蜜则是世间的享乐。</p>
<cite>— 巴尔拉姆，载于科尔内留斯·阿·拉皮德，<a href="01_genesis_02_zh.html#verse-17">创世纪第二章注释 — 「知善恶树的果子你不可吃」</a></cite>
</blockquote>
