<blockquote>
<p>圣四十兵士及殉道者被总督剥去衣衫，投入冰冻的湖中以严寒杀之，他们彼此以此言互相勉励：「我们脱去的不是衣衫，而是那因私欲之诡诈而败坏的旧人；上主啊，我们感谢祢，因为借着脱去这衣衫，我们也得以脱去罪恶：因为蛇的缘故我们穿上了它，如今因基督的缘故我们将它脱去。」他们几乎被严寒夺去生命之后，又被投入烈火之中，此时天使自天上显示了他们凯旋的冠冕。</p>
<cite>— 四十位殉道者，引自科尔内留斯·阿·拉皮德，<a href="01_genesis_03_zh.html#verse-21">创世纪第三章注释 — 「天主给亚当和他的妻子做了皮衣」</a></cite>
</blockquote>
