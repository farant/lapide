<blockquote>
<p>人既然是可悲的，就让他也是暂时的罢，如此他便与天主和魔鬼都不相似：因为天主既是永恒的又是有福的，天主拥有永恒的福乐，有福的永恒。在这两者中，魔鬼失去了一样，即福乐；但他未曾失去永恒，因而他拥有的是永恒的苦难，可悲的永恒。天主说：让我们宽待人罢；既然他失去了福乐，就让我们也从这可悲者身上取去永恒；好使他在任何方面都不像我们中的一位。</p>
<cite>— 鲁佩尔图斯·图伊岑西斯，引自科尔内留斯·阿·拉皮德，<a href="01_genesis_03_zh.html#verse-22">创世纪第三章注释 — 「看，亚当已如我们中的一个」</a></cite>
</blockquote>
