<blockquote>
<p>是谁安排了跳蚤和蚊虫的肢体，使其具有秩序、生命与运动？你随意观察一只微小的虫子吧。审视其肢体的秩序和赋予其运动的生命活力，你便会发现：它自行逃避死亡，爱惜生命，追求快乐，远离痛苦，运用各种感官，以适合自身的运动有力地活动。是谁赐予蚊虫那吸血的细针？那吸管又是何等纤细！是谁安排了这一切？是谁造成了这一切？在至微小者面前惊叹吧，并赞美那至伟大者。</p>
<cite>— 圣奥思定，载于科尔内留斯·阿·拉皮德，<a href="01_genesis_01_zh.html#verse-24">创世纪第一章注释 — 「第二十四节：地上要生出各种生物」</a></cite>
</blockquote>
