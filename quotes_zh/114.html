<blockquote>
<p>人类始祖的长子是加音，属于人的城；次子是亚伯尔，属于天主的城。因此在整个人类中，当这两座城最初随着生与死开始运行其历程时，长子是此世的公民；而次子则是世间的朝圣者，属于天主之城，因恩宠而被预定，因恩宠而被拣选，因恩宠而在世间作旅人，因恩宠而成为天上的公民。因此经上记载加音建造了一座城：但亚伯尔作为朝圣者，并未建造。因为圣徒之城在上面，虽然它在此世生育公民，在这些公民中间它是朝圣的，直到它的王国来临之时——那时它将与它的元首、万世之王一同作王，永无终结。</p>
<cite>— 圣奥思定，引自科尔内留斯·阿·拉皮德，<a href="01_genesis_04_zh.html#ch4-verse-17">创世纪第四章注释 — 「他的妻子」</a></cite>
</blockquote>
