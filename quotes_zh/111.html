<blockquote>
<p>控诉的不是他的声音，不是他的灵魂，而是他的血的声音在控诉——那是你自己所倾洒的血：因此控诉你的是你自己的行为，而非你的兄弟。大地也是见证者，因为它接纳了鲜血。你的兄弟若饶恕你，大地却不饶恕你；你的兄弟若沉默不语，大地却定你的罪。它同时是控告你的见证者和审判者。因此毫无疑问，即使更高的存在——诸天、太阳、月亮、星辰、座品天使、宰制天使、率领天使、异能天使、革鲁宾和色辣芬——也都定罪了那被低下之物所定罪的人。因为一个连大地都不能宣判无罪的人，怎能在那纯洁而属天的审判中被宣判无罪呢？</p>
<cite>— 圣盎博罗削，引自科尔内留斯·阿·拉皮德，<a href="01_genesis_04_zh.html#ch4-verse-10">创世纪第四章注释 — 「血的声音」</a></cite>
</blockquote>
