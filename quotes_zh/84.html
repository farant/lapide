<blockquote>
<p>在希伯来文中，「男人」与「女人」二词包含着天主的缩写圣名「雅」(Yah)，祂是婚姻的创立者；只要这圣名留存于婚姻之中——而它之所以留存，是因为夫妻敬畏天主且彼此相爱——天主便临在于这结合之中并降福它。但若夫妻彼此憎恨、忘却天主，他们便弃绝了这圣名；当组成「雅」的字母被除去之后，男人与女人所剩下的便只是「厄什」与「厄什」，即火与火——也就是今生争吵纷扰之火，以及来世永远之火。</p>
<cite>— 辣彼亚巴郎·本·厄则辣，载于科尔内留斯·阿·拉皮德，<a href="01_genesis_02_zh.html#verse-23">创世纪第二章注释 — 「这才真是我的骨中之骨」</a></cite>
</blockquote>
