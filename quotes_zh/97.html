<blockquote>
<p>你以财富自夸，以先祖的高贵自矜，因故土和容貌之美而沾沾自喜，并为世人加诸你的荣誉而欢欣：看看你自己罢，因为你是必死的，你是灰土，你也要归于灰土。环顾那些在你之前同样光芒闪耀之人：那些民众以权势追捧的人如今安在？那些不可战胜的帝王安在？那些操办集会与盛宴的人安在？如今一切皆成尘土，一切皆成灰烬。看看那些坟墓，辨认谁是奴隶、谁是主人，谁是穷人、谁是富人。你若能够，请分辨囚徒与君王，强者与弱者，美者与丑者。</p>
<cite>— 圣奥思定，引自科尔内留斯·阿·拉皮德，<a href="01_genesis_03_zh.html#verse-19">创世纪第三章注释 — 「你原是灰土，你还要归于灰土」</a></cite>
</blockquote>
