<blockquote>
<p>基督徒典籍的深邃如此之大，纵使我自幼年至耄耋之年，以最充裕的闲暇、最高度的勤奋和更卓越的才智专心研习，也必日日有所长进。因为在信仰之外，那些进步者还有如此多的事物有待理解，隐藏在如此众多、如此纷繁的奥秘象征之下；不仅在言辞中，更在事物本身中，蕴含着如此深邃的智慧，即便是最年长、最敏锐、最渴慕学习的人，也会应验圣经所言：「人做完了，才是开始。」</p>
<cite>— 圣奥思定，载于科尔内留斯·阿·拉皮德，<a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_Pt1_zh.html#chapter-iv">圣经序论与颂词 — 第四章：教父之评断与榜样</a></cite>
</blockquote>
