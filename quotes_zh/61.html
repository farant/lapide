<blockquote>
<p>在世界这一伟大工程中，我们当默想三事：即它是什么，它如何存在，它为何而立。在万物的存在中，彰显出不可测度的权能；在其方式中，闪耀着无可比拟的智慧；在默想它为何而造时，则显露出极有益的仁慈与极仁慈的益处，其恩惠之浩大与丰厚足以折服最忘恩负义之人。因为万物实在是从无中以最大的权能被造，以最大的智慧被美丽地安排，以最大的仁慈被有益地成就。</p>
<cite>— 圣伯尔纳铎，载于科尔内留斯·阿·拉皮德，<a href="01_genesis_01_zh.html#verse-31">创世纪第一章注释 — 「第三十一节：天主看了祂造的一切，认为样样都很好」</a></cite>
</blockquote>
