<blockquote>
<p>圣道罗德亚被总督法布里丘斯押赴殉道之时满心欢喜，因为她说自己正要奔赴她的净配那里，祂的乐园绽放着万花百果的美丽。当书记员德奥斐禄戏谑地请她到了那里给他送些玫瑰时，她说：「我会送的。」她被斩首之后，有一个孩童手持盛满新鲜玫瑰的篮子出现在德奥斐禄面前——那时正值隆冬——并说这些玫瑰是道罗德亚从她净配的乐园中送来的。德奥斐禄遂归依了基督的信仰，并为此而致命殉道。</p>
<cite>— 科尔内留斯·阿·拉皮德，<a href="01_genesis_02_zh.html#verse-8">创世纪第二章注释 — 「上主天主在伊甸东方栽植了乐园」</a></cite>
</blockquote>
