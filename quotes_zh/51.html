<blockquote>
<p>想到这些，谁还愚蠢到在这寰宇中的一个小点上，以暴力或欺诈夺取邻人一方田地、一座房屋或其他财物，从而将自己排除在天界轨道的无限空间之外？谁愿以一点尘土换取天空的广袤？谁愿以一块赤土或白土——金银本质上又是什么呢——出卖那壮丽辉煌的星辰殿宇？因此，你贫穷吗？仰望苍天。你病苦吗？忍耐吧，这是通往星辰之路。你被轻视、嘲弄、迫害吗？承受吧，这是通往星辰之路。叹息吧，努力吧，劳作吧，暂时挥洒汗水吧，这是通往至福天乡之路。</p>
<cite>— 科尔内留斯·阿·拉皮德，<a href="01_genesis_01_zh.html#verse-16">创世纪第一章注释 — 「第十六节：天主造了两个大光体」</a></cite>
</blockquote>
