<blockquote>
<p>人是什么？人是命运的玩物，无常的映像，腐朽的明镜，时间的猎物，亚里士多德如是说；是死亡的奴隶，匆匆过客；是天主手中嬉戏的球，普劳图斯如是说；是一个软弱脆弱的躯体，赤裸无甲，需借他人之助，塞内加如是说；是一条腐朽的锁链，一个活着的死亡，一具有知觉的尸体，一座转动的坟墓，赫尔墨斯·特里斯墨吉斯忒如是说；是一个幻影和一道轻飘飘的影子，索福克勒斯如是说；是影子的梦，品达如是说。</p>
<cite>— 科尔内留斯·阿·拉皮德，<a href="01_genesis_03_zh.html#verse-19">创世纪第三章注释 — 「你原是灰土，你还要归于灰土」</a></cite>
</blockquote>
