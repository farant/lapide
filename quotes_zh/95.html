<blockquote>
<p>此处玫瑰与荆棘并生，几乎以明显的声音宣告：世人啊，令你们愉悦的事物皆掺杂着忧伤。因为在人间事务中，没有什么是纯粹的：忧伤紧随喜乐，丧偶紧随婚姻，操劳紧随育儿，羞辱紧随生活的光辉，损失紧随兴旺的成就，厌倦紧随欢宴，疾病紧随健康。玫瑰固然美丽，却使我忧伤。每当我看到这朵花，便记起我的罪过，因为那罪过，大地被判定要生出荆棘和蒺藜。</p>
<cite>— 圣巴西略，引自科尔内留斯·阿·拉皮德，<a href="01_genesis_03_zh.html#verse-17">创世纪第三章注释 — 「为了你的缘故，地受了诅咒」</a></cite>
</blockquote>
