<blockquote>
<p>天主注视的并非加音和亚伯尔的祭品，而是他们的心灵，因此心灵悦纳者，其祭品亦蒙悦纳。亚伯尔温良正直，以纯洁之心向天主献祭，也教导他人：当他们将礼物献于祭坛时，应当怀着敬畏天主之心、单纯之心、正义之则、和睦之平安而前来。这是理所当然的，因为他在天主的祭献中如此虔诚，此后他自己便成了献给天主的祭品。他既是第一位显示殉道的人，便以其鲜血的光荣揭开了主的苦难序幕——他既拥有主的正义，又拥有主的平安。</p>
<cite>— 圣西彼廉，引自科尔内留斯·阿·拉皮德，<a href="01_genesis_04_zh.html#ch4-verse-5">创世纪第四章注释 — 「但对加音」</a></cite>
</blockquote>
