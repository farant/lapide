<blockquote>
<p>厄娃啊，当守护托付于你的；当等待许诺于你的；当谨防禁止于你的，免得你丧失赐予于你的。你为何如此定睛注视自己的死亡？当你的注意力被引向别处时，蛇便暗暗潜入你的心中，温言软语地对你说话；以谄媚征服你的理性，以谎言平息你的恐惧；在激起贪食之时增添你的不安，在暗示渴望之时磨尖你的好奇；终于，它献上被禁止的而夺去被赐予的；它递上果实而掠走乐园。</p>
<cite>— 圣伯尔纳铎，引自科尔内留斯·阿·拉皮德，<a href="01_genesis_03_zh.html#verse-6">创世纪第三章注释 — 「女人于是看见」</a></cite>
</blockquote>
