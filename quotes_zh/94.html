<p>圣依拉略在临终时恐惧，便对自己说：「你事奉上主将近七十年，还害怕死吗？」修院长帕蒙博临终时说：「我现在就要到我的天主那里去；但我如同一个才刚刚开始真正而正确地敬拜天主的人。」阿尔塞尼乌斯说：「求主恩准，至少从现在起我开始虔诚地生活。」圣方济各临终前说：「弟兄们，到如今我们进步甚微；现在让我们开始事奉天主罢。」安多尼说：「今天，就当你方才拥抱了修道生活。」而一生圣善的阿加通常常说：「我害怕死亡，因为天主的判断与人的判断迥然不同。」</p>
<cite>— 科尔内留斯·阿·拉皮德，<a href="01_genesis_03_zh.html#verse-15">创世纪第三章注释 — 「她要踏碎你的头（原始福音）」</a></cite>
</blockquote>
