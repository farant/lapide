<blockquote>
<p>希伯来民族从埃及带走的金银和衣物，远不及他们后来在耶路撒冷、尤其在撒罗满治下所获得的财富；同样，从外邦典籍中采集的一切学问，即便有用，若与圣经的知识相比，也是微不足道的。因为人在别处所学的，若是有害的，在圣经中已被谴责；而当人在圣经中找到了在别处有益地学到的一切时，更会在其中丰盛地发现那些在别处绝不能学到、唯有在圣经那奇妙的深邃与奇妙的谦卑中才能获得的宝藏。</p>
<cite>— 圣奥思定，载于科尔内留斯·阿·拉皮德，<a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_Pt1_zh.html#chapter-ii">圣经序论与颂词 — 第二章：论圣经之对象与广度</a></cite>
</blockquote>
