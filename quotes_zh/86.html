<blockquote>
<p>狄多积聚了大量金银之后，航行至非洲并在那里创建了迦太基城；当利比亚王希阿尔巴斯向她求婚时，她为纪念亡夫息凯乌斯筑起一座火葬台，纵身跃入其中，宁愿焚身也不愿另嫁他人。一位贞洁的女子创建了迦太基；同一座城邦又以贞洁的赞颂而终结。因为当迦太基被攻陷焚毁之际，哈斯德鲁巴尔之妻眼见自己即将被罗马人俘获，便一手挽着一个幼子，纵身投入自家房屋下燃烧的烈火之中。</p>
<cite>— 科尔内留斯·阿·拉皮德，<a href="01_genesis_02_zh.html#verse-24">创世纪第二章注释 — 「人当离开父母」</a></cite>
</blockquote>
