<blockquote>
<p>魔鬼所行之事，正如医生惯常所为：医生将苦药——若一次全部给予，病人必会吐出——分成数份，逐次灌入，使病人不知不觉中将其全部吞下。同样，魔鬼将死亡分成许多部分和年岁，劝诱年轻人说：你不会在青春和壮年中死去。他劝诱学生说：你不会在学业完成之前死去。总之，无人年迈到不自以为至少还能再活一年。由此便引出一个至为真确的格言：死亡之于每一个人，比每一个人所猜想的都更为切近。</p>
<cite>— 科尔内留斯·阿·拉皮德，<a href="01_genesis_03_zh.html#verse-4">创世纪第三章注释 — 「你们决不会死」</a></cite>
</blockquote>
