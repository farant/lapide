<blockquote>
<p>请注意，意志的统治权是何等广大——不仅统治外在的动作和行为，而且统治内在的欲望和情欲。纵然你感受到最猛烈的愤怒或情欲的冲动，你当以坚定不移的意志抵抗它们，并说：我拒绝同意，它们使我不悦，我憎恶它们；如此你便能制服愤怒与情欲，你便能在天主和世人面前不是一个暴怒之人，而是一位温和地驯服愤怒的人；不是淫荡之人，而是一位贞洁地征服情欲的人。意志的力量和权威竟是如此之大。圣金口若望说：「意志的力量是伟大的，它使我们能做我们所愿的，不能做我们所不愿的。」</p>
<cite>— 科尔内留斯·阿·拉皮德，<a href="01_genesis_04_zh.html#ch4-verse-7">创世纪第四章注释 — 「你若行善」</a></cite>
</blockquote>
