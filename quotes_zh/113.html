<blockquote>
<p>请注意加音身上罪的效果和惩罚。共有六种。第一是身体的颤抖；第二是流放和逃亡；第三是心灵的恐惧和惊惶——「凡遇见我的，必要杀我。」加音啊，你害怕什么？除了你和你的父母，世上还没有其他人。第四：大地本身追逐加音，拒绝给他果实，把他作为逃亡者驱逐出去。第五：除了可怖的闪电和雷鸣之外，加音看到天使们手持火剑威胁要置他于死地；若他目光投向地面，他似乎看到毒蛇、猛狮和野兽向他扑来。第六：加音在大地上成了流亡者，最终藏身于森林之中，被辣默客所杀。那么，圣金口若望所说的「罪是自愿的疯狂和自己选择的魔鬼」，岂不是真实的吗？</p>
<cite>— 科尔内留斯·阿·拉皮德，<a href="01_genesis_04_zh.html#ch4-verse-14">创世纪第四章注释 — 「你看，你驱逐了我」</a></cite>
</blockquote>
