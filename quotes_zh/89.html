<blockquote>
<p>你当在一切行为和一切思虑中如此安排自己，仿佛今日或此刻便要死去。晨光初露时，当想你或许活不到日暮；夜幕降临时，不可自许能见到明朝。因此当时刻准备就绪，如此生活，使死亡永远不会在你毫无准备时来临。趁你尚有时间，当为自己积攒不朽的财富；除了你的救恩之外，莫思虑其他事情；唯独挂念天主的事；当以旅客和异乡人的身份自守于世；保守你的心灵自由而高举于天主，因为在此世你没有永久的城邑。</p>
<cite>— 多默·肯培，引自科尔内留斯·阿·拉皮德，<a href="01_genesis_03_zh.html#verse-4">创世纪第三章注释 — 「你们决不会死」</a></cite>
</blockquote>
