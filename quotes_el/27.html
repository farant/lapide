<blockquote>
<p>Δεν υπάρχει συλλαβή, ούτε καν μία κεραία στα ιερά Γράμματα, στα βάθη της οποίας να μην κρύβεται κάποιος μεγάλος θησαυρός.</p>
<cite>— Αγ. Ιωάννης Χρυσόστομος, στον Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_el.html#chapter-iv">Προοίμιο και Εγκώμιο της Αγίας Γραφής — Κεφάλαιο Δ΄: Οι Κρίσεις και τα Παραδείγματα των Πατέρων</a></cite>
</blockquote>
