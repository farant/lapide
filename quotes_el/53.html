<blockquote>
<p>Τίποτε δεν μπορεί να συγκριθεί με τη βασιλεία των ουρανών· διότι ολόκληρος ο κόσμος, ζυγισμένος σε ίση πλάστιγγα, δεν μπορεί να εξισωθεί με μία μόνο ψυχή.</p>
<cite>— Αγ. Μηνάς, in Cornelius a Lapide, <a href="01_genesis_01_el.html#verse-16">Υπόμνημα στη Γένεση, Κεφάλαιο Α΄</a></cite>
</blockquote>
