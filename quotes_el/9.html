<blockquote>
<p>Στον ναό του Θεού, ο καθένας προσφέρει ό,τι μπορεί: άλλοι χρυσό, ασήμι και πολύτιμους λίθους· άλλοι προσφέρουν λινό, πορφύρα, κόκκινο και υάκινθο. Για μας, καλά πάμε αν προσφέρουμε δέρματα και τρίχες κατσίκας.</p>
<cite>— Αγ. Ιερώνυμος, <a href="02_Clemens_Hieronymi_Du_Culte_el.html#helmeted-prologue">Ο Θωρακισμένος Πρόλογος</a></cite>
</blockquote>
