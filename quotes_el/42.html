<blockquote>
<p>Μας δημιούργησες, Κύριε, για Σένα, και ανήσυχη είναι η καρδιά μας, ώσπου να αναπαυθεί σε Σένα. Ο ουρανός και η γη κράζουν, Κύριε, να Σε αγαπήσουμε.</p>
<cite>— Αγ. Αυγουστίνος, in Cornelius a Lapide, <a href="01_genesis_01_el.html#he-created">Υπόμνημα στη Γένεση, Κεφάλαιο Α΄</a></cite>
</blockquote>
