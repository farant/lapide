<blockquote>
<p>Ο θεϊκός λόγος της Αγίας Γραφής είναι ένα ποτάμι συγχρόνως ρηχό και βαθύ, στο οποίο το αρνί μπορεί να περπατήσει και ο ελέφαντας μπορεί να κολυμπήσει.</p>
<cite>— Αγ. Γρηγόριος, στον Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_el.html#chapter-v">Προοίμιο και Εγκώμιο της Αγίας Γραφής — Κεφάλαιο Ε΄: Περί των Απαιτούμενων Διαθέσεων για αυτή τη Μελέτη</a></cite>
</blockquote>
