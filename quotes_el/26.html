<blockquote>
<p>Τόσο μεγάλο είναι το βάθος των χριστιανικών γραμμάτων, ώστε θα προόδευα σε αυτά καθημερινά... Όταν ο άνθρωπος τελειώσει, τότε αρχίζει.</p>
<cite>— Αγ. Αυγουστίνος, στον Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_el.html#chapter-iv">Προοίμιο και Εγκώμιο της Αγίας Γραφής — Κεφάλαιο Δ΄: Οι Κρίσεις και τα Παραδείγματα των Πατέρων</a></cite>
</blockquote>
