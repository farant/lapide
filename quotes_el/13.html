<blockquote>
<p>Σε παρακαλώ, αγαπητέ αδελφέ, να ζεις ανάμεσα σε αυτά, να τα μελετάς, να μη γνωρίζεις τίποτε άλλο, να μην αναζητάς τίποτε άλλο. Δεν σου φαίνεται ότι αυτό είναι ήδη εδώ στη γη η κατοικία της ουράνιας βασιλείας;</p>
<cite>— Αγ. Ιερώνυμος, <a href="02_Clemens_Hieronymi_Du_Culte_el.html#jerome-to-paulinus">Ιερώνυμος προς Παυλίνο</a></cite>
</blockquote>
