<blockquote>
<p>Αφηγούνται οι ιστορικοί ότι ο Ξέρξης, ενώ κάλυπτε τη γη με τον στρατό του και τη θάλασσα με τον στόλο του, κοιτάζοντας όλο αυτό το πλήθος από ένα ύψωμα, στέναξε και έκλαψε, λέγοντας: «Από όλους αυτούς κανείς δεν θα ζει μετά από εκατό χρόνια.»</p>
<cite>— Cornelius a Lapide, <a href="01_genesis_02_el.html#verse-17">Υπόμνημα στη Γένεση, Κεφάλαιο Β΄</a></cite>
</blockquote>
