<blockquote>
<p>Ούτε δημιουργός υπάρχει εξοχότερος του Θεού· ούτε τέχνη αποτελεσματικότερη του λόγου του Θεού· ούτε αιτία καλύτερη από το να δημιουργηθεί το αγαθό από τον Αγαθό.</p>
<cite>— Αγ. Αυγουστίνος, in Cornelius a Lapide, <a href="01_genesis_01_el.html#verse-4">Υπόμνημα στη Γένεση, Κεφάλαιο Α΄</a></cite>
</blockquote>
