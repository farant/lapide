<blockquote>
<p>Η παντοδυναμία του παντοδύναμου Δημιουργού είναι η αιτία της υπάρξεως κάθε κτίσματος· αν αυτή η δύναμη έπαυε κάποτε να κυβερνά όσα δημιουργήθηκαν, τότε θα έπαυε αμέσως και η μορφή τους, και ολόκληρη η φύση τους θα κατέρρεε.</p>
<cite>— Αγ. Αυγουστίνος, in Cornelius a Lapide, <a href="01_genesis_02_el.html#verse-2-2">Υπόμνημα στη Γένεση, Κεφάλαιο Β΄</a></cite>
</blockquote>
