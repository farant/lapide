<blockquote>
<p>Είναι καλύτερο να πίνεις πάντοτε ή να τρως πάντοτε; Βεβαίως, όπως και τα δύο χρειάζονται εναλλάξ, έτσι αρμόζει να προσεύχεσαι και να μελετάς την Αγία Γραφή εναλλάξ.</p>
<cite>— Αγ. Ιορδάνης, στον Cornelius a Lapide, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_el.html#saintly-examples">Προοίμιο και Εγκώμιο της Αγίας Γραφής — Αγιασμένα Παραδείγματα Μελέτης της Γραφής</a></cite>
</blockquote>
