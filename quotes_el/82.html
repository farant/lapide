<blockquote>
<p>Από όλα τα πράγματα από τα οποία κερδίζει κανείς κάτι, τίποτε δεν είναι καλύτερο από τη γεωργία, τίποτε πιο εύφορο, τίποτε πιο γλυκό, τίποτε πιο αντάξιο ενός ελεύθερου ανθρώπου.</p>
<cite>— Κικέρων, in Cornelius a Lapide, <a href="01_genesis_02_el.html#verse-15">Υπόμνημα στη Γένεση, Κεφάλαιο Β΄</a></cite>
</blockquote>
