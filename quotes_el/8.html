<blockquote>
<p>Αληθώς και στη συνείδησή μου, είμαι ο πιο ανόητος των ανθρώπων, και η σοφία των ανθρώπων δεν είναι μέσα μου· είμαι ένα μικρό παιδί που δεν γνωρίζει ούτε την είσοδό του ούτε την έξοδό του.</p>
<cite>— Cornelius a Lapide, <a href="01_Preliminares_el.html#life">Προκαταρκτικά — Βίος του Cornelius a Lapide</a></cite>
</blockquote>
