<p>Εκείνος που δεν κατέχει τίποτα δεν υπόκειται σε δήμευση περιουσίας: εκτός αν χρειάζεσαι αυτά τα σκισμένα και φθαρμένα κουρέλια μου και τα λίγα μου βιβλία, στα οποία βρίσκονται όλος ο πλούτος και τα μέσα μου.</p>
<cite>— Μέγας Βασίλειος, <a href="01_Preliminares_el.html#dedicatory-letter">Προκαταρκτικά — Αφιερωτική Επιστολή</a></cite>
