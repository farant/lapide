<blockquote>
<p>Παιδί μου, παιδί μου, θυμήσου την αιώνια ζωή, κοίταξε τον ουρανό και ατένισε εκείνον που βασιλεύει εκεί· διότι δεν σου αφαιρείται η ζωή, αλλά μεταβάλλεται σε κάτι καλύτερο.</p>
<cite>— Μητέρα του Αγ. Συμφοριανού, in Cornelius a Lapide, <a href="01_genesis_01_el.html#verse-16">Υπόμνημα στη Γένεση, Κεφάλαιο Α΄</a></cite>
</blockquote>
