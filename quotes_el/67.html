<blockquote>
<p>Ενεφύσησε λοιπόν πρώτα, για να δείξει, λέει ο Θεοδώρητος, ότι είναι τόσο εύκολο για τον Θεό να δημιουργήσει ψυχή, όσο εύκολο είναι για τον άνθρωπο να φυσήξει.</p>
<cite>— Θεοδώρητος, in Cornelius a Lapide, <a href="01_genesis_02_el.html#verse-7">Υπόμνημα στη Γένεση, Κεφάλαιο Β΄</a></cite>
</blockquote>
