<blockquote>
<p>Του Άβελ είναι αυτή η φωνή: «Θα προσφέρω παχύ ιερό θύμα, δεν θα θυσιάσω ισχνό.» Του Κάιν, αντιθέτως, αυτή: «Θα θυσιάσω ισχνό, δεν θα προσφέρω παχύ ιερό θύμα.»</p>
<cite>— Αγ. Αμβρόσιος, in Cornelius a Lapide, <a href="01_genesis_04_el.html#ch4-verse-3">Υπόμνημα στη Γένεση, Κεφάλαιο Δ΄ — «Post Multos Dies»</a></cite>
</blockquote>
