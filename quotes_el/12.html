<p>Αυτά είναι παιδαριωδίες, παρόμοιες με τα παιχνίδια των τσαρλατάνων: να διδάσκεις αυτό που αγνοείς· ακόμη χειρότερα, για να μιλήσω με αγανάκτηση, να μη γνωρίζεις καν ότι δεν γνωρίζεις.</p>
<cite>— Αγ. Ιερώνυμος, <a href="02_Clemens_Hieronymi_Du_Culte_el.html#jerome-to-paulinus">Ιερώνυμος προς Παυλίνο</a></cite>
