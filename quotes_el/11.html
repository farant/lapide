<blockquote>
<p>Ένα ευφυές πνεύμα είναι αξιέπαινο ακόμη και χωρίς δάσκαλο. Δεν εξετάζουμε τι βρίσκεις, αλλά τι αναζητάς. Το μαλακό κερί, εύκολο στη διαμόρφωση, ακόμη κι αν τα χέρια του τεχνίτη και του πλάστη αδρανούν, εντούτοις κατέχει σε δυνατότητα ό,τι μπορεί να γίνει.</p>
<cite>— Αγ. Ιερώνυμος, <a href="02_Clemens_Hieronymi_Du_Culte_el.html#jerome-to-paulinus">Ιερώνυμος προς Παυλίνο</a></cite>
</blockquote>
