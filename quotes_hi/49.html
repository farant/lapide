<blockquote>
<p>ईश्वर से उत्कृष्ट कोई कर्ता नहीं; ईश्वर के वचन से अधिक प्रभावशाली कोई कला नहीं; इससे उत्तम कोई कारण नहीं कि भले द्वारा भलाई की रचना की जाए।</p>
<cite>— संत अगस्टिनुस, कोर्नेलियूस आ लापिदे में, <a href="01_genesis_01_hi.html#verse-4">उत्पत्ति पर टीका, अध्याय १ — "पद ४: और ईश्वर ने देखा कि प्रकाश अच्छा है"</a></cite>
</blockquote>
