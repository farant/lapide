<blockquote>
<p>पृथ्वी पर उन बातों को सीखें जिनका ज्ञान स्वर्ग में हमारे साथ बना रहे। इस प्रकार अध्ययन करो मानो सदा जीवित रहोगे; इस प्रकार जीवन बिताओ मानो सदा मरणशील हो।</p>
<cite>— संत हिएरोनिमुस, कोर्नेलियूस आ लापिदे में उद्धृत, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_Pt1_hi.html#chapter-iv">पवित्र शास्त्र की भूमिका और प्रशस्ति — अध्याय IV: धर्मपिताओं के निर्णय और उदाहरण</a></cite>
</blockquote>
