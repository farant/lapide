<blockquote>
<p>इन पवित्र लेखकों की जिह्वाएँ और हाथ उसी पवित्र आत्मा की लेखनियों के अतिरिक्त और कुछ नहीं थे, इतना कि वे विभिन्न लेखक नहीं, अपितु एक ही लेखक की विभिन्न लेखनियाँ प्रतीत होते हैं।</p>
<cite>— कोर्नेलियूस आ लापिदे, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_hi.html#sacred-writers-as-pens">पवित्र शास्त्र की भूमिका और प्रशस्ति — पवित्र आत्मा की लेखनी के रूप में पवित्र लेखक</a></cite>
</blockquote>
