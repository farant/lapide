<blockquote>
<p>मैं तुमसे प्रार्थना करता हूँ, प्रियतम भ्राता, इन बातों के बीच जीवन बिताओ, इन पर मनन करो, और कुछ न जानो, और कुछ न खोजो। क्या तुम्हें यह पहले से ही यहाँ पृथ्वी पर स्वर्गिक राज्य का निवासस्थान नहीं प्रतीत होता?</p>
<cite>— संत हिएरोनिमुस, <a href="02_Clemens_Hieronymi_Du_Culte_hi.html#jerome-to-paulinus">हिएरोनिमुस का पौलिनुस को पत्र</a></cite>
</blockquote>
