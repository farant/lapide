<blockquote>
<p>होमर राजा को लोगों का चरवाहा कहता है, क्योंकि उसे उनका भरण-पोषण करना चाहिए, जैसे चरवाहा भेड़ों का करता है, न कि उन्हें लूटना चाहिए।</p>
<cite>— कोर्नेलियूस आ लापिदे, <a href="01_Preliminares_hi.html#dedicatory-letter">प्रारम्भिक सामग्री — महाधर्माध्यक्ष वान डेर बर्ख को समर्पण पत्र</a></cite>
</blockquote>
