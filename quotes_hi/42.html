<blockquote>
<p>हे प्रभु, तूने हमें अपने लिए बनाया है, और हमारा हृदय तब तक अशान्त रहता है जब तक वह तुझ में विश्राम न पाए। हे प्रभु, आकाश और पृथ्वी पुकार-पुकारकर कहते हैं कि हमें तुझसे प्रेम करना चाहिए।</p>
<cite>— संत अगस्टिनुस, कोर्नेलियूस आ लापिदे में, <a href="01_genesis_01_hi.html#he-created">उत्पत्ति पर टीका, अध्याय १ — "उसने रचना की"</a></cite>
</blockquote>
