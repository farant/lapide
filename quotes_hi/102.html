<blockquote>
<p>यह हाबिल का आदर्श वाक्य है: "मैं मोटी भेंट चढ़ाऊँगा; दुबली भेंट नहीं चढ़ाऊँगा।" इसके विपरीत, काइन का यह है: "मैं दुबली भेंट चढ़ाऊँगा; मोटी भेंट नहीं दूँगा।"</p>
<cite>— संत अम्ब्रोसियुस, कोर्नेलियूस आ लापिदे में, <a href="01_genesis_04_hi.html#ch4-verse-3">उत्पत्ति पर टीका, अध्याय ४ — "बहुत दिनों के बाद"</a></cite>
</blockquote>
