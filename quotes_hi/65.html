<blockquote>
<p>तो फिर मनुष्य का मुख क्या है, यदि वाणी का एक मन्दिर नहीं, वचन का सोता नहीं, शब्दों का भवन नहीं, इच्छा का भण्डार नहीं?</p>
<cite>— अम्ब्रोस, कोर्नेलियूस आ लापिदे में, <a href="01_genesis_02_hi.html#verse-7">उत्पत्ति पर टीका, अध्याय २ — "पद ७: और प्रभु ईश्वर ने पृथ्वी की मिट्टी से मनुष्य को रचा"</a></cite>
</blockquote>
