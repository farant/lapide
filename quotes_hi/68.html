<blockquote>
<p>जब ईश्वर ने मनुष्य को अपनी श्वास और आत्मा प्रदान की, तो उसने स्वयं को प्रदान किया, मानो उसने अपना हृदय ही उसके भीतर रख दिया हो।</p>
<cite>— कोर्नेलियूस आ लापिदे, <a href="01_genesis_02_hi.html#verse-7">उत्पत्ति पर टीका, अध्याय २ — "पद ७: और प्रभु ईश्वर ने पृथ्वी की मिट्टी से मनुष्य को रचा"</a></cite>
</blockquote>
