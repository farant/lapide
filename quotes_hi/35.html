<blockquote>
<p>क्या सदा पीते रहना श्रेष्ठ है, या सदा खाते रहना? निश्चय ही, जैसे दोनों बारी-बारी से आवश्यक हैं, वैसे ही प्रार्थना करना और पवित्र शास्त्र का अध्ययन करना बारी-बारी से उचित है।</p>
<cite>— संत जॉर्डन, कोर्नेलियूस आ लापिदे में उद्धृत, <a href="12_Proemium_Et_Encomium_Sacrae_Scripturae_hi.html#saintly-examples">पवित्र शास्त्र की भूमिका और प्रशस्ति — शास्त्र-अध्ययन के पवित्र उदाहरण</a></cite>
</blockquote>
