<blockquote>
<p>ये बचकानी बातें हैं, बाज़ीगरों के खेल के समान — जो तुम नहीं जानते उसे सिखाना; अथवा, क्रोध से कहूँ तो, यह भी न जानना कि तुम नहीं जानते।</p>
<cite>— संत हिएरोनिमुस, <a href="02_Clemens_Hieronymi_Du_Culte_hi.html#jerome-to-paulinus">हिएरोनिमुस का पौलिनुस को पत्र</a></cite>
</blockquote>
