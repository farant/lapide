<blockquote>
<p>चार जघन्य पाप हैं जो पवित्रशास्त्र की भाषा में स्वर्ग तक पुकारते हैं: पहला, भ्रातृहत्या, जैसी काइन की थी; दूसरा, सदोम का पाप; तीसरा, श्रमिकों की धोखे से रोकी गई मजदूरी; चौथा, विधवाओं, अनाथों और दरिद्रों का उत्पीड़न।</p>
<cite>— कोर्नेलियूस आ लापिदे, <a href="01_genesis_04_hi.html#ch4-verse-10">उत्पत्ति पर टीका, अध्याय ४ — "रक्त की वाणी"</a></cite>
</blockquote>
