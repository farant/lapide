<blockquote>
<p>स्वर्ग के राज्य से तुलना की जा सकने वाली कोई वस्तु नहीं है; क्योंकि सम्पूर्ण संसार भी, समान तराज़ू में तोलने पर, एक आत्मा की तुलना में कुछ भी नहीं।</p>
<cite>— मीनास, कोर्नेलियूस आ लापिदे में, <a href="01_genesis_01_hi.html#verse-16">उत्पत्ति पर टीका, अध्याय १ — "पद १६: और ईश्वर ने दो बड़ी ज्योतियाँ बनायीं"</a></cite>
</blockquote>
