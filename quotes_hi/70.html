<blockquote>
<p>मसीही लोग पूर्व की ओर मुख करके प्रार्थना करते हैं, ताकि उन्हें स्वर्गलोक का स्मरण रहे, जहाँ से उन्हें पाप के कारण निकाला गया था।</p>
<cite>— क्रिसोस्तोमुस, थियोडोरेट, और दमास्कीनुस, कोर्नेलियूस आ लापिदे में, <a href="01_genesis_02_hi.html#verse-8">उत्पत्ति पर टीका, अध्याय २ — "पद ८: और प्रभु ईश्वर ने आनन्द का एक उद्यान लगाया"</a></cite>
