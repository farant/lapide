<blockquote>
<p>उसने फूँका, यह दिखाने के लिए कि ईश्वर के लिए आत्मा की रचना करना उतना ही सहज है जितना मनुष्य के लिए श्वास लेना।</p>
<cite>— थियोडोरेट, कोर्नेलियूस आ लापिदे में, <a href="01_genesis_02_hi.html#verse-7">उत्पत्ति पर टीका, अध्याय २ — "पद ७: और प्रभु ईश्वर ने पृथ्वी की मिट्टी से मनुष्य को रचा"</a></cite>
</blockquote>
