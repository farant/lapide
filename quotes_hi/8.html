<blockquote>
<p>सत्य में और अपनी अन्तरात्मा में, मैं मनुष्यों में सबसे मूर्ख हूँ, और मनुष्यों का ज्ञान मेरे साथ नहीं है; मैं एक छोटा बालक हूँ जो अपना आना-जाना नहीं जानता।</p>
<cite>— कोर्नेलियूस आ लापिदे, <a href="01_Preliminares_hi.html#life">प्रारम्भिक सामग्री — कोर्नेलियूस आ लापिदे का जीवन</a></cite>
